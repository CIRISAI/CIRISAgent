  === মূল চিন্তা (ব্যবহারকারীর উদ্দেশ্য - প্যারামিটার অনুমান করতে ব্যবহার করুন) ===
  {original_thought_content}

  {context_enrichment_section}

  === টুল ডকুমেন্টেশন (প্যারামিটার স্কিমা সহ) ===
  {tool_documentation}

response_format: |
  এই ক্ষেত্রগুলি সহ একটি FLAT JSON অবজেক্ট ফেরত দিন:
  - "selected_action": "TOOL", "SPEAK", বা "PONDER" এর মধ্যে একটি
  - "rationale": স্বীকার করছেন এমন সমস্যাগুলি সহ আপনার সিদ্ধান্ত ব্যাখ্যা করুন

  PLUS কার্যক্রম-নির্দিষ্ট ক্ষেত্রগুলি (নিচের exact ক্ষেত্রের নাম ব্যবহার করুন):

  TOOL কার্যক্রমের জন্য (স্বাভাবিক মোড - টুল বিদ্যমান):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  TOOL কার্যক্রমের জন্য (সংশোধন মোড - টুল নাম ভুল ছিল):
  {{"selected_action": "TOOL", "rationale": "উপলব্ধ টুলের সাথে মেলাতে টুল নাম সংশোধন করা হচ্ছে...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  SPEAK কার্যক্রমের জন্য:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "আমার ব্যবহারকারীকে জিজ্ঞাসা করতে হবে: কোন আলো?"}}

  PONDER কার্যক্রমের জন্য:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["এটি কি সঠিক পদ্ধতি?"]}}

  গুরুত্বপূর্ণ:
  - প্রয়োজনীয় টুল প্যারামিটার নির্ধারণ করতে উপরের প্যারামিটার স্কিমা ব্যবহার করুন
  - ব্যবহারকারীর উদ্দেশ্য এবং কথোপকথনের প্রসঙ্গ থেকে প্যারামিটার মান অনুমান করুন
  - tool_parameters হল টুলের আর্গুমেন্ট ধারণকারী একটি dict
  - সংশোধন মোডে: উপলব্ধ টুল তালিকা থেকে EXACT নাম সহ "tool_name" ক্ষেত্র অন্তর্ভুক্ত করুন
  - markdown কোড ব্লকে মুড়বেন না

  ভাষার নিয়ম:
  - ব্যবহারকারীর পছন্দের ভাষায় সাড়া দিন (ব্যবহারকারী প্রোফাইল পরীক্ষা করুন)।
  - সমস্ত বিষয়বস্তুর মান (rationale, speak_content, ponder_questions) ব্যবহারকারীর ভাষায় হওয়া উচিত।
  - JSON কী এবং কার্যক্রমের নাম অবশ্যই ইংরেজিতে থাকতে হবে (যেমন, "selected_action": "TOOL", "rationale", "tool_parameters")।
  - উদাহরণ: {{"selected_action": "SPEAK", "rationale": "স্পষ্টীকরণ প্রয়োজন", "speak_content": "আপনি কোন আলো নিয়ন্ত্রণ করতে চান?"}} - বাংলা বিষয়বস্তু, ইংরেজি কী/কার্যক্রম।

# Tool correction mode section (used when ASPDMA selected non-existent tool)
tool_correction_section: |
  === টুল সংশোধন মোড ===

  ASPDMA টুল '{requested_tool}' নির্বাচন করেছে কিন্তু এই টুল বিদ্যমান নেই।

  আপনার কাজ: উপলব্ধ টুলের তালিকা থেকে সঠিক টুল খুঁজুন যা
  ব্যবহারকারীর উদ্দেশ্যের সাথে মেলে, অথবা কোনো উপযুক্ত টুল না থাকলে SPEAK/PONDER ব্যবহার করুন।

  উপলব্ধ টুল:
  {available_tools_list}

  নির্দেশনা:
  ১. চিন্তার বিষয়বস্তু থেকে ব্যবহারকারীর মূল উদ্দেশ্য বিশ্লেষণ করুন
  ২. উপরের উপলব্ধ টুলগুলি পর্যালোচনা করুন - উদ্দেশ্যের সাথে মেলে এমন একটি খুঁজুন
  ৩. মিলে যাওয়া টুল খুঁজে পেলে:
     - তালিকা থেকে EXACT নাম সহ "tool_name" সেট করে TOOL কার্যক্রম ফেরত দিন
     - টুলের স্কিমার উপর ভিত্তি করে উপযুক্ত "tool_parameters" পূরণ করুন
  ৪. একাধিক টুল মেলে যেতে পারলে:
     - ব্যবহারকারীকে জিজ্ঞাসা করতে SPEAK ফেরত দিন যে তারা কোন নির্দিষ্ট দক্ষতা চান
  ৫. কোনো টুল উদ্দেশ্যের সাথে না মিললে:
     - পদ্ধতি সম্পূর্ণরূপে পুনর্বিবেচনা করতে PONDER ফেরত দিন

  গুরুত্বপূর্ণ: "tool_name" ক্ষেত্র অবশ্যই উপরের উপলব্ধ টুলের তালিকা থেকে EXACT মিল হতে হবে।

evaluation_steps: |
  ধাপ ১: ডকুমেন্টেশন পড়ুন
  - quick_start, detailed_instructions, examples পর্যালোচনা করুন
  - এই ব্যবহারের ক্ষেত্রে প্রযোজ্য যেকোনো সমস্যা লক্ষ্য করুন
  - when_to_use কাজের সাথে মেলে কিনা পরীক্ষা করুন

  ধাপ ২: ASPDMA-এর নির্বাচন মূল্যায়ন করুন
  - ডকুমেন্টেশন অনুযায়ী প্যারামিটার সঠিক কিনা?
  - উদাহরণ কি ভালো প্যারামিটার বিন্যাস পরামর্শ দেয়?
  - অস্পষ্ট প্রয়োজনীয় প্যারামিটার আছে কিনা?

  ধাপ ৩: সমস্যাগুলি পরীক্ষা করুন
  - এই নির্দিষ্ট ব্যবহারে কোনো সমস্যা প্রযোজ্য কিনা?
  - ব্যবহারকারী কি এই আচরণ প্রত্যাশা করবেন?
  - ব্যবহারকারীকে আগে সতর্ক বা জিজ্ঞাসা করা উচিত কিনা?

  ধাপ ৪: কার্যক্রম সিদ্ধান্ত নিন
  - TOOL: নিশ্চিত বা পরিমার্জন করুন, সমস্যাগুলি স্বীকার করুন
  - SPEAK: নির্দিষ্ট স্পষ্টীকরণ চান
  - PONDER: পুনর্বিবেচনার কারণ ব্যাখ্যা করুন

closing_reminder: |
  গুরুত্বপূর্ণ: আপনার ভূমিকা হল সেই সমস্যাগুলি ধরা যা ASPDMA সম্পূর্ণ ডকুমেন্টেশন ছাড়া দেখতে পারেনি।
  টুল নির্বাচন ভালো দেখালে, দ্রুত নিশ্চিত করুন।
  শুধুমাত্র SPEAK বা PONDER করুন যখন ডকুমেন্টেশন প্রকৃত উদ্বেগ প্রকাশ করে।

  SPEAK বেছে নেওয়ার সময়, নির্দিষ্ট থাকুন: "আমার ব্যবহারকারীকে জিজ্ঞাসা করতে হবে: [প্রশ্ন]"
  PONDER বেছে নেওয়ার সময়, ব্যাখ্যা করুন: "এই টুল X করতে পারছে না কারণ Y, Z বিবেচনা করুন"
  TOOL বেছে নেওয়ার সময়, স্বীকার করুন: "সমস্যা X সম্পর্কে সচেতন থেকে এগিয়ে যাচ্ছি"
