response_format: |
  Ваша відповідь ПОВИННА бути єдиним JSON-об'єктом, що відповідає наданій схемі, з наступними ключами:
  - "k_eff": Число з плаваючою комою (>= 0) - Ефективна кількість незалежних джерел. Використовуйте формулу k/(1+ρ(k-1)). k_eff < 2 = крихке.
  - "correlation_risk": Число з плаваючою комою (0.0-1.0) - Оцінена ρ кореляція між джерелами.
  - "phase": Рядок - Один з "chaos" (суперечливий), "healthy" (різноманітний синтез), або "rigidity" (ехо-камера).
  - "fragility_flag": Булеве значення - TRUE, якщо k_eff < 2 АБО phase = "rigidity" АБО correlation_risk > 0.7.
  - "sources_identified": Масив рядків - Список чітких джерел/перспектив, ідентифікованих у міркуванні.
  - "correlation_factors": Масив рядків - Фактори, що викликають кореляцію (наприклад, "той самий автор", "походить з єдиного дослідження").
  - "reasoning": Рядок - Ваш аналіз різноманітності інформації та епістемічного здоров'я. Це поле ОБОВ'ЯЗКОВЕ.

  МОВНІ ПРАВИЛА:
  - Відповідайте мовою користувача, яку він надає перевагу (перевірте профіль користувача).
  - ВСІ значення вмісту (reasoning, sources_identified, correlation_factors) повинні бути мовою користувача.
  - Ключі JSON та значення фаз ПОВИННІ залишатися англійською (наприклад, "reasoning", "k_eff", "phase": "healthy").
  - Приклад: {{"reasoning": "Інформація походить лише з одного джерела", "sources_identified": ["навчальні дані"], "phase": "rigidity"}} - український вміст, англійські ключі/фази.

  Не включайте додаткові поля або не обгортайте в блоки коду markdown.

evaluation_steps: |
  КРОК 1: Підрахуйте Джерела (k)
  - Які джерела/перспективи інформують це міркування?
  - Ваше навчання = 1 джерело (завжди присутнє)
  - Вхідні дані користувача = +1 джерело ЯКЩО зріла взаємодія (20+ взаємодій)
  - Веб/результати інструментів = +1 джерело кожне ЯКЩО з незалежних походжень
  - Цитати/дані = +1 джерело кожне ЯКЩО справді незалежні

  КРОК 2: Оцініть Кореляцію (ρ)
  - Для кожної пари джерел запитайте: чи одне походить від іншого?
  - Той самий автор/установа/набір даних → висока кореляція
  - Всі джерела погоджуються щодо складного питання → підозріла кореляція
  - Різні методології, той самий висновок → нижча кореляція
  - ρ = 0 (повністю незалежні) до ρ = 1 (всі походять з того самого походження)

  КРОК 3: Обчисліть k_eff
  - Застосуйте формулу: k_eff = k / (1 + ρ(k-1))
  - Приклад: k=3 джерела, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (крихке!)
  - Приклад: k=3 джерела, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (здорове)
  - Початковий агент: k=1 → k_eff = 1 (завжди крихке)

  КРОК 4: Визначення Фази
  - ХАОС: Кілька суперечливих висновків, немає способу вирішити
  - ЗДОРОВА: Різні перспективи, які можуть бути синтезовані (k_eff ≥ 2)
  - ЖОРСТКІСТЬ: Домінує єдиний наратив, немає незгоди (k_eff → 1, ехо-камера)

  КРОК 5: Перевірка Крихкості
  - k_eff < 2? → КРИХКЕ
  - phase = "rigidity"? → КРИХКЕ
  - correlation_risk > 0.7? → КРИХКЕ
  - Встановіть fragility_flag = TRUE, якщо будь-яке з вищезгаданого

closing_reminder: |
  ВАЖЛИВО: Коли невпевнені щодо незалежності джерел, помиляйтеся на боці обережності
  та оцінюйте вищу кореляцію. Краще позначити для перегляду, ніж пропустити
  потенційну ехо-камеру.

  Прапорець крихкості НЕ означає, що міркування неправильне - це означає, що міркування
  повинно отримати додаткову перевірку або незалежне підтвердження перед діями високих ставок.
