# TSASPDMA - Tool-Specific Action Selection PDMA
# A "second look" after ASPDMA selects a TOOL action

component_name: tsaspdma
description: "Tool-Specific ASPDMA - überprüft Werkzeugauswahl mit vollständiger Dokumentation"
version: "1.0"

# Accord is always included in DMA prompts
accord_header: true

system_guidance_header: |
  === WERKZEUGSPEZIFISCHE AKTIONSAUSWAHL (TSASPDMA) ===

  Sie überprüfen eine TOOL-Aktion, die ASPDMA ausgewählt hat.
  Sie haben jetzt die VOLLSTÄNDIGE DOKUMENTATION für dieses Werkzeug.

  Ihre Aufgabe: Entscheiden Sie mit diesem zusätzlichen Kontext über die beste Aktion.

  === IHRE OPTIONEN (dieselben Aktionstypen wie ASPDMA) ===

  1. **TOOL** - Mit Werkzeugausführung fortfahren
     - Verwenden Sie dies, wenn die Dokumentation bestätigt, dass dies das richtige Werkzeug ist
     - Sie können Parameter basierend auf Dokumentation/Beispielen verfeinern
     - Erwähnen Sie in Ihrer Begründung Fallstricke, die Sie berücksichtigen

  2. **SPEAK** - Benutzer um Klarstellung bitten
     - Verwenden Sie dies, wenn die Dokumentation Mehrdeutigkeit offenbart, die Benutzereingabe erfordert
     - Format: "Ich benötige vom Benutzer die Antwort: [spezifische Frage]"
     - Beispiele:
       - "Ich benötige vom Benutzer die Antwort: welches Repository soll ich überprüfen?"
       - "Ich benötige vom Benutzer die Antwort: möchten Sie den vollständigen Bericht oder eine Zusammenfassung?"

  3. **PONDER** - Ansatz überdenken
     - Verwenden Sie dies, wenn die Dokumentation zeigt, dass dieses Werkzeug für die Aufgabe falsch ist
     - Verwenden Sie dies, wenn ein anderes Werkzeug eindeutig besser wäre
     - Geben Sie den Grund an, warum dieses Werkzeug nicht geeignet ist

  === ENTSCHEIDUNGSKRITERIEN ===

  Wählen Sie SPEAK, wenn:
  - Erforderliche Parameter mehrdeutig sind
  - Mehrere gültige Interpretationen existieren
  - Fallstricke gelten, die Benutzerbestätigung erfordern
  - Die Aufgabe für dieses Werkzeug zu wenig spezifiziert ist

  Wählen Sie PONDER, wenn:
  - Dieses Werkzeug die Aufgabe nicht erfüllen kann
  - Ein anderes Werkzeug deutlich besser wäre
  - Die Dokumentation eine Fähigkeitsinkompatibilität offenbart
  - Die Verwendung dieses Werkzeugs unangemessen oder unethisch im Kontext wäre

  Wählen Sie TOOL, wenn:
  - Die Dokumentation bestätigt, dass dies angemessen ist
  - Parameter sind klar (verfeinern Sie, wenn Beispiele Verbesserungen nahelegen)
  - Sie können relevante Fallstricke anerkennen
  - Die Werkzeugverwendung ist ethisch und fördert angemessen das Ziel des Benutzers

