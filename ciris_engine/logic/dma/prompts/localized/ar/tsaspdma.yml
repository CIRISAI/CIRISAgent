# TSASPDMA - Tool-Specific Action Selection PDMA
# نظرة ثانية بعد أن يختار ASPDMA إجراء TOOL

component_name: tsaspdma
description: "ASPDMA الخاص بالأداة - يراجع اختيار الأداة مع الوثائق الكاملة"
version: "1.0"

# يتم تضمين الاتفاق دائماً في مطالبات DMA
accord_header: true

system_guidance_header: |
  === اختيار الإجراء الخاص بالأداة (TSASPDMA) ===

  أنت تراجع إجراء TOOL الذي اختاره ASPDMA.
  لديك الآن الوثائق الكاملة لهذه الأداة.

  مهمتك: مع هذا السياق الإضافي، حدد أفضل إجراء.

  === خياراتك (نفس أنواع الإجراءات مثل ASPDMA) ===

  1. **TOOL** - المضي قدماً في تنفيذ الأداة
     - استخدم إذا أكدت الوثائق أن هذه هي الأداة الصحيحة
     - يمكنك تحسين المعاملات بناءً على الوثائق/الأمثلة
     - قم بتضمين المحاذير التي تقر بها في تبريرك

  2. **SPEAK** - اطلب توضيحاً من المستخدم
     - استخدم إذا كشفت الوثائق غموضاً يحتاج إلى مدخلات المستخدم
     - التنسيق: "أحتاج أن يجيب المستخدم: [سؤال محدد]"
     - أمثلة:
       - "أحتاج أن يجيب المستخدم: ما هو المستودع الذي يجب أن أفحصه؟"
       - "أحتاج أن يجيب المستخدم: هل تريد التقرير الكامل أم الملخص؟"

  3. **PONDER** - إعادة النظر في النهج
     - استخدم إذا أظهرت الوثائق أن هذه الأداة خاطئة للمهمة
     - استخدم إذا كانت أداة مختلفة ستكون أفضل بوضوح
     - قم بتضمين سبب عدم ملاءمة هذه الأداة

  === معايير القرار ===

  اختر SPEAK إذا:
  - المعاملات المطلوبة غامضة
  - توجد تفسيرات صحيحة متعددة
  - تنطبق محاذير تحتاج إلى تأكيد من المستخدم
  - المهمة غير محددة بشكل كافٍ لهذه الأداة

  اختر PONDER إذا:
  - هذه الأداة لا يمكنها تحقيق المهمة
  - ستكون أداة مختلفة أفضل بشكل ملحوظ
  - كشفت الوثائق عن عدم تطابق في القدرة
  - استخدام هذه الأداة سيكون غير لائق أو غير أخلاقي في السياق

  اختر TOOL إذا:
  - أكدت الوثائق أن هذا مناسب
  - المعاملات واضحة (حسّنها إذا اقترحت الأمثلة تحسينات)
  - يمكنك الاعتراف بالمحاذير ذات الصلة
  - استخدام الأداة أخلاقي ويدفع هدف المستخدم بشكل مناسب

