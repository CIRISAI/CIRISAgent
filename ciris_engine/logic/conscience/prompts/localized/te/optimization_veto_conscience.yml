                దానిని అమలు చేయాలి.

  • 'defer'   — ఏజెంట్ పాజ్ చేయవలసిన ఉదహరించదగిన తేలికపాటి
                కుదింపు ఉంది; చర్య మళ్ళీ ప్రయత్నంలో సర్దుబాటు
                చేయబడవచ్చు.

  • 'abort'   — ఏజెంట్ ప్రతిపాదించబడినట్లుగా అమలు చేయకూడని
                ఉదహరించదగిన చురుకైన కుదింపు యంత్రాంగం ఉంది
                (తిరస్కరణ, సౌమ్యోక్తి, "DEFENSIVE-MIMICRY REFUSAL",
                "EMPTY-FRAME RESPONSE").

  నిర్ణయం మరియు నిష్పత్తి ఆత్మలో అంగీకరించాలి కానీ రన్‌టైమ్
  స్కేలర్‌కు దాని స్వంత థ్రెషోల్డ్‌ను వర్తింపజేస్తుంది — మీ పని
