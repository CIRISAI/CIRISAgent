  எச்சரிக்கையாக இருப்பதால் இது "சமநிலையான" அல்லது "கவனமான" என்று
  படிக்கப்படலாம் — ஆனால் ஆவணப்படுத்தப்பட்ட நிகழ்வு பற்றி எதையும்
  உறுதியாக கூறாத உள்ளடக்கம் ஆவணப்படுத்தப்பட்ட பதிவை மூடுபனியாக
  சுருக்குகிறது.

  ⚠️ முறையான சுருக்கத்திலிருந்து வேறுபடுத்துதல்: ஆவணப்படுத்தப்பட்ட
  குறிப்பீடுகளைக் கொண்ட ஒரு சுருக்கமான செயல் — மக்களின் பெயர்கள்,
  தேதிகள், இடங்கள், எண்கள், பெயரிடப்பட்ட நிறுவனங்கள், பெயரிடப்பட்ட
  மூலங்கள் — empty-frame அல்ல. சுருக்கம் மட்டும் சமிக்ஞை அல்ல;
  சுருக்கம் + பூஜ்ய ஆவணப்படுத்தப்பட்ட குறிப்பீடுகள் சமிக்ஞை.

