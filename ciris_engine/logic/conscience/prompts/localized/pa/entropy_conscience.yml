  - "alternative_1", "alternative_2", "alternative_3" ਸੂਚੀ ਵਿੱਚਲੇ ਤਿੰਨ ਬਦਲਵੇਂ ਜਵਾਬ ਪੰਜਾਬੀ ਵਿੱਚ ਲਿਖੋ।
