name: Upgrade Fixture

# Builds a deterministic agent-DB snapshot for the current release. The
# snapshot is consumed by the *next* major release's upgrade-compat test
# matrix (golden-snapshot upgrade test). See tools/release/UPGRADE_FIXTURE.md.

on:
  workflow_dispatch:
    inputs:
      version_label:
        description: "Version label to embed in MANIFEST (e.g. v2.8.13)"
        required: false
        type: string
  push:
    tags:
      - "v2.*"
      - "release/2.*"
  # Run on PRs that touch the fixture builder itself so a broken builder
  # gets caught before it lands on a release branch.
  pull_request:
    paths:
      - "tools/release/build_upgrade_fixture.py"
      - ".github/workflows/upgrade-fixture.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build upgrade fixture
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # PRs and workflow_dispatch only need read; tag builds need write to
    # attach the fixture files to the GitHub Release via
    # softprops/action-gh-release. Granting write at the job level keeps
    # the workflow simple — the upload step is gated by `if: ref_type == 'tag'`
    # so non-tag runs never exercise the write capability.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install TPM2 TSS runtime libraries (CIRISVerify dep)
        # CIRISVerify needs libtss2-* runtime libs to initialize its
        # signing key — without these, setup/complete aborts with
        # UNSUPPORTED_PLATFORM_CIRIS_VERIFY and rolls back. Same 3-way
        # fallback chain memory-benchmark.yml + safety-battery.yml use
        # (Debian / newer Debian / Ubuntu 24.04 t64 package renames),
        # wrapped in retry to survive apt mirror flakes.
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          shell: bash
          command: |
            if ! sudo apt-get install -y libtss2-esys0 libtss2-tctildr0 libtss2-mu0; then
              if ! sudo apt-get install -y libtss2-esys-3.0.2-0 libtss2-tctildr0 libtss2-mu-4.0.1-0; then
                sudo apt-get install -y libtss2-esys-3.0.2-0t64 libtss2-tctildr0t64 libtss2-mu-4.0.1-0t64
              fi
            fi

      - name: Resolve version label
        id: ver
        run: |
          if [ -n "${{ inputs.version_label }}" ]; then
            echo "label=${{ inputs.version_label }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "label=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            # Derive from constants.py — keeps PR runs labelled correctly
            label=$(python -c "from ciris_engine.constants import CIRIS_VERSION; print('v' + CIRIS_VERSION.replace('-stable',''))")
            echo "label=$label" >> "$GITHUB_OUTPUT"
          fi

      - name: Build fixture
        run: |
          python -m tools.release.build_upgrade_fixture \
            --out "fixtures/${{ steps.ver.outputs.label }}" \
            --version "${{ steps.ver.outputs.label }}" \
            --port 8123

      - name: Show MANIFEST
        run: cat "fixtures/${{ steps.ver.outputs.label }}/MANIFEST.json"

      - name: Upload fixture artifact
        uses: actions/upload-artifact@v4
        with:
          name: upgrade-fixture-${{ steps.ver.outputs.label }}
          path: fixtures/${{ steps.ver.outputs.label }}/
          if-no-files-found: error
          retention-days: 90

      # On tagged release, also attach to the GitHub Release so consumers
      # don't need to chase workflow artifacts.
      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fixtures/${{ steps.ver.outputs.label }}/ciris_engine.db
            fixtures/${{ steps.ver.outputs.label }}/ciris_audit.db
            fixtures/${{ steps.ver.outputs.label }}/MANIFEST.json
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
