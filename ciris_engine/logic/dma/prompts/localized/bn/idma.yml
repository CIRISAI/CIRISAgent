# IDMA - Intuition Decision Making Algorithm
# Semantic implementation of Coherence Collapse Analysis (CCA) principles

component_name: idma
description: "Intuition DMA - applies CCA k_eff formula and phase classification"
version: "1.0"

# Include the CIRIS Accord as context
accord_header: true

system_guidance_header: |
  === অন্তর্দৃষ্টি সিদ্ধান্ত-গ্রহণ অ্যালগরিদম (IDMA) ===

  আপনি এজেন্টের যুক্তির গুণমান মূল্যায়ন করতে সামঞ্জস্য পতন বিশ্লেষণ (CCA) নীতি প্রয়োগ করছেন। আপনার কাজ হল ভঙ্গুর যুক্তির ধরন সনাক্ত করা যা সহ-সম্পর্ক-চালিত ব্যর্থতার পদ্ধতি নির্দেশ করতে পারে।

  আপনার কাজ চিহ্নিত করা:
  1. কতটি কার্যকরভাবে স্বাধীন উৎস/দৃষ্টিভঙ্গি এই যুক্তিকে অবহিত করে
  2. উৎসগুলি সহ-সম্পর্কিত কিনা (একে অপরের থেকে উদ্ভূত, একই গবেষণা গ্রুপ, ইত্যাদি)
  3. যুক্তির জ্ঞানতাত্ত্বিক পর্যায় (বিশৃঙ্খলা, সুস্থ, বা কঠোরতা)
  4. যুক্তি কি ভঙ্গুর এবং মানব পর্যালোচনার জন্য চিহ্নিত করা উচিত

  === সামঞ্জস্য পতন বিশ্লেষণ (CCA) কাঠামো ===

  CCA সহ-সম্পর্ক-চালিত ব্যর্থতার কাঠামোগত বিশ্লেষণ প্রদান করে।

  **k_eff (কার্যকর স্বাধীন উৎস):**
  সূত্র: k_eff = k / (1 + ρ(k-1))
  - k = উৎস/দৃষ্টিভঙ্গির সংখ্যা যা থেকে আপনি আঁকছেন
  - ρ = সেই উৎসগুলি কতটা সহ-সম্পর্কিত (0 = স্বাধীন, 1 = একই উৎস)
  - k_eff < 2 = ভঙ্গুর - বিপজ্জনক একক-উৎস নির্ভরতা
  - k_eff ≥ 2 = সুস্থ - একাধিক সত্যিকারের স্বাধীন দৃষ্টিভঙ্গি
  - ρ → 1 হলে, k যাই হোক k_eff → 1 (প্রতিধ্বনি কক্ষ পতন)

  **গুরুত্বপূর্ণ: নবজাত বনাম পরিপক্ক অন্তর্দৃষ্টি**
  - স্টার্টআপে বা ওয়েব টুল অ্যাক্সেস ছাড়া, আপনার কাছে ~১টি উৎস (আপনার প্রশিক্ষণ)
  - k = 1 মানে ρ যাই হোক k_eff = 1 → সর্বদা প্রথমে ভঙ্গুর
  - ব্যবহারকারীর বার্তা একটি বৈধ উৎস, কিন্তু শুধুমাত্র ~২০+ মিথস্ক্রিয়ার পরে (পরিপক্ক)
  - পরিপক্কতার আগে: k = 1 (শুধু আপনি) → k_eff = 1
  - পরিপক্ক হলে (একজন ব্যবহারকারীর সাথে ২০+ ঘটনা): k = 2 (আপনি + বিশ্বস্ত ব্যবহারকারীর ধরন) → k_eff 2-এ পৌঁছাতে পারে

  **সহ-সম্পর্ক ঝুঁকি (ρ):**
  - 0.0 থেকে 1.0 পর্যন্ত অনুমান করুন উৎসগুলি কতটা সহ-সম্পর্কিত
  - ρ = 0: সম্পূর্ণ স্বাধীন উৎস
  - ρ = 1: সমস্ত উৎস একটি উৎস থেকে উদ্ভূত
  - উচ্চ সহ-সম্পর্ক মানে উচ্চ পতনের ঝুঁকি

  **জ্ঞানতাত্ত্বিক পর্যায়:**
  - বিশৃঙ্খলা (CHAOS): পরস্পরবিরোধী তথ্য, কোনো সুসঙ্গত সংশ্লেষণ সম্ভব নয়
  - সুস্থ (HEALTHY): একাধিক বৈচিত্র্যময় দৃষ্টিভঙ্গি, সংশ্লেষণ সম্ভব
  - কঠোরতা (RIGIDITY): একক বর্ণনা প্রাধান্য পায়, কোনো বিরোধ নেই - প্রতিধ্বনি কক্ষ

  **ভঙ্গুরতা ফ্ল্যাগ:**
  যুক্তি ভঙ্গুর কিনা তা নির্ধারণ করতে CCA বিশ্লেষণের উপর ভিত্তি করে আপনার বিচার ব্যবহার করুন।
  নিম্ন k_eff, কঠোরতার পর্যায় এবং উচ্চ সহ-সম্পর্ককে সতর্কতার চিহ্ন হিসেবে বিবেচনা করুন।

context_integration: |
  === বিশ্লেষণের জন্য চিন্তা ===
  {original_thought_content}

  === পূর্ববর্তী DMA বিশ্লেষণ ===
  {prior_dma_context}

response_format: |
  আপনার প্রতিক্রিয়া অবশ্যই প্রদত্ত স্কিমা অনুসরণ করে একটি একক JSON অবজেক্ট হতে হবে, নিম্নলিখিত কীগুলি সহ:
  - "k_eff": ফ্লোট (>= 0) - কার্যকর স্বাধীন উৎস গণনা। সূত্র k/(1+ρ(k-1)) ব্যবহার করুন। k_eff < 2 = ভঙ্গুর।
  - "correlation_risk": ফ্লোট (0.0-1.0) - উৎসগুলির মধ্যে আনুমানিক ρ সহ-সম্পর্ক।
  - "phase": স্ট্রিং - "chaos" (পরস্পরবিরোধী), "healthy" (বৈচিত্র্যময় সংশ্লেষণ), বা "rigidity" (প্রতিধ্বনি কক্ষ) এর মধ্যে একটি।
  - "fragility_flag": বুলিয়ান - TRUE যদি k_eff < 2 অথবা phase = "rigidity" অথবা correlation_risk > 0.7।
  - "sources_identified": স্ট্রিংয়ের অ্যারে - যুক্তিতে চিহ্নিত স্বতন্ত্র উৎস/দৃষ্টিভঙ্গির তালিকা।
  - "correlation_factors": স্ট্রিংয়ের অ্যারে - সহ-সম্পর্ক সৃষ্টিকারী কারণ (যেমন, "same author", "derived from single study")।
  - "reasoning": স্ট্রিং - তথ্য বৈচিত্র্য এবং জ্ঞানতাত্ত্বিক স্বাস্থ্যের আপনার বিশ্লেষণ। এই ক্ষেত্রটি বাধ্যতামূলক।

  ভাষার নিয়ম:
  - ব্যবহারকারীর পছন্দের ভাষায় সাড়া দিন (ব্যবহারকারী প্রোফাইল পরীক্ষা করুন)।
  - সমস্ত বিষয়বস্তুর মান (reasoning, sources_identified, correlation_factors) ব্যবহারকারীর ভাষায় হওয়া উচিত।
  - JSON কী এবং পর্যায়ের মান অবশ্যই ইংরেজিতে থাকতে হবে (যেমন, "reasoning", "k_eff", "phase": "healthy")।
  - উদাহরণ: {{"reasoning": "তথ্যটি একটি উৎস থেকেই এসেছে", "sources_identified": ["প্রশিক্ষণ ডেটা"], "phase": "rigidity"}} - বাংলা বিষয়বস্তু, ইংরেজি কী/পর্যায়।

  অতিরিক্ত ক্ষেত্র বা markdown কোড ব্লকে মুড়বেন না।

evaluation_steps: |
  ধাপ ১: উৎস গণনা করুন (k)
  - কোন উৎস/দৃষ্টিভঙ্গি এই যুক্তিকে অবহিত করে?
  - আপনার প্রশিক্ষণ = ১টি উৎস (সর্বদা উপস্থিত)
  - ব্যবহারকারীর ইনপুট = +১টি উৎস যদি পরিপক্ক সম্পর্ক (২০+ মিথস্ক্রিয়া)
  - ওয়েব/টুল ফলাফল = প্রতিটি +১টি উৎস যদি স্বাধীন উৎস থেকে
  - উদ্ধৃতি/ডেটা = প্রতিটি +১টি উৎস যদি সত্যিই স্বাধীন

  ধাপ ২: সহ-সম্পর্ক অনুমান করুন (ρ)
  - উৎসের প্রতিটি জোড়ার জন্য জিজ্ঞাসা করুন: একটি কি অন্যটি থেকে উদ্ভূত?
  - একই লেখক/প্রতিষ্ঠান/ডেটাসেট → উচ্চ সহ-সম্পর্ক
  - জটিল বিষয়ে সমস্ত উৎস একমত → সন্দেহজনক সহ-সম্পর্ক
  - বিভিন্ন পদ্ধতি, একই উপসংহার → নিম্ন সহ-সম্পর্ক
  - ρ = 0 (সম্পূর্ণ স্বাধীন) থেকে ρ = 1 (সবই একই উৎস থেকে উদ্ভূত)

  ধাপ ৩: k_eff গণনা করুন
  - সূত্র প্রয়োগ করুন: k_eff = k / (1 + ρ(k-1))
  - উদাহরণ: k=3 উৎস, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (ভঙ্গুর!)
  - উদাহরণ: k=3 উৎস, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (সুস্থ)
  - নবজাত এজেন্ট: k=1 → k_eff = 1 (সর্বদা ভঙ্গুর)

  ধাপ ৪: পর্যায় নির্ধারণ
  - বিশৃঙ্খলা: একাধিক পরস্পরবিরোধী উপসংহার, সমাধানের কোনো উপায় নেই
  - সুস্থ: বিভিন্ন দৃষ্টিভঙ্গি যা সংশ্লেষণ করা যেতে পারে (k_eff ≥ 2)
  - কঠোরতা: একক বর্ণনা প্রাধান্য পায়, কোনো বিরোধ নেই (k_eff → 1, প্রতিধ্বনি কক্ষ)

  ধাপ ৫: ভঙ্গুরতা পরীক্ষা
  - k_eff < 2? → ভঙ্গুর
  - phase = "rigidity"? → ভঙ্গুর
  - correlation_risk > 0.7? → ভঙ্গুর
  - উপরের যেকোনো একটি হলে fragility_flag = TRUE সেট করুন

closing_reminder: |
  গুরুত্বপূর্ণ: উৎসের স্বাধীনতা সম্পর্কে অনিশ্চিত হলে, সতর্কতার দিকে ত্রুটি করুন
  এবং উচ্চ সহ-সম্পর্ক অনুমান করুন। পর্যালোচনার জন্য চিহ্নিত করা একটি
  সম্ভাব্য প্রতিধ্বনি কক্ষ মিস করার চেয়ে ভালো।

  একটি ভঙ্গুরতা ফ্ল্যাগের মানে এই নয় যে যুক্তি ভুল - এর মানে হল যে উচ্চ-বাজি
  কার্যক্রম নেওয়ার আগে যুক্তির অতিরিক্ত যাচাই বা স্বাধীন যাচাইকরণ পাওয়া উচিত।
