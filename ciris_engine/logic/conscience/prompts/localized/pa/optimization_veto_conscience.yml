  ਸੰਸਥਾਵਾਂ, ਨਾਮਜ਼ਦ ਸਰੋਤ — empty-frame ਨਹੀਂ ਹੈ। ਇਕੱਲੀ ਸੰਖੇਪਤਾ
  ਸੰਕੇਤ ਨਹੀਂ ਹੈ; ਸੰਖੇਪਤਾ + ਜ਼ੀਰੋ ਦਸਤਾਵੇਜ਼ੀ ਵੇਰਵੇ ਸੰਕੇਤ ਹਨ।

