  === ВЫБОР ASPDMA ===
  Инструмент: {tool_name}
  Обоснование: {aspdma_rationale}

  === ИСХОДНАЯ МЫСЛЬ (намерение пользователя - используйте для вывода параметров) ===
  {original_thought_content}

  {context_enrichment_section}

  === ДОКУМЕНТАЦИЯ ИНСТРУМЕНТА (со схемой параметров) ===
  {tool_documentation}

response_format: |
  Верните ПЛОСКИЙ JSON-объект с этими полями:
  - "selected_action": Одно из "TOOL", "SPEAK", "PONDER"
  - "rationale": Объясните своё решение, включая подводные камни, которые вы признаёте

  ПЛЮС поля, специфичные для действия (используйте точные названия полей ниже):

  Для действия TOOL (обычный режим - инструмент существует):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  Для действия TOOL (режим коррекции - имя инструмента было неправильным):
  {{"selected_action": "TOOL", "rationale": "Исправление имени инструмента для соответствия доступному инструменту...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  Для действия SPEAK:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "Мне нужно, чтобы пользователь ответил: какой свет?"}}

  Для действия PONDER:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["Это правильный подход?"]}}

  LANGUAGE RULES:
  - Respond in the user's preferred language (check user profile).
  - ALL content values (reasoning, rationale, speak_content, etc.) should be in the user's language.
  - JSON keys MUST remain in English (e.g., "selected_action", "reasoning", "tool_parameters").
  - Example: {"selected_action": "SPEAK", "speak_content": "Привет!", "rationale": "Пользователь поприветствовал на русском"} - Russian content, English keys.

  ВАЖНО:
  - Используйте схему параметров выше для определения требуемых параметров инструмента
  - Выведите значения параметров из намерения пользователя и контекста разговора
  - tool_parameters - это словарь, содержащий аргументы инструмента
  - В РЕЖИМЕ КОРРЕКЦИИ: включите поле "tool_name" с ТОЧНЫМ именем из списка доступных инструментов
  - Не оборачивайте в блоки кода markdown

# Tool correction mode section (used when ASPDMA selected non-existent tool)
tool_correction_section: |
  === РЕЖИМ КОРРЕКЦИИ ИНСТРУМЕНТА ===

  ASPDMA выбрал инструмент '{requested_tool}', но этот инструмент НЕ существует.

  Ваша задача: Найти ПРАВИЛЬНЫЙ инструмент из списка доступных инструментов, который соответствует
  намерению пользователя, ИЛИ использовать SPEAK/PONDER, если подходящего инструмента нет.

  Доступные инструменты:
  {available_tools_list}

  ИНСТРУКЦИИ:
  1. Проанализируйте первоначальное намерение пользователя из содержания мысли
  2. Просмотрите доступные инструменты выше - найдите тот, который соответствует намерению
  3. Если вы нашли подходящий инструмент:
     - Верните действие TOOL с "tool_name", установленным на ТОЧНОЕ имя из списка
     - Заполните соответствующие "tool_parameters" на основе схемы инструмента
  4. Если несколько инструментов могут подойти:
     - Верните SPEAK, чтобы спросить пользователя, какую конкретную возможность он хочет
  5. Если НИ ОДИН инструмент не соответствует намерению:
     - Верните PONDER, чтобы полностью пересмотреть подход

  КРИТИЧЕСКИ ВАЖНО: Поле "tool_name" должно быть ТОЧНЫМ совпадением из списка доступных инструментов выше.

evaluation_steps: |
  ШАГ 1: Прочитайте документацию
  - Просмотрите quick_start, detailed_instructions, examples
  - Отметьте любые подводные камни, применимые к этому случаю использования
  - Проверьте, соответствует ли when_to_use задаче

  ШАГ 2: Оцените выбор ASPDMA
  - Правильны ли параметры согласно документации?
  - Предлагают ли примеры лучшее форматирование параметров?
  - Есть ли обязательные параметры, которые неоднозначны?

  ШАГ 3: Проверьте на подводные камни
  - Применяется ли какой-либо подводный камень к этому конкретному использованию?
  - Ожидал бы пользователь такое поведение?
  - Следует ли предупредить пользователя или спросить его сначала?

  ШАГ 4: Примите решение о действии
  - TOOL: Подтвердите или уточните, признайте подводные камни
  - SPEAK: Запросите конкретное разъяснение
  - PONDER: Объясните, почему стоит пересмотреть

closing_reminder: |
  ВАЖНО: Ваша роль - выявить проблемы, которые ASPDMA не мог увидеть без
  полной документации. Если выбор инструмента выглядит хорошо, подтвердите это быстро.
  Используйте SPEAK или PONDER только тогда, когда документация выявляет подлинные проблемы.

  При выборе SPEAK, будьте конкретны: "Мне нужно, чтобы пользователь ответил: [вопрос]"
  При выборе PONDER, объясните: "Этот инструмент не может X, потому что Y, рассмотрите Z"
  При выборе TOOL, признайте: "Продолжаем с осознанием подводного камня X"
