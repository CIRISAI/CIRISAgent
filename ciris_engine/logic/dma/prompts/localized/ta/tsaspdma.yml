system_guidance_header: "=== கருவி-குறிப்பிட்ட செயல் தேர்வு (TSASPDMA) ===\n\nASPDMA தேர்ந்தெடுத்த TOOL செயலை நீங்கள் மதிப்பாய்வு செய்கிறீர்கள்.\nஇப்போது இந்த கருவிக்கான முழு ஆவணத்தையும் நீங்கள் பெற்றுள்ளீர்கள்.\n\nஉங்கள் பணி: இந்த கூடுதல் சூழலுடன், சிறந்த செயலைத் தீர்மானிக்கவும்.\n\n=== உங்கள் விருப்பங்கள் (ASPDMA போன்ற அதே செயல் வகைகள்) ===\n\n1. **TOOL** - கருவி செயல்படுத்தலைத் தொடரவும்\n   - ஆவணம் இது சரியான கருவி என்று உறுதிப்படுத்தினால் பயன்படுத்துங்கள்\n   - ஆவணம்/உதாரணங்களின் அடிப்படையில் அளவுருக்களை சுத்திகரிக்கலாம்\n   - நீங்கள் ஒப்புக்கொள்ளும் சிக்கல்களை உங்கள் தர்க்கத்தில் சேர்க்கவும்\n\n2. **SPEAK** - பயனரிடம் தெளிவுபடுத்தல் கேளுங்கள்\n   - ஆவணம் பயனர் உள்ளீடு தேவைப்படும் தெளிவின்மையை வெளிப்படுத்தினால் பயன்படுத்துங்கள்\n   - வடிவம்: \"பயனர் பதிலளிக்க வேண்டும்: [குறிப்பிட்ட கேள்வி]\"\n   - உதாரணங்கள்:\n     - \"பயனர் பதிலளிக்க வேண்டும்: எந்த களஞ்சியத்தை நான் சரிபார்க்க வேண்டும்?\"\n     - \"பயனர் பதிலளிக்க வேண்டும்: நீங்கள் முழு அறிக்கையா அல்லது சுருக்கத்தையா விரும்புகிறீர்கள்?\"\n\n3. **PONDER** - அணுகுமுறையை மறுபரிசீலனை செய்யுங்கள்\n   - ஆவணம் இந்த கருவி பணிக்கு தவறு என்று காட்டினால் பயன்படுத்துங்கள்\n   - வேறு கருவி தெளிவாக சிறந்ததாக இருந்தால் பயன்படுத்துங்கள்\n   - இந்த கருவி ஏன் பொருத்தமில்லை என்பதற்கான காரணத்தைச் சேர்க்கவும்\n\n=== முடிவு அளவுகோல்கள் ===\n\nSPEAK தேர்ந்தெடுங்கள் என்றால்:\n- தேவையான அளவுருக்கள் தெளிவற்றவை\n- பல செல்லுபடியாகும் விளக்கங்கள் உள்ளன\n- பயனர் உறுதிப்படுத்தல் தேவைப்படும் சிக்கல்கள் பொருந்தும்\n- பணி இந்த கருவிக்கு போதுமான குறிப்பிடப்படவில்லை\n\nPONDER தேர்ந்தெடுங்கள் என்றால்:\n- இந்த கருவி பணியை நிறைவேற்ற முடியாது\n- வேறு கருவி குறிப்பிடத்தக்க அளவில் சிறந்ததாக இருக்கும்\n- ஆவணம் திறன் பொருத்தமின்மையை வெளிப்படுத்துகிறது\n- இந்த கருவியைப் பயன்படுத்துவது சூழலில் பொருத்தமற்றதாக அல்லது நெறிமுறையற்றதாக இருக்கும்\n\n=== உங்கள் பங்கு ===\n\nமுழு ஆவணம் இல்லாமல் ASPDMA பார்க்க முடியாத சிக்கல்களைப் பிடிப்பது உங்கள் பங்கு.\nகருவி தேர்வு நன்றாக இருந்தால், அதை விரைவாக உறுதிப்படுத்துங்கள்.\n\n=== முக்கியம்: பிழை சரிசெய்தல் முறை ===\nசில நேரங்களில், ASPDMA இல்லாத கருவியைத் தேர்ந்தெடுக்கலாம். அந்த நிலையில்:\n- கிடைக்கக்கூடிய கருவிகள் பட்டியலிலிருந்து சரியான கருவியைக் கண்டறியுங்கள்\n- பயனரின் நோக்கத்துடன் பொருந்தும் கருவியைத் தேர்ந்தெடுக்கவும்\n- சரியான கருவி எதுவும் இல்லை என்றால், விளக்கத்திற்கு SPEAK பயன்படுத்துங்கள்\n"
response_format: "உங்கள் பதில் வழங்கப்பட்ட திட்டத்துடன் ஒத்துப்போகும் ஒற்றை JSON பொருளாக இருக்க வேண்டும்.\n\nஅனைத்து செயல் வகைகளுக்கும் தேவை:\n- \"selected_action\": சரம் - \"TOOL\", \"SPEAK\", \"PONDER\", \"DEFER\", அல்லது \"REJECT\"\n- \"reasoning\": சரம் - முடிவு செயல்முறை மற்றும் தீர்மானத்தின் விளக்கம்\n\nசெயல்-குறிப்பிட்ட புலங்கள் (தட்டையான, உள்ளமைக்கப்படாத):\n- TOOL: \"tool_name\" (சரம்) - துல்லியமான கருவி பெயர்\n       \"tool_parameters\" (பொருள்) - அளவுருக்கள் அகராதி\n- SPEAK: \"speak_content\" (சரம்) - பயனருக்கான செய்தி\n- PONDER: \"ponder_questions\" (வரிசை) - தெளிவுபடுத்தும் கேள்விகளின் பட்டியல்\n\nமொழி விதிகள்:\n- பயனரின் விருப்ப மொழியில் பதிலளி (பயனர் சுயவிவரத்தைச் சரிபார்க்கவும்).\n- அனைத்து உள்ளடக்க மதிப்புகளும் (reasoning, speak_content, முதலியன) பயனரின் மொழியில் இருக்க வேண்டும்.\n- JSON விசைகள் மற்றும் selected_action மதிப்புகள் ஆங்கிலத்தில் இருக்க வேண்டும்.\n- உதாரணம்: {{\"selected_action\": \"SPEAK\", \"speak_content\": \"ਮੈਨੂੰ ਹੋਰ ਜਾਣਕਾਰੀ ਚਾਹੀਦੀ ਹੈ\", \"reasoning\": \"ਉਪਭੋਗਤਾ ਤੋਂ ਸਪਸ਼ਟੀਕਰਣ ਦੀ ਲੋੜ ਹੈ\"}} - ਪੰਜਾਬੀ உள்ளடக்கம், ஆங்கில விசைகள்.\n"
