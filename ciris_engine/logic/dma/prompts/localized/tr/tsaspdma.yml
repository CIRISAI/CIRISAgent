  Araç: {tool_name}

  Gerekçe: {aspdma_reasoning}


  === ORİJİNAL DÜŞÜNCE (kullanıcının niyeti - parametreleri çıkarmak için kullanın) ===

  {original_thought_content}


  {context_enrichment_section}


