context_enrichment_section: '=== دستیاب وسائل (سیاق و سباق کی افزودگی سے) ===

  {context_enrichment_data}


  اہم: اوپر کی فہرست سے عین entity_id قدریں استعمال کریں۔

  دوستانہ نام براہ راست استعمال نہ کریں - انہیں پہلے entity_id سے نقشہ بنائیں۔

  '
context_integration: '=== ASPDMA کا انتخاب ===

  ٹول: {tool_name}

  منطق: {aspdma_reasoning}


  === اصل سوچ (صارف کا ارادہ - پیرامیٹرز کا اندازہ لگانے کے لیے استعمال کریں) ===

  {original_thought_content}


  {context_enrichment_section}


  === TOOL DOCUMENTATION (پیرامیٹر Schema کے ساتھ) ===

