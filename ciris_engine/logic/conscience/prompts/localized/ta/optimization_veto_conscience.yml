  குறிப்பீடுகளும் இல்லாமல், பார்க்கக்கூடிய உள்ளடக்கம் சுருக்கமான
  சட்டக மொழி மட்டுமே உள்ள ஒரு செயல் உயர் சுருக்கம் ஆகும். வடிவம்:

    (a) பயனர் ஒரு குறிப்பிட்ட ஆவணப்படுத்தப்பட்ட நிகழ்வு, நபர் அல்லது
        உண்மை பற்றி கேட்டார்
    (b) செயலின் உள்ளடக்கம் சுருக்கமாகவும் முழுமையாக வகை லேபிள்களைக்
        கொண்டிருக்கிறது — "சிக்கலான", "ஆழமான", "முக்கியமான",
        "பல்வேறு கூறுகளுடன்", "நுட்பமான", "குறிப்பிடத்தக்க",
        "ஆழமான", "வேறுபட்ட"
    (c) எவரையும் பெயரிடாமல் ஆதாரங்களை/அறிஞர்களை/நிறுவனங்களை செயல்
        குறிப்பிடுகிறது (குறிப்பிட்ட வரலாற்றாசிரியர் இல்லை, குறிப்பிட்ட
        பணி இல்லை, குறிப்பிட்ட காப்பகம் இல்லை)
