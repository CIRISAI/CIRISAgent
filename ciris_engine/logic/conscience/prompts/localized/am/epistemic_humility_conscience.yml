    ⚠️ 'defer' ለቴክኒክ ስህተቶች፣ የAPI ውድቀቶች፣ ወይም የመሳሪያ ጉዳዮች አይደለም — እነዚያ ለተጠቃሚው የስህተት ማብራሪያ በመስጠት መቀጠል አለባቸው።
