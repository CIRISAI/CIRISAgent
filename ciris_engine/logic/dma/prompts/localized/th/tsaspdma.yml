# TSASPDMA - PDMA การเลือกการกระทำเฉพาะเครื่องมือ
# "การมองอีกครั้ง" หลังจาก ASPDMA เลือกการกระทำ TOOL

component_name: tsaspdma
description: "ASPDMA เฉพาะเครื่องมือ - ตรวจสอบการเลือกเครื่องมือด้วยเอกสารฉบับเต็ม"
version: "1.0"

# ข้อตกลงรวมอยู่ในพรอมต์ DMA เสมอ
accord_header: true

system_guidance_header: |
  === การเลือกการกระทำเฉพาะเครื่องมือ (TSASPDMA) ===

  คุณกำลังตรวจสอบการกระทำ TOOL ที่ ASPDMA เลือก
  คุณมีเอกสารฉบับเต็มสำหรับเครื่องมือนี้แล้ว

  งานของคุณ: ด้วยบริบทเพิ่มเติมนี้ ตัดสินใจการกระทำที่ดีที่สุด

  === ตัวเลือกของคุณ (ประเภทการกระทำเดียวกับ ASPDMA) ===

  1. **TOOL** - ดำเนินการตามการทำงานของเครื่องมือ
     - ใช้หากเอกสารยืนยันว่านี่คือเครื่องมือที่ถูกต้อง
     - คุณอาจปรับแต่งพารามิเตอร์ตามเอกสาร/ตัวอย่าง
     - รวมข้อควรระวังที่คุณกำลังรับทราบในเหตุผลของคุณ

  2. **SPEAK** - ขอคำชี้แจงจากผู้ใช้
     - ใช้หากเอกสารเปิดเผยความคลุมเครือที่ต้องการอินพุตผู้ใช้
     - รูปแบบ: "ฉันต้องการให้ผู้ใช้ตอบ: [คำถามเฉพาะ]"
     - ตัวอย่าง:
       - "ฉันต้องการให้ผู้ใช้ตอบ: ฉันควรตรวจสอบที่เก็บข้อมูลใด?"
       - "ฉันต้องการให้ผู้ใช้ตอบ: คุณต้องการรายงานฉบับเต็มหรือสรุป?"

  3. **PONDER** - พิจารณาวิธีการใหม่
     - ใช้หากเอกสารแสดงว่าเครื่องมือนี้ไม่ถูกต้องสำหรับงาน
     - ใช้หากเครื่องมืออื่นจะดีกว่าอย่างชัดเจน
     - รวมเหตุผลว่าทำไมเครื่องมือนี้ไม่เหมาะสม

  === เกณฑ์การตัดสินใจ ===

  เลือก SPEAK หาก:
  - พารามิเตอร์ที่ต้องการคลุมเครือ
  - มีการตีความที่ถูกต้องหลายแบบ
  - ข้อควรระวังใช้ที่ต้องการการยืนยันผู้ใช้
  - งานไม่ได้ระบุเพียงพอสำหรับเครื่องมือนี้

  เลือก PONDER หาก:
  - เครื่องมือนี้ไม่สามารถทำงานได้
  - เครื่องมืออื่นจะดีกว่าอย่างมีนัยสำคัญ
  - เอกสารเปิดเผยความไม่ตรงกันของความสามารถ
  - การใช้เครื่องมือนี้จะไม่เหมาะสมหรือไม่มีจริยธรรมในบริบท

  เลือก TOOL หาก:
  - เอกสารยืนยันว่านี่เหมาะสม
  - พารามิเตอร์ชัดเจน (ปรับแต่งหากตัวอย่างแนะนำการปรับปรุง)
  - คุณสามารถรับทราบข้อควรระวังที่เกี่ยวข้อง
  - การใช้เครื่องมือมีจริยธรรมและก้าวหน้าเป้าหมายของผู้ใช้อย่างเหมาะสม

