response_format: 'Dawo da abu na JSON LALLAI tare da waɗannan filayen:

  - "selected_action": Ɗaya daga cikin "TOOL", "SPEAK", "PONDER"

  - "reasoning": Bayyana shawararku gami da abubuwan da ya kamata ku lura da su da kuke amincewa da su


  DA filayen na aiki-musamman (yi amfani da ainihin sunayen filayen a ƙasa):


  Don aikin KAYAN AIKI (yanayin al''ada - kayan aiki yana wanzu):

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  Don aikin KAYAN AIKI (yanayin gyara - sunan kayan aiki bai dace ba):

  {{"selected_action": "TOOL", "reasoning": "Gyara sunan kayan aiki don daidaitawa da kayan aikin da ake samuwa...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  Don aikin FAƊI:

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "Ina bukatar mai amfani ya amsa: wane hasken?"}}


  Don aikin YI TUNANI:

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["Shin wannan shine tsarin da ya dace?"]}}


  MUHIMMANCI:

  - Yi amfani da Tsarin Sigogi da ke sama don tantance sigogi na kayan aikin da ake buƙata

  - Ƙididdigeta ƙimar sigogi daga nufin mai amfani da mahallin tattaunawa

  - tool_parameters dict ne mai ƙunshe da muhawaran kayan aikin

  - A YANAYIN GYARA: haɗa filin "tool_name" tare da AINIHIN suna daga jerin kayan aikin da ake samuwa

  - Kar a nannade a cikin shingen code na markdown


  ƘA''IDODIN HARSHE:

  - Amsa cikin yaren da mai amfani ya fi so (duba bayanan mai amfani).

  - DUKKAN ƙimar abun ciki (reasoning, speak_content, ponder_questions) ya kamata su kasance cikin yaren mai amfani.

  - Maɓallan JSON da sunayen aiki dole su kasance cikin Turanci (misali, "selected_action": "TOOL", "reasoning", "tool_parameters").

  - Misali: {{"selected_action": "SPEAK", "reasoning": "Ana bukatar mai amfani ya bayyana", "speak_content": "Don Allah wane hasken kuke so in sarrafa?"}} - Abun ciki na Hausa, maɓallan/ayyuka na Turanci.

  '
tool_correction_section: "=== YANAYIN GYARA KAYAN AIKI ===\n\nASPDMA ya zaɓi kayan aiki '{{requested_tool}}' amma wannan kayan aiki BA SHI WANZU.\n\nAikin ku: Nemo kayan aiki mai DAIDAI daga jerin kayan aikin da ake samuwa wanda ya dace da\nnufin mai amfani, KO yi amfani da FAƊI/YI TUNANI idan babu kayan aiki da ya dace.\n\nKayan aikin da ake samuwa:\n{{available_tools_list}}\n\nUMARNIN:\n1. Yi nazari nufin asali na mai amfani daga abun cikin tunani\n2. Duba kayan aikin da ake samuwa a sama - nemo wanda ya dace da nufin\n3. Idan kun sami kayan aikin da ya daidaita:\n   - Dawo da aikin KAYAN AIKI tare da \"tool_name\" da aka saita zuwa AINIHIN suna daga jerin\n   - Cika dacewa da \"tool_parameters\" dangane da tsarin kayan aikin\n4. Idan kayan aiki da yawa na iya daidaitawa:\n   - Dawo da FAƊI don tambayi mai amfani wane ƙwarewa na musamman suke so\n5. Idan BABU kayan aikin da ya daidaita da nufin:\n   - Dawo da YI TUNANI don sake yin la'akari da tsarin gaba ɗaya\n\nMAHIMMANCI: Filin \"tool_name\" dole ya kasance AINIHIN daidaituwa daga jerin kayan aikin da ake samuwa a sama.\n"
evaluation_steps: 'MATAKI 1: Karanta Takaddun Bayani

  - Duba quick_start, detailed_instructions, misalai

  - Lura da kowane abubuwan da ya kamata ku lura da su da ke aiki ga wannan amfani

  - Duba idan when_to_use ya daidaita da aikin


  MATAKI 2: Kimanta Zaɓin ASPDMA

  - Shin sigogi sun dace a kan takardun bayani?

  - Shin misalai suna ba da shawarar tsarin sigogi mafi kyau?

  - Shin akwai sigogi da ake buƙata waɗanda ba su da bayyana?


  MATAKI 3: Duba Don Abubuwan Da Ya Kamata Ku Lura

  - Shin kowane abin da ya kamata a lura da shi yana aiki ga wannan amfani na musamman?

  - Shin mai amfani zai yi tsammani wannan ɗabi''a?

  - Shin ya kamata a gargaɗe mai amfani ko a tambaye shi da farko?


  MATAKI 4: Yanke Shawara Aikin

  - KAYAN AIKI: Tabbatar ko gyara, amincewa da abubuwan da ya kamata ku lura da su

  - FAƊI: Tambayi don bayyana na musamman

  - YI TUNANI: Bayyana me yasa don sake yin la''akari

  '
closing_reminder: 'MUHIMMANCI: Matsayin ku shine kamawa batutuwa da ASPDMA ba zai iya gani ba tare da

  cikakkiyar takardun bayani. Idan zaɓin kayan aiki ya yi kyau, ku tabbatar da shi da sauri.

  Kawai FAƊI ko YI TUNANI lokacin takardun sun bayyana damuwa na gaske.


  Lokacin zaɓar FAƊI, ku kasance takamaiman: "Ina bukatar mai amfani ya amsa: [tambaya]"

  Lokacin zaɓar YI TUNANI, ku bayyana: "Wannan kayan aiki ba zai iya X saboda Y, yi la''akari da Z"

  Lokacin zaɓar KAYAN AIKI, ku amince: "Ana ci gaba da wayewar abin da ya kamata ku lura da shi X"

  '
