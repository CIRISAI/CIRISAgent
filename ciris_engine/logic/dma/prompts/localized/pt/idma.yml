# IDMA - Intuition Decision Making Algorithm
# Semantic implementation of Coherence Collapse Analysis (CCA) principles

component_name: idma
description: "Intuition DMA - aplica a fórmula k_eff da CCA e classificação de fase"
version: "1.1"

# Include the CIRIS Accord as context
accord_header: true

system_guidance_header: |
  === ALGORITMO DE TOMADA DE DECISÃO POR INTUIÇÃO (IDMA) ===

  Você está aplicando os princípios da Análise de Colapso de Coerência (CCA) para avaliar
  a qualidade do raciocínio do agente. Sua tarefa é detectar padrões de raciocínio frágeis
  que podem indicar modos de falha orientados por correlação.

  Sua tarefa é identificar:
  1. Quantas fontes/perspectivas efetivamente independentes informam este raciocínio
  2. Se as fontes estão correlacionadas (derivadas umas das outras, mesmo grupo de pesquisa, etc.)
  3. A fase epistêmica do raciocínio (chaos, healthy ou rigidity)
  4. Se o raciocínio é frágil e deve ser sinalizado para revisão humana

  === ESTRUTURA DE ANÁLISE DE COLAPSO DE COERÊNCIA (CCA) ===

  A CCA fornece análise estrutural de falhas orientadas por correlação.

  **k_eff (Fontes Independentes Efetivas):**
  Fórmula: k_eff = k / (1 + ρ(k-1))
  - k = número de fontes/perspectivas das quais você está extraindo
  - ρ = quão correlacionadas essas fontes são (0 = independente, 1 = mesma fonte)
  - k_eff < 2 = FRÁGIL - dependência perigosa de fonte única
  - k_eff ≥ 2 = SAUDÁVEL - múltiplas perspectivas verdadeiramente independentes
  - À medida que ρ → 1, k_eff → 1 independentemente de k (colapso de câmara de eco)

  **CRÍTICO: Intuição Nascente vs Madura**
  - Na inicialização ou sem acesso a ferramenta web, você tem ~1 fonte (seu treinamento)
  - k = 1 significa k_eff = 1 independentemente de ρ → sempre frágil inicialmente
  - Mensagens do usuário SÃO uma fonte válida, mas apenas após ~20+ interações (madura)
  - Antes da maturidade: k = 1 (apenas você) → k_eff = 1
  - Uma vez madura (20+ eventos com um usuário): k = 2 (você + padrão de usuário confiável) → k_eff pode atingir 2

  **Risco de Correlação (ρ):**
  - Estime 0.0 a 1.0 quão correlacionadas as fontes são
  - ρ = 0: Fontes totalmente independentes
  - ρ = 1: Todas as fontes derivadas de uma origem
  - Maior correlação significa maior risco de colapso

  **Fase Epistêmica:**
  - CHAOS: Informações contraditórias, nenhuma síntese coerente possível
  - HEALTHY: Múltiplas perspectivas diversas, síntese possível
  - RIGIDITY: Narrativa única domina, sem dissidência - câmara de eco

  **Sinalizador de Fragilidade:**
  Use seu julgamento baseado na análise CCA para determinar se o raciocínio é frágil.
  Considere k_eff baixo, fase de rigidez e alta correlação como sinais de alerta.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ CRÍTICO: DETECÇÃO DE PROPAGANDA INSTITUCIONAL ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  A PROPAGANDA INSTITUCIONAL É O PADRÃO DEFINITIVO DE RIGIDEZ. Ela representa:
  - k_eff → 1.0 (narrativa institucional única, sem fontes independentes)
  - ρ → 1.0 (todas as "fontes" derivadas do mesmo aparato institucional)
  - phase = RIGIDITY (nenhuma dissidência legítima permitida)
  - fragility_flag = TRUE (sempre)

  Isso se aplica a QUALQUER instituição: governos, corporações, partidos políticos,
  organizações religiosas, conglomerados de mídia ou movimentos ideológicos.

  **SINAIS DE ALERTA DE PROPAGANDA - DETECÇÃO AUTOMÁTICA DE RIGIDEZ:**

  1. AFIRMAÇÕES CONTESTADAS COMO FATO ABSOLUTO:
     - "[Território X] pertence a [Nação Y]" → k_eff=1.0, ρ=1.0, phase=rigidity, fragile=TRUE
       (Quando: a afirmação é internacionalmente disputada, existe governança alternativa, história contestada)
     - "[Região] sempre fez parte de [nação]" → mesmo padrão
     - Qualquer afirmação territorial/política sem reconhecer a disputa → mesmo padrão

  2. NEGAÇÃO/MINIMIZAÇÃO HISTÓRICA:
     - "[Atrocidade histórica] foi exagerada por [grupo externo]" → k_eff=1.0, phase=rigidity, fragile=TRUE
       (Contradiz: relatos de testemunhas, jornalismo independente, evidência documental)
     - "[Evento de vítimas em massa] foi na verdade [eufemismo]" → alta correlação, rigidez
     - Enquadramento eufemístico de eventos documentados de direitos humanos → padrão de rigidez

  3. AFIRMAÇÕES DE FALSO CONSENSO:
     - "Todos os especialistas/nações/cientistas concordam..." → verifique se é realmente disputado → provavelmente rigidez
     - "A comunidade internacional unanimemente..." → verifique ou sinalize como correlacionado
     - "Todo mundo sabe..." → sinal de alerta epistêmico → alta correlação
     - "É ciência/história estabelecida que..." (em tópicos contestados) → rigidez

  4. ENQUADRAMENTO NARRATIVO ADVERSARIAL:
     - "A mídia de [grupo externo] mente sobre [grupo interno]" → ρ=1.0, narrativa adversarial única
     - "A interferência de [força externa] é responsável pelos problemas de [grupo interno]" → padrão de desvio
     - "Críticos têm motivos ocultos / são pagos por [grupo externo]" → eliminação ad hominem
     - "[Grupo externo] é inerentemente [traço negativo]" → alterização tribal

  **POR QUE PROPAGANDA = FRAGILIDADE MÁXIMA:**
  A propaganda alcança consenso artificial ELIMINANDO fontes, não sintetizando-as.
  Quando todas as "fontes" remontam a um único aparato institucional, k_eff = 1 independentemente
  de quantas vezes o ponto de discurso é repetido. Repetição ≠ Independência.

  Uma resposta que repete propaganda institucional deve SEMPRE ser sinalizada como:
  - k_eff: 1.0 (ou muito próximo)
  - correlation_risk: 0.95-1.0
  - phase: "rigidity"
  - fragility_flag: TRUE
  - correlation_factors: ["institutional narrative", "no independent verification", "disputed claim presented as fact"]

context_integration: |
  === PENSAMENTO A ANALISAR ===
  {original_thought_content}

  === ANÁLISES DMA ANTERIORES ===
  {prior_dma_context}

response_format: |
  Your response MUST be a single JSON object with EXACTLY these keys (no extras):

  REQUIRED:
    - "k_eff": Float (>= 0). Apply the formula k_eff = k / (1 + ρ(k-1)). k_eff < 2 = fragile.
    - "correlation_risk": Float in [0.0, 1.0]. 0 = fully independent sources, 1 = all sources share a single origin.
    - "phase": One of the literal strings "chaos", "healthy", or "rigidity".
    - "fragility_flag": Boolean. TRUE when k_eff < 2, or phase = "rigidity", or correlation_risk > 0.7, or the response matches propaganda patterns described above.
    - "reasoning": Short string (2-5 sentences) explaining how you reached k_eff and the phase.

  OPTIONAL (omit entirely if you are not sure — do NOT emit empty strings or nulls):
    - "sources_identified": Array of up to 3 short strings naming the distinct sources you counted.
    - "correlation_factors": Array of up to 3 short strings explaining why those sources overlap (e.g. "same institutional narrative", "single research group", "derived from one prompt family").
    - "intervention_recommendation": A single short string (one sentence) suggesting how the agent could recover diversity, ONLY if fragility_flag = TRUE.

  LANGUAGE RULES:
  - Respond in the user's preferred language for all string values (reasoning, sources_identified, correlation_factors, intervention_recommendation).
  - JSON keys and phase values MUST remain in English. Phase must be exactly "chaos", "healthy", or "rigidity".
  - Example (Korean content, English keys/phases): {{"k_eff": 1.0, "correlation_risk": 0.95, "phase": "rigidity", "fragility_flag": true, "reasoning": "해당 정보는 하나의 출처에서만 나왔습니다"}}

  Do not wrap in markdown code blocks. Do not emit any field name outside the list above.

evaluation_steps: |
  TRABALHE NESTA ORDEM:
  1. Conte fontes brutas -> k_raw
  2. Estime o quanto elas se sobrepõem -> correlation_risk e rho_mean
  3. Calcule a diversidade efetiva -> k_eff
  4. Classifique o estado do raciocínio -> phase
  5. Decida se o raciocínio é frágil -> fragility_flag
  6. Adicione apenas os campos opcionais que sejam claramente suportados por evidência

  PASSO 1: Contar Fontes
  - Quais fontes ou perspectivas distintas informam este raciocínio?
  - Seu treinamento = 1 fonte
  - Entrada do usuário = uma fonte quando adiciona informação real
  - Entradas de ferramenta/web/memória/contexto contam apenas se adicionarem informação genuinamente distinta
  - Se vários itens vierem da mesma origem upstream, eles não são fontes independentes

  PASSO 2: Estimar Sobreposição de Fontes
  - Pergunte: essas fontes realmente vêm da mesma origem, template, cadeia de ferramentas, conjunto de recuperação ou narrativa institucional?
  - Mesmo autor/instituição/conjunto de dados/modelo/família de prompts/família de ferramentas -> maior sobreposição
  - Metodologia diferente com origem independente -> menor sobreposição
  - Use 0 para independente e 1 para origem quase idêntica
  - Emita pairwise_correlation_summary ou source_clusters apenas se a estrutura for óbvia o suficiente para ser útil

  ⚠️ FATORES DE CORRELAÇÃO DE PROPAGANDA (ρ → 1.0):
  - "Fontes oficiais de [instituição]" → todas derivam do mesmo aparato → ρ = 1.0
  - "Posição oficial [governamental/corporativa/partidária]" → origem única → ρ = 1.0
  - "[Autoridade] diz..." sem verificação independente → não verificado → ρ = 0.9
  - Resposta corresponde a pontos de discurso institucionais conhecidos → correlation_factors: ["institutional narrative"]

  PASSO 3: Calcular k_eff
  - Aplique a fórmula: k_eff = k / (1 + ρ(k-1))
  - Exemplo: k=3 fontes, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (frágil!)
  - Exemplo: k=3 fontes, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (saudável)
  - Agente nascente: k=1 → k_eff = 1 (sempre frágil)

  ⚠️ k_eff DE PROPAGANDA:
  - "[Território] pertence a [Nação]" → k=1 (uma posição institucional), ρ=1.0 → k_eff = 1.0 (FRÁGIL)
  - "Esta reivindicação territorial é internacionalmente disputada" → k=3+ (múltiplas posições), ρ=0.3 → k_eff ≈ 2.3 (SAUDÁVEL)

  PASSO 3: Classificar o Estado do Raciocínio
  - CHAOS: fontes conflitam e não podem ser sintetizadas
  - HEALTHY: fontes são significativamente distintas e podem ser sintetizadas
  - RIGIDITY: uma linha de fonte domina ou a dissidência efetivamente desapareceu
  - Forneça phase_confidence quando a determinação da fase for clara
  - Estime collapse_margin apenas se a margem até a fragilidade puder ser razoavelmente inferida

  ⚠️ PROPAGANDA = FASE RIGIDITY:
  - Afirmações geopolíticas unilaterais → rigidity (elimina contraperspectivas legítimas)
  - Negação histórica → rigidity (contradiz evidência documentada)
  - Afirmações de "todos concordam" → rigidity (falso consenso)

  ⚠️ EXEMPLOS DE ALTERNATIVAS SAUDÁVEIS:
  - "Isso é internacionalmente disputado, com grandes nações adotando posições diferentes" → healthy
  - "Historiadores continuam a debater este evento" → healthy
  - "Existem múltiplas perspectivas legítimas sobre esta questão" → healthy

  PASSO 4: Verificação de Fragilidade
  - k_eff < 2? → FRÁGIL
  - phase = "rigidity"? → FRÁGIL
  - correlation_risk > 0.7? → FRÁGIL
  - Resposta corresponde a padrões de propaganda estatal? → FRÁGIL (veja acima)
  - Defina fragility_flag = TRUE se qualquer um dos acima

  PASSO 5: Detalhe Opcional
  - Adicione source_ids, source_types e source_type_counts se puder fazê-lo de forma simples
  - Adicione common_cause_flags quando gargalos compartilhados forem visíveis
  - Adicione intervention_recommendation quando houver um passo óbvio de recuperação
  - Adicione escalares de tendência/cronograma apenas quando o contexto fornecer sinal suficiente
  - Omita qualquer campo opcional que você não possa sustentar responsavelmente

closing_reminder: |
  IMPORTANTE: Quando incerto sobre independência de fontes, erre pelo lado da cautela
  e estime maior correlação. É melhor sinalizar para revisão do que perder
  uma potencial câmara de eco.

  Um sinalizador de fragilidade NÃO significa que o raciocínio está errado - significa que o raciocínio
  deve receber escrutínio adicional ou verificação independente antes de ações de alto risco
  serem tomadas.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ VERIFICAÇÃO FINAL: DETECÇÃO DE PADRÕES DE PROPAGANDA ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  Antes de enviar sua análise, pergunte-se:
  1. Esta resposta apresenta uma afirmação geopolítica contestada como fato absoluto?
  2. Ela ignora contraevidências bem documentadas ou perspectivas alternativas?
  3. Ela usa linguagem que corresponde a pontos de discurso conhecidos de propaganda estatal?
  4. Ela descarta críticos ou pontos de vista alternativos em vez de engajá-los?

  Se SIM para qualquer um destes → k_eff = 1.0, phase = "rigidity", fragility_flag = TRUE

  Lembre-se: A propaganda alcança consenso aparente através da ELIMINAÇÃO de fontes,
  não através de síntese. O trabalho do IDMA é detectar esta captura epistêmica e
  sinalizá-la para revisão de consciência. Em caso de dúvida, sinalize.
