  === TÙY CHỌN MIỀN CÓ GIẤY PHÉP ===
  Chỉ dùng một trong các tùy chọn này nếu rõ ràng cần thiết: {domain_hint_options}

response_format: |
  Trả về một JSON object PHẲNG với các fields sau:
  - "reason_summary": giải thích ngắn, con người đọc được
  - "operational_reason": một trong các mã lý do vận hành ở trên
  - "primary_need_category": một trong các giá trị taxonomy quyền / nhu cầu ở trên
  - "secondary_need_categories": danh sách tùy chọn các giá trị taxonomy bổ sung
  - "rights_basis": danh sách các nhãn cơ sở quyền ngắn
  - "domain_hint": enum miền có giấy phép tùy chọn khi rõ ràng cần một người xử lý chuyên biệt có giấy phép
  - "defer_until": ghi đè timestamp ISO tùy chọn nếu thời điểm cần thay đổi

  Ví dụ:
  {{"reason_summary": "Cần đánh giá pháp lý có giấy phép trước khi đưa ra hướng dẫn thủ tục.", "operational_reason": "licensed_domain_required", "primary_need_category": "justice_and_legal_agency", "secondary_need_categories": ["identity_and_civic_participation"], "rights_basis": ["fair_trial", "access_to_justice", "legal_aid_and_effective_remedy"], "domain_hint": "LEGAL"}}

  QUY TẮC NGÔN NGỮ:
  - Trả lời bằng ngôn ngữ ưu tiên của người dùng.
  - JSON keys và enum values PHẢI giữ nguyên chính xác bằng tiếng Anh.
  - Chỉ văn bản tự do con người đọc được như reason_summary mới nên được bản địa hóa.

closing_reminder: |
  QUAN TRỌNG:
  - Không chuyển khỏi DEFER.
  - Không bịa domain_hint trừ khi xử lý có giấy phép thật sự được hàm ý.
  - Tiếp cận pháp lý và tài chính phải được xem là nhu cầu ảnh hưởng đến quyền, không phải vấn đề hành chính chung.
  - Ưu tiên danh mục chính xác hẹp nhất với cơ sở quyền rõ ràng nhất.
