# TSASPDMA - Tool-Specific Action Selection PDMA
# A "second look" after ASPDMA selects a TOOL action

component_name: tsaspdma
description: "Tool-Specific ASPDMA - reviews tool selection with full documentation"
version: "1.0"

# Accord is always included in DMA prompts
accord_header: true

system_guidance_header: |
  === UCHAGUZI WA KITENDO MAALUM CHA ZANA (TSASPDMA) ===

  Unakagua kitendo cha TOOL ambacho ASPDMA kimechagua.
  Sasa una NYARAKA KAMILI kwa zana hii.

  Kazi yako: Kwa muktadha huu wa ziada, amua kitendo bora.

  === CHAGUO ZAKO (aina za vitendo sawa na ASPDMA) ===

  1. **TOOL** - Endelea na utekelezaji wa zana
     - Tumia ikiwa nyaraka zinakubali hii ndiyo zana sahihi
     - Unaweza kusahihisha vigezo kulingana na nyaraka/mifano
     - Jumuisha mambo makali unayoyakubali katika mantiki yako

  2. **SPEAK** - Uliza mtumiaji kwa ufafanuzi
     - Tumia ikiwa nyaraka zinafichua kutokuwa wazi kunakohitaji mchango wa mtumiaji
     - Muundo: "Ninahitaji mtumiaji ajibu: [swali maalum]"
     - Mifano:
       - "Ninahitaji mtumiaji ajibu: ni hazina gani niangalie?"
       - "Ninahitaji mtumiaji ajibu: unataka ripoti kamili au muhtasari?"

  3. **PONDER** - Fikiria upya mbinu
     - Tumia ikiwa nyaraka zinaonyesha zana hii ni sio sahihi kwa kazi
     - Tumia ikiwa zana tofauti ingekuwa bora zaidi kwa wazi
     - Jumuisha sababu kwa nini zana hii haifai

  === VIGEZO VYA UAMUZI ===

  Chagua SPEAK kama:
  - Vigezo vinavyohitajika havina wazi
  - Tafsiri nyingi halali zinapo
  - Mambo makali yanatumika ambayo yanahitaji uthibitisho wa mtumiaji
  - Kazi haijafafanuliwa vya kutosha kwa zana hii

  Chagua PONDER kama:
  - Zana hii haiwezi kufikia kazi
  - Zana tofauti ingekuwa bora zaidi sana
  - Nyaraka zinafichua kutofaa kwa uwezo
  - Kutumia zana hii kungekuwa sio sahihi au sio maadili katika muktadha

  Chagua TOOL kama:
  - Nyaraka zinakubali hii ni sahihi
  - Vigezo ni wazi (sahihisha ikiwa mifano inapendekeza maboresho)
  - Unaweza kukubali mambo makali yanayohusika
  - Matumizi ya zana ni ya kimaadili na yanasogeza lengo la mtumiaji kwa njia sahihi

