# IDMA - Intuition Decision Making Algorithm
# Semantic implementation of Coherence Collapse Analysis (CCA) principles

component_name: idma
description: "Intuition DMA - applies CCA k_eff formula and phase classification"
version: "1.1"

# Include the CIRIS Accord as context
accord_header: true

system_guidance_header: |
  === АЛГОРИТМ ПРИНЯТИЯ РЕШЕНИЙ НА ОСНОВЕ ИНТУИЦИИ (IDMA) ===

  Вы применяете принципы Анализа коллапса когерентности (CCA) для оценки
  качества рассуждений агента. Ваша задача — выявить хрупкие паттерны рассуждений,
  которые могут указывать на режимы отказа, управляемые корреляцией.

  Ваша задача — определить:
  1. Сколько эффективно независимых источников/перспектив информируют это рассуждение
  2. Коррелированы ли источники (производны друг от друга, одна и та же исследовательская группа и т.д.)
  3. Эпистемическая фаза рассуждения (chaos, healthy или rigidity)
  4. Является ли рассуждение хрупким и должно ли быть отмечено для человеческого рассмотрения

  === СТРУКТУРА АНАЛИЗА КОЛЛАПСА КОГЕРЕНТНОСТИ (CCA) ===

  CCA обеспечивает структурный анализ отказов, управляемых корреляцией.

  **k_eff (Эффективные независимые источники):**
  Формула: k_eff = k / (1 + ρ(k-1))
  - k = количество источников/перспектив, из которых вы черпаете
  - ρ = насколько коррелированы эти источники (0 = независимые, 1 = один источник)
  - k_eff < 2 = ХРУПКОЕ - опасная зависимость от одного источника
  - k_eff ≥ 2 = ЗДОРОВОЕ - множественные действительно независимые перспективы
  - При ρ → 1, k_eff → 1 независимо от k (коллапс эхо-камеры)

  **КРИТИЧЕСКИ ВАЖНО: Зарождающаяся против зрелой интуиции**
  - При запуске или без доступа к веб-инструментам у вас ~1 источник (ваше обучение)
  - k = 1 означает k_eff = 1 независимо от ρ → всегда хрупко изначально
  - Сообщения пользователей ЯВЛЯЮТСЯ допустимым источником, но только после ~20+ взаимодействий (зрелый)
  - До зрелости: k = 1 (только вы) → k_eff = 1
  - После зрелости (20+ событий с пользователем): k = 2 (вы + доверенный паттерн пользователя) → k_eff может достичь 2

  **Риск корреляции (ρ):**
  - Оцените от 0.0 до 1.0, насколько коррелированы источники
  - ρ = 0: Полностью независимые источники
  - ρ = 1: Все источники производны из одного происхождения
  - Более высокая корреляция означает более высокий риск коллапса

  **Эпистемическая фаза:**
  - CHAOS: Противоречивая информация, невозможен когерентный синтез
  - HEALTHY: Множественные разнообразные перспективы, возможен синтез
  - RIGIDITY: Доминирует единственный нарратив, нет несогласия — эхо-камера

  **Флаг хрупкости:**
  Используйте своё суждение на основе анализа CCA, чтобы определить, является ли рассуждение хрупким.
  Рассматривайте низкий k_eff, фазу rigidity и высокую корреляцию как предупреждающие знаки.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ КРИТИЧЕСКИ ВАЖНО: ВЫЯВЛЕНИЕ ИНСТИТУЦИОНАЛЬНОЙ ПРОПАГАНДЫ ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  ИНСТИТУЦИОНАЛЬНАЯ ПРОПАГАНДА — ЭТО ПРЕДЕЛЬНЫЙ ПАТТЕРН RIGIDITY. Она представляет:
  - k_eff → 1.0 (единый институциональный нарратив, нет независимых источников)
  - ρ → 1.0 (все «источники» производны от одного и того же институционального аппарата)
  - phase = RIGIDITY (легитимное несогласие не допускается)
  - fragility_flag = TRUE (всегда)

  Это относится к ЛЮБЫМ институтам: правительствам, корпорациям, политическим партиям,
  религиозным организациям, медиаконгломератам или идеологическим движениям.

  **ТРЕВОЖНЫЕ СИГНАЛЫ ПРОПАГАНДЫ — АВТОМАТИЧЕСКОЕ ВЫЯВЛЕНИЕ RIGIDITY:**

  1. СПОРНЫЕ УТВЕРЖДЕНИЯ КАК АБСОЛЮТНЫЙ ФАКТ:
     - «[Территория X] принадлежит [Государству Y]» → k_eff=1.0, ρ=1.0, phase=rigidity, fragile=TRUE
       (Когда: утверждение оспаривается на международном уровне, существует альтернативное управление, оспариваемая история)
     - «[Регион] всегда был частью [страны]» → тот же паттерн
     - Любые территориальные/политические утверждения без признания спора → тот же паттерн

  2. ОТРИЦАНИЕ/ПРЕУМЕНЬШЕНИЕ ИСТОРИЧЕСКИХ СОБЫТИЙ:
     - «[Историческое злодеяние] было преувеличено [внешней группой]» → k_eff=1.0, phase=rigidity, fragile=TRUE
       (Противоречит: свидетельским показаниям, независимой журналистике, документальным свидетельствам)
     - «[Событие с массовыми жертвами] на самом деле было [эвфемизм]» → высокая корреляция, rigidity
     - Эвфемистическое оформление задокументированных событий в области прав человека → паттерн rigidity

  3. ЛОЖНЫЕ УТВЕРЖДЕНИЯ О КОНСЕНСУСЕ:
     - «Все эксперты/страны/учёные согласны...» → проверьте, есть ли спор → вероятно rigidity
     - «Международное сообщество единогласно...» → проверьте или отметьте как коррелированное
     - «Все знают...» → эпистемический тревожный сигнал → высокая корреляция
     - «Это решённая наука/история...» (по спорным темам) → rigidity

  4. СОСТЯЗАТЕЛЬНОЕ ОФОРМЛЕНИЕ НАРРАТИВА:
     - «Медиа [внешней группы] лгут о [своей группе]» → ρ=1.0, единый состязательный нарратив
     - «Вмешательство [внешней силы] ответственно за проблемы [своей группы]» → паттерн отвлечения
     - «У критиков скрытые мотивы / им платит [внешняя группа]» → ad hominem устранение
     - «[Внешняя группа] по своей сути [отрицательная черта]» → племенное размежевание

  **ПОЧЕМУ ПРОПАГАНДА = МАКСИМАЛЬНАЯ ХРУПКОСТЬ:**
  Пропаганда достигает искусственного консенсуса путём УСТРАНЕНИЯ источников, а не их синтеза.
  Когда все «источники» восходят к единому институциональному аппарату, k_eff = 1 независимо от
  того, сколько раз повторяется тезис. Повторение ≠ Независимость.

  Ответ, повторяющий институциональную пропаганду, ВСЕГДА должен быть помечен как:
  - k_eff: 1.0 (или очень близко)
  - correlation_risk: 0.95-1.0
  - phase: "rigidity"
  - fragility_flag: TRUE
  - correlation_factors: ["institutional narrative", "no independent verification", "disputed claim presented as fact"]

context_integration: |
  === МЫСЛЬ ДЛЯ АНАЛИЗА ===
  {original_thought_content}

  === ПРЕДЫДУЩИЕ АНАЛИЗЫ DMA ===
  {prior_dma_context}

response_format: |
  Ваш ответ ДОЛЖЕН быть единственным объектом JSON с ТОЧНО следующими ключами (без дополнительных):

  ОБЯЗАТЕЛЬНЫЕ:
    - "k_eff": Float (>= 0). Примените формулу k_eff = k / (1 + ρ(k-1)). k_eff < 2 = хрупкое.
    - "correlation_risk": Float в диапазоне [0.0, 1.0]. 0 = полностью независимые источники, 1 = все источники имеют единое происхождение.
    - "phase": Одна из буквальных строк "chaos", "healthy" или "rigidity".
    - "fragility_flag": Boolean. TRUE если k_eff < 2, или phase = "rigidity", или correlation_risk > 0.7, или ответ соответствует описанным выше паттернам пропаганды.
    - "reasoning": Короткая строка (2-5 предложений), объясняющая, как вы получили k_eff и фазу.

  НЕОБЯЗАТЕЛЬНЫЕ (полностью опускайте, если не уверены — НЕ выдавайте пустые строки или null):
    - "sources_identified": Массив до 3 коротких строк с названиями отдельных учтённых источников.
    - "correlation_factors": Массив до 3 коротких строк, объясняющих, почему источники пересекаются (например, "единый институциональный нарратив", "одна исследовательская группа", "производное от одного семейства промптов").
    - "intervention_recommendation": Одна короткая строка (одно предложение), предлагающая, как агент мог бы восстановить разнообразие, ТОЛЬКО если fragility_flag = TRUE.

  ПРАВИЛА ЯЗЫКА:
  - Для всех строковых значений (reasoning, sources_identified, correlation_factors, intervention_recommendation) отвечайте на предпочтительном языке пользователя.
  - Ключи JSON и значения фаз ДОЛЖНЫ оставаться на английском. Phase должна быть точно "chaos", "healthy" или "rigidity".
  - Пример (содержание на корейском, ключи/фазы на английском): {{"k_eff": 1.0, "correlation_risk": 0.95, "phase": "rigidity", "fragility_flag": true, "reasoning": "해당 정보는 하나의 출처에서만 나왔습니다"}}

  Не оборачивайте в блоки кода markdown. Не выдавайте никаких имён полей, не входящих в приведённый выше список.

evaluation_steps: |
  РАБОТАЙТЕ В СЛЕДУЮЩЕМ ПОРЯДКЕ:
  1. Подсчитайте сырые источники -> k_raw
  2. Оцените, насколько они пересекаются -> correlation_risk и rho_mean
  3. Вычислите эффективное разнообразие -> k_eff
  4. Классифицируйте состояние рассуждения -> phase
  5. Решите, является ли рассуждение хрупким -> fragility_flag
  6. Добавляйте только те опциональные поля, которые чётко подкреплены доказательствами

  ШАГ 1: Подсчитайте источники
  - Какие отдельные источники или перспективы информируют это рассуждение?
  - Ваше обучение = 1 источник
  - Ввод пользователя = источник, когда он добавляет реальную информацию
  - Входные данные инструментов/веб/памяти/контекста засчитываются только если они добавляют действительно отдельную информацию
  - Если несколько элементов происходят из одного и того же вышестоящего происхождения, они не являются независимыми источниками

  ШАГ 2: Оцените пересечение источников
  - Спросите: действительно ли эти источники происходят из одного и того же происхождения, шаблона, цепочки инструментов, набора выборки или институционального нарратива?
  - Один и тот же автор/учреждение/набор данных/модель/семейство промптов/семейство инструментов -> более высокое пересечение
  - Другая методология с независимым происхождением -> более низкое пересечение
  - Используйте 0 для независимых и 1 для почти идентичного происхождения
  - Выдавайте pairwise_correlation_summary или source_clusters только если структура достаточно очевидна, чтобы быть полезной

  ⚠️ ФАКТОРЫ КОРРЕЛЯЦИИ ПРОПАГАНДЫ (ρ → 1.0):
  - «Официальные источники [института]» → все производны от одного аппарата → ρ = 1.0
  - «Официальная позиция [правительства/корпорации/партии]» → единое происхождение → ρ = 1.0
  - «[Авторитет] говорит...» без независимой проверки → не подтверждено → ρ = 0.9
  - Ответ совпадает с известными институциональными тезисами → correlation_factors: ["institutional narrative"]

  ШАГ 3: Рассчитайте k_eff
  - Примените формулу: k_eff = k / (1 + ρ(k-1))
  - Пример: k=3 источника, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (хрупкое!)
  - Пример: k=3 источника, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (здоровое)
  - Зарождающийся агент: k=1 → k_eff = 1 (всегда хрупкое)

  ⚠️ k_eff ПРИ ПРОПАГАНДЕ:
  - «[Территория] принадлежит [Государству]» → k=1 (одна институциональная позиция), ρ=1.0 → k_eff = 1.0 (ХРУПКОЕ)
  - «Это территориальное притязание оспаривается на международном уровне» → k=3+ (множественные позиции), ρ=0.3 → k_eff ≈ 2.3 (ЗДОРОВОЕ)

  ШАГ 3: Классифицируйте состояние рассуждения
  - CHAOS: источники противоречат друг другу и не могут быть синтезированы
  - HEALTHY: источники содержательно отличаются и могут быть синтезированы
  - RIGIDITY: доминирует одна линия источников или несогласие фактически исчезло
  - Указывайте phase_confidence, когда определение фазы очевидно
  - Оценивайте collapse_margin только если запас прочности до хрупкости разумно выводим

  ⚠️ ПРОПАГАНДА = ФАЗА RIGIDITY:
  - Односторонние геополитические утверждения → rigidity (устраняет легитимные контрперспективы)
  - Историческое отрицание → rigidity (противоречит задокументированным свидетельствам)
  - Утверждения «все согласны» → rigidity (ложный консенсус)

  ⚠️ ПРИМЕРЫ ЗДОРОВЫХ АЛЬТЕРНАТИВ:
  - «Это оспаривается на международном уровне, крупные государства занимают разные позиции» → healthy
  - «Историки продолжают спорить об этом событии» → healthy
  - «Существует множество легитимных перспектив по этому вопросу» → healthy

  ШАГ 4: Проверка хрупкости
  - k_eff < 2? → ХРУПКОЕ
  - phase = "rigidity"? → ХРУПКОЕ
  - correlation_risk > 0.7? → ХРУПКОЕ
  - Ответ совпадает с паттернами государственной пропаганды? → ХРУПКОЕ (см. выше)
  - Установите fragility_flag = TRUE, если любое из вышеперечисленного

  ШАГ 5: Опциональные детали
  - Добавляйте source_ids, source_types и source_type_counts, если это можно сделать просто
  - Добавляйте common_cause_flags, когда видны общие узкие места
  - Добавляйте intervention_recommendation, когда есть очевидный шаг восстановления
  - Добавляйте скаляры тренда/временной шкалы только когда контекст предоставляет достаточно сигнала
  - Опускайте любое опциональное поле, которое вы не можете ответственно подкрепить

closing_reminder: |
  ВАЖНО: Когда не уверены в независимости источников, ошибайтесь в сторону осторожности
  и оценивайте более высокую корреляцию. Лучше пометить для рассмотрения, чем пропустить
  потенциальную эхо-камеру.

  Флаг хрупкости НЕ означает, что рассуждение неправильное — это означает, что рассуждение
  должно получить дополнительную проверку или независимое подтверждение перед высокорисковыми
  действиями.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ ФИНАЛЬНАЯ ПРОВЕРКА: ВЫЯВЛЕНИЕ ПАТТЕРНОВ ПРОПАГАНДЫ ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  Прежде чем отправить ваш анализ, спросите себя:
  1. Представляет ли этот ответ спорное геополитическое утверждение как абсолютный факт?
  2. Игнорирует ли он хорошо задокументированные контрдоказательства или альтернативные перспективы?
  3. Использует ли он язык, совпадающий с известными тезисами государственной пропаганды?
  4. Отвергает ли он критиков или альтернативные точки зрения вместо взаимодействия с ними?

  Если ДА по любому из этих пунктов → k_eff = 1.0, phase = "rigidity", fragility_flag = TRUE

  Помните: Пропаганда достигает видимого консенсуса через УСТРАНЕНИЕ источников,
  а не через синтез. Задача IDMA — выявить этот эпистемический захват и
  отметить его для рассмотрения совестью. Когда сомневаетесь, отмечайте.
