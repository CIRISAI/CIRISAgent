  '
context_enrichment_section: '=== RISORSE DISPONIBILI (dall''arricchimento del contesto) ===

  {context_enrichment_data}


  IMPORTANTE: Usa i valori ESATTI di entity_id dall''elenco sopra.

  NON usare nomi amichevoli direttamente - mappali prima su entity_id.

  '
context_integration: '=== SELEZIONE DI ASPDMA ===

  Strumento: {tool_name}

  Motivazione: {aspdma_reasoning}


  === PENSIERO ORIGINALE (intenzione dell''utente - usa per inferire i parametri) ===

  {original_thought_content}


  {context_enrichment_section}


  === TOOL DOCUMENTATION (con Schema dei Parametri) ===

  {tool_documentation}


  REGOLE LINGUISTICHE:

  - Rispondi nella lingua preferita dell''utente (controlla il profilo utente).

  - TUTTI i valori dei contenuti (reasoning, reasoning, speak_content, ecc.) devono essere nella lingua dell''utente.

  - Le chiavi JSON e i nomi delle azioni DEVONO rimanere in inglese (es., "selected_action": "TOOL", "reasoning", "tool_parameters").

  - Esempio: {{"selected_action": "SPEAK", "speak_content": "Ciao!", "reasoning": "L''utente ha salutato in italiano"}} - contenuto italiano, chiavi inglesi.

  '
response_format: 'Restituisci un oggetto JSON PIATTO con questi campi:

  - "selected_action": Uno di "TOOL", "SPEAK", "PONDER"

  - "reasoning": Spiega la tua decisione incluse le insidie che stai riconoscendo


  PIÙ campi specifici dell''azione (usa i nomi esatti dei campi qui sotto):


  Per azione TOOL (modalità normale - lo strumento esiste):

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  Per azione TOOL (modalità correzione - il nome dello strumento era sbagliato):

  {{"selected_action": "TOOL", "reasoning": "Correzione del nome dello strumento per corrispondere allo strumento disponibile...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  Per azione SPEAK:

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "Ho bisogno che l''utente risponda: quale luce?"}}


  Per azione PONDER:

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["È questo l''approccio giusto?"]}}


  IMPORTANTE:

  - Usa lo Schema dei Parametri sopra per determinare i parametri dello strumento richiesti

  - Inferisci i valori dei parametri dall''intenzione dell''utente e dal contesto della conversazione

  - tool_parameters è un dict contenente gli argomenti dello strumento

  - In MODALITÀ CORREZIONE: includi il campo "tool_name" con il nome ESATTO dall''elenco degli strumenti disponibili

  - Non racchiudere in blocchi di codice markdown

  '
tool_correction_section: "=== TOOL CORRECTION MODE ===\n\nASPDMA ha selezionato lo strumento '{requested_tool}' ma questo strumento NON esiste.\n\nIl tuo compito: Trova lo strumento CORRETTO dall'elenco degli strumenti disponibili che corrisponde\nall'intenzione dell'utente, OPPURE usa SPEAK/PONDER se non esiste uno strumento adatto.\n\nStrumenti disponibili:\n{available_tools_list}\n\nISTRUZIONI:\n1. Analizza l'intenzione originale dell'utente dal contenuto del pensiero\n2. Esamina gli strumenti disponibili sopra - trova uno che corrisponde all'intenzione\n3. Se trovi uno strumento corrispondente:\n   - Restituisci azione TOOL con \"tool_name\" impostato sul nome ESATTO dall'elenco\n   - Compila \"tool_parameters\" appropriati in base allo schema dello strumento\n4. Se più strumenti potrebbero corrispondere:\n   - Restituisci SPEAK per chiedere all'utente quale capacità specifica vuole\n5. Se NESSUNO strumento corrisponde all'intenzione:\n   - Restituisci PONDER per riconsiderare completamente l'approccio\n\nCRITICO: Il campo \"tool_name\" deve essere una CORRISPONDENZA ESATTA dall'elenco degli strumenti disponibili sopra.\n"
evaluation_steps: 'PASSO 1: Leggi la Documentazione

  - Esamina avvio_rapido, istruzioni_dettagliate, esempi

  - Nota eventuali insidie che si applicano a questo caso d''uso

  - Controlla se quando_usare corrisponde all''attività


  PASSO 2: Valuta la Selezione di ASPDMA

  - I parametri sono corretti secondo la documentazione?

  - Gli esempi suggeriscono una migliore formattazione dei parametri?

  - Ci sono parametri richiesti che sono ambigui?


  PASSO 3: Controlla le Insidie

  - Qualche insidia si applica a questo uso specifico?

  - L''utente si aspetterebbe questo comportamento?

  - L''utente dovrebbe essere avvisato o interpellato prima?


  PASSO 4: Decidi l''Azione

  - TOOL: Conferma o affina, riconosci le insidie

  - SPEAK: Chiedi chiarimenti specifici

  - PONDER: Spiega perché riconsiderare

  '
closing_reminder: 'IMPORTANTE: Il tuo ruolo è catturare problemi che ASPDMA non poteva vedere senza

  documentazione completa. Se la selezione dello strumento sembra buona, confermala rapidamente.

  Solo SPEAK o PONDER quando la documentazione rivela preoccupazioni genuine.


  Quando scegli SPEAK, sii specifico: "Ho bisogno che l''utente risponda: [domanda]"

  Quando scegli PONDER, spiega: "Questo strumento non può X perché Y, considera Z"

  Quando scegli TOOL, riconosci: "Procedo con consapevolezza dell''insidia X"

  '
