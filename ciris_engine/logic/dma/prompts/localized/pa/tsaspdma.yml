response_format: 'ਇਹਨਾਂ ਖੇਤਰਾਂ ਨਾਲ FLAT JSON ਵਸਤੂ ਵਾਪਸ ਕਰੋ:

  - "selected_action": "TOOL", "SPEAK", "PONDER" ਵਿੱਚੋਂ ਇੱਕ

  - "reasoning": ਆਪਣਾ ਫੈਸਲਾ ਦੱਸੋ ਉਹ ਸਾਵਧਾਨੀਆਂ ਸਮੇਤ ਜੋ ਤੁਸੀਂ ਸਵੀਕਾਰ ਕਰ ਰਹੇ ਹੋ


  ਨਾਲ ਹੀ ਕਾਰਵਾਈ-ਵਿਸ਼ੇਸ਼ ਖੇਤਰ (ਹੇਠਾਂ ਸਹੀ ਖੇਤਰ ਨਾਮ ਵਰਤੋ):


  TOOL ਕਾਰਵਾਈ ਲਈ (ਆਮ ਮੋਡ - ਸੰਦ ਮੌਜੂਦ ਹੈ):

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  TOOL ਕਾਰਵਾਈ ਲਈ (ਸੁਧਾਰ ਮੋਡ - ਸੰਦ ਦਾ ਨਾਮ ਗਲਤ ਸੀ):

  {{"selected_action": "TOOL", "reasoning": "ਉਪਲਬਧ ਸੰਦ ਨਾਲ ਮੇਲ ਕਰਨ ਲਈ ਸੰਦ ਦਾ ਨਾਮ ਸੁਧਾਰਿਆ ਜਾ ਰਿਹਾ ਹੈ...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  SPEAK ਕਾਰਵਾਈ ਲਈ:

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "ਮੈਨੂੰ ਯੂਜ਼ਰ ਤੋਂ ਜਵਾਬ ਚਾਹੀਦਾ ਹੈ: ਕਿਹੜੀ ਲਾਈਟ?"}}


  PONDER ਕਾਰਵਾਈ ਲਈ:

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["ਕੀ ਇਹ ਸਹੀ ਪਹੁੰਚ ਹੈ?"]}}


  ਮਹੱਤਵਪੂਰਨ:

  - ਲੋੜੀਂਦੇ ਸੰਦ ਪੈਰਾਮੀਟਰ ਨਿਰਧਾਰਤ ਕਰਨ ਲਈ ਉੱਪਰ ਦਿੱਤੀ ਪੈਰਾਮੀਟਰ ਸਕੀਮਾ ਵਰਤੋ

  - ਯੂਜ਼ਰ ਦੇ ਇਰਾਦੇ ਅਤੇ ਗੱਲਬਾਤ ਸੰਦਰਭ ਤੋਂ ਪੈਰਾਮੀਟਰ ਮੁੱਲ ਅਨੁਮਾਨ ਕਰੋ

  - tool_parameters ਇੱਕ dict ਹੈ ਜਿਸ ਵਿੱਚ ਸੰਦ ਦੇ arguments ਹਨ

  - ਸੁਧਾਰ ਮੋਡ ਵਿੱਚ: ਉਪਲਬਧ ਸੰਦਾਂ ਦੀ ਸੂਚੀ ਤੋਂ ਸਹੀ ਨਾਮ ਨਾਲ "tool_name" ਖੇਤਰ ਸ਼ਾਮਲ ਕਰੋ

  - ਮਾਰਕਡਾਊਨ ਕੋਡ ਬਲਾਕਾਂ ਵਿੱਚ ਨਾ ਲਪੇਟੋ


  ਭਾਸ਼ਾ ਨਿਯਮ:

  - ਯੂਜ਼ਰ ਦੀ ਪਸੰਦੀਦਾ ਭਾਸ਼ਾ ਵਿੱਚ ਜਵਾਬ ਦਿਓ (ਯੂਜ਼ਰ ਪ੍ਰੋਫ਼ਾਈਲ ਦੇਖੋ)।

  - ਸਾਰੇ ਸਮੱਗਰੀ ਮੁੱਲ (reasoning, speak_content, ponder_questions) ਯੂਜ਼ਰ ਦੀ ਭਾਸ਼ਾ ਵਿੱਚ ਹੋਣੇ ਚਾਹੀਦੇ ਹਨ।

  - JSON ਕੁੰਜੀਆਂ ਅਤੇ ਕਾਰਵਾਈ ਨਾਮ ਅੰਗਰੇਜ਼ੀ ਵਿੱਚ ਰਹਿਣੇ ਚਾਹੀਦੇ ਹਨ (ਜਿਵੇਂ, "selected_action": "TOOL", "reasoning", "tool_parameters")।

  - ਉਦਾਹਰਨ: {{"selected_action": "SPEAK", "reasoning": "需要用户澄清", "speak_content": "请问您想控制哪个灯？"}} - ਚੀਨੀ ਸਮੱਗਰੀ, ਅੰਗਰੇਜ਼ੀ ਕੁੰਜੀਆਂ/ਕਾਰਵਾਈਆਂ।

  '
tool_correction_section: "=== TOOL CORRECTION MODE ===\n\nASPDMA ਨੇ ਸੰਦ '{requested_tool}' ਚੁਣਿਆ ਪਰ ਇਹ ਸੰਦ ਮੌਜੂਦ ਨਹੀਂ ਹੈ।\n\nਤੁਹਾਡਾ ਕੰਮ: ਉਪਲਬਧ ਸੰਦਾਂ ਦੀ ਸੂਚੀ ਤੋਂ ਉਹ ਸਹੀ ਸੰਦ ਲੱਭੋ ਜੋ ਯੂਜ਼ਰ\nਦੇ ਇਰਾਦੇ ਨਾਲ ਮੇਲ ਖਾਂਦਾ ਹੋਵੇ, ਜਾਂ ਜੇ ਕੋਈ ਉਚਿਤ ਸੰਦ ਨਾ ਮਿਲੇ ਤਾਂ SPEAK/PONDER ਵਰਤੋ।\n\nਉਪਲਬਧ ਸੰਦ:\n{available_tools_list}\n\nਨਿਰਦੇਸ਼:\n1. ਵਿਚਾਰ ਸਮੱਗਰੀ ਤੋਂ ਯੂਜ਼ਰ ਦਾ ਮੂਲ ਇਰਾਦਾ ਵਿਸ਼ਲੇਸ਼ਣ ਕਰੋ\n2. ਉੱਪਰ ਦਿੱਤੇ ਉਪਲਬਧ ਸੰਦ ਦੇਖੋ - ਇਰਾਦੇ ਨਾਲ ਮੇਲ ਖਾਂਦਾ ਲੱਭੋ\n3. ਜੇ ਮੇਲ ਖਾਂਦਾ ਸੰਦ ਮਿਲੇ:\n   - ਸੂਚੀ ਤੋਂ ਸਹੀ ਨਾਮ ਨਾਲ \"tool_name\" ਸੈੱਟ ਕਰਕੇ TOOL ਕਾਰਵਾਈ ਵਾਪਸ ਕਰੋ\n   - ਸੰਦ ਦੀ ਸਕੀਮਾ ਦੇ ਆਧਾਰ ਤੇ ਉਚਿਤ \"tool_parameters\" ਭਰੋ\n4. ਜੇ ਕਈ ਸੰਦ ਮੇਲ ਖਾ ਸਕਦੇ ਹਨ:\n   - ਯੂਜ਼ਰ ਨੂੰ ਪੁੱਛਣ ਲਈ SPEAK ਵਾਪਸ ਕਰੋ ਕਿ ਉਹ ਕਿਹੜੀ ਖਾਸ ਸਮਰੱਥਾ ਚਾਹੁੰਦੇ ਹਨ\n5. ਜੇ ਕੋਈ ਸੰਦ ਇਰਾਦੇ ਨਾਲ ਮੇਲ ਨਹੀਂ ਖਾਂਦਾ:\n   - ਪਹੁੰਚ ਤੇ ਮੁੜ ਵਿਚਾਰ ਕਰਨ ਲਈ PONDER ਵਾਪਸ ਕਰੋ\n\nਮਹੱਤਵਪੂਰਨ: \"tool_name\" ਖੇਤਰ ਉੱਪਰ ਦਿੱਤੀ ਉਪਲਬਧ ਸੰਦਾਂ ਦੀ ਸੂਚੀ ਤੋਂ ਸਹੀ ਮੇਲ ਹੋਣਾ ਲਾਜ਼ਮੀ ਹੈ।\n"
evaluation_steps: 'ਕਦਮ 1: ਦਸਤਾਵੇਜ਼ਾਂ ਪੜ੍ਹੋ

  - quick_start, detailed_instructions, examples ਦੀ ਸਮੀਖਿਆ ਕਰੋ

  - ਇਸ ਵਰਤੋਂ ਲਈ ਲਾਗੂ ਸਾਵਧਾਨੀਆਂ ਨੋਟ ਕਰੋ

  - ਜਾਂਚੋ ਕਿ when_to_use ਕੰਮ ਨਾਲ ਮੇਲ ਖਾਂਦਾ ਹੈ ਕਿ ਨਹੀਂ


  ਕਦਮ 2: ASPDMA ਦੀ ਚੋਣ ਮੁਲਾਂਕਣ ਕਰੋ

  - ਕੀ ਦਸਤਾਵੇਜ਼ਾਂ ਅਨੁਸਾਰ ਪੈਰਾਮੀਟਰ ਸਹੀ ਹਨ?

  - ਕੀ ਉਦਾਹਰਨਾਂ ਬਿਹਤਰ ਪੈਰਾਮੀਟਰ ਫਾਰਮੈਟਿੰਗ ਸੁਝਾਉਂਦੀਆਂ ਹਨ?

  - ਕੀ ਅਜਿਹੇ ਲੋੜੀਂਦੇ ਪੈਰਾਮੀਟਰ ਹਨ ਜੋ ਅਸਪੱਸ਼ਟ ਹਨ?


  ਕਦਮ 3: ਸਾਵਧਾਨੀਆਂ ਦੀ ਜਾਂਚ ਕਰੋ

  - ਕੀ ਇਸ ਖਾਸ ਵਰਤੋਂ ਲਈ ਕੋਈ ਸਾਵਧਾਨੀ ਲਾਗੂ ਹੁੰਦੀ ਹੈ?

  - ਕੀ ਯੂਜ਼ਰ ਇਹ ਵਿਵਹਾਰ ਅਨੁਮਾਨ ਕਰੇਗਾ?

  - ਕੀ ਯੂਜ਼ਰ ਨੂੰ ਚੇਤਾਵਨੀ ਜਾਂ ਪਹਿਲਾਂ ਪੁੱਛਣਾ ਚਾਹੀਦਾ ਹੈ?


  ਕਦਮ 4: ਕਾਰਵਾਈ ਫੈਸਲਾ ਕਰੋ

  - TOOL: ਪੁਸ਼ਟੀ ਕਰੋ ਜਾਂ ਸੁਧਾਰੋ, ਸਾਵਧਾਨੀਆਂ ਸਵੀਕਾਰ ਕਰੋ

  - SPEAK: ਖਾਸ ਸਪੱਸ਼ਟੀਕਰਨ ਮੰਗੋ

  - PONDER: ਮੁੜ ਵਿਚਾਰ ਕਰਨ ਦਾ ਕਾਰਨ ਦੱਸੋ

  '
closing_reminder: 'ਮਹੱਤਵਪੂਰਨ: ਤੁਹਾਡਾ ਰੋਲ ਉਹ ਸਮੱਸਿਆਵਾਂ ਫੜਨਾ ਹੈ ਜੋ ASPDMA ਪੂਰੀ ਦਸਤਾਵੇਜ਼ਾਂ ਤੋਂ ਬਿਨਾਂ ਦੇਖ ਨਹੀਂ ਸਕਦਾ।

  ਜੇ ਸੰਦ ਚੋਣ ਠੀਕ ਲੱਗਦੀ ਹੈ, ਤੇਜ਼ੀ ਨਾਲ ਪੁਸ਼ਟੀ ਕਰੋ।

  ਕੇਵਲ SPEAK ਜਾਂ PONDER ਉਦੋਂ ਕਰੋ ਜਦੋਂ ਦਸਤਾਵੇਜ਼ਾਂ ਅਸਲੀ ਚਿੰਤਾਵਾਂ ਦੱਸਦੀਆਂ ਹੋਣ।


  SPEAK ਚੁਣਦੇ ਸਮੇਂ, ਖਾਸ ਰਹੋ: "ਮੈਨੂੰ ਯੂਜ਼ਰ ਤੋਂ ਜਵਾਬ ਚਾਹੀਦਾ ਹੈ: [ਸਵਾਲ]"

  PONDER ਚੁਣਦੇ ਸਮੇਂ, ਦੱਸੋ: "ਇਹ ਸੰਦ X ਨਹੀਂ ਕਰ ਸਕਦਾ ਕਿਉਂਕਿ Y, Z ਵਿਚਾਰੋ"

  TOOL ਚੁਣਦੇ ਸਮੇਂ, ਸਵੀਕਾਰ ਕਰੋ: "ਸਾਵਧਾਨੀ X ਦੀ ਜਾਣਕਾਰੀ ਨਾਲ ਅੱਗੇ ਵਧ ਰਿਹਾ ਹਾਂ"

  '
