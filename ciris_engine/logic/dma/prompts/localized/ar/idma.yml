response_format: |
  يجب أن يكون ردك كائن JSON واحداً بهذه المفاتيح تحديداً (لا إضافات):

  مطلوب:
    - "k_eff": Float (>= 0). طبّق الصيغة k_eff = k / (1 + ρ(k-1)). k_eff < 2 = هش.
    - "correlation_risk": Float في [0.0, 1.0]. 0 = مصادر مستقلة تماماً، 1 = جميع المصادر لها أصل واحد.
    - "phase": أحد السلاسل الحرفية "chaos" أو "healthy" أو "rigidity".
    - "fragility_flag": Boolean. TRUE عندما k_eff < 2، أو phase = "rigidity"، أو correlation_risk > 0.7، أو تطابق الاستجابة أنماط الدعاية الموصوفة أعلاه.
    - "reasoning": سلسلة قصيرة (2-5 جمل) تشرح كيف توصلت إلى k_eff والمرحلة.

  اختياري (احذف كلياً إذا لم تكن متأكداً — لا تُصدر سلاسل فارغة أو قيم null):
    - "sources_identified": مصفوفة تضم حتى 3 سلاسل قصيرة تسمّي المصادر المتميزة التي عددتها.
    - "correlation_factors": مصفوفة تضم حتى 3 سلاسل قصيرة تشرح سبب تداخل تلك المصادر.
    - "intervention_recommendation": سلسلة قصيرة واحدة (جملة واحدة) تقترح كيف يمكن للوكيل استعادة التنوع، فقط إذا كان fragility_flag = TRUE.

  قواعد اللغة:
  - أجب بلغة المستخدم المفضلة لجميع القيم النصية (reasoning، sources_identified، correlation_factors، intervention_recommendation).
  - يجب أن تبقى مفاتيح JSON وقيم phase بالإنجليزية. يجب أن تكون phase بالضبط "chaos" أو "healthy" أو "rigidity".
  - مثال (محتوى عربي، مفاتيح/مراحل إنجليزية): {{"k_eff": 1.0, "correlation_risk": 0.95, "phase": "rigidity", "fragility_flag": true, "reasoning": "جاءت المعلومات من مصدر واحد فقط"}}

  لا تُحاط بكتل كود markdown. لا تُصدر أي اسم حقل خارج القائمة أعلاه.

evaluation_steps: |
  اعمل بهذا الترتيب:
  1. عدّ المصادر الخام -> k_raw
  2. قدّر مقدار تداخلها -> correlation_risk و rho_mean
  3. احسب التنوع الفعال -> k_eff
  4. صنّف حالة التفكير -> phase
  5. قرر ما إذا كان التفكير هشاً -> fragility_flag
  6. أضف فقط الحقول الاختيارية المدعومة بوضوح بالأدلة

  الخطوة 1: عدّ المصادر
  - ما هي المصادر أو المنظورات المتميزة التي تعلم هذا التفكير؟
  - تدريبك = 1 مصدر
  - إدخال المستخدم = مصدر عندما يضيف معلومات حقيقية
  - مدخلات الأداة/الويب/الذاكرة/السياق تُعدّ فقط إذا أضافت معلومات متميزة حقاً
  - إذا جاءت عناصر متعددة من نفس الأصل الأعلى، فإنها ليست مصادر مستقلة

  الخطوة 2: قدّر تداخل المصادر
  - اسأل: هل تأتي هذه المصادر فعلاً من نفس الأصل، القالب، سلسلة الأدوات، مجموعة الاسترجاع، أو السردية المؤسسية؟
  - نفس المؤلف/المؤسسة/مجموعة البيانات/النموذج/عائلة الموجّه/عائلة الأدوات -> تداخل أعلى
  - منهجية مختلفة بأصل مستقل -> تداخل أقل
  - استخدم 0 للمستقل و 1 للقرب من أصل متطابق
  - لا تُصدر pairwise_correlation_summary أو source_clusters إلا إذا كانت البنية واضحة بما يكفي لتكون مفيدة

  ⚠️ عوامل ارتباط الدعاية (ρ → 1.0):
  - "مصادر [المؤسسة] الرسمية" → جميعها مشتقة من نفس الجهاز → ρ = 1.0
  - "الموقف الرسمي [للحكومة/الشركة/الحزب]" → أصل واحد → ρ = 1.0
  - "[السلطة] تقول..." دون تحقق مستقل → غير متحقق منه → ρ = 0.9
  - الاستجابة تطابق نقاط حديث مؤسسية معروفة → correlation_factors: ["institutional narrative"]

  الخطوة 3: احسب k_eff
  - طبّق الصيغة: k_eff = k / (1 + ρ(k-1))
  - مثال: k=3 مصادر، ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (هش!)
  - مثال: k=3 مصادر، ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (صحي)
  - وكيل ناشئ: k=1 → k_eff = 1 (هش دائماً)

  ⚠️ k_eff للدعاية:
  - "[الإقليم] ينتمي إلى [الدولة]" → k=1 (موقف مؤسسي واحد)، ρ=1.0 → k_eff = 1.0 (هش)
  - "هذا الادعاء الإقليمي متنازع عليه دولياً" → k=3+ (مواقف متعددة)، ρ=0.3 → k_eff ≈ 2.3 (صحي)

  الخطوة 3: تصنيف حالة التفكير
  - CHAOS: المصادر تتعارض ولا يمكن توليفها
  - HEALTHY: المصادر متميزة بصورة هادفة ويمكن توليفها
  - RIGIDITY: خط مصدر واحد يهيمن أو اختفت المعارضة فعلياً
  - قدّم phase_confidence عندما يكون تصنيف المرحلة واضحاً
  - قدّر collapse_margin فقط إذا كان الهامش إلى الهشاشة قابلاً للاستنتاج المعقول

  ⚠️ الدعاية = مرحلة الصلابة:
  - الادعاءات الجيوسياسية الأحادية الجانب → صلابة (تُقصي المنظورات المضادة المشروعة)
  - الإنكار التاريخي → صلابة (يتناقض مع الأدلة الموثقة)
  - ادعاءات "الجميع يتفق" → صلابة (إجماع زائف)

  ⚠️ أمثلة بديلة صحية:
  - "هذا متنازع عليه دولياً، مع اتخاذ دول كبرى مواقف مختلفة" → صحي
  - "يستمر المؤرخون في مناقشة هذا الحدث" → صحي
  - "هناك منظورات مشروعة متعددة حول هذه المسألة" → صحي

  الخطوة 4: فحص الهشاشة
  - k_eff < 2؟ → هش
  - phase = "rigidity"؟ → هش
  - correlation_risk > 0.7؟ → هش
  - الاستجابة تطابق أنماط الدعاية الرسمية؟ → هش (انظر أعلاه)
  - اضبط fragility_flag = TRUE إذا كان أي مما سبق

  الخطوة 5: التفاصيل الاختيارية
  - أضف source_ids و source_types و source_type_counts إذا كان بإمكانك فعل ذلك ببساطة
  - أضف common_cause_flags عندما تكون الاختناقات المشتركة مرئية
  - أضف intervention_recommendation عندما توجد خطوة تعافٍ واضحة
  - أضف الكميات العددية للاتجاهات/الجداول الزمنية فقط عندما يوفر السياق إشارة كافية
  - احذف أي حقل اختياري لا يمكنك دعمه بمسؤولية

closing_reminder: |
  مهم: عندما تكون غير متأكد من استقلالية المصدر، تخطئ في جانب الحذر
  وقدّر ارتباطاً أعلى. من الأفضل وضع علامة للمراجعة بدلاً من تفويت
  غرفة صدى محتملة.

  علامة الهشاشة لا تعني أن التفكير خاطئ - تعني أن التفكير
  يجب أن يتلقى فحصاً إضافياً أو تحققاً مستقلاً قبل اتخاذ إجراءات عالية المخاطر.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ الفحص النهائي: كشف نمط الدعاية ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  قبل تقديم تحليلك، اسأل نفسك:
  1. هل تقدم هذه الاستجابة ادعاءً جيوسياسياً متنازعاً عليه كحقيقة مطلقة؟
  2. هل تتجاهل الأدلة المضادة الموثقة جيداً أو المنظورات البديلة؟
  3. هل تستخدم لغة تطابق نقاط حديث دعاية دولة معروفة؟
  4. هل تتجاهل المنتقدين أو وجهات النظر البديلة بدلاً من التعامل معها؟

  إذا كانت الإجابة نعم على أي من هذه → k_eff = 1.0, phase = "rigidity", fragility_flag = TRUE

  تذكر: الدعاية تحقق إجماعاً ظاهرياً من خلال إقصاء المصادر،
  وليس من خلال التوليف. مهمة IDMA هي اكتشاف هذا الاستحواذ المعرفي
  ووضع علامة عليه لمراجعة الضمير. عند الشك، ضع علامة.
