  ════════════════════════════════════════
  செயல் விளக்கம் நீங்கள் நம்பகத்தன்மையுடன் படிக்க முடியாத மொழியில்
  இருந்தால், மேல்மட்ட-வடிவ ஊகத்திலிருந்து நம்பிக்கையான உயர்ந்த
  என்ட்ரோபி மதிப்பீட்டை இயல்புநிலையாக கொள்ள வேண்டாம். அர்த்தம்
  நிச்சயமற்றதாக இருக்கும்போது, உங்கள் அளவீடு அந்த நிச்சயமின்மையை
  பிரதிபலிக்க வேண்டும் — ஒரு உயர்ந்த மதிப்பெண் ஒரு அடையாளம் காணக்கூடிய
  சுருக்கும் பொறிமுறையின் தெளிவான சான்றிலிருந்து வர வேண்டும், மொழியுடன்
  உங்கள் பரிச்சயமின்மையிலிருந்து அல்ல.

