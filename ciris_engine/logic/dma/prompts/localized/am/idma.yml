response_format: |
  ምላሽዎ ከተሰጠው ስኪማ ጋር የሚዛመድ አንድ JSON ነገር መሆን አለበት፣ የሚከተሉት ቁልፎች አሉት።
  - "k_eff": ተሳቢ (>= 0) - የተመጣጣኝ ነጻ ምንጭ ቆጠራ። ቀመሩን k/(1+ρ(k-1)) ይጠቀሙ። k_eff < 2 = ደካማ።
  - "correlation_risk": ተሳቢ (0.0-1.0) - በምንጮች መካከል የተገመተ ρ ተዛመድ።
  - "phase": ቁምፊ - ከ"chaos" (ተቃራኒ)፣ "healthy" (የተለያዩ ውህደት)፣ ወይም "rigidity" (የማስተጋባ ክፍል) አንዱ።
  - "fragility_flag": Boolean - k_eff < 2 ወይም phase = "rigidity" ወይም correlation_risk > 0.7 ከሆነ TRUE።
  - "sources_identified": የቁምፊዎች አራይ - በምክንያት ውስጥ የተለዩ ተለይተው የተለዩ ምንጮች/አመለካከቶች ዝርዝር።
  - "correlation_factors": የቁምፊዎች አራይ - ተዛመድን የሚያስከትሉ ነገሮች (ለምሳሌ፣ "ተመሳሳይ ደራሲ"፣ "ከነጠላ ጥናት የተወሰደ")።
  - "reasoning": ቁምፊ - የመረጃ ልዩነት እና የእውቀት ጤና ትንታኔዎ። ይህ መስክ ግዴታዊ ነው።

  ተጨማሪ መስኮችን ወይም በmarkdown code blocks ውስጥ አታጠቃልሉ።

evaluation_steps: |
  ደረጃ 1: ምንጮችን ይቁጠሩ (k)
  - ይህንን ምክንያት ምን ምንጮች/አመለካከቶች ያሳውቃሉ?
  - ስልጠናዎ = 1 ምንጭ (ሁልጊዜ አለ)
  - የተጠቃሚ ግብዓት = +1 ምንጭ ጎለማሳ ግንኙነት ከሆነ (20+ ግንኙነቶች)
  - የድር/መሳሪያ ውጤቶች = +1 ምንጭ እያንዳንዱ ከነጻ መነሻዎች ከሆነ
  - ጥቅሶች/ውሂብ = +1 ምንጭ እያንዳንዱ በትክክል ነጻ ከሆነ

  ደረጃ 2: ተዛመድን ይገምቱ (ρ)
  - ለእያንዳንዱ ጥንድ ምንጮች፣ ጠይቅ: አንዱ ከሌላው የተወሰደ ነው?
  - ተመሳሳይ ደራሲ/ተቋም/ውሂብ ስብስብ → ከፍተኛ ተዛመድ
  - ሁሉም ምንጮች በውስብስብ ጉዳይ ላይ ይስማማሉ → አድሎአዊ ተዛመድ
  - የተለያዩ ዘዴዎች፣ ተመሳሳይ መደምደሚያ → ዝቅተኛ ተዛመድ
  - ρ = 0 (ሙሉ በሙሉ ነጻ) እስከ ρ = 1 (ሁሉም ከተመሳሳይ መነሻ የተወሰዱ)

  ደረጃ 3: k_eff ያስሉ
  - ቀመሩን ተግብሩ: k_eff = k / (1 + ρ(k-1))
  - ምሳሌ: k=3 ምንጮች፣ ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (ደካማ!)
  - ምሳሌ: k=3 ምንጮች፣ ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (ጤናማ)
  - አዲስ ወኪል: k=1 → k_eff = 1 (ሁልጊዜ ደካማ)

  ደረጃ 4: የደረጃ መወሰን
  - ትርምስ: በርካታ ተቃራኒ መደምደሚያዎች፣ ምንም መፍትሄ የለም
  - ጤናማ: የተለያዩ አመለካከቶች የሚዋሃዱ (k_eff ≥ 2)
  - ጥብቅነት: ነጠላ ትረካ የሚቆጣጠር፣ ምንም ተቃውሞ የለም (k_eff → 1፣ የማስተጋባ ክፍል)

  ደረጃ 5: የደካማነት ማረጋገጫ
  - k_eff < 2? → ደካማ
  - phase = "rigidity"? → ደካማ
  - correlation_risk > 0.7? → ደካማ
  - ከላይ ማንኛውም ከሆነ fragility_flag = TRUE ያስቀምጡ

closing_reminder: |
  አስፈላጊ: ስለ ምንጭ ነጻነት እርግጠኛ ያልሆኑ ሆኖ፣ በጥንቃቄ ጎን ላይ ስህተት ይስሩ
  እና ከፍተኛ ተዛመድን ይገምቱ። ለግምገማ መሰየም ከመቻል ይልቅ ይሻላል
  ሊሆን የሚችል የማስተጋባ ክፍልን ማጣት።

  የደካማነት ባንዴራ ምክንያቱ ስህተት ነው ማለት አይደለም - ምክንያቱ
  ከከፍተኛ ስጋት ተግባራት በፊት ተጨማሪ ቅኝት ወይም ነጻ ማረጋገጫ መቀበል አለበት።
