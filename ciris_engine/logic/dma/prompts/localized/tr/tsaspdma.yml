  {tool_documentation}

  '
response_format: 'Bu alanlarla DÜZLEMSEL bir JSON nesnesi döndürün:

  - "selected_action": "TOOL", "SPEAK", "PONDER"dan biri

  - "reasoning": Kabul ettiğiniz dikkat edilmesi gereken noktalar dahil kararınızı açıklayın


  ARTI eyleme özel alanlar (aşağıdaki tam alan adlarını kullanın):


  TOOL eylemi için (normal mod - araç var):

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  TOOL eylemi için (düzeltme modu - araç adı yanlıştı):

  {{"selected_action": "TOOL", "reasoning": "Mevcut araca uyması için araç adını düzeltiyorum...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  SPEAK eylemi için:

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "Kullanıcının cevaplaması gerekiyor: hangi ışık?"}}


  PONDER eylemi için:

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["Bu doğru yaklaşım mı?"]}}


  ÖNEMLİ:

  - Gerekli araç parametrelerini belirlemek için yukarıdaki Parametre Şemasını kullanın

  - Parametre değerlerini kullanıcının niyetinden ve konuşma bağlamından çıkarın

  - tool_parameters, aracın argümanlarını içeren bir dict''tir

  - DÜZELTME MODUNDA: mevcut araçlar listesinden TAM adla "tool_name" alanını dahil edin

  - Markdown kod bloklarına sarmayın

  - JSON anahtarları ve eylem adları İngilizce KALMALIDIR (örneğin, "selected_action": "TOOL", "reasoning", "tool_parameters").

  '
tool_correction_section: "=== TOOL CORRECTION MODE ===\n\nASPDMA '{requested_tool}' aracını seçti ancak bu araç MEVCUT DEĞİL.\n\nGöreviniz: Kullanıcının niyetine uyan mevcut araçlar listesinden DOĞRU aracı bulun\nVEYA uygun araç yoksa SPEAK/PONDER kullanın.\n\nMevcut araçlar:\n{available_tools_list}\n\nTALİMATLAR:\n1. Düşünce içeriğinden kullanıcının orijinal niyetini analiz edin\n2. Yukarıdaki mevcut araçları inceleyin - niyetle eşleşen birini bulun\n3. Eşleşen bir araç bulursanız:\n   - \"tool_name\"i listeden TAM adla ayarlayarak TOOL eylemini döndürün\n   - Aracın şemasına göre uygun \"tool_parameters\"ı doldurun\n4. Birden fazla araç eşleşebilirse:\n   - Kullanıcıya hangi spesifik yeteneği istediklerini sormak için SPEAK döndürün\n5. HİÇBİR araç niyetle eşleşmiyorsa:\n   - Yaklaşımı tamamen yeniden düşünmek için PONDER döndürün\n\nKRİTİK: \"tool_name\" alanı yukarıdaki mevcut araçlar listesinden TAM bir eşleşme olmalıdır.\n"
evaluation_steps: 'ADIM 1: Dokümantasyonu Okuyun

  - quick_start, detailed_instructions, examples''ı inceleyin

  - Bu kullanım durumuna uygulanan dikkat edilmesi gereken noktaları not edin

  - when_to_use''un görevle eşleşip eşleşmediğini kontrol edin


  ADIM 2: ASPDMA''nın Seçimini Değerlendirin

  - Parametreler dokümantasyona göre doğru mu?

  - Örnekler daha iyi parametre biçimlendirmesi öneriyor mu?

  - Belirsiz olan gerekli parametreler var mı?


  ADIM 3: Dikkat Edilmesi Gerekenleri Kontrol Edin

  - Herhangi bir dikkat edilmesi gereken bu spesifik kullanıma uygulanıyor mu?

  - Kullanıcı bu davranışı bekler mi?

  - Kullanıcı uyarılmalı veya önce sorulmalı mı?


  ADIM 4: Eylemi Belirleyin

  - TOOL: Onaylayın veya iyileştirin, dikkat edilmesi gerekenleri kabul edin

  - SPEAK: Spesifik açıklama isteyin

  - PONDER: Neden yeniden düşünülmesi gerektiğini açıklayın

  '
closing_reminder: 'ÖNEMLİ: Rolünüz, ASPDMA''nın tam dokümantasyon olmadan göremediği sorunları

  yakalamaktır. Araç seçimi iyi görünüyorsa, hızlıca onaylayın.

  Yalnızca dokümantasyon gerçek endişeleri ortaya çıkardığında SPEAK veya PONDER kullanın.


  SPEAK seçerken, spesifik olun: "Kullanıcının cevaplaması gerekiyor: [soru]"

  PONDER seçerken, açıklayın: "Bu araç X yapamaz çünkü Y, Z''yi düşünün"

  TOOL seçerken, kabul edin: "X dikkat edilmesi gerekeninin farkındalığıyla devam ediyorum"

  '
