context_enrichment_section: '=== అందుబాటులో ఉన్న వనరులు (సందర్భ సమృద్ధీకరణ నుండి) ===

  {{context_enrichment_data}}


  ముఖ్యమైనది: పై జాబితా నుండి ఖచ్చిత entity_id విలువలను ఉపయోగించండి.

  స్నేహపూర్వక పేర్లను ప్రత్యక్షంగా ఉపయోగించవద్దు - మొదట వాటిని entity_id కు మ్యాప్ చేయండి.

  '
context_integration: '=== ASPDMA యొక్క ఎంపిక ===

  సాధనం: {{tool_name}}

