  {aspdma_reasoning}

  === LÝ DO DEFER HIỆN TẠI ===
  {current_reason}

  === NGỮ CẢNH DEFER HIỆN TẠI ===
  {current_context}

  === DEFER UNTIL HIỆN TẠI ===
  {current_defer_until}

