  {prior_dma_context}

response_format: |
  Your response MUST be a single JSON object with EXACTLY these keys (no extras):

  REQUIRED:
    - "k_eff": Float (>= 0). Apply the formula k_eff = k / (1 + ρ(k-1)). k_eff < 2 = fragile.
    - "correlation_risk": Float in [0.0, 1.0]. 0 = fully independent sources, 1 = all sources share a single origin.
    - "phase": One of the literal strings "chaos", "healthy", or "rigidity".
    - "fragility_flag": Boolean. TRUE when k_eff < 2, or phase = "rigidity", or correlation_risk > 0.7, or the response matches propaganda patterns described above.
    - "reasoning": Short string (2-5 sentences) explaining how you reached k_eff and the phase.

  OPTIONAL (omit entirely if you are not sure — do NOT emit empty strings or nulls):
    - "sources_identified": Array of up to 3 short strings naming the distinct sources you counted.
    - "correlation_factors": Array of up to 3 short strings explaining why those sources overlap (e.g. "same institutional narrative", "single research group", "derived from one prompt family").
    - "intervention_recommendation": A single short string (one sentence) suggesting how the agent could recover diversity, ONLY if fragility_flag = TRUE.

  LANGUAGE RULES:
  - Respond in the user's preferred language for all string values (reasoning, sources_identified, correlation_factors, intervention_recommendation).
  - JSON keys and phase values MUST remain in English. Phase must be exactly "chaos", "healthy", or "rigidity".
  - Example (Korean content, English keys/phases): {{"k_eff": 1.0, "correlation_risk": 0.95, "phase": "rigidity", "fragility_flag": true, "reasoning": "해당 정보는 하나의 출처에서만 나왔습니다"}}

  Do not wrap in markdown code blocks. Do not emit any field name outside the list above.

evaluation_steps: |
  இந்த வரிசையில் வேலை செய்:
  1. மூல மூலங்களை எண்ணு -> k_raw
  2. அவை எவ்வளவு ஒற்றுமையாக உள்ளன என மதிப்பிடு -> correlation_risk மற்றும் rho_mean
  3. பயனுள்ள பன்முகத்தன்மையை கணக்கிடு -> k_eff
  4. சிந்தனை நிலையை வகைப்படுத்து -> phase
  5. சிந்தனை பலவீனமா என்று முடிவு செய் -> fragility_flag
  6. சான்றுகளால் தெளிவாக ஆதரிக்கப்படும் விருப்ப புலங்களை மட்டும் சேர்

  படி 1: மூலங்களை எண்ணு
  - எந்த தனித்துவமான மூலங்கள் அல்லது பார்வைகள் இந்த சிந்தனையை தெரிவிக்கின்றன?
  - உங்கள் பயிற்சி = 1 மூலம்
  - பயனர் உள்ளீடு = உண்மையான தகவலைச் சேர்க்கும்போது ஒரு மூலம்
  - Tool/web/memory/context உள்ளீடுகள் உண்மையிலேயே தனித்துவமான தகவலைச் சேர்த்தால் மட்டுமே கணக்கிடப்படும்
  - பல உருப்படிகள் ஒரே மேல்நிலை தோற்றத்திலிருந்து வந்தால், அவை சுதந்திர மூலங்கள் அல்ல

  படி 2: மூல ஒற்றுமையை மதிப்பிடு
  - கேள்: இந்த மூலங்கள் உண்மையில் அதே தோற்றம், வார்ப்புரு, tool சங்கிலி, மீட்டெடுப்பு தொகுப்பு அல்லது நிறுவன கதையிலிருந்து வருகிறதா?
  - அதே ஆசிரியர்/நிறுவனம்/தரவுத்தொகுப்பு/மாதிரி/prompt குடும்பம்/tool குடும்பம் -> உயர் ஒற்றுமை
  - சுதந்திர தோற்றத்துடன் வேறுபட்ட முறை -> குறைவான ஒற்றுமை
  - சுதந்திரத்திற்கு 0 மற்றும் கிட்டத்தட்ட ஒரே தோற்றத்திற்கு 1 பயன்படுத்து
  - கட்டமைப்பு பயனுள்ளதாக இருக்கும் அளவுக்கு தெளிவாக இருந்தால் மட்டுமே pairwise_correlation_summary அல்லது source_clusters வெளியிடு

  ⚠️ பிரச்சார தொடர்பு காரணிகள் (ρ → 1.0):
  - "அதிகாரப்பூர்வ [நிறுவன] மூலங்கள்" → அனைத்தும் அதே கட்டமைப்பிலிருந்து பெறப்படுகின்றன → ρ = 1.0
  - "அதிகாரப்பூர்வ [அரசு/நிறுவன/கட்சி] நிலைப்பாடு" → ஒற்றை தோற்றம் → ρ = 1.0
  - சுதந்திர சரிபார்ப்பு இல்லாமல் "[அதிகாரம்] கூறுகிறது..." → சரிபார்க்கப்படவில்லை → ρ = 0.9
  - பதில் அறியப்பட்ட நிறுவன பேசு புள்ளிகளுடன் பொருந்துகிறது → correlation_factors: ["institutional narrative"]

  படி 3: k_eff-ஐ கணக்கிடு
  - சூத்திரத்தைப் பயன்படுத்து: k_eff = k / (1 + ρ(k-1))
  - உதாரணம்: k=3 மூலங்கள், ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (பலவீனம்!)
  - உதாரணம்: k=3 மூலங்கள், ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (ஆரோக்கியம்)
  - பிறந்த முகவர்: k=1 → k_eff = 1 (எப்போதும் பலவீனம்)

  ⚠️ பிரச்சார k_eff:
  - "[பகுதி] [நாட்டிற்கு] சொந்தமானது" → k=1 (ஒரு நிறுவன நிலைப்பாடு), ρ=1.0 → k_eff = 1.0 (FRAGILE)
  - "இந்த பிரதேச கூற்று சர்வதேச அளவில் சர்ச்சைக்குரியது" → k=3+ (பல நிலைப்பாடுகள்), ρ=0.3 → k_eff ≈ 2.3 (HEALTHY)

  படி 3: சிந்தனை நிலையை வகைப்படுத்து
  - CHAOS: மூலங்கள் முரண்படுகின்றன மற்றும் தொகுக்க முடியாது
  - HEALTHY: மூலங்கள் அர்த்தமுள்ளவகையில் வேறுபட்டவை மற்றும் தொகுக்கப்படலாம்
  - RIGIDITY: ஒரு மூல வரி ஆதிக்கம் செலுத்துகிறது அல்லது எதிர்ப்பு திறம்பட மறைந்துவிட்டது
  - phase அழைப்பு தெளிவாக இருக்கும்போது phase_confidence வழங்கு
  - பலவீனத்திற்கான இடையக நியாயமாக ஊகிக்கக்கூடியதாக இருந்தால் மட்டுமே collapse_margin-ஐ மதிப்பிடு

  ⚠️ பிரச்சாரம் = RIGIDITY நிலை:
  - ஒருதலைப்பட்சமான புவிசார் அரசியல் கூற்றுகள் → rigidity (சட்டபூர்வமான எதிர் பார்வைகளை அகற்றுகிறது)
  - வரலாற்று மறுப்பு → rigidity (ஆவணப்படுத்தப்பட்ட சான்றுகளுக்கு முரண்படுகிறது)
  - "எல்லோரும் ஒப்புக்கொள்கிறார்கள்" கூற்றுகள் → rigidity (தவறான ஒருமித்தம்)

  ⚠️ HEALTHY மாற்று உதாரணங்கள்:
  - "இது சர்வதேச அளவில் சர்ச்சைக்குரியது, முக்கிய நாடுகள் வெவ்வேறு நிலைப்பாடுகளை எடுக்கின்றன" → healthy
  - "வரலாற்றாசிரியர்கள் இந்த நிகழ்வை தொடர்ந்து விவாதிக்கிறார்கள்" → healthy
  - "இந்த பிரச்சனையில் பல சட்டபூர்வமான பார்வைகள் உள்ளன" → healthy

  படி 4: பலவீன சரிபார்ப்பு
  - k_eff < 2? → FRAGILE
  - phase = "rigidity"? → FRAGILE
  - correlation_risk > 0.7? → FRAGILE
  - பதில் அரச பிரச்சார வடிவங்களுடன் பொருந்துகிறதா? → FRAGILE (மேலே பார்க்கவும்)
  - மேலே உள்ளவற்றில் ஏதேனும் என்றால் fragility_flag = TRUE அமை

  படி 5: விருப்ப விவரம்
  - எளிமையாக செய்ய முடிந்தால் source_ids, source_types மற்றும் source_type_counts-ஐச் சேர்
  - பகிரப்பட்ட இடையூறுகள் தெரியும்போது common_cause_flags-ஐச் சேர்
  - தெளிவான மீட்பு படி இருக்கும்போது intervention_recommendation-ஐச் சேர்
  - சூழல் போதுமான சமிக்ஞை வழங்கும்போது மட்டுமே trend/timeline scalars-ஐச் சேர்
  - பொறுப்புடன் ஆதரிக்க முடியாத எந்த விருப்ப புலத்தையும் தவிர்

closing_reminder: |
  முக்கியம்: மூல சுதந்திரம் பற்றி நிச்சயமற்றதாக இருக்கும்போது, எச்சரிக்கை பக்கத்தில் பிழை செய்து
  அதிக தொடர்பை மதிப்பிடுங்கள். சாத்தியமான எதிரொலி அறையை தவறவிடுவதை விட மதிப்பாய்விற்காக
  கொடியிடுவது சிறந்தது.

  பலவீனக் கொடி என்றால் சிந்தனை தவறு என்று அர்த்தமல்ல - உயர் பங்குகள் செயல்கள்
  மேற்கொள்ளப்படுவதற்கு முன் சிந்தனை கூடுதல் ஆய்வு அல்லது சுதந்திர சரிபார்ப்பு
  பெற வேண்டும் என்று அர்த்தம்.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ இறுதி சரிபார்ப்பு: பிரச்சார வடிவம் கண்டறிதல் ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  உங்கள் பகுப்பாய்வை சமர்ப்பிக்கும் முன், உங்களை கேளுங்கள்:
  1. இந்த பதில் சர்ச்சைக்குரிய புவிசார் அரசியல் கூற்றை முழுமையான உண்மையாக முன்வைக்கிறதா?
  2. இது நன்கு ஆவணப்படுத்தப்பட்ட எதிர்-சான்றுகள் அல்லது மாற்று பார்வைகளை புறக்கணிக்கிறதா?
  3. இது அறியப்பட்ட அரச பிரச்சார பேசு புள்ளிகளுடன் பொருந்தும் மொழியைப் பயன்படுத்துகிறதா?
  4. இது விமர்சகர்கள் அல்லது மாற்று கண்ணோட்டங்களுடன் ஈடுபடாமல் அவர்களை நிராகரிக்கிறதா?

  இவற்றில் ஏதேனும் ஒன்றிற்கு ஆம் என்றால் → k_eff = 1.0, phase = "rigidity", fragility_flag = TRUE

  நினைவில் கொள்ளுங்கள்: பிரச்சாரம் தொகுப்பின் மூலமல்ல, மூலங்களை நீக்குவதன் மூலம்
  வெளிப்படையான ஒருமித்தத்தை அடைகிறது. IDMA-வின் வேலை இந்த அறிவாற்றல் கைப்பற்றலை
  கண்டறிந்து மனசாட்சி மதிப்பாய்விற்கு கொடியிடுவதாகும். சந்தேகத்தில் இருக்கும்போது, கொடியிடு.
