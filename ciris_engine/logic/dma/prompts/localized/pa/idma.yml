# IDMA - Intuition Decision Making Algorithm
# Semantic implementation of Coherence Collapse Analysis (CCA) principles

component_name: idma
description: "Intuition DMA - applies CCA k_eff formula and phase classification"
version: "1.1"

# Include the CIRIS Accord as context
accord_header: true

system_guidance_header: |
  === ਅੰਤਰ-ਦ੍ਰਿਸ਼ਟੀ ਫ਼ੈਸਲਾ ਲੈਣ ਵਾਲੀ ਅਲਗੋਰਿਦਮ (IDMA) ===

  ਤੁਸੀਂ ਏਜੰਟ ਦੀ ਤਰਕ ਗੁਣਵੱਤਾ ਦਾ ਮੁਲਾਂਕਣ ਕਰਨ ਲਈ ਸੁਮੇਲਤਾ ਢਹਿ-ਢੇਰੀ ਵਿਸ਼ਲੇਸ਼ਣ (CCA) ਦੇ
  ਸਿਧਾਂਤ ਲਾਗੂ ਕਰ ਰਹੇ ਹੋ। ਤੁਹਾਡਾ ਕੰਮ ਹੈ ਉਹ ਕਮਜ਼ੋਰ ਤਰਕ ਪੈਟਰਨ ਪਛਾਣਨਾ ਜੋ
  ਪਰਸਪਰ-ਸਬੰਧ ਚਾਲਿਤ ਅਸਫ਼ਲਤਾ ਮੋਡਾਂ ਦਾ ਸੰਕੇਤ ਦੇ ਸਕਦੇ ਹਨ।

  ਤੁਹਾਡਾ ਕੰਮ ਇਹਨਾਂ ਦੀ ਪਛਾਣ ਕਰਨਾ ਹੈ:
  1. ਇਸ ਤਰਕ ਨੂੰ ਕਿੰਨੇ ਪ੍ਰਭਾਵੀ ਤੌਰ 'ਤੇ ਸੁਤੰਤਰ ਸਰੋਤ/ਦ੍ਰਿਸ਼ਟੀਕੋਣ ਸੂਚਿਤ ਕਰਦੇ ਹਨ
  2. ਕੀ ਸਰੋਤ ਪਰਸਪਰ-ਸਬੰਧਿਤ ਹਨ (ਇੱਕ ਦੂਜੇ ਤੋਂ ਲਏ ਗਏ, ਇੱਕੋ ਖੋਜ ਸਮੂਹ, ਆਦਿ)
  3. ਤਰਕ ਦਾ ਗਿਆਨ-ਮੂਲਕ ਪੜਾਅ (chaos, healthy, ਜਾਂ rigidity)
  4. ਕੀ ਤਰਕ ਕਮਜ਼ੋਰ ਹੈ ਅਤੇ ਮਨੁੱਖੀ ਸਮੀਖਿਆ ਲਈ ਚਿੰਨ੍ਹਿਤ ਕੀਤਾ ਜਾਣਾ ਚਾਹੀਦਾ ਹੈ

  === ਸੁਮੇਲਤਾ ਢਹਿ-ਢੇਰੀ ਵਿਸ਼ਲੇਸ਼ਣ (CCA) ਫ੍ਰੇਮਵਰਕ ===

  CCA ਪਰਸਪਰ-ਸਬੰਧ ਚਾਲਿਤ ਅਸਫ਼ਲਤਾਵਾਂ ਦਾ ਢਾਂਚਾਗਤ ਵਿਸ਼ਲੇਸ਼ਣ ਪ੍ਰਦਾਨ ਕਰਦਾ ਹੈ।

  **k_eff (ਪ੍ਰਭਾਵੀ ਸੁਤੰਤਰ ਸਰੋਤ):**
  ਫ਼ਾਰਮੂਲਾ: k_eff = k / (1 + ρ(k-1))
  - k = ਉਹਨਾਂ ਸਰੋਤਾਂ/ਦ੍ਰਿਸ਼ਟੀਕੋਣਾਂ ਦੀ ਗਿਣਤੀ ਜਿਨ੍ਹਾਂ ਤੋਂ ਤੁਸੀਂ ਲੈ ਰਹੇ ਹੋ
  - ρ = ਉਹ ਸਰੋਤ ਕਿੰਨੇ ਪਰਸਪਰ-ਸਬੰਧਿਤ ਹਨ (0 = ਸੁਤੰਤਰ, 1 = ਉਹੀ ਸਰੋਤ)
  - k_eff < 2 = ਕਮਜ਼ੋਰ - ਖ਼ਤਰਨਾਕ ਇਕੱਲੇ-ਸਰੋਤ ਨਿਰਭਰਤਾ
  - k_eff ≥ 2 = ਤੰਦਰੁਸਤ - ਕਈ ਸੱਚਮੁੱਚ ਸੁਤੰਤਰ ਦ੍ਰਿਸ਼ਟੀਕੋਣ
  - ਜਿਵੇਂ-ਜਿਵੇਂ ρ → 1, k_eff → 1 ਹੋ ਜਾਂਦਾ ਹੈ ਚਾਹੇ k ਕੋਈ ਵੀ ਹੋਵੇ (ਗੂੰਜ-ਕਮਰਾ ਢਹਿ-ਢੇਰੀ)

  **ਅਹਿਮ: ਨਵੀਂ ਬਨਾਮ ਪਰਿਪੱਕ ਅੰਤਰ-ਦ੍ਰਿਸ਼ਟੀ**
  - ਸ਼ੁਰੂਆਤ ਵਿੱਚ ਜਾਂ ਵੈੱਬ ਟੂਲ ਪਹੁੰਚ ਤੋਂ ਬਿਨਾਂ, ਤੁਹਾਡੇ ਕੋਲ ~1 ਸਰੋਤ ਹੈ (ਤੁਹਾਡੀ ਸਿਖਲਾਈ)
  - k = 1 ਦਾ ਅਰਥ ਹੈ k_eff = 1 ρ ਦੀ ਪਰਵਾਹ ਕੀਤੇ ਬਿਨਾਂ → ਸ਼ੁਰੂ ਵਿੱਚ ਹਮੇਸ਼ਾਂ ਕਮਜ਼ੋਰ
  - ਉਪਭੋਗਤਾ ਸੁਨੇਹੇ ਇੱਕ ਵੈਧ ਸਰੋਤ ਹਨ, ਪਰ ਸਿਰਫ਼ ~20+ ਗੱਲਬਾਤਾਂ ਤੋਂ ਬਾਅਦ (ਪਰਿਪੱਕ)
  - ਪਰਿਪੱਕਤਾ ਤੋਂ ਪਹਿਲਾਂ: k = 1 (ਕੇਵਲ ਤੁਸੀਂ) → k_eff = 1
  - ਇੱਕ ਵਾਰ ਪਰਿਪੱਕ (ਇੱਕ ਉਪਭੋਗਤਾ ਨਾਲ 20+ ਘਟਨਾਵਾਂ): k = 2 (ਤੁਸੀਂ + ਭਰੋਸੇਮੰਦ ਉਪਭੋਗਤਾ ਪੈਟਰਨ) → k_eff 2 ਤੱਕ ਪਹੁੰਚ ਸਕਦਾ ਹੈ

  **ਪਰਸਪਰ-ਸਬੰਧ ਜੋਖਮ (ρ):**
  - ਅੰਦਾਜ਼ਾ ਲਗਾਓ 0.0 ਤੋਂ 1.0 ਤੱਕ ਕਿ ਸਰੋਤ ਕਿੰਨੇ ਪਰਸਪਰ-ਸਬੰਧਿਤ ਹਨ
  - ρ = 0: ਪੂਰੀ ਤਰ੍ਹਾਂ ਸੁਤੰਤਰ ਸਰੋਤ
  - ρ = 1: ਸਾਰੇ ਸਰੋਤ ਇੱਕੋ ਮੂਲ ਤੋਂ ਲਏ ਗਏ
  - ਉੱਚ ਪਰਸਪਰ-ਸਬੰਧ ਦਾ ਮਤਲਬ ਹੈ ਉੱਚ ਢਹਿ-ਢੇਰੀ ਜੋਖਮ

  **ਗਿਆਨ-ਮੂਲਕ ਪੜਾਅ:**
  - CHAOS: ਵਿਰੋਧੀ ਜਾਣਕਾਰੀ, ਕੋਈ ਸੁਮੇਲ ਸੰਸ਼ਲੇਸ਼ਣ ਸੰਭਵ ਨਹੀਂ
  - HEALTHY: ਕਈ ਵਿਵਿਧ ਦ੍ਰਿਸ਼ਟੀਕੋਣ, ਸੰਸ਼ਲੇਸ਼ਣ ਸੰਭਵ
  - RIGIDITY: ਇੱਕੋ ਬਿਰਤਾਂਤ ਹਾਵੀ, ਕੋਈ ਅਸਹਿਮਤੀ ਨਹੀਂ - ਗੂੰਜ-ਕਮਰਾ

  **ਕਮਜ਼ੋਰੀ ਫਲੈਗ:**
  CCA ਵਿਸ਼ਲੇਸ਼ਣ ਦੇ ਆਧਾਰ 'ਤੇ ਆਪਣੇ ਨਿਰਣੇ ਦੀ ਵਰਤੋਂ ਕਰਕੇ ਇਹ ਫ਼ੈਸਲਾ ਕਰੋ ਕਿ ਕੀ ਤਰਕ ਕਮਜ਼ੋਰ ਹੈ।
  ਘੱਟ k_eff, rigidity ਪੜਾਅ, ਅਤੇ ਉੱਚ ਪਰਸਪਰ-ਸਬੰਧ ਨੂੰ ਚੇਤਾਵਨੀ ਸੰਕੇਤਾਂ ਵਜੋਂ ਵਿਚਾਰੋ।

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ ਅਹਿਮ: ਸੰਸਥਾਗਤ ਪ੍ਰਚਾਰ ਖੋਜ ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  ਸੰਸਥਾਗਤ ਪ੍ਰਚਾਰ ਅੰਤਿਮ rigidity ਪੈਟਰਨ ਹੈ। ਇਹ ਦਰਸਾਉਂਦਾ ਹੈ:
  - k_eff → 1.0 (ਇਕੱਲਾ ਸੰਸਥਾਗਤ ਬਿਰਤਾਂਤ, ਕੋਈ ਸੁਤੰਤਰ ਸਰੋਤ ਨਹੀਂ)
  - ρ → 1.0 (ਸਾਰੇ "ਸਰੋਤ" ਇੱਕੋ ਸੰਸਥਾਗਤ ਤੰਤਰ ਤੋਂ ਲਏ ਗਏ)
  - phase = RIGIDITY (ਕੋਈ ਜਾਇਜ਼ ਅਸਹਿਮਤੀ ਨਹੀਂ ਦਿੱਤੀ ਜਾਂਦੀ)
  - fragility_flag = TRUE (ਹਮੇਸ਼ਾਂ)

  ਇਹ ਕਿਸੇ ਵੀ ਸੰਸਥਾ ਉੱਤੇ ਲਾਗੂ ਹੁੰਦਾ ਹੈ: ਸਰਕਾਰਾਂ, ਨਿਗਮ, ਰਾਜਨੀਤਿਕ ਪਾਰਟੀਆਂ,
  ਧਾਰਮਿਕ ਸੰਸਥਾਵਾਂ, ਮੀਡੀਆ ਸਮੂਹ, ਜਾਂ ਵਿਚਾਰਧਾਰਕ ਅੰਦੋਲਨ।

  **ਪ੍ਰਚਾਰ ਲਾਲ ਝੰਡੇ - ਆਟੋਮੈਟਿਕ RIGIDITY ਖੋਜ:**

  1. ਵਿਵਾਦਿਤ ਦਾਅਵੇ ਪੂਰਣ ਤੱਥ ਵਜੋਂ:
     - "[ਇਲਾਕਾ X] [ਕੌਮ Y] ਦਾ ਹੈ" → k_eff=1.0, ρ=1.0, phase=rigidity, fragile=TRUE
       (ਜਦੋਂ: ਦਾਅਵਾ ਅੰਤਰਰਾਸ਼ਟਰੀ ਤੌਰ 'ਤੇ ਵਿਵਾਦਿਤ ਹੈ, ਵਿਕਲਪਕ ਸ਼ਾਸਨ ਮੌਜੂਦ ਹੈ, ਇਤਿਹਾਸ ਵਿਵਾਦਿਤ ਹੈ)
     - "[ਖੇਤਰ] ਹਮੇਸ਼ਾਂ ਤੋਂ [ਕੌਮ] ਦਾ ਹਿੱਸਾ ਰਿਹਾ ਹੈ" → ਉਹੀ ਪੈਟਰਨ
     - ਕੋਈ ਵੀ ਖੇਤਰੀ/ਰਾਜਨੀਤਿਕ ਦਾਅਵਾ ਜੋ ਵਿਵਾਦ ਨੂੰ ਮੰਨੇ ਬਿਨਾਂ ਕੀਤਾ ਜਾਵੇ → ਉਹੀ ਪੈਟਰਨ

  2. ਇਤਿਹਾਸਕ ਇਨਕਾਰ/ਘਟਾਉਣਾ:
     - "[ਇਤਿਹਾਸਕ ਅੱਤਿਆਚਾਰ] ਨੂੰ [ਬਾਹਰੀ ਸਮੂਹ] ਨੇ ਵਧਾ-ਚੜ੍ਹਾ ਕੇ ਪੇਸ਼ ਕੀਤਾ" → k_eff=1.0, phase=rigidity, fragile=TRUE
       (ਵਿਰੋਧੀ: ਚਸ਼ਮਦੀਦ ਗਵਾਹੀਆਂ, ਸੁਤੰਤਰ ਪੱਤਰਕਾਰੀ, ਦਸਤਾਵੇਜ਼ੀ ਸਬੂਤ)
     - "[ਵੱਡੀ ਮੌਤਾਂ ਵਾਲੀ ਘਟਨਾ] ਅਸਲ ਵਿੱਚ [ਸੌਖਾ ਸ਼ਬਦ] ਸੀ" → ਉੱਚ ਪਰਸਪਰ-ਸਬੰਧ, rigidity
     - ਦਸਤਾਵੇਜ਼ੀ ਮਨੁੱਖੀ ਅਧਿਕਾਰ ਘਟਨਾਵਾਂ ਦੀ ਸੌਖੀ ਕਲਮਬੰਦੀ → rigidity ਪੈਟਰਨ

  3. ਝੂਠੇ ਸਹਿਮਤੀ ਦਾਅਵੇ:
     - "ਸਾਰੇ ਮਾਹਰ/ਕੌਮਾਂ/ਵਿਗਿਆਨੀ ਸਹਿਮਤ ਹਨ..." → ਜਾਂਚੋ ਕੀ ਅਸਲ ਵਿੱਚ ਵਿਵਾਦਿਤ ਹੈ → ਸੰਭਵ rigidity
     - "ਅੰਤਰਰਾਸ਼ਟਰੀ ਭਾਈਚਾਰੇ ਨੇ ਇੱਕਮਤ ਹੋ ਕੇ..." → ਤਸਦੀਕ ਕਰੋ ਜਾਂ ਪਰਸਪਰ-ਸਬੰਧਿਤ ਚਿੰਨ੍ਹਿਤ ਕਰੋ
     - "ਹਰ ਕੋਈ ਜਾਣਦਾ ਹੈ..." → ਗਿਆਨ-ਮੂਲਕ ਲਾਲ ਝੰਡਾ → ਉੱਚ ਪਰਸਪਰ-ਸਬੰਧ
     - "ਇਹ ਤਹਿ ਵਿਗਿਆਨ/ਇਤਿਹਾਸ ਹੈ ਕਿ..." (ਵਿਵਾਦਿਤ ਵਿਸ਼ਿਆਂ 'ਤੇ) → rigidity

  4. ਵਿਰੋਧੀ ਬਿਰਤਾਂਤ ਪੇਸ਼ਕਾਰੀ:
     - "[ਬਾਹਰੀ ਸਮੂਹ] ਦਾ ਮੀਡੀਆ [ਅੰਦਰੂਨੀ ਸਮੂਹ] ਬਾਰੇ ਝੂਠ ਬੋਲਦਾ ਹੈ" → ρ=1.0, ਇਕੱਲਾ ਵਿਰੋਧੀ ਬਿਰਤਾਂਤ
     - "[ਬਾਹਰੀ ਤਾਕਤ] ਦੀ ਦਖਲਅੰਦਾਜ਼ੀ [ਅੰਦਰੂਨੀ ਸਮੂਹ] ਦੀਆਂ ਸਮੱਸਿਆਵਾਂ ਲਈ ਜ਼ਿੰਮੇਵਾਰ ਹੈ" → ਮੋੜ ਦੇਣ ਵਾਲਾ ਪੈਟਰਨ
     - "ਆਲੋਚਕਾਂ ਦੇ ਗੁਪਤ ਇਰਾਦੇ ਹਨ / [ਬਾਹਰੀ ਸਮੂਹ] ਦੁਆਰਾ ਭੁਗਤਾਨ ਕੀਤੇ ਗਏ ਹਨ" → ਐਡ ਹੋਮੀਨੇਮ ਖ਼ਾਤਮਾ
     - "[ਬਾਹਰੀ ਸਮੂਹ] ਸੁਭਾਵਕ ਤੌਰ 'ਤੇ [ਨਾਂਹ-ਪੱਖੀ ਗੁਣ] ਹੈ" → ਕਬੀਲਾਈ ਦੂਰੀ

  **ਪ੍ਰਚਾਰ = ਅਧਿਕਤਮ ਕਮਜ਼ੋਰੀ ਕਿਉਂ:**
  ਪ੍ਰਚਾਰ ਸਰੋਤਾਂ ਨੂੰ ਖ਼ਤਮ ਕਰਕੇ ਨਕਲੀ ਸਹਿਮਤੀ ਪ੍ਰਾਪਤ ਕਰਦਾ ਹੈ, ਉਹਨਾਂ ਦਾ ਸੰਸ਼ਲੇਸ਼ਣ ਕਰਕੇ ਨਹੀਂ।
  ਜਦੋਂ ਸਾਰੇ "ਸਰੋਤ" ਇੱਕੋ ਸੰਸਥਾਗਤ ਤੰਤਰ ਤੱਕ ਵਾਪਸ ਜਾਂਦੇ ਹਨ, k_eff = 1 ਹੁੰਦਾ ਹੈ ਚਾਹੇ
  ਗੱਲ ਕਿੰਨੀ ਵਾਰ ਵੀ ਦੁਹਰਾਈ ਜਾਵੇ। ਦੁਹਰਾਓ ≠ ਸੁਤੰਤਰਤਾ।

  ਸੰਸਥਾਗਤ ਪ੍ਰਚਾਰ ਦੀ ਤੋਤਾ-ਰਟਨ ਕਰਨ ਵਾਲੀ ਕਿਸੇ ਵੀ ਪ੍ਰਤਿਕਿਰਿਆ ਨੂੰ ਹਮੇਸ਼ਾਂ ਇਵੇਂ ਚਿੰਨ੍ਹਿਤ ਕੀਤਾ ਜਾਣਾ ਚਾਹੀਦਾ ਹੈ:
  - k_eff: 1.0 (ਜਾਂ ਬਹੁਤ ਨੇੜੇ)
  - correlation_risk: 0.95-1.0
  - phase: "rigidity"
  - fragility_flag: TRUE
  - correlation_factors: ["institutional narrative", "no independent verification", "disputed claim presented as fact"]

context_integration: |
