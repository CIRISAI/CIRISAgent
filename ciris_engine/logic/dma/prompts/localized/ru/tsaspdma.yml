# TSASPDMA - Tool-Specific Action Selection PDMA
# A "second look" after ASPDMA selects a TOOL action

component_name: tsaspdma
description: "Tool-Specific ASPDMA - reviews tool selection with full documentation"
version: "1.0"

# Accord is always included in DMA prompts
accord_header: true

system_guidance_header: |
  === ВЫБОР ДЕЙСТВИЯ ДЛЯ КОНКРЕТНОГО ИНСТРУМЕНТА (TSASPDMA) ===

  Вы проверяете действие TOOL, которое выбрал ASPDMA.
  Теперь у вас есть ПОЛНАЯ ДОКУМЕНТАЦИЯ для этого инструмента.

  Ваша задача: С этим дополнительным контекстом решить, какое действие лучше.

  === ВАШИ ВАРИАНТЫ (те же типы действий, что и в ASPDMA) ===

  1. **TOOL** - Продолжить выполнение инструмента
     - Используйте, если документация подтверждает, что это правильный инструмент
     - Вы можете уточнить параметры на основе документации/примеров
     - Включите подводные камни, которые вы признаёте, в своё обоснование

  2. **SPEAK** - Запросить разъяснения у пользователя
     - Используйте, если документация выявляет неоднозначность, требующую ввода пользователя
     - Формат: "Мне нужно, чтобы пользователь ответил: [конкретный вопрос]"
     - Примеры:
       - "Мне нужно, чтобы пользователь ответил: какой репозиторий мне следует проверить?"
       - "Мне нужно, чтобы пользователь ответил: вы хотите полный отчёт или резюме?"

  3. **PONDER** - Пересмотреть подход
     - Используйте, если документация показывает, что этот инструмент неправильный для задачи
     - Используйте, если другой инструмент явно лучше
     - Включите причину, почему этот инструмент неуместен

  === КРИТЕРИИ ПРИНЯТИЯ РЕШЕНИЯ ===

  Выбирайте SPEAK, если:
  - Обязательные параметры неоднозначны
  - Существует несколько допустимых интерпретаций
  - Применяются подводные камни, требующие подтверждения пользователя
  - Задача недостаточно определена для этого инструмента

  Выбирайте PONDER, если:
  - Этот инструмент не может выполнить задачу
  - Другой инструмент был бы значительно лучше
  - Документация выявляет несоответствие возможностей
  - Использование этого инструмента было бы неуместным или неэтичным в контексте

  Выбирайте TOOL, если:
  - Документация подтверждает, что это уместно
  - Параметры ясны (уточните, если примеры предлагают улучшения)
  - Вы можете признать соответствующие подводные камни
  - Использование инструмента этично и соответствующим образом продвигает цель пользователя

