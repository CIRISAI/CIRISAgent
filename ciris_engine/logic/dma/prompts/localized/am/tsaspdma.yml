response_format: 'እነዚህን መስኮች ያለው ጠፍጣፋ JSON ነገር መመለስ:

  - "selected_action": ከ"TOOL"፣ "SPEAK"፣ "PONDER" አንዱ

  - "reasoning": እርስዎ እየተቀበሉ ያሉትን gotchas ጨምሮ ውሳኔዎን ያብራሩ


  ለድርጊት ተወሰኑ መስኮች PLUS (ከታች ያሉትን ትክክለኛ የመስክ ስሞች ይጠቀሙ):


  TOOL ድርጊት (መደበኛ ሁነታ - መሳሪያ አለ):

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  TOOL ድርጊት (የማረም ሁነታ - የመሳሪያ ስም ስህተት ነበር):

  {{"selected_action": "TOOL", "reasoning": "የመሳሪያ ስምን ከሚገኙ መሳሪያዎች ጋር እያረመ...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  SPEAK ድርጊት:

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "ተጠቃሚው እንዲመልስ እፈልጋለሁ: የትኛው መብራት?"}}


  PONDER ድርጊት:

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["ይህ ትክክለኛው አቀራረብ ነው?"]}}


  አስፈላጊ:

  - የሚያስፈልጉትን የመሳሪያ መለኪያዎች ለመወሰን ከላይ ያለውን የመለኪያ ስኪማ ይጠቀሙ

  - የመለኪያ እሴቶችን ከተጠቃሚው ዓላማ እና የንግግር አውድ ያውጡ

  - tool_parameters የመሳሪያውን ክርክሮች የያዘ dict ነው

  - በማረም ሁነታ: ከሚገኙ መሳሪያዎች ዝርዝር ትክክለኛ ስም ያለው "tool_name" መስክ ያካትቱ

  - በmarkdown code blocks ውስጥ አታጠቃልሉ


  የቋንቋ ደንቦች:

  - በተጠቃሚው ተመራጭ ቋንቋ ምላሽ ይስጡ (የተጠቃሚውን መገለጫ ይመልከቱ)።

  - ሁሉም የይዘት እሴቶች (reasoning፣ speak_content፣ ወዘተ) በተጠቃሚው ቋንቋ መሆን አለባቸው።

  - የJSON ቁልፎች በእንግሊዝኛ መቆየት አለባቸው (ለምሳሌ፣ "selected_action": "TOOL"፣ "reasoning"፣ "tool_parameters")።

  - ምሳሌ: {{"selected_action": "SPEAK", "speak_content": "ሰላም!", "reasoning": "ተጠቃሚው በአማርኛ ሰላምታ ሰጥቷል"}} - የአማርኛ ይዘት፣ የእንግሊዝኛ ቁልፎች።

  '
tool_correction_section: "=== TOOL ማረም ሁነታ ===\n\nASPDMA መሳሪያውን '{requested_tool}' መረጠ ግን ይህ መሳሪያ አይኖርም።\n\nተግባርዎ: ከሚገኙ መሳሪያዎች ዝርዝር የተጠቃሚውን ዓላማ የሚመጥን ትክክለኛ መሳሪያ ያግኙ፣\nወይም ምንም ተስማሚ መሳሪያ የሌለ ከሆነ SPEAK/PONDER ይጠቀሙ።\n\nየሚገኙ መሳሪያዎች:\n{available_tools_list}\n\nመመሪያዎች:\n1. ከሀሳብ ይዘት የተጠቃሚውን ዋና ዓላማ ይተንትኑ\n2. ከላይ ያሉትን የሚገኙ መሳሪያዎች ይገምግሙ - ከዓላማው ጋር የሚመጥን ያግኙ\n3. የሚመጥን መሳሪያ ካገኙ:\n   - ከዝርዝሩ ትክክለኛ ስም ጋር \"tool_name\" የተቀመጠ TOOL ድርጊት ይመልሱ\n   - በመሳሪያው ስኪማ መሰረት ተገቢ \"tool_parameters\" ይሙሉ\n4. በርካታ መሳሪያዎች ሊመጥኑ ከቻሉ:\n   - ተጠቃሚው የትኛውን ተወሰነ አቅም እንደሚፈልግ ለመጠየቅ SPEAK ይመልሱ\n5. ምንም መሳሪያ ከዓላማው ጋር የማይመጥን ከሆነ:\n   - አቀራረቡን ሙሉ በሙሉ እንደገና ለማሰብ PONDER ይመልሱ\n\nወሳኝ: \"tool_name\" መስክ ከላይ ካለው የሚገኙ መሳሪያዎች ዝርዝር ጋር ትክክለኛ ተመጣጣኝ መሆን አለበት።\n"
evaluation_steps: 'ደረጃ 1: ሰነዱን ያንብቡ

  - quick_start፣ detailed_instructions፣ examples ይገምግሙ

  - ለዚህ አጠቃቀም ጉዳይ የሚተገበሩ ማንኛቸውም gotchas ይመልከቱ

  - when_to_use ከተግባሩ ጋር የሚመጣጠን መሆኑን ያረጋግጡ


  ደረጃ 2: ASPDMA ምርጫን ይገምግሙ

  - መለኪያዎቹ በሰነድ መሰረት ትክክል ናቸው?

  - ምሳሌዎች የተሻለ የመለኪያ ቅርጸት ያጠቁሙ?

  - አሻሚ የሚያስፈልጉ መለኪያዎች አሉ?


  ደረጃ 3: Gotchas ን ይፈትሹ

  - ለዚህ ተወሰነ አጠቃቀም ማንኛውም gotcha ተፈጻሚ ይሆናል?

  - ተጠቃሚው ይህንን ባህሪ ይጠብቃል?

  - ተጠቃሚው መጀመሪያ መጠንቀቅ ወይም መጠየቅ አለበት?


  ደረጃ 4: ድርጊት ይወስኑ

  - TOOL: ያረጋግጡ ወይም ያጣሩ፣ gotchas ን ይቀበሉ

  - SPEAK: ተወሰነ ማብራሪያ ጠይቅ

  - PONDER: ለምን እንደገና ማሰብ እንደሚገባ ያብራሩ

  '
closing_reminder: 'አስፈላጊ: ሚናዎ ASPDMA ሙሉ ሰነድ ሳይኖረው ማየት የማይችላቸውን ጉዳዮች መያዝ ነው።

  የመሳሪያ ምርጫው ጥሩ ከሆነ፣ በፍጥነት ያረጋግጡት።

  ሰነዱ እውነተኛ ስጋቶችን በሚያሳይበት ጊዜ ብቻ SPEAK ወይም PONDER።


  SPEAK በሚመርጡበት ጊዜ፣ ተወሰነ ይሁኑ: "ተጠቃሚው እንዲመልስ እፈልጋለሁ: [ጥያቄ]"

  PONDER በሚመርጡበት ጊዜ፣ ያብራሩ: "ይህ መሳሪያ X ማድረግ አይችልም ምክንያቱም Y፣ Z አስብበት"

  TOOL በሚመርጡበት ጊዜ፣ ይቀበሉ: "ስለ gotcha X ግንዛቤ ይዘው እየቀጠሉ"

  '
