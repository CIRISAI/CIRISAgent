# सुसंगतता कोलॅप्स विश्लेषण (CCA) तत्त्वांची शब्दार्थ अंमलबजावणी

component_name: idma
description: "अंतर्ज्ञान DMA - CCA k_eff सूत्र आणि फेज वर्गीकरण लागू करते"
