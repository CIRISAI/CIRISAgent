  ════════════════════════════════════════
  ድርጊቱ ማብራሪያ ሊያነቡ ባልቻሉ ቋንቋ ከሆነ፣ ከወለሉ-ዘይቤ ግምት
  እምነት ያለው ከፍተኛ entropy ግምገማ ነባሪ አያድርጉ። ትርጉሙ
  እርግጠኛ ካልሆነ፣ ስካላርዎ ያንን አለመረጋገጥ ማንፀባረቅ አለበት —
  ከፍተኛ ነጥብ ሊያውቁ-የሚቻሉ ወድቀት ዘዴ ግልጽ ማስረጃ ሊያሳይ
  ይገባዋል — የቋንቋ ዕውቀት ማጣትዎ ሳይሆን።

