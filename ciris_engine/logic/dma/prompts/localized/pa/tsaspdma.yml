response_format: |
  এই ফিল্ডগুলি সহ একটি FLAT JSON অবজেক্ট প্রদান করুন:
  - "selected_action": "TOOL", "SPEAK", "PONDER" এর একটি
  - "rationale": ਤੁਹਾਡੇ সিদ্ধান্ত ব্যাখ্যা করুন ਤੁਸੀਂ যে সতর্কতা স্বীকার করছেন তা সহ

  প্লাস কর্ম-নির্দিষ্ট ফিল্ড (নীচে সঠিক ফিল্ডের নাম ব্যবহার করুন):

  TOOL কর্মের জন্য (স্বাভাবিক মোড - ਸੰਦ বিদ্যমান):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  TOOL কর্মের জন্য (সংশোধন মোড - ਸੰਦের নাম ভুল ছিল):
  {{"selected_action": "TOOL", "rationale": "উপলব্ধ ਸੰਦের সাথে মিল করতে ਸੰਦের নাম সংশোধন করা হচ্ছে...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  SPEAK কর্মের জন্য:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "ਮੇਰੇ ਯੂਜ਼ਰকে উত্তর দিতে হবে: কোন লাইট?"}}

  PONDER কর্মের জন্য:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["এটি কি সঠিক পদ্ধতি?"]}}

  গুরুত্বপূর্ণ:
  - ਲੋੜੀਂਦਾ ਸੰਦ প্যারামিটার নির্ধারণ করতে উপরের প্যারামিটার স্কিমা ব্যবহার করুন
  - ਯੂਜ਼ਰর উদ্ਦੇਸ਼্য এবং কথোপকথন প্রসঙ্গ থেকে প্যারামিটার মান অনুমান করুন
  - tool_parameters হল একটি ডিক্ট যা ਸੰਦের আর্গুমেন্ট ধারণ করে
  - সংশোধন মোডে: উপলব্ধ ਸੰਦ তালিকা থেকে সঠিক নাম সহ "tool_name" ফিল্ড অন্তর্ভুক্ত করুন
  - মার্কডাউন কোড ব্লকে মোড়াবেন না

  ਭਾਸ਼ਾ নিয়ম:
  - ਯੂਜ਼ਰর ਪਸੰਦের ਭਾਸ਼ਾয় প্রতিক্রিয়া দিন (ਯੂਜ਼ਰ প্রোফাইল দেখুন)।
  - সমস্ত কন্টেন্ট মান (rationale, speak_content, ponder_questions) ਯੂਜ਼ਰর ਭਾਸ਼ਾয় হওয়া উচিত।
  - JSON কী এবং কর্মের নাম অবশ্যই ইংরেজিতে থাকবে (যেমন, "selected_action": "TOOL", "rationale", "tool_parameters")।
  - উদাহরণ: {{"selected_action": "SPEAK", "rationale": "需要用户澄清", "speak_content": "请问您想控制哪个灯？"}} - চীনা কন্টেন্ট, ইংরেজি কী/কর্ম।

# ਸੰਦ সংশোধন মোড বিভাগ (যখন ASPDMA অস্তিত্বহীন ਸੰਦ নির্বাচন করেছে তখন ব্যবহৃত)
tool_correction_section: |
  === ਸੰਦ সংশোধন মোড ===

  ASPDMA ਸੰਦ '{requested_tool}' নির্বাচন করেছে কিন্তু এই ਸੰਦটি বিদ্যমান নেই।

  ਤੁਹਾਡੇ কাজ: উপলব্ধ ਸੰਦ তালিকা থেকে সঠিক ਸੰਦ খুঁজুন যা
  ਯੂਜ਼ਰর উদ্ਦੇਸ਼্যের সাথে মিলে, বা কোনো উপযুক্ত ਸੰਦ না থাকলে SPEAK/PONDER ব্যবহার করুন।

  উপলব্ধ ਸੰਦ:
  {available_tools_list}

  নির্ਦੇਸ਼াবলী:
  ১. ਸੋਚੋর কন্টেন্ট থেকে ਯੂਜ਼ਰর মূল উদ্ਦੇਸ਼্য বিশ্লেষণ করুন
  ২. উপরের উপলব্ধ ਸੰਦগুলি পর্যালোচনা করুন - উদ্ਦੇਸ਼্যের সাথে মিলে এমন একটি খুঁজুন
  ৩. যদি ਤੁਸੀਂ মিলে যাওয়া ਸੰਦ খুঁজে পান:
     - তালিকা থেকে সঠিক নামে "tool_name" সেট করে TOOL কর্ম প্রদান করুন
     - ਸੰਦের স্কিমার ভিত্তিতে উপযুক্ত "tool_parameters" পূরণ করুন
  ৪. যদি একাধিক ਸੰਦ মিলতে পারে:
     - ਯੂਜ਼ਰকে জিজ্ঞাসা করতে SPEAK প্রদান করুন কোন নির্দিষ্ট সক্ষমতা তারা চান
  ৫. যদি কোনো ਸੰਦ উদ্ਦੇਸ਼্যের সাথে মিলে না:
     - ਪੂਰਾ ਹੋਇਆভাবে পদ্ধতি পুনর্বিবেচনা করতে PONDER প্রদান করুন

  গুরুত্বপূর্ণ: "tool_name" ফিল্ড অবশ্যই উপরের উপলব্ধ ਸੰਦ তালিকা থেকে সঠিক মিল হতে হবে।

evaluation_steps: |
  ধাপ ১: ডকুমেন্টেশন পড়ুন
  - quick_start, detailed_instructions, examples পর্যালোচনা করুন
  - এই ব্যবহারের ক্ষেত্রে প্রযোজ্য কোনো সতর্কতা নোট করুন
  - when_to_use কাজের সাথে মিলে কিনা পরীক্ষা করুন

  ধাপ ২: ASPDMA এর নির্বাচন মূল্যায়ন করুন
  - ডকুমেন্টেশন অনুযায়ী প্যারামিটার সঠিক কিনা?
  - উদাহরণ কি ভাল প্যারামিটার ফরম্যাটিং পরামর্শ দেয়?
  - কি ਲੋੜੀਂਦਾ প্যারামিটার আছে যা অস্পষ্ট?

  ধাপ ৩: সতর্কতা পরীক্ষা করুন
  - এই নির্দিষ্ট ব্যবহারে কোনো সতর্কতা প্রযোজ্য কিনা?
  - ਯੂਜ਼ਰ কি এই আচরণ আশা করবেন?
  - ਯੂਜ਼ਰকে কি সতর্ক করা উচিত বা প্রথমে জিজ্ঞাসা করা উচিত?

  ধাপ ৪: কর্ম সিদ্ধান্ত নিন
  - TOOL: ਪੁਸ਼ਟੀ ਕਰੋ বা পরিমার্জন করুন, সতর্কতা স্বীকার করুন
  - SPEAK: নির্দিষ্ট স্পষ্টীকরণ জিজ্ঞাসা করুন
  - PONDER: পুনর্বিবেচনার কারণ ব্যাখ্যা করুন

closing_reminder: |
  গুরুত্বপূর্ণ: ਤੁਹਾਡੇ ভূমিকা হল এমন ਸਮੱਸਿਆ ধরা যা ASPDMA ਪੂਰਾ ਹੋਇਆ
  ডকুমেন্টেশন ছাড়া দেখতে পারেনি। যদি ਸੰਦ নির্বাচন ভাল দেখায়, দ্রুত ਪੁਸ਼ਟੀ ਕਰੋ।
  শুধুমাত্র SPEAK বা PONDER করুন যখন ডকুমেন্টেশন প্রকৃত উদ্বেগ প্রকাশ করে।

  SPEAK নির্বাচন করার ਸਮਾਂ, নির্দিষ্ট হন: "ਮੇਰੇ ਯੂਜ਼ਰকে উত্তর দিতে হবে: [প্রশ্ন]"
  PONDER নির্বাচন করার ਸਮਾਂ, ব্যাখ্যা করুন: "এই ਸੰਦ X করতে পারে না কারণ Y, Z বিবেচনা করুন"
  TOOL নির্বাচন করার ਸਮਾਂ, স্বীকার করুন: "সতর্কতা X এর সচেতনতা নিয়ে এগিয়ে যাওয়া হচ্ছে"
