# DSASPDMA - Deferral-Specific Action Selection PDMA
# Segunda pasada basada en derechos después de que ASPDMA selecciona DEFER

component_name: dsaspdma
description: "Selección de acción específica de deferencia: clasifica una acción DEFER contra la taxonomía de derechos/necesidades"
version: "1.0"

accord_header: true

taxonomy_text: |
  === TAXONOMÍA DE DERECHOS / NECESIDADES ===
  - health_and_bodily_integrity: Úsalo para vida, salud, integridad corporal, discapacidad, seguridad médica, weaponización, materiales peligrosos o implicaciones directas de daño físico.
    Fundamento de derechos: right_to_life, right_to_health, security_of_person
  - adequate_standard_of_living_and_services: Úsalo para vivienda, refugio, seguridad del hogar, comida, agua, saneamiento, energía, infraestructura y otras condiciones esenciales de vida.
    Fundamento de derechos: adequate_standard_of_living, housing, food_water_sanitation
  - livelihood_and_financial_security: Úsalo para trabajo, ingresos, salarios, deuda, crédito, beneficios, seguridad social, inversión, impuestos u otras necesidades materiales de sustento y estabilidad financiera.
    Fundamento de derechos: work, social_security, material_conditions_for_subsistence
  - justice_and_legal_agency: Úsalo para asesoría legal, asistencia jurídica, debido proceso, juicio justo, acceso a remedio, contratos, responsabilidad u otras cuestiones de acceso a la justicia.
    Fundamento de derechos: fair_trial, access_to_justice, legal_aid_and_effective_remedy
  - identity_and_civic_participation: Úsalo para reconocimiento ante la ley, verificación de identidad, nacionalidad, voto, elecciones, participación pública o condición cívica.
    Fundamento de derechos: recognition_before_the_law, nationality_and_identity, participation_in_public_affairs
  - privacy_autonomy_and_dignity: Úsalo para privacidad, autonomía, dignidad, libertad frente a coerción, fraude, manipulación, inferencia biométrica o vigilancia.
    Fundamento de derechos: privacy, autonomy_and_consent, human_dignity
  - education_culture_and_scientific_participation: Úsalo para educación, investigación, acceso al conocimiento, participación cultural y beneficios del progreso científico.
    Fundamento de derechos: education, take_part_in_cultural_life, benefits_of_scientific_progress
  - community_and_collective_safety: Úsalo para moderación comunitaria, escalación de crisis, detección de patrones, seguridad pública, discriminación o daños que afectan principalmente a grupos.
    Fundamento de derechos: equal_protection, non_discrimination, collective_safety_and_protection
  - general_human_oversight: Úsalo cuando la deferencia trata sobre incertidumbre, interpretación de políticas, límites de autoridad o supervisión humana no específica de dominio.
    Fundamento de derechos: human_review_and_accountability

  === CÓDIGOS DE RAZÓN OPERATIVA DE DEFERENCIA ===
  - licensed_domain_required: Se requiere un especialista con licencia o un manejador de dominio gobernado por separado.
  - rights_impact_review: La solicitud afecta materialmente derechos protegidos o necesidades humanas básicas y requiere revisión.
  - safety_escalation: Posibles daños o condiciones de crisis requieren escalación inmediata o supervisión humana.
  - consent_or_authority_required: Primero se requiere consentimiento válido, autorización o autoridad humana responsable.
  - insufficient_context: El agente no tiene contexto fiable suficiente para proceder de forma responsable.
  - policy_review_required: Se necesita una interpretación de política o gobernanza antes de actuar.
  - resource_or_system_limitation: Las limitaciones del sistema impiden una finalización segura sin revisión.
  - time_based_review: La decisión debe reconsiderarse más tarde en un momento específico o tras un cambio de condición.
  - ethical_uncertainty: El sistema sigue éticamente incierto y requiere juicio humano.
  - unknown: Código de respaldo cuando la razón operativa sigue sin estar clara.

system_guidance_header: |
  === SELECCIÓN DE ACCIÓN ESPECÍFICA DE DEFERENCIA (DSASPDMA) ===

  ASPDMA ya eligió DEFER.
  Tu trabajo NO es reabrir la elección de acción.
  Tu trabajo es clasificar la deferencia para que sea explicable, auditable y enrutable.

  Debes:
  1. Conservar la acción DEFER.
  2. Elegir la mejor categoría primaria de derechos / necesidades.
  3. Elegir el código de razón operativa más adecuado.
  4. Añadir categorías secundarias solo cuando apliquen materialmente.
  5. Establecer domain_hint solo cuando claramente se requiera un manejador con licencia.

evaluation_steps: |
  PASO 1: Lee el pensamiento original y la justificación provisional de ASPDMA.
  PASO 2: Identifica qué necesidad humana / categoría de derechos está implicada más directamente.
  PASO 3: Elige el código de razón operativa que mejor explique POR QUÉ el sistema difiere.
  PASO 4: Mantén el resumen de razón corto, específico y legible para una persona.
  PASO 5: Prefiere una categoría primaria. Añade categorías secundarias solo cuando el caso abarque genuinamente múltiples derechos.

context_integration: |
  === PENSAMIENTO ORIGINAL ===
  {original_thought_content}

  === JUSTIFICACIÓN DE ASPDMA ===
  {aspdma_reasoning}

  === RAZÓN ACTUAL DE DEFER ===
  {current_reason}

  === CONTEXTO ACTUAL DE DEFER ===
  {current_context}

  === DEFER UNTIL ACTUAL ===
  {current_defer_until}

  === DOMAIN HINT ACTUAL ===
  {current_domain_hint}

  {taxonomy_text}

  === OPCIONES DE DOMINIO CON LICENCIA ===
  Usa una de estas solo si claramente es necesaria: {domain_hint_options}

response_format: |
  Devuelve un objeto JSON PLANO con estos campos:
  - "reason_summary": explicación humana breve
  - "operational_reason": uno de los códigos de razón operativa anteriores
  - "primary_need_category": uno de los valores de la taxonomía de derechos / necesidades anteriores
  - "secondary_need_categories": lista opcional de valores adicionales de la taxonomía
  - "rights_basis": lista de etiquetas breves de fundamento de derechos
  - "domain_hint": enum opcional de dominio con licencia cuando claramente se necesite un manejador especializado
  - "defer_until": anulación opcional de marca temporal ISO si el momento debe cambiar

  Ejemplo:
  {{"reason_summary": "Se requiere revisión legal con licencia antes de dar orientación procesal.", "operational_reason": "licensed_domain_required", "primary_need_category": "justice_and_legal_agency", "secondary_need_categories": ["identity_and_civic_participation"], "rights_basis": ["fair_trial", "access_to_justice", "legal_aid_and_effective_remedy"], "domain_hint": "LEGAL"}}

  REGLAS DE IDIOMA:
  - Responde en el idioma preferido del usuario.
  - Las claves JSON y los valores enum DEBEN permanecer exactamente en inglés.
  - Solo el texto humano legible como reason_summary debe localizarse.

closing_reminder: |
  IMPORTANTE:
  - No cambies DEFER por otra acción.
  - No inventes domain_hint salvo que el manejo con licencia esté realmente implicado.
  - El acceso legal y financiero debe tratarse como una necesidad con impacto en derechos, no como un problema administrativo genérico.
  - Prefiere la categoría más precisa con la base de derechos más clara.
