# CodeQL Configuration for GitHub Code Quality
# This configuration limits code quality analysis to production code directories
# Mirrors SonarCloud configuration scope: ciris_engine/ and ciris_adapters/

name: "CIRIS Code Quality Config"

# Include only production code directories
paths:
  - ciris_engine
  - ciris_adapters

# Exclude test files, tools, documentation, and other non-production code
# This matches the SonarCloud exclusion pattern
paths-ignore:
  - tests
  - tools
  - CIRISGUI
  - CIRISVoice
  - FSD
  - ciris_adk
  - ciris_mypy_toolkit
  - ciris_profiles
  - ciris_sdk
  - config
  - data_archive
  - docker
  - docs
  - htmlcov
  - logs
  - scripts
  - deployment
  - wyoming
  - homeassistant-ciris
  # The setup wizard writes the agent's own `.env` file (SECRETS_MASTER_KEY,
  # API keys, OAuth tokens) with chmod(0o600). CodeQL's
  # `py/clear-text-storage-of-sensitive-information` rule taints every
  # provider/key field that flows into `save_path.write_text(content, ...)`,
  # but the write is the canonical persistence surface — the CIRIS process
  # has to read those values back at startup, and encrypting the blob would
  # just relocate the decryption-key storage problem. Exclude the whole file
  # from CodeQL analysis; its behavior is well-defined and small.
  - 'ciris_engine/logic/setup/wizard.py'
  - '**/*.test.py'
  - '**/*_test.py'
  - '**/*.md'
  - '**/*.txt'
  - '**/*.yaml'
  - '**/*.yml'
  - '**/*.json'
  - '**/*.ini'
  - '**/*.sh'
  - '**/*.lock'
  - '**/*.toml'
  - '**/Dockerfile'
  - '**/docker-compose.yml'
  - '**/*.sql'
  - 'vulture_whitelist.py'

# Use default CodeQL query suites for quality analysis
queries:
  - uses: security-and-quality
