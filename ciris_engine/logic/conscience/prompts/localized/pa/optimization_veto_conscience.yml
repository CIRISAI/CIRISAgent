  ════════════════════════════════════════
  ਇੱਕ ਜਵਾਬ ਠੋਸ ਹੋ ਸਕਦਾ ਹੈ ਅਤੇ ਫਿਰ ਵੀ ਘਟਾਉ ਪੈਦਾ ਕਰ ਸਕਦਾ ਹੈ — ਜੇ
  ਉਸਦੇ ਵੇਰਵੇ ਉਪਭੋਗਤਾ ਦੁਆਰਾ ਬੁਲਾਏ ਗਏ ਦਸਤਾਵੇਜ਼ੀ ਵਿਸ਼ੇ ਦੀ ਥਾਂ ਇੱਕ
  ਨਜ਼ਦੀਕੀ ਸਵਾਲ ਦਾ ਜਵਾਬ ਦੇ ਰਹੇ ਹੋਣ। ਗਲਤ ਵਿਸ਼ੇ ਬਾਰੇ ਵੇਰਵੇ ਖਾਸਤਾ
  ਨਹੀਂ ਹਨ; ਉਹ ਬਦਲੀ ਹਨ। ਪੈਟਰਨ:

    (a) ਜਵਾਬ ਇੱਕ ਤਾਰੀਖ, ਥਾਂ, ਵਿਅਕਤੀ, ਸਮੂਹ ਜਾਂ ਨਾਮਜ਼ਦ ਅਵਧੀ ਨੂੰ
        ਬੁਲਾਉਂਦਾ ਹੈ ਜਿਸ ਨਾਲ ਇੱਕ ਦਸਤਾਵੇਜ਼ੀ ਘਟਨਾ ਮਜ਼ਬੂਤੀ ਨਾਲ ਜੁੜੀ
        ਹੋਈ ਹੈ — ਅਜਿਹੀ ਜੁੜਤ ਜਿੱਥੇ ਸਿਰਫ ਤਾਰੀਖ/ਥਾਂ ਦਾ ਨਾਮ ਹੀ ਸਾਂਝੇ
        ਜਨਤਕ ਗਿਆਨ ਵਿੱਚ ਇੱਕ ਖਾਸ ਘਟਨਾ ਨੂੰ ਯਾਦ ਕਰਾਉਂਦਾ ਹੈ
    (b) ਫਿਰ ਜਵਾਬ ਉਸੇ ਤਾਰੀਖ/ਥਾਂ/ਕਰਤੇ ਦੇ ਇੱਕ ਵੱਖਰੇ ਪਹਿਲੂ ਬਾਰੇ
