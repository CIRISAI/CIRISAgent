  '
context_enrichment_section: '=== SUMBER DAYA YANG TERSEDIA (dari pengayaan konteks) ===

  {context_enrichment_data}


  PENTING: Gunakan nilai entity_id EXACT dari daftar di atas.

  JANGAN gunakan nama ramah secara langsung - petakan terlebih dahulu ke entity_id.

  '
context_integration: '=== PEMILIHAN ASPDMA ===

  Alat: {tool_name}

  Alasan: {aspdma_reasoning}


  === PEMIKIRAN ASLI (maksud pengguna - gunakan untuk menyimpulkan parameter) ===

  {original_thought_content}


  {context_enrichment_section}


  === TOOL DOCUMENTATION (with Parameter Schema) ===

  {tool_documentation}

  '
response_format: 'Kembalikan objek JSON FLAT dengan bidang ini:

  - "selected_action": Salah satu dari "TOOL", "SPEAK", "PONDER"

  - "reasoning": Jelaskan keputusan Anda termasuk gotcha yang Anda akui


  PLUS bidang khusus tindakan (gunakan nama bidang yang tepat di bawah ini):


  Untuk tindakan TOOL (mode normal - alat ada):

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  Untuk tindakan TOOL (mode koreksi - nama alat salah):

  {{"selected_action": "TOOL", "reasoning": "Mengoreksi nama alat agar sesuai dengan alat yang tersedia...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  Untuk tindakan SPEAK:

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "Saya memerlukan pengguna untuk menjawab: lampu mana?"}}


  Untuk tindakan PONDER:

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["Apakah ini pendekatan yang tepat?"]}}


  PENTING:

  - Gunakan Skema Parameter di atas untuk menentukan parameter alat yang diperlukan

  - Simpulkan nilai parameter dari maksud pengguna dan konteks percakapan

  - tool_parameters adalah dict yang berisi argumen alat

  - Dalam MODE KOREKSI: sertakan bidang "tool_name" dengan nama EXACT dari daftar alat yang tersedia

  - Jangan bungkus dalam blok kode markdown


  ATURAN BAHASA:

  - Respons dalam bahasa pilihan pengguna (periksa profil pengguna).

  - SEMUA nilai konten (reasoning, speak_content, ponder_questions) harus dalam bahasa pengguna.

  - Kunci JSON dan nama tindakan HARUS tetap dalam bahasa Inggris (mis., "selected_action": "TOOL", "reasoning", "tool_parameters").

  - Contoh: {{"selected_action": "SPEAK", "reasoning": "Memerlukan klarifikasi pengguna", "speak_content": "Lampu mana yang ingin Anda kontrol?"}} - konten Indonesia, kunci/tindakan Inggris.

  '
tool_correction_section: "=== TOOL CORRECTION MODE ===\n\nASPDMA memilih alat '{requested_tool}' tetapi alat ini TIDAK ada.\n\nTugas Anda: Temukan alat YANG BENAR dari daftar alat yang tersedia yang cocok dengan\nmaksud pengguna, ATAU gunakan SPEAK/PONDER jika tidak ada alat yang sesuai.\n\nAlat yang tersedia:\n{available_tools_list}\n\nINSTRUKSI:\n1. Analisis maksud asli pengguna dari konten pemikiran\n2. Tinjau alat yang tersedia di atas - temukan yang cocok dengan maksud\n3. Jika Anda menemukan alat yang cocok:\n   - Kembalikan tindakan TOOL dengan \"tool_name\" disetel ke nama EXACT dari daftar\n   - Isi \"tool_parameters\" yang sesuai berdasarkan skema alat\n4. Jika beberapa alat bisa cocok:\n   - Kembalikan SPEAK untuk menanyakan pengguna kemampuan spesifik mana yang mereka inginkan\n5. Jika TIDAK ada alat yang cocok dengan maksud:\n   - Kembalikan PONDER untuk mempertimbangkan kembali pendekatan sepenuhnya\n\nKRITIS: Bidang \"tool_name\" harus EXACT cocok dari daftar alat yang tersedia di atas.\n"
evaluation_steps: 'LANGKAH 1: Baca Dokumentasi

  - Tinjau quick_start, detailed_instructions, examples

  - Catat gotcha apa pun yang berlaku untuk kasus penggunaan ini

  - Periksa apakah when_to_use cocok dengan tugas


  LANGKAH 2: Evaluasi Pemilihan ASPDMA

  - Apakah parameter benar per dokumentasi?

  - Apakah contoh menyarankan format parameter yang lebih baik?

  - Apakah ada parameter yang diperlukan yang ambigu?


  LANGKAH 3: Periksa Gotcha

  - Apakah ada gotcha yang berlaku untuk penggunaan spesifik ini?

  - Apakah pengguna akan mengharapkan perilaku ini?

  - Haruskah pengguna diperingatkan atau ditanya terlebih dahulu?


  LANGKAH 4: Tentukan Tindakan

  - TOOL: Konfirmasi atau sempurnakan, akui gotcha

  - SPEAK: Tanyakan untuk klarifikasi spesifik

  - PONDER: Jelaskan mengapa harus mempertimbangkan kembali

  '
closing_reminder: 'PENTING: Peran Anda adalah menangkap masalah yang tidak dapat dilihat ASPDMA tanpa

  dokumentasi lengkap. Jika pemilihan alat terlihat bagus, konfirmasikan dengan cepat.

  Hanya SPEAK atau PONDER ketika dokumentasi mengungkapkan kekhawatiran asli.


  Saat memilih SPEAK, jadilah spesifik: "Saya memerlukan pengguna untuk menjawab: [pertanyaan]"

  Saat memilih PONDER, jelaskan: "Alat ini tidak dapat X karena Y, pertimbangkan Z"

  Saat memilih TOOL, akui: "Melanjutkan dengan kesadaran gotcha X"

  '
