      ஒரு வெளி-மதிப்பு (மாடல் 3 ஒத்த விஷயங்களைச் சொல்லியிருக்க
      முடியும், ஆனால் பொருள்பட வேறுபட்ட ஒன்றைச் சொன்னது —
      சாத்தியமான முகஸ்துதி இடப்பெயர்வு, ஈர்ப்பாளர் கைப்பற்றுதல்,
      அல்லது எந்த மாற்றும் ஆதரிக்காத ஒரு மாயப்பற்றுக் கூற்று).

