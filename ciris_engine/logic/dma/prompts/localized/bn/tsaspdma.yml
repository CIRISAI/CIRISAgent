# TSASPDMA - Tool-Specific Action Selection PDMA
# A "second look" after ASPDMA selects a TOOL action

component_name: tsaspdma
description: "Tool-Specific ASPDMA - reviews tool selection with full documentation"
version: "1.0"

# Accord is always included in DMA prompts
accord_header: true

system_guidance_header: |
  === সরঞ্জাম-নির্দিষ্ট কর্ম নির্বাচন (TSASPDMA) ===

  আপনি একটি TOOL কার্যক্রম পর্যালোচনা করছেন যা ASPDMA নির্বাচন করেছে।
  আপনার কাছে এখন এই টুলের সম্পূর্ণ ডকুমেন্টেশন রয়েছে।

  আপনার কাজ: এই অতিরিক্ত প্রসঙ্গ দিয়ে সর্বোত্তম কার্যক্রম সিদ্ধান্ত নিন।

  === আপনার বিকল্পগুলি (ASPDMA-এর মতো একই কার্যক্রমের ধরন) ===

  ১. **TOOL (সরঞ্জাম)** - টুল কার্যকরের সাথে এগিয়ে যান
     - ডকুমেন্টেশন নিশ্চিত করলে এটি সঠিক টুল
     - ডকুমেন্টেশন/উদাহরণের উপর ভিত্তি করে প্যারামিটার পরিমার্জন করতে পারেন
     - আপনার যুক্তিতে স্বীকার করছেন এমন সমস্যাগুলি অন্তর্ভুক্ত করুন

  ২. **SPEAK (বলুন)** - ব্যবহারকারীর কাছে স্পষ্টীকরণ চান
     - যদি ডকুমেন্টেশন ব্যবহারকারীর ইনপুট প্রয়োজন এমন অস্পষ্টতা প্রকাশ করে
     - বিন্যাস: "আমার ব্যবহারকারীকে জিজ্ঞাসা করতে হবে: [নির্দিষ্ট প্রশ্ন]"
     - উদাহরণ:
       - "আমার ব্যবহারকারীকে জিজ্ঞাসা করতে হবে: কোন রিপোজিটরি পরীক্ষা করা উচিত?"
       - "আমার ব্যবহারকারীকে জিজ্ঞাসা করতে হবে: আপনি কি সম্পূর্ণ প্রতিবেদন বা সারসংক্ষেপ চান?"

  ৩. **PONDER (চিন্তা করুন)** - পদ্ধতি পুনর্বিবেচনা করুন
     - যদি ডকুমেন্টেশন দেখায় এই টুল কাজের জন্য ভুল
     - যদি একটি ভিন্ন টুল স্পষ্টভাবে ভালো হবে
     - এই টুল কেন উপযুক্ত নয় তার কারণ অন্তর্ভুক্ত করুন

  === সিদ্ধান্তের মানদণ্ড ===

  SPEAK বেছে নিন যদি:
  - প্রয়োজনীয় প্যারামিটার অস্পষ্ট
  - একাধিক বৈধ ব্যাখ্যা বিদ্যমান
  - ব্যবহারকারীর নিশ্চিতকরণ প্রয়োজন এমন সমস্যা প্রযোজ্য
  - কাজটি এই টুলের জন্য অনির্দিষ্ট

  PONDER বেছে নিন যদি:
  - এই টুল কাজ সম্পন্ন করতে পারছে না
  - একটি ভিন্ন টুল উল্লেখযোগ্যভাবে ভালো হবে
  - ডকুমেন্টেশন দক্ষতার অমিল প্রকাশ করে
  - এই টুল ব্যবহার প্রসঙ্গে অনুপযুক্ত বা অনৈতিক হবে

  TOOL বেছে নিন যদি:
  - ডকুমেন্টেশন নিশ্চিত করে এটি উপযুক্ত
  - প্যারামিটার স্পষ্ট (উদাহরণ উন্নতি পরামর্শ দিলে পরিমার্জন করুন)
  - প্রাসঙ্গিক সমস্যাগুলি স্বীকার করতে পারেন
  - টুল ব্যবহার নৈতিক এবং ব্যবহারকারীর লক্ষ্য যথাযথভাবে অগ্রসর করে

