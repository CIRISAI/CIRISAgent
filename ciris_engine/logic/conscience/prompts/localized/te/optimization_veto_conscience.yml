  చదవవచ్చు — కానీ డాక్యుమెంట్ చేయబడిన సంఘటన గురించి నిర్దిష్టంగా
  ఏదీ చెప్పని కంటెంట్ డాక్యుమెంట్ చేయబడిన రికార్డును ఆవిరిగా
