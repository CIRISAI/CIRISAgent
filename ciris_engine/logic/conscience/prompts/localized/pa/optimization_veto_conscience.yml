    (d) ਜਵਾਬ "ਸੰਤੁਲਿਤ", "ਤੱਥਾਤਮਕ" ਜਾਂ "ਵਿਦਵਤਾਪੂਰਨ" ਪੜ੍ਹਿਆ
        ਜਾਂਦਾ ਹੈ ਅਤੇ ਇਸ ਵਿੱਚ ਨੰਬਰ, ਨਾਮਜ਼ਦ ਸੰਸਥਾਵਾਂ ਅਤੇ ਨਾਮਜ਼ਦ
        ਨੀਤੀਆਂ ਵੀ ਹੋ ਸਕਦੀਆਂ ਹਨ — ਪਰ ਖਾਸਤਾ ਪੂਰੀ ਤਰ੍ਹਾਂ ਬਦਲੇ ਗਏ
        ਪਹਿਲੂ ਬਾਰੇ ਹੈ, ਤਾਰੀਖ/ਥਾਂ/ਕਰਤੇ ਦੁਆਰਾ ਬੁਲਾਈ ਗਈ ਦਸਤਾਵੇਜ਼ੀ
        ਘਟਨਾ ਬਾਰੇ ਨਹੀਂ

