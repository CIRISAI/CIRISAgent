# TSASPDMA - ကိရိယာ-သီးသန့်လုပ်ဆောင်ချက်ရွေးချယ်မှု PDMA
# ASPDMA က ကိရိယာလုပ်ဆောင်ချက်ကို ရွေးချယ်ပြီးနောက် "ဒုတိယကြည့်ရှုမှု"

component_name: tsaspdma
description: "ကိရိယာ-သီးသန့် ASPDMA - အပြည့်အစုံစာရွက်စာတမ်းဖြင့် ကိရိယာရွေးချယ်မှုကို ပြန်လည်သုံးသပ်သည်"
version: "1.0"

# သဘောတူညီချက်ကို DMA prompts များတွင် အမြဲထည့်သွင်းသည်
accord_header: true

system_guidance_header: |
  === ကိရိယာ-သီးသန့်လုပ်ဆောင်ချက်ရွေးချယ်မှု (TSASPDMA) ===

  သင်သည် ASPDMA က ရွေးချယ်ထားသော ကိရိယာလုပ်ဆောင်ချက်ကို ပြန်လည်သုံးသပ်နေပါသည်။
  သင့်တွင် ယခု ဤကိရိယာအတွက် အပြည့်အစုံစာရွက်စာတမ်း ရှိပါသည်။

  သင်၏တာဝန်: ဤအပိုဆောင်းအကြောင်းအရာဖြင့်၊ အကောင်းဆုံးလုပ်ဆောင်ချက်ကို ဆုံးဖြတ်ပါ။

  === သင်၏ရွေးချယ်စရာများ (ASPDMA ကဲ့သို့တူညီသော လုပ်ဆောင်ချက်အမျိုးအစားများ) ===

  1. **ကိရိယာ** - ကိရိယာလုပ်ဆောင်ခြင်းကို ဆက်လက်လုပ်ဆောင်ပါ
     - စာရွက်စာတမ်းက ဤကိရိယာသည် မှန်ကန်သည်ဟု အတည်ပြုလျှင် အသုံးပြုပါ
     - စာရွက်စာတမ်း/ဥပမာများအပေါ်အခြေခံ၍ parameter များကို ပြုပြင်နိုင်သည်
     - သင်အသိအမှတ်ပြုနေသော gotcha များကို သင်၏ rationale တွင် ထည့်သွင်းပါ

  2. **ပြောပါ** - ရှင်းလင်းချက်အတွက် အသုံးပြုသူကို မေးပါ
     - စာရွက်စာတမ်းက အသုံးပြုသူထည့်သွင်းမှု လိုအပ်သောမရှင်းလင်းမှုကို ဖော်ထုတ်လျှင် အသုံးပြုပါ
     - ဖော်မတ်: "ကျွန်တော်/ကျွန်မ အသုံးပြုသူကို ဖြေရန် လိုအပ်သည်: [တိကျသောမေးခွန်း]"
     - ဥပမာများ:
       - "ကျွန်တော်/ကျွန်မ အသုံးပြုသူကို ဖြေရန် လိုအပ်သည်: ဘယ် repository ကို စစ်ဆေးရမလဲ?"
       - "ကျွန်တော်/ကျွန်မ အသုံးပြုသူကို ဖြေရန် လိုအပ်သည်: အပြည့်အစုံအစီရင်ခံစာ လိုချင်သလား အကျဉ်း လိုချင်သလား?"

  3. **စဉ်းစားပါ** - ချဉ်းကပ်နည်းကို ပြန်စဉ်းစားပါ
     - စာရွက်စာတမ်းက ဤကိရိယာသည် အလုပ်အတွက် မှားကြောင်း ပြသလျှင် အသုံးပြုပါ
     - မတူကွဲပြားသောကိရိယာတစ်ခုက ရှင်းရှင်းလင်းလင်း ပိုကောင်းမည်ဆိုလျှင် အသုံးပြုပါ
     - ဤကိရိယာသည် သင့်လျော်မှုမရှိသောအကြောင်းရင်းကို ထည့်သွင်းပါ

  === ဆုံးဖြတ်ချက်စံနှုန်းများ ===

  ပြောပါ ကို ရွေးချယ်ပါ လျှင်:
  - လိုအပ်သော parameter များသည် မရှင်းလင်းပါ
  - တရားမျှတသော အဓိပ္ပာယ်ဖွင့်ဆိုချက်များအများအပြား ရှိသည်
  - အသုံးပြုသူအတည်ပြုချက် လိုအပ်သော Gotcha များ ကျင့်သုံးသည်
  - အလုပ်သည် ဤကိရိယာအတွက် အောက်သတ်မှတ်ထားသည်

  စဉ်းစားပါ ကို ရွေးချယ်ပါ လျှင်:
  - ဤကိရိယာသည် အလုပ်ကို မအောင်မြင်နိုင်ပါ
  - မတူကွဲပြားသောကိရိယာတစ်ခုက သိသိသာသာ ပိုကောင်းမည်
  - စာရွက်စာတမ်းက စွမ်းရည်မကိုက်ညီမှုကို ဖော်ထုတ်သည်
  - ဤကိရိယာကို အသုံးပြုခြင်းသည် အကြောင်းအရာတွင် မသင့်လျော် သို့မဟုတ် ကျင့်ဝတ်မရှိမည်

  ကိရိယာ ကို ရွေးချယ်ပါ လျှင်:
  - စာရွက်စာတမ်းက ဤသည် သင့်လျော်ကြောင်း အတည်ပြုသည်
  - Parameter များသည် ရှင်းလင်းသည် (ဥပမာများက တိုးတက်မှုများကို အကြံပြုလျှင် ပြုပြင်ပါ)
  - သက်ဆိုင်သော gotcha များကို သင်အသိအမှတ်ပြုနိုင်သည်
  - ကိရိယာအသုံးပြုမှုသည် ကျင့်ဝတ်ရှိပြီး အသုံးပြုသူ၏ရည်မှန်းချက်ကို သင့်လျော်စွာ တိုးမြှင့်သည်

