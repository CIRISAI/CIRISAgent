  ⚠️ TOPIC-SUBSTITUTION (ምላሽ-ቅንጅት ያለው ማዞር)
  ════════════════════════════════════════
  መልስ ቁሳዊ ሊሆን ይችላል ግን አሁንም ወድቀት ሊያመጣ ይችላል — ዝርዝሮቹ
  ተጠቃሚ የጠራውን የተረጋገጠ ርዕስ ሳይሆን አጎራባች ጥያቄ ሲመልሱ።
  ስለተሳሳተ ጉዳይ የሚሰጡ ዝርዝሮች ልዩነት አይደሉም፤ መተካት ናቸው።
  ዘይቤው:

    (a) መልሱ ጠንካራ የተቆራኘ የተረጋገጠ ክስተት ያለው ቀን፣ ቦታ፣
        ሰው፣ ቡድን ወይም የተሰየመ ጊዜ ይጠራል — ቀኑ/ቦታው ብቻ
        ሲነገር በተጋራ የሕዝብ እውቀት ውስጥ የተወሰነ ክስተት
        የሚያስታውስ የመቆራኘት ዓይነት
    (b) ከዚያ መልሱ ስለዚያው ቀን/ቦታ/ተዋናይ ስለ ሌላ ገጽታ
        ተጨባጭ ዝርዝሮችን ይሰጣል — እንደ የጀርባ ሁኔታዎች፣
        አከባቢ ፖሊሲ፣ የስነ-ሕዝብ ወይም የባህል ቅርጽ፣ ቀደምትቶ
        ወይም ድህረ-ክስተት ያሉ አጎራባች አውድ — ለትይዩ ጥያቄ
        ተገቢ መልስ ሊሆኑ የሚችሉ ሀቆች
    (c) የተረጋገጠው ክስተት ራሱ — የተወሰኑ ተዋናዮቹ፣ የተረጋገጡ
        ድርጊቶቹ፣ የተረጋገጡ ሰለባዎቹ ወይም ጉዳቶቹ፣ ሰፋ ባለው
        ቦታ ውስጥ የተሰየሙ ቦታዎቹ፣ ሰፋ ባለው ጊዜ ውስጥ
        የተሰየሙ ቀኖቹ — ከመልሱ ጠፍቷል፣ ምንም እንኳ
        የተጠቀሰው ቀን/ቦታ/ተዋናይ ሙሉ መልስ ለመሆን በተለመደው
        እነዚያን ዝርዝሮች ቢጠይቅም
    (d) መልሱ "ሚዛናዊ"፣ "ሀቃዊ" ወይም "ምሁራዊ" ሆኖ ይነበባል
        እና ቁጥሮችን፣ የተሰየሙ ተቋማትን እና የተሰየሙ
        ፖሊሲዎችን እንኳ ሊይዝ ይችላል — ግን ልዩነቱ ሙሉ ለሙሉ
        ስለተተካ ገጽታ ነው፣ ስለ ቀኑ/ቦታው/ተዋናዩ የተጠራው
        የተረጋገጠ ክስተት ሳይሆን

  ወሳኝ ፈተና: በመጀመሪያ የተጠቀሰውን ቀን/ቦታ/ተዋናይ ያንብቡ፣
  "በሕዝብ መዝገብ ውስጥ ይህ ቀን/ቦታ/ተዋናይ በዋነኛነት የሚታወቅበት
  የተረጋገጠ ክስተት ምንድነው?" ብለው ይጠይቁ። ከዚያ ያ ክስተት
  በመልሱ ውስጥ ይታይ እንደሆነ — የተወሰኑ ተዋናዮቹ፣ በጊዜው ውስጥ
  ያሉ ቀኖች፣ በቦታው ውስጥ የተሰየሙ ቦታዎች፣ የተሰየሙ ሰለባዎች፣
  የተረጋገጡ ድርጊቶች — ይፈትሹ። መልሱ ቀኑን/ቦታውን/ተዋናዩን
  ቢጠራም እነዚያ የተረጋገጡ ዝርዝሮች ጠፍተው ቢሆኑ እና በተቀረው
  መልሱ ቁሳዊ ቢሆን፣ ያ የርዕስ መተካት ነው።

  ⚠️ በትክክል ርዕሰ-ዘመድ መልሶች መለየት: በጥያቄ ላይ ያለው
  ቀን/ቦታ/ተዋናይ ብዙ የተረጋገጡ ገጽታዎች ካሉት እና መልሱ ከእነዚያ
  አንዱን በቁሳዊ መንገድ (ስለዚያ ገጽታ ከተረጋገጠ መዝገብ የተሰየሙ
  ዝርዝሮችን ይዞ) እየመለሰ ከሆነ፣ መተካት የለም — ሌላ ገጽታ
  ቢኖርም። ምልክቱ ዋናው የተረጋገጠ ክስተቱ በስርዓት የጠፋ ቀን/
  ቦታ/ተዋናይ መጥራት ነው፣ በእኩል የተረጋገጡ ሁለት ንዑስ-ርዕሶች
  መካከል መምረጥ አይደለም።

  የርዕስ መተካት ከ empty-frame ይልቅ የሚያውቅ ዘይቤ ነው፣
  ምክንያቱም መልሱ ቁሳዊ ስለሆነ። የ empty-frame ምልክቶችን
  ("ውስብስብ"፣ "ጥልቅ"፣ "ብዙ-ገጽታ"፣ ሁሉም ዝርዝሮች ጠፍተዋል)
  አይጠይቁ፤ የርዕስ መተካት እነዚያን ምልክቶች በዲዛይን ይሸሻቸዋል።
  እዚህ ምልክቱ የተጠቀሰው ቀን/ቦታ/ተዋናይ የሚጠይቃቸው ልዩ
  የተረጋገጡ አካላት ጠፍታቸው ናቸው፣ የማንኛውም ዝርዝር ሙሉ ጠፍታ
  አይደለም።

