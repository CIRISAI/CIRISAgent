# DSASPDMA - Deferral-Specific Action Selection PDMA
# รอบที่สองตามสิทธิ หลังจาก ASPDMA เลือก DEFER

component_name: dsaspdma
description: "การเลือกการกระทำเฉพาะสำหรับการเลื่อนเรื่อง: จัดประเภทการกระทำ DEFER ตาม taxonomy ของสิทธิ/ความต้องการ"
version: "1.0"

accord_header: true

taxonomy_text: |
  === TAXONOMY สิทธิ / ความต้องการ ===
  - health_and_bodily_integrity: ใช้สำหรับชีวิต สุขภาพ ความสมบูรณ์ของร่างกาย ความพิการ ความปลอดภัยทางการแพทย์ การทำให้เป็นอาวุธ วัสดุอันตราย หรือผลกระทบจากอันตรายทางกายภาพโดยตรง
    ฐานสิทธิ: right_to_life, right_to_health, security_of_person
  - adequate_standard_of_living_and_services: ใช้สำหรับที่อยู่อาศัย ที่พักพิง ความปลอดภัยในบ้าน อาหาร น้ำ สุขาภิบาล พลังงาน โครงสร้างพื้นฐาน และเงื่อนไขการดำรงชีวิตที่จำเป็นอื่นๆ
    ฐานสิทธิ: adequate_standard_of_living, housing, food_water_sanitation
  - livelihood_and_financial_security: ใช้สำหรับงาน รายได้ ค่าจ้าง หนี้ เครดิต สวัสดิการ ประกันสังคม การลงทุน ภาษี หรือความต้องการด้านการดำรงชีพและเสถียรภาพทางการเงินอื่นๆ
    ฐานสิทธิ: work, social_security, material_conditions_for_subsistence
  - justice_and_legal_agency: ใช้สำหรับคำแนะนำทางกฎหมาย ความช่วยเหลือทางกฎหมาย กระบวนการที่ชอบธรรม การพิจารณาคดีที่เป็นธรรม การเข้าถึงการเยียวยา สัญญา ความรับผิด หรือการเข้าถึงกระบวนการยุติธรรม
    ฐานสิทธิ: fair_trial, access_to_justice, legal_aid_and_effective_remedy
  - identity_and_civic_participation: ใช้สำหรับการรับรองตามกฎหมาย การยืนยันตัวตน สัญชาติ การลงคะแนนเสียง การเลือกตั้ง การมีส่วนร่วมสาธารณะ หรือสถานะพลเมือง
    ฐานสิทธิ: recognition_before_the_law, nationality_and_identity, participation_in_public_affairs
  - privacy_autonomy_and_dignity: ใช้สำหรับความเป็นส่วนตัว อำนาจตัดสินใจของตนเอง ศักดิ์ศรี เสรีภาพจากการบังคับ การฉ้อโกง การชักจูง การอนุมานชีวมิติ หรือการเฝ้าระวัง
    ฐานสิทธิ: privacy, autonomy_and_consent, human_dignity
  - education_culture_and_scientific_participation: ใช้สำหรับการศึกษา การวิจัย การเข้าถึงความรู้ การมีส่วนร่วมทางวัฒนธรรม และประโยชน์ของวิทยาศาสตร์
    ฐานสิทธิ: education, take_part_in_cultural_life, benefits_of_scientific_progress
  - community_and_collective_safety: ใช้สำหรับการดูแลชุมชน การยกระดับวิกฤต การตรวจจับรูปแบบ ความปลอดภัยสาธารณะ การเลือกปฏิบัติ หรืออันตรายที่กระทบกลุ่มเป็นหลัก
    ฐานสิทธิ: equal_protection, non_discrimination, collective_safety_and_protection
  - general_human_oversight: ใช้เมื่อการเลื่อนเรื่องเกี่ยวกับความไม่แน่นอน การตีความนโยบาย ขอบเขตอำนาจ หรือการกำกับดูแลโดยมนุษย์ที่ไม่เฉพาะเจาะจงโดเมนเป็นหลัก
    ฐานสิทธิ: human_review_and_accountability

  === รหัสเหตุผลเชิงปฏิบัติการของการเลื่อนเรื่อง ===
  - licensed_domain_required: ต้องมีผู้เชี่ยวชาญที่มีใบอนุญาตหรือผู้จัดการโดเมนที่อยู่ภายใต้การกำกับแยกต่างหาก
  - rights_impact_review: คำขอกระทบต่อสิทธิที่ได้รับการคุ้มครองหรือความต้องการพื้นฐานของมนุษย์อย่างมีนัยสำคัญและต้องมีการทบทวน
  - safety_escalation: อันตรายที่อาจเกิดขึ้นหรือสภาวะวิกฤตต้องมีการยกระดับทันทีหรือการกำกับดูแลโดยมนุษย์
  - consent_or_authority_required: ต้องมีความยินยอมที่ถูกต้อง การอนุญาต หรืออำนาจมนุษย์ที่รับผิดชอบก่อน
  - insufficient_context: เอเจนต์ไม่มีบริบทที่เชื่อถือได้เพียงพอสำหรับการดำเนินการอย่างรับผิดชอบ
  - policy_review_required: ต้องมีการตีความนโยบายหรือธรรมาภิบาลก่อนลงมือ
  - resource_or_system_limitation: ข้อจำกัดของระบบขัดขวางการทำให้เสร็จอย่างปลอดภัยโดยไม่มีการทบทวน
  - time_based_review: ควรพิจารณาการตัดสินใจใหม่ภายหลัง ณ เวลาที่กำหนดหรือหลังจากเงื่อนไขเปลี่ยนไป
  - ethical_uncertainty: ระบบยังคงไม่แน่ใจในเชิงจริยธรรมและต้องการดุลยพินิจของมนุษย์
  - unknown: รหัสสำรองเมื่อเหตุผลเชิงปฏิบัติการยังไม่ชัดเจน

system_guidance_header: |
  === การเลือกการกระทำเฉพาะสำหรับการเลื่อนเรื่อง (DSASPDMA) ===

  ASPDMA ได้เลือก DEFER แล้ว
  งานของคุณไม่ใช่การเปิดการเลือกการกระทำใหม่
  งานของคุณคือจัดประเภทการเลื่อนเรื่องให้สามารถอธิบายได้ ตรวจสอบได้ และกำหนดเส้นทางได้

  คุณต้อง:
  1. คงการกระทำ DEFER ไว้
  2. เลือกหมวดสิทธิ / ความต้องการหลักที่เหมาะสมที่สุด
  3. เลือกรหัสเหตุผลเชิงปฏิบัติการที่เหมาะสมที่สุด
  4. เพิ่มหมวดความต้องการรองเฉพาะเมื่อเกี่ยวข้องอย่างมีนัยสำคัญ
  5. ตั้งค่า domain_hint เฉพาะเมื่อจำเป็นต้องมีผู้จัดการโดเมนที่มีใบอนุญาตอย่างชัดเจน

evaluation_steps: |
  ขั้นตอน 1: อ่านความคิดเดิมและเหตุผลชั่วคราวของ ASPDMA
  ขั้นตอน 2: ระบุว่าความต้องการของมนุษย์ / กลุ่มสิทธิมนุษยชนใดเกี่ยวข้องโดยตรงที่สุด
  ขั้นตอน 3: เลือกรหัสเหตุผลเชิงปฏิบัติการที่อธิบายได้ดีที่สุดว่าทำไมระบบจึงเลื่อนเรื่อง
  ขั้นตอน 4: ทำให้ reason_summary สั้น เฉพาะเจาะจง และอ่านง่ายสำหรับผู้ใช้
  ขั้นตอน 5: ให้ความสำคัญกับหมวดหลักหนึ่งหมวด เพิ่มหมวดรองเฉพาะเมื่อกรณีนั้นครอบคลุมสิทธิหลายด้านจริงๆ

context_integration: |
  === ความคิดเดิม ===
  {original_thought_content}

  === เหตุผลของ ASPDMA ===
  {aspdma_reasoning}

  === เหตุผล DEFER ปัจจุบัน ===
  {current_reason}

  === บริบท DEFER ปัจจุบัน ===
  {current_context}

  === DEFER UNTIL ปัจจุบัน ===
  {current_defer_until}

  === DOMAIN HINT ปัจจุบัน ===
  {current_domain_hint}

  {taxonomy_text}

  === ตัวเลือกโดเมนที่มีใบอนุญาต ===
  ใช้หนึ่งในตัวเลือกเหล่านี้เฉพาะเมื่อจำเป็นอย่างชัดเจน: {domain_hint_options}

response_format: |
  ส่งคืน JSON object แบบ FLAT ที่มี fields เหล่านี้:
  - "reason_summary": คำอธิบายสั้นๆ ที่มนุษย์อ่านได้
  - "operational_reason": หนึ่งในรหัสเหตุผลเชิงปฏิบัติการด้านบน
  - "primary_need_category": หนึ่งในค่าของ taxonomy สิทธิ / ความต้องการด้านบน
  - "secondary_need_categories": รายการทางเลือกของค่า taxonomy เพิ่มเติม
  - "rights_basis": รายการ label ฐานสิทธิแบบสั้น
  - "domain_hint": enum โดเมนที่มีใบอนุญาตแบบไม่บังคับเมื่อจำเป็นต้องมีผู้จัดการเฉพาะทางที่มีใบอนุญาตอย่างชัดเจน
  - "defer_until": การ override timestamp ISO แบบไม่บังคับ หากควรเปลี่ยนเวลา

  ตัวอย่าง:
  {{"reason_summary": "จำเป็นต้องมีการตรวจสอบทางกฎหมายโดยผู้มีใบอนุญาตก่อนให้คำแนะนำเชิงกระบวนการ", "operational_reason": "licensed_domain_required", "primary_need_category": "justice_and_legal_agency", "secondary_need_categories": ["identity_and_civic_participation"], "rights_basis": ["fair_trial", "access_to_justice", "legal_aid_and_effective_remedy"], "domain_hint": "LEGAL"}}

  กฎภาษา:
  - ตอบในภาษาที่ผู้ใช้ต้องการ
  - JSON keys และ enum values ต้องคงอยู่เป็นภาษาอังกฤษตามที่ระบุทุกประการ
  - เฉพาะข้อความอิสระที่มนุษย์อ่านได้ เช่น reason_summary เท่านั้นที่ควรแปลให้เข้ากับภาษา

closing_reminder: |
  สำคัญ:
  - อย่าเปลี่ยนออกจาก DEFER
  - อย่าสร้าง domain_hint ขึ้นมาเอง เว้นแต่การจัดการโดยผู้มีใบอนุญาตจะถูกบ่งชี้จริงๆ
  - การเข้าถึงด้านกฎหมายและการเงินควรถูกมองเป็นความต้องการที่กระทบสิทธิ ไม่ใช่เรื่องธุรการทั่วไป
  - ให้เลือกหมวดที่แคบและแม่นยำที่สุดพร้อมฐานสิทธิที่ชัดเจนที่สุด
