# ==============================================================================
# SonarCloud Configuration for CIRISAgent
# ==============================================================================
# Goal: Analyze ciris_engine and ciris_adapters against quality gate
# ==============================================================================

sonar.projectKey=CIRISAI_CIRISAgent
sonar.organization=cirisai

# Python version for precise analysis
sonar.python.version=3.12

# ==============================================================================
# SOURCE SCOPE
# ==============================================================================
# Explicitly define what to analyze (not "." which is too broad)
sonar.sources=ciris_engine,ciris_adapters,main.py

# Tests are in tests/ directory
sonar.tests=tests

# ==============================================================================
# EXCLUSIONS FROM ANALYSIS
# ==============================================================================
# These patterns are excluded from code quality analysis entirely
sonar.exclusions=\
  **/migrations/*.sql,\
  **/__pycache__/**,\
  **/*.egg-info/**,\
  **/example_usage.py

# ==============================================================================
# COVERAGE CONFIGURATION
# ==============================================================================
sonar.python.coverage.reportPaths=coverage.xml

# Exclude from coverage metrics (code we intentionally don't test):
# - protocols/: Interface definitions, tested via implementations
# - schemas/: Pydantic data classes, validated by type system
# - base.py: Abstract base classes, tested via concrete subclasses
# - __main__.py: Entry points, tested via integration
# - desktop_launcher.py: OS-specific launcher logic
sonar.coverage.exclusions=\
  ciris_engine/protocols/**,\
  ciris_engine/schemas/**,\
  ciris_adapters/**/schemas/**,\
  **/base.py,\
  **/base_adapter.py,\
  **/__main__.py,\
  **/desktop_launcher.py,\
  **/example_usage.py

# ==============================================================================
# LANGUAGE-SPECIFIC SETTINGS
# ==============================================================================

# Disable PL/SQL (we use SQLite, not Oracle)
sonar.plsql.file.suffixes=-

# Disable C/C++/Objective-C (iOS client code has no compile database)
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# ==============================================================================
# QUALITY GATE NOTES
# ==============================================================================
# Quality gate criteria (SonarCloud defaults):
# - Coverage: >= 80% on new code
# - Duplications: <= 3% on new code
# - Maintainability: A rating
# - Reliability: A rating
# - Security: A rating
# - Security Hotspots: 100% reviewed
# ==============================================================================
