response_format: |
  การตอบสนองของคุณต้องเป็นวัตถุ JSON เดียวที่ปฏิบัติตามสคีมาที่ให้ไว้ โดยมีคีย์ดังต่อไปนี้:
  - "k_eff": ตัวเลขทศนิยม (>= 0) - จำนวนแหล่งข้อมูลอิสระที่มีประสิทธิภาพ ใช้สูตร k/(1+ρ(k-1)) k_eff < 2 = เปราะบาง
  - "correlation_risk": ตัวเลขทศนิยม (0.0-1.0) - ประมาณการความสัมพันธ์ ρ ระหว่างแหล่งข้อมูล
  - "phase": สตริง - หนึ่งใน "chaos" (ขัดแย้ง), "healthy" (สังเคราะห์ที่หลากหลาย) หรือ "rigidity" (ห้องสะท้อนเสียง)
  - "fragility_flag": บูลีน - TRUE หาก k_eff < 2 หรือ phase = "rigidity" หรือ correlation_risk > 0.7
  - "sources_identified": อาร์เรย์ของสตริง - รายการแหล่งข้อมูล/มุมมองที่แตกต่างที่ระบุในการให้เหตุผล
  - "correlation_factors": อาร์เรย์ของสตริง - ปัจจัยที่ทำให้เกิดความสัมพันธ์ (เช่น "ผู้เขียนเดียวกัน", "มาจากการศึกษาเดียว")
  - "reasoning": สตริง - การวิเคราะห์ของคุณเกี่ยวกับความหลากหลายของข้อมูลและสุขภาพญาณวิทยา ฟิลด์นี้บังคับ

  กฎภาษา:
  - ตอบสนองในภาษาที่ผู้ใช้ต้องการ (ตรวจสอบโปรไฟล์ผู้ใช้)
  - เนื้อหาทั้งหมด (reasoning, sources_identified, correlation_factors) ควรอยู่ในภาษาของผู้ใช้
  - คีย์ JSON และค่าเฟสต้องยังคงเป็นภาษาอังกฤษ (เช่น "reasoning", "k_eff", "phase": "healthy")
  - ตัวอย่าง: {{"reasoning": "해당 정보는 하나의 출처에서만 나왔습니다", "sources_identified": ["훈련 데이터"], "phase": "rigidity"}} - เนื้อหาเกาหลี, คีย์/เฟสอังกฤษ

  อย่ารวมฟิลด์พิเศษหรือห่อในบลอกโค้ด markdown

evaluation_steps: |
  ขั้นตอน 1: นับแหล่งข้อมูล (k)
  - แหล่งข้อมูล/มุมมองใดเป็นพื้นฐานของการให้เหตุผลนี้?
  - การฝึกของคุณ = 1 แหล่ง (มีอยู่เสมอ)
  - อินพุตผู้ใช้ = +1 แหล่ง หากเป็นความสัมพันธ์ที่เติบโต (20+ การโต้ตอบ)
  - ผลลัพธ์เว็บ/เครื่องมือ = +1 แหล่งแต่ละรายการ หากมาจากต้นกำเนิดที่เป็นอิสระ
  - การอ้างอิง/ข้อมูล = +1 แหล่งแต่ละรายการ หากเป็นอิสระจริงๆ

  ขั้นตอน 2: ประมาณความสัมพันธ์ (ρ)
  - สำหรับแต่ละคู่ของแหล่งข้อมูล ถาม: หนึ่งมาจากอีกหนึ่งหรือไม่?
  - ผู้เขียน/สถาบัน/ชุดข้อมูลเดียวกัน → ความสัมพันธ์สูง
  - แหล่งข้อมูลทั้งหมดเห็นด้วยในเรื่องที่ซับซ้อน → ความสัมพันธ์น่าสงสัย
  - วิธีการที่แตกต่างกัน ข้อสรุปเดียวกัน → ความสัมพันธ์ต่ำกว่า
  - ρ = 0 (เป็นอิสระอย่างสมบูรณ์) ถึง ρ = 1 (ทั้งหมดมาจากต้นกำเนิดเดียวกัน)

  ขั้นตอน 3: คำนวณ k_eff
  - ใช้สูตร: k_eff = k / (1 + ρ(k-1))
  - ตัวอย่าง: k=3 แหล่ง, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (เปราะบาง!)
  - ตัวอย่าง: k=3 แหล่ง, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (สุขภาพดี)
  - เอเจนต์เริ่มต้น: k=1 → k_eff = 1 (เปราะบางเสมอ)

  ขั้นตอน 4: การกำหนดเฟส
  - ความวุ่นวาย: ข้อสรุปที่ขัดแย้งกันหลายแหล่ง ไม่มีทางแก้ไข
  - สุขภาพดี: มุมมองที่แตกต่างกันที่สามารถสังเคราะห์ได้ (k_eff ≥ 2)
  - ความแข็งแกร่ง: เรื่องเล่าเดียวครอบงำ ไม่มีการคัดค้าน (k_eff → 1, ห้องสะท้อนเสียง)

  ขั้นตอน 5: การตรวจสอบเปราะบาง
  - k_eff < 2? → เปราะบาง
  - phase = "rigidity"? → เปราะบาง
  - correlation_risk > 0.7? → เปราะบาง
  - ตั้ง fragility_flag = TRUE หากเป็นข้อใดข้อหนึ่งข้างต้น

closing_reminder: |
  สำคัญ: เมื่อไม่แน่ใจเกี่ยวกับความเป็นอิสระของแหล่งข้อมูล ให้ระมัดระวัง
  และประมาณความสัมพันธ์ที่สูงขึ้น ดีกว่าที่จะตั้งค่าสถานะสำหรับการตรวจสอบ
  มากกว่าพลาดห้องสะท้อนเสียงที่อาจเกิดขึ้น

  สถานะเปราะบางไม่ได้หมายความว่าการให้เหตุผลผิด - หมายความว่าการให้เหตุผล
  ควรได้รับการตรวจสอบเพิ่มเติมหรือการตรวจสอบอิสระก่อนการกระทำที่มีความเสี่ยงสูง
