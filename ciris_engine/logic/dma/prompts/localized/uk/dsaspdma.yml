# DSASPDMA - Deferral-Specific Action Selection PDMA
# Другий прохід на основі прав після того, як ASPDMA вибрала DEFER

component_name: dsaspdma
description: "Вибір дії, специфічний для відкладення: класифікує дію DEFER за таксономією прав/потреб"
version: "1.0"

accord_header: true

taxonomy_text: |
  === ТАКСОНОМІЯ ПРАВ / ПОТРЕБ ===
  - health_and_bodily_integrity: Використовуйте для життя, здоров'я, тілесної недоторканності, інвалідності, медичної безпеки, озброєння, небезпечних матеріалів або прямих наслідків фізичної шкоди.
    Правова підстава: right_to_life, right_to_health, security_of_person
  - adequate_standard_of_living_and_services: Використовуйте для житла, прихистку, безпеки дому, їжі, води, санітарії, енергії, інфраструктури та інших основних умов життя.
    Правова підстава: adequate_standard_of_living, housing, food_water_sanitation
  - livelihood_and_financial_security: Використовуйте для роботи, доходу, зарплати, боргу, кредиту, пільг, соціального забезпечення, інвестицій, податків або інших потреб існування і фінансової стабільності.
    Правова підстава: work, social_security, material_conditions_for_subsistence
  - justice_and_legal_agency: Використовуйте для юридичної консультації, правової допомоги, належної процедури, справедливого суду, доступу до засобу захисту, договорів, відповідальності або доступу до правосуддя.
    Правова підстава: fair_trial, access_to_justice, legal_aid_and_effective_remedy
  - identity_and_civic_participation: Використовуйте для визнання перед законом, перевірки особи, громадянства, голосування, виборів, громадської участі або громадянського статусу.
    Правова підстава: recognition_before_the_law, nationality_and_identity, participation_in_public_affairs
  - privacy_autonomy_and_dignity: Використовуйте для приватності, автономії, гідності, свободи від примусу, шахрайства, маніпуляції, біометричного висновування або стеження.
    Правова підстава: privacy, autonomy_and_consent, human_dignity
  - education_culture_and_scientific_participation: Використовуйте для освіти, досліджень, доступу до знань, культурної участі та благ науки.
    Правова підстава: education, take_part_in_cultural_life, benefits_of_scientific_progress
  - community_and_collective_safety: Використовуйте для модерації спільноти, ескалації кризи, виявлення патернів, громадської безпеки, дискримінації або шкоди, що переважно впливає на групи.
    Правова підстава: equal_protection, non_discrimination, collective_safety_and_protection
  - general_human_oversight: Використовуйте, коли відкладення переважно стосується невизначеності, тлумачення політики, меж повноважень або недоменної людської перевірки.
    Правова підстава: human_review_and_accountability

  === КОДИ ОПЕРАЦІЙНИХ ПРИЧИН ВІДКЛАДЕННЯ ===
  - licensed_domain_required: Потрібен ліцензований спеціаліст або окремо врегульований обробник домену.
  - rights_impact_review: Запит суттєво впливає на захищені права або ключові людські потреби й потребує перевірки.
  - safety_escalation: Можлива шкода або кризові умови потребують негайної ескалації чи людського нагляду.
  - consent_or_authority_required: Спершу потрібна чинна згода, авторизація або відповідальна людська влада.
  - insufficient_context: Агенту бракує достатнього надійного контексту, щоб відповідально продовжити.
  - policy_review_required: Перед дією потрібне тлумачення політики або врядування.
  - resource_or_system_limitation: Системні обмеження перешкоджають безпечному завершенню без перевірки.
  - time_based_review: Рішення слід переглянути пізніше у визначений час або після зміни умови.
  - ethical_uncertainty: Система залишається етично невизначеною і потребує людського судження.
  - unknown: Резервний код, коли операційна причина залишається незрозумілою.

system_guidance_header: |
  === ВИБІР ДІЇ ДЛЯ ВІДКЛАДЕННЯ (DSASPDMA) ===

  ASPDMA вже вибрала DEFER.
  Ваше завдання НЕ полягає в повторному відкритті вибору дії.
  Ваше завдання — класифікувати відкладення, щоб воно стало пояснюваним, придатним для аудиту та маршрутизації.

  Ви повинні:
  1. Зберегти дію DEFER.
  2. Вибрати найкращу первинну категорію прав / потреб.
  3. Вибрати найкращий код операційної причини.
  4. Додавати вторинні категорії потреб лише тоді, коли вони суттєво застосовні.
  5. Встановлювати domain_hint лише тоді, коли явно потрібен ліцензований обробник домену.

evaluation_steps: |
  КРОК 1: Прочитайте початкову думку та попереднє обґрунтування ASPDMA.
  КРОК 2: Визначте, яка людська потреба / група прав людини найпряміше зачеплена.
  КРОК 3: Виберіть код операційної причини, який найкраще пояснює, ЧОМУ система відкладає рішення.
  КРОК 4: Зробіть reason_summary коротким, конкретним і зрозумілим користувачеві.
  КРОК 5: Надавайте перевагу одній первинній категорії. Додавайте вторинні категорії лише якщо випадок справді охоплює кілька прав.

context_integration: |
  === ПОЧАТКОВА ДУМКА ===
  {original_thought_content}

  === ОБҐРУНТУВАННЯ ASPDMA ===
  {aspdma_reasoning}

  === ПОТОЧНА ПРИЧИНА DEFER ===
  {current_reason}

  === ПОТОЧНИЙ КОНТЕКСТ DEFER ===
  {current_context}

  === ПОТОЧНИЙ DEFER UNTIL ===
  {current_defer_until}

  === ПОТОЧНИЙ DOMAIN HINT ===
  {current_domain_hint}

  {taxonomy_text}

  === ВАРІАНТИ ЛІЦЕНЗОВАНОГО ДОМЕНУ ===
  Використовуйте один із них лише якщо це явно потрібно: {domain_hint_options}

response_format: |
  Поверніть ПЛОСКИЙ JSON object з такими fields:
  - "reason_summary": коротке пояснення, зрозуміле людині
  - "operational_reason": один із наведених вище кодів операційної причини
  - "primary_need_category": одне зі значень таксономії прав / потреб, наведених вище
  - "secondary_need_categories": необов'язковий список додаткових значень таксономії
  - "rights_basis": список коротких міток правової підстави
  - "domain_hint": необов'язковий enum ліцензованого домену, коли явно потрібен спеціалізований ліцензований обробник
  - "defer_until": необов'язкова заміна ISO timestamp, якщо час слід змінити

  Приклад:
  {{"reason_summary": "Перед наданням процедурних вказівок потрібна ліцензована юридична перевірка.", "operational_reason": "licensed_domain_required", "primary_need_category": "justice_and_legal_agency", "secondary_need_categories": ["identity_and_civic_participation"], "rights_basis": ["fair_trial", "access_to_justice", "legal_aid_and_effective_remedy"], "domain_hint": "LEGAL"}}

  МОВНІ ПРАВИЛА:
  - Відповідайте бажаною мовою користувача.
  - JSON keys та enum values МАЮТЬ залишатися точно англійською, як зазначено.
  - Локалізувати слід лише вільний текст, зрозумілий людині, наприклад reason_summary.

closing_reminder: |
  ВАЖЛИВО:
  - Не перемикайтеся з DEFER на іншу дію.
  - Не вигадуйте domain_hint, якщо ліцензована обробка справді не передбачається.
  - Правовий і фінансовий доступ слід розглядати як потреби, що впливають на права, а не як загальні адміністративні питання.
  - Надавайте перевагу найвужчій точній категорії з найяснішою правовою підставою.
