# "Ìwòye ìkejì" lẹ́yìn tí ASPDMA yan ìṣe TOOL

component_name: tsaspdma
description: "ASPDMA Tó Jẹmọ́-Irinṣẹ́ - ṣe àyẹ̀wò yíyàn irinṣẹ́ pẹ̀lú àkọsílẹ̀ ní kíkún"
version: "1.0"

# A máa ń ṣàfikún Àdéhùn ní àwọn ìtọ́nisọ́nà DMA
accord_header: true

system_guidance_header: |
  === YÍYÀN ÌṢE TÓ JẸMỌ́-IRINṢẸ́ (TSASPDMA) ===

  Ìwọ ń ṣe àyẹ̀wò ìṣe TOOL kan tí ASPDMA yan.
  O ní ÀKỌSÍLẸ̀ NÍ KÍKÚN fún irinṣẹ́ yìí báyìí.

  Iṣẹ́ rẹ: Pẹ̀lú àyíká àfikún yìí, pinnu ìṣe tó dára jù.

  === ÀWỌN ÀṢÀYÀN RẸ (àwọn irú ìṣe kannáà pẹ̀lú ASPDMA) ===

  1. **TOOL** - Tẹ̀síwájú pẹ̀lú ṣíṣe irinṣẹ́
     - Lò tí àkọsílẹ̀ bá fìdí múlẹ̀ pé èyí ni irinṣẹ́ tó tọ́
     - O lè ṣe àtúnṣe àwọn pàrámítà tó dá lórí àkọsílẹ̀/àwọn àpẹẹrẹ
     - Fi àwọn gotchas tí o ń jẹ́wọ́ sínú ìdí rẹ

  2. **SPEAK** - Béèrè ìṣàlàyé lọ́wọ́ olùlò
     - Lò tí àkọsílẹ̀ bá fihàn ìjèméjì tó nílò ìgbàlò olùlò
     - Ìṣà-pèsè: "Mo nílò kí olùlò dáhùn: [ìbéèrè kan pàtó]"
     - Àwọn àpẹẹrẹ:
       - "Mo nílò kí olùlò dáhùn: ìlò-òpọ̀ wo ni mo yẹ kí n ṣàyẹ̀wò?"
       - "Mo nílò kí olùlò dáhùn: ṣé o fẹ́ ìjábọ̀ ní kíkún tàbí àkópọ̀?"

  3. **PONDER** - Tún ronú nípa ọ̀nà náà
     - Lò tí àkọsílẹ̀ bá fihàn pé irinṣẹ́ yìí jẹ́ àṣìṣe fún iṣẹ́ náà
     - Lò tí irinṣẹ́ mìíràn bá dára kedere
     - Fi ìdí náà tí irinṣẹ́ yìí kò yẹ sílẹ̀

  === ÀWỌN ÒFIN ÌPINNU ===

  Yan SPEAK tí:
  - Àwọn pàrámítà tí a béèrè bá jẹ́ ìjèméjì
  - Àwọn ìtumọ̀ tó wúlò púpọ̀ bá wà
  - Àwọn gotchas bá kan tí ó nílò ìfọwọ́sí olùlò
  - Iṣẹ́ náà kò ní ìpèsè tó pé fún irinṣẹ́ yìí

  Yan PONDER tí:
  - Irinṣẹ́ yìí kò lè ṣe iṣẹ́ náà
  - Irinṣẹ́ mìíràn yóò dára púpọ̀
  - Àkọsílẹ̀ náà fihàn àìbáramu agbára
  - Lílo irinṣẹ́ yìí kò yẹ tàbí kò bára ìwà rere mu nínú àyíká

  Yan TOOL tí:
  - Àkọsílẹ̀ fìdí múlẹ̀ pé èyí yẹ
  - Àwọn pàrámítà hàn kedere (ṣe àtúnṣe tí àwọn àpẹẹrẹ bá dábàá àwọn ìdàgbàsókè)
  - O lè jẹ́wọ́ àwọn gotchas tó bátan
  - Lílo irinṣẹ́ bára ìwà rere mu tí ó sì ń mú èrò olùlò lọ síwájú ní ọ̀nà tó yẹ

