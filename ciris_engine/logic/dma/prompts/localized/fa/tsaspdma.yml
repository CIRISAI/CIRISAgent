context_enrichment_section: '=== الموارد المتاحة (من إثراء السياق) ===

  {context_enrichment_data}


  مهم: استخدم قيم entity_id الدقيقة من القائمة أعلاه.

  لا تستخدم الأسماء الودية مباشرة - قم بتعيينها إلى entity_id أولاً.

  '
context_integration: '=== اختيار ASPDMA ===

  الابزار: {tool_name}

  التبرير: {aspdma_reasoning}


  === الفكرة الأصلية (نية المستخدم - استخدمها لاستنتاج المعاملات) ===

  {original_thought_content}


  {context_enrichment_section}


  === TOOL DOCUMENTATION (مع مخطط المعاملات) ===

  {tool_documentation}

  '
response_format: 'أرجع كائن JSON مسطح بهذه الحقول:

  - "selected_action": واحد من "TOOL"، "SPEAK"، "PONDER"

  - "reasoning": اشرح قرارك بما في ذلك المحاذير التي تقر بها


  بالإضافة إلى حقول خاصة بالإجراء (استخدم أسماء الحقول الدقيقة أدناه):


  لإجراء TOOL (الوضع العادي - الابزار موجودة):

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  لإجراء TOOL (وضع التصحيح - اسم الابزار كان خاطئاً):

  {{"selected_action": "TOOL", "reasoning": "تصحيح اسم الابزار لمطابقة الابزار المتاحة...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  لإجراء SPEAK:

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "أحتاج أن يجيب المستخدم: أي ضوء؟"}}


  لإجراء PONDER:

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["هل هذا هو النهج الصحيح؟"]}}


  مهم:

  - استخدم مخطط المعاملات أعلاه لتحديد معاملات الابزار المطلوبة

  - استنتج قيم المعاملات من نية المستخدم وسياق المحادثة

  - tool_parameters هو قاموس يحتوي على حجج الابزار

  - في وضع التصحيح: قم بتضمين حقل "tool_name" مع الاسم الدقيق من قائمة الأدوات المتاحة

  - لا تلف في كتل أكواد markdown


  قواعد اللغة:

  - الرد باللغة المفضلة للمستخدم (تحقق من ملف تعريف المستخدم).

  - جميع قيم المحتوى (reasoning، reasoning، speak_content، إلخ) يجب أن تكون بلغة المستخدم.

  - مفاتيح JSON يجب أن تبقى باللغة الإنجليزية (على سبيل المثال، "selected_action": "TOOL"، "reasoning"، "tool_parameters").

  - مثال: {{"selected_action": "SPEAK", "speak_content": "مرحبا!", "reasoning": "رد المستخدم بالعربية"}} - محتوى عربي، مفاتيح إنجليزية.

  '
tool_correction_section: "=== TOOL CORRECTION MODE ===\n\nاختار ASPDMA الابزار '{requested_tool}' ولكن هذه الابزار غير موجودة.\n\nمهمتك: ابحث عن الابزار الصحيحة من قائمة الأدوات المتاحة التي تطابق\nنية المستخدم، أو استخدم SPEAK/PONDER إذا لم تكن هناك ابزار مناسبة.\n\nالأدوات المتاحة:\n{available_tools_list}\n\nتعليمات:\n1. حلل نية المستخدم الأصلية من محتوى الفكرة\n2. راجع الأدوات المتاحة أعلاه - ابحث عن واحدة تطابق النية\n3. إذا وجدت ابزار مطابقة:\n   - أرجع إجراء TOOL مع \"tool_name\" معين للاسم الدقيق من القائمة\n   - املأ \"tool_parameters\" المناسبة بناءً على مخطط الابزار\n4. إذا كان من الممكن أن تتطابق أدوات متعددة:\n   - أرجع SPEAK لسؤال المستخدم عن القدرة المحددة التي يريدها\n5. إذا لم تتطابق أي ابزار مع النية:\n   - أرجع PONDER لإعادة النظر في النهج بالكامل\n\nحاسم: يجب أن يكون حقل \"tool_name\" تطابقاً دقيقاً من قائمة الأدوات المتاحة أعلاه.\n"
evaluation_steps: 'الخطوة 1: اقرأ الوثائق

  - راجع quick_start، detailed_instructions، examples

  - مشاهده کنید أي محاذير تنطبق على حالة الاستخدام هذه

  - تحقق مما إذا كان when_to_use يطابق المهمة


  الخطوة 2: قيّم اختيار ASPDMA

  - هل المعاملات صحيحة حسب الوثائق؟

  - هل تقترح الأمثلة تنسيق معاملات أفضل؟

  - هل هناك معاملات مطلوبة غامضة؟


  الخطوة 3: تحقق من المحاذير

  - هل ينطبق أي هشدار على هذا الاستخدام المحدد؟

  - هل سيتوقع المستخدم هذا السلوك؟

  - هل يجب هشدار المستخدم أو سؤاله أولاً؟


  الخطوة 4: حدد الإجراء

  - TOOL: أكد أو حسّن، اعترف بالمحاذير

  - SPEAK: اطلب توضيحاً محدداً

  - PONDER: اشرح لماذا يجب إعادة النظر

  '
closing_reminder: 'مهم: دورك هو اكتشاف المشكلات التي لم يتمكن ASPDMA من رؤيتها بدون

  الوثائق الكاملة. إذا بدا اختيار الابزار جيداً، أكده بسرعة.

  استخدم SPEAK أو PONDER فقط عندما تكشف الوثائق عن مخاوف حقيقية.


  عند اختيار SPEAK، كن محدداً: "أحتاج أن يجيب المستخدم: [سؤال]"

  عند اختيار PONDER، اشرح: "هذه الابزار لا يمكنها X لأن Y، اعتبر Z"

  عند اختيار TOOL، اعترف: "المضي قدماً مع الوعي بالهشدار X"

  '
