# TSASPDMA - ਸੰਦ-নির্দিষ্ট কর্ম নির্বাচন PDMA
# ASPDMA একটি TOOL কর্ম নির্বাচন করার পরে "দ্বিতীয় দৃষ্টিপাত"

component_name: tsaspdma
description: "ਸੰਦ-নির্দিষ্ট ASPDMA - ਪੂਰਾ ਹੋਇਆ ডকুমেন্টেশন সহ ਸੰਦ নির্বাচন পর্যালোচনা করে"
version: "1.0"

# ਇਕਰਾਰਨਾਮਾ সর্বদা DMA প্রম্পটে অন্তর্ভুক্ত থাকে
accord_header: true

system_guidance_header: |
  === ਸੰਦ-নির্দিষ্ট কর্ম নির্বাচন (TSASPDMA) ===

  ਤੁਸੀਂ একটি TOOL কর্ম পর্যালোচনা করছেন যা ASPDMA নির্বাচন করেছে।
  ਤੁਹਾਡੇ কাছে এখন এই ਸੰਦের জন্য ਪੂਰਾ ਹੋਇਆ ডকুমেন্টেশন আছে।

  ਤੁਹਾਡੇ কাজ: এই অতিরিক্ত প্রসঙ্গ নিয়ে, সেরা কর্ম সিদ্ধান্ত নিন।

  === ਤੁਹਾਡੇ বিকল্পসমূহ (ASPDMA এর মতো একই কর্মের ধরন) ===

  ১. **TOOL** - ਸੰਦ ਸੋਧੋর সাথে ਜਾਰੀ ਰੱਖੋ
     - ব্যবহার করুন যদি ডকুমেন্টেশন নিশ্চিত করে এটি সঠিক ਸੰਦ
     - ਤੁਸੀਂ ডকুমেন্টেশন/উদাহরণের ভিত্তিতে প্যারামিটার পরিমার্জন করতে পারেন
     - ਤੁਹਾਡੇ যুক্তিতে যে সতর্কতা ਤੁਸੀਂ স্বীকার করছেন তা অন্তর্ভুক্ত করুন

  ২. **SPEAK** - ਯੂਜ਼ਰকে স্পষ্টীকরণের জন্য জিজ্ঞাসা করুন
     - ব্যবহার করুন যদি ডকুমেন্টেশন এমন অস্পষ্টতা প্রকাশ করে যার জন্য ਯੂਜ਼ਰ ইনপুট প্রয়োজন
     - ফরম্যাট: "ਮੇਰੇ ਯੂਜ਼ਰকে উত্তর দিতে হবে: [নির্দিষ্ট প্রশ্ন]"
     - উদাহরণ:
       - "ਮੇਰੇ ਯੂਜ਼ਰকে উত্তর দিতে হবে: কোন রিপোজিটরি ਮੇਰੇ চেক করা উচিত?"
       - "ਮੇਰੇ ਯੂਜ਼ਰকে উত্তর দিতে হবে: ਤੁਸੀਂ কি ਪੂਰਾ ਹੋਇਆ রিপোর্ট চান নাকি সারসংক্ষেপ?"

  ৩. **PONDER** - পদ্ধতি পুনর্বিবেচনা করুন
     - ব্যবহার করুন যদি ডকুমেন্টেশন দেখায় এই ਸੰਦ কাজের জন্য ভুল
     - ব্যবহার করুন যদি একটি ভিন্ন ਸੰਦ স্পষ্টভাবে ভাল হবে
     - কেন এই ਸੰਦ উপযুক্ত নয় তার কারণ অন্তর্ভুক্ত করুন

  === সিদ্ধান্ত মানদণ্ড ===

  SPEAK নির্বাচন করুন যদি:
  - ਲੋੜੀਂਦਾ প্যারামিটার অস্পষ্ট হয়
  - একাধিক বৈধ ব্যাখ্যা বিদ্যমান
  - সতর্কতা প্রযোজ্য যার জন্য ਯੂਜ਼ਰ নিশ্চিতকরণ প্রয়োজন
  - এই ਸੰਦের জন্য কাজটি অপর্যাপ্তভাবে নির্দিষ্ট

  PONDER নির্বাচন করুন যদি:
  - এই ਸੰਦ কাজটি ਮੁਕੰਮਲ করতে পারে না
  - একটি ভিন্ন ਸੰਦ উল্লেখযোগ্যভাবে ভাল হবে
  - ডকুমেন্টেশন সক্ষমতা অমিল প্রকাশ করে
  - এই ਸੰਦ ব্যবহার করা প্রসঙ্গে অনুপযুক্ত বা অনৈতিক হবে

  TOOL নির্বাচন করুন যদি:
  - ডকুমেন্টেশন নিশ্চিত করে এটি উপযুক্ত
  - প্যারামিটার স্পষ্ট (উদাহরণ উন্নতির পরামর্শ দিলে পরিমার্জন করুন)
  - ਤੁਸੀਂ প্রাসঙ্গিক সতর্কতা স্বীকার করতে পারেন
  - ਸੰਦ ব্যবহার নৈতিক এবং ਯੂਜ਼ਰর লক্ষ্য উপযুক্তভাবে এগিয়ে নেয়

