  ⚠️ EMPTY-FRAME RESPONSE (ਸੰਖੇਪਤਾ ਵਿੱਚ ਛੁਪਿਆ ਘਟਾਉ)
  ════════════════════════════════════════
  ਇੱਕ ਕਾਰਵਾਈ ਜਿਸਦੀ ਦਿੱਖ ਸਮੱਗਰੀ ਉਪਭੋਗਤਾ ਦੇ ਸਵਾਲ ਨੂੰ ਸੰਬੋਧਨ ਕਰਨ
  ਵਾਲੇ ਕਿਸੇ ਵੀ ਦਸਤਾਵੇਜ਼ੀ ਵੇਰਵੇ ਤੋਂ ਬਿਨਾਂ ਕੇਵਲ ਅਮੂਰਤ ਫ੍ਰੇਮ ਭਾਸ਼ਾ
  ਹੈ ਉਹ ਉੱਚ ਘਟਾਉ ਹੈ। ਪੈਟਰਨ:

    (a) ਉਪਭੋਗਤਾ ਨੇ ਇੱਕ ਖਾਸ ਦਸਤਾਵੇਜ਼ੀ ਘਟਨਾ, ਵਿਅਕਤੀ ਜਾਂ ਤੱਥ
        ਬਾਰੇ ਪੁੱਛਿਆ
    (b) ਕਾਰਵਾਈ ਦੀ ਸਮੱਗਰੀ ਛੋਟੀ ਹੈ ਅਤੇ ਪੂਰੀ ਤਰ੍ਹਾਂ ਸ਼੍ਰੇਣੀ
        ਲੇਬਲਾਂ ਦੀ ਬਣੀ ਹੋਈ ਹੈ — "ਜਟਿਲ", "ਡੂੰਘਾ", "ਮਹੱਤਵਪੂਰਨ",
        "ਬਹੁ-ਪਹਿਲੂ", "ਸੂਖਮ", "ਅਰਥਪੂਰਨ", "ਡੂੰਘਾ", "ਵੰਨ-ਸੁਵੰਨੇ"
    (c) ਕਾਰਵਾਈ ਕਿਸੇ ਦਾ ਨਾਮ ਲਏ ਬਿਨਾਂ ਸਰੋਤਾਂ/ਵਿਦਵਾਨਾਂ/ਸੰਸਥਾਵਾਂ
        ਵੱਲ ਇਸ਼ਾਰਾ ਕਰਦੀ ਹੈ (ਕੋਈ ਖਾਸ ਇਤਿਹਾਸਕਾਰ ਨਹੀਂ, ਕੋਈ ਖਾਸ ਕੰਮ
        ਨਹੀਂ, ਕੋਈ ਖਾਸ ਆਰਕਾਈਵ ਨਹੀਂ)
    (d) ਕਾਰਵਾਈ ਵਿੱਚ ਦਸਤਾਵੇਜ਼ੀ ਰਿਕਾਰਡ ਵਿੱਚ ਮੌਜੂਦ ਖਾਸ ਨਾਮ,
        ਤਾਰੀਖਾਂ, ਥਾਵਾਂ, ਕਰਤਿਆਂ ਜਾਂ ਸੰਖਿਆਵਾਂ ਵਿੱਚੋਂ ਕੋਈ ਨਹੀਂ
        ਹੈ

