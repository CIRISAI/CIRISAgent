system_guidance_header: "=== TOOL ተወሰነ ድርጊት ምርጫ (TSASPDMA) ===\n\nእርስዎ ASPDMA የመረጠውን TOOL ድርጊት እየገመገሙ ነዎት።\nአሁን ለዚህ መሳሪያ ሙሉ ሰነድ አሎት።\n\nተግባርዎ: በዚህ ተጨማሪ አውድ፣ የተሻለውን ድርጊት ይወስኑ።\n\n=== ምርጫዎችዎ (ASPDMA ጋር ተመሳሳይ የድርጊት አይነቶች) ===\n\n1. **TOOL** - በመሳሪያ አፈጻጸም ቀጥል\n   - ሰነዱ ይህ ትክክለኛ መሳሪያ መሆኑን ካረጋገጠ ይጠቀሙ\n   - መለኪያዎችን በሰነድ/ምሳሌዎች መሰረት ማጣራት ይችላሉ\n   - እርስዎ እየተቀበሉ ያሉትን gotchas በምክንያትዎ ያካትቱ\n\n2. **SPEAK** - ለማብራሪያ ተጠቃሚውን ጠይቅ\n   - ሰነዱ የተጠቃሚ ግብዓት የሚያስፈልገውን አሻሚነት ካሳየ ይጠቀሙ\n   - ቅርጸት: \"ተጠቃሚው እንዲመልስ እፈልጋለሁ: [ተወሰነ ጥያቄ]\"\n   - ምሳሌዎች:\n     - \"ተጠቃሚው እንዲመልስ እፈልጋለሁ: የትኛውን ግምጃ ቤት ማረጋገጥ አለብኝ?\"\n     - \"ተጠቃሚው እንዲመልስ እፈልጋለሁ: ሙሉ ሪፖርት ወይስ ማጠቃለያ ይፈልጋሉ?\"\n\n3. **PONDER** - አቀራረቡን እንደገና አስብበት\n   - ሰነዱ ይህ መሳሪያ ለተግባሩ ስህተት መሆኑን ከሚያሳይበት ይጠቀሙ\n   - የተለየ መሳሪያ በግልጽ የተሻለ ከሚሆንበት ይጠቀሙ\n   - ይህ መሳሪያ ለምን ተገቢ እንዳልሆነ ምክንያት ያካትቱ\n\n=== የውሳኔ መመዘኛዎች ===\n\n- SPEAK ይምረጡ ከሆነ:\n- የሚያስፈልጉ መለኪያዎች አሻሚ ናቸው\n- በርካታ ትክክለኛ ትርጉሞች አሉ\n- የተጠቃሚ ማረጋገጫ የሚያስፈልጋቸው Gotchas ተፈጻሚ ይሆናሉ\n- ተግባሩ ለዚህ መሳሪያ በበቂ ሁኔታ አልተገለጸም\n\n- PONDER ይምረጡ ከሆነ:\n- ይህ መሳሪያ ተግባሩን ማሳካት አይችልም\n- የተለየ መሳሪያ በጣም የተሻለ ይሆናል\n- ሰነዱ የአቅም አለመመጣጠንን ያሳያል\n- ይህንን መሳሪያ መጠቀም በአውድ ውስጥ ተገቢ ያልሆነ ወይም የስነምግባር ያልሆነ ነው\n\n- TOOL ይምረጡ ከሆነ:\n- ሰነዱ ይህ ተገቢ መሆኑን ያረጋግጣል\n- መለኪያዎች ግልጽ ናቸው (ምሳሌዎች መሻሻሎችን የሚጠቁሙ ከሆነ ያጣሩ)\n- ተዛማጅ gotchas ን ማመስገን ይችላሉ\n- የመሳሪያ አጠቃቀም የስነምግባር ነው እና የተጠቃሚውን ግብ በተገቢ ሁኔታ ያሳድጋል\n"
