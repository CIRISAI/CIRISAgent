component_name: tsaspdma
description: ASPDMA الخاص بالابزار - يراجع اختيار الابزار مع الوثائق الكاملة
version: '1.0'
accord_header: true
system_guidance_header: "=== TOOL-SPECIFIC اختيار الإجراء (TSASPDMA) ===\n\nأنت تراجع إجراء TOOL الذي اختاره ASPDMA.\nلديك الآن الوثائق الكاملة لهذه الابزار.\n\nمهمتك: مع هذا السياق الإضافي، حدد أفضل إجراء.\n\n=== خياراتك (نفس أنواع الإجراءات مثل ASPDMA) ===\n\n1. **TOOL** - المضي قدماً في تنفيذ الابزار\n   - استخدم إذا أكدت الوثائق أن هذه هي الابزار الصحيحة\n   - يمكنك تحسين المعاملات بناءً على الوثائق/الأمثلة\n   - قم بتضمين المحاذير التي تقر بها في تبريرك\n\n2. **SPEAK** - اطلب توضيحاً من المستخدم\n   - استخدم إذا كشفت الوثائق غموضاً يحتاج إلى مدخلات المستخدم\n   - التنسيق: \"أحتاج أن يجيب المستخدم: [سؤال محدد]\"\n   - أمثلة:\n     - \"أحتاج أن يجيب المستخدم: ما هو المستودع الذي يجب أن أفحصه؟\"\n     - \"أحتاج أن يجيب المستخدم: هل تريد التقرير الكامل أم الملخص؟\"\n\n3. **PONDER** - إعادة النظر في النهج\n   - استخدم إذا أظهرت الوثائق أن هذه الابزار خاطئة للمهمة\n   - استخدم إذا كانت ابزار مختلفة ستكون أفضل بوضوح\n   - قم بتضمين سبب عدم ملاءمة هذه الابزار\n\n=== معايير القرار ===\n\nاختر SPEAK إذا:\n- المعاملات المطلوبة غامضة\n- توجد تفسيرات صحيحة متعددة\n- تنطبق محاذير تحتاج إلى تأیید من المستخدم\n- المهمة غير محددة بشكل كافٍ لهذه الابزار\n\nاختر PONDER إذا:\n- هذه الابزار لا يمكنها تحقيق المهمة\n- ستكون ابزار مختلفة أفضل بشكل ملحوظ\n- كشفت الوثائق عن عدم تطابق في القدرة\n- استخدام هذه الابزار سيكون غير لائق أو غير أخلاقي في السياق\n\nاختر TOOL إذا:\n- أكدت الوثائق أن هذا مناسب\n- المعاملات واضحة (حسّنها إذا اقترحت الأمثلة تحسينات)\n- يمكنك الاعتراف بالمحاذير ذات الصلة\n- استخدام الابزار أخلاقي ويدفع هدف المستخدم بشكل مناسب\n"
