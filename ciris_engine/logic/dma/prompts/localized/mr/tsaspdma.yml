response_format: 'या फील्डसह फ्लॅट JSON ऑब्जेक्ट परत करा:

  - "selected_action": "TOOL", "SPEAK", "PONDER" पैकी एक

  - "reasoning": तुम्ही कबूल करत असलेल्या gotchas समाविष्ट करून तुमचा निर्णय स्पष्ट करा


  आणि कृती-विशिष्ट फील्ड (खाली अचूक फील्ड नावे वापरा):


  TOOL कृतीसाठी (सामान्य मोड - साधन अस्तित्वात आहे):

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  TOOL कृतीसाठी (सुधारणा मोड - साधन नाव चुकीचे होते):

  {{"selected_action": "TOOL", "reasoning": "उपलब्ध साधन जुळवण्यासाठी साधन नाव सुधारत आहे...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  SPEAK कृतीसाठी:

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "मला वापरकर्त्याने उत्तर देणे आवश्यक आहे: कोणता दिवा?"}}


  PONDER कृतीसाठी:

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["हा योग्य दृष्टीकोन आहे का?"]}}


  महत्त्वाचे:

  - आवश्यक साधन पॅरामीटर निर्धारित करण्यासाठी वरील पॅरामीटर स्कीमा वापरा

  - वापरकर्त्याच्या हेतूतून आणि संभाषण संदर्भातून पॅरामीटर मूल्यांचा अंदाज लावा

  - tool_parameters हा साधनाचे आर्ग्युमेंट्स असलेला dict आहे

  - सुधारणा मोडमध्ये: उपलब्ध साधने यादीतील अचूक नावासह "tool_name" फील्ड समाविष्ट करा

  - मार्कडाउन कोड ब्लॉक्समध्ये गुंडाळू नका


  भाषा नियम:

  - वापरकर्त्याच्या पसंतीच्या भाषेत प्रतिसाद द्या (वापरकर्ता प्रोफाइल तपासा).

  - सर्व सामग्री मूल्ये (reasoning, speak_content, ponder_questions) वापरकर्त्याच्या भाषेत असावीत.

  - JSON की आणि कृती नावे इंग्रजीमध्ये राहणे आवश्यक आहे (उदा., "selected_action": "TOOL", "reasoning", "tool_parameters").

  - उदाहरण: {{"selected_action": "SPEAK", "reasoning": "需要用户澄清", "speak_content": "请问您想控制哪个灯？"}} - चीनी सामग्री, इंग्रजी की/कृती.

  '
tool_correction_section: "=== TOOL सुधारणा मोड ===\n\nASPDMA ने '{requested_tool}' साधन निवडले परंतु हे साधन अस्तित्वात नाही.\n\nतुमचे कार्य: वापरकर्त्याच्या हेतूशी जुळणारे उपलब्ध साधने यादीतून योग्य साधन शोधा, किंवा कोणतेही योग्य साधन अस्तित्वात नसल्यास SPEAK/PONDER वापरा.\n\nउपलब्ध साधने:\n{available_tools_list}\n\nसूचना:\n1. विचार सामग्रीतून वापरकर्त्याच्या मूळ हेतूचे विश्लेषण करा\n2. वरील उपलब्ध साधने पुनरावलोकन करा - हेतूशी जुळणारे एक शोधा\n3. जर तुम्हाला जुळणारे साधन सापडले:\n   - यादीतील अचूक नावावर सेट केलेल्या \"tool_name\" सह TOOL कृती परत करा\n   - साधनाच्या स्कीमावर आधारित योग्य \"tool_parameters\" भरा\n4. जर अनेक साधने जुळू शकतील:\n   - वापरकर्त्याला त्यांना कोणती विशिष्ट क्षमता हवी आहे हे विचारण्यासाठी SPEAK परत करा\n5. जर कोणतेही साधन हेतूशी जुळत नसेल:\n   - दृष्टीकोन पूर्णपणे पुनर्विचार करण्यासाठी PONDER परत करा\n\nगंभीर: \"tool_name\" फील्ड वरील उपलब्ध साधने यादीतील अचूक जुळणी असणे आवश्यक आहे.\n"
evaluation_steps: 'पायरी 1: दस्तऐवजीकरण वाचा

  - quick_start, detailed_instructions, उदाहरणे पुनरावलोकन करा

  - या वापर प्रकरणासाठी लागू होणारे कोणतेही gotchas लक्षात घ्या

  - when_to_use कार्याशी जुळते का तपासा


  पायरी 2: ASPDMA च्या निवडीचे मूल्यांकन करा

  - दस्तऐवजीकरणानुसार पॅरामीटर योग्य आहेत का?

  - उदाहरणे चांगले पॅरामीटर स्वरूपन सूचवतात का?

  - अस्पष्ट असलेले आवश्यक पॅरामीटर आहेत का?


  पायरी 3: Gotchas तपासा

  - या विशिष्ट वापरासाठी कोणताही gotcha लागू होतो का?

  - वापरकर्ता या वर्तनाची अपेक्षा करेल का?

  - वापरकर्त्याला प्रथम चेतावणी दिली पाहिजे किंवा विचारले पाहिजे का?


  पायरी 4: कृती ठरवा

  - TOOL: gotchas कबूल करून पुष्टी किंवा परिष्कृत करा

  - SPEAK: विशिष्ट स्पष्टीकरण विचारा

  - PONDER: पुनर्विचार का करावा ते स्पष्ट करा

  '
closing_reminder: 'महत्त्वाचे: तुमची भूमिका अशा समस्या पकडणे आहे ज्या ASPDMA संपूर्ण दस्तऐवजीकरणाशिवाय पाहू शकत नाही. जर TOOL निवड चांगली दिसते, तर त्वरित पुष्टी करा.

  जेव्हा दस्तऐवजीकरण अस्सल चिंता उघड करते तेव्हाच SPEAK किंवा PONDER वापरा.


  SPEAK निवडताना, विशिष्ट व्हा: "मला वापरकर्त्याने उत्तर देणे आवश्यक आहे: [प्रश्न]"

  PONDER निवडताना, स्पष्ट करा: "हे साधन Y कारणाने X करू शकत नाही, Z विचारात घ्या"

  TOOL निवडताना, कबूल करा: "gotcha X ची जागरूकता असताना पुढे जात आहे"

  '
