response_format: |
  ਹੇਠਾਂ ਦਿੱਤੇ fields ਨਾਲ ਇੱਕ FLAT JSON object ਵਾਪਸ ਕਰੋ:
  - "reason_summary": ਮਨੁੱਖ ਲਈ ਪੜ੍ਹਨਯੋਗ ਛੋਟੀ ਵਿਆਖਿਆ
  - "operational_reason": ਉੱਪਰਲੇ ਕਾਰਜਕਾਰੀ ਕਾਰਨ ਕੋਡਾਂ ਵਿੱਚੋਂ ਇੱਕ
  - "primary_need_category": ਉੱਪਰਲੇ ਅਧਿਕਾਰ / ਲੋੜ taxonomy ਮੁੱਲਾਂ ਵਿੱਚੋਂ ਇੱਕ
  - "secondary_need_categories": ਵਾਧੂ taxonomy ਮੁੱਲਾਂ ਦੀ ਵਿਕਲਪਿਕ ਸੂਚੀ
  - "rights_basis": ਛੋਟੇ ਅਧਿਕਾਰ-ਆਧਾਰ label ਦੀ ਸੂਚੀ
  - "domain_hint": ਜਦੋਂ ਖ਼ਾਸ ਲਾਇਸੰਸਯੁਕਤ handler ਸਪਸ਼ਟ ਤੌਰ 'ਤੇ ਲੋੜੀਂਦਾ ਹੋਵੇ ਤਾਂ ਵਿਕਲਪਿਕ ਲਾਇਸੰਸਯੁਕਤ domain enum
  - "defer_until": ਜੇ ਸਮਾਂ ਬਦਲਣਾ ਹੋਵੇ ਤਾਂ ਵਿਕਲਪਿਕ ISO timestamp override

  ਉਦਾਹਰਨ:
  {{"reason_summary": "ਕਾਰਵਾਈ ਸੰਬੰਧੀ ਮਾਰਗਦਰਸ਼ਨ ਦੇਣ ਤੋਂ ਪਹਿਲਾਂ ਲਾਇਸੰਸਯੁਕਤ ਕਾਨੂੰਨੀ ਸਮੀਖਿਆ ਲੋੜੀਂਦੀ ਹੈ।", "operational_reason": "licensed_domain_required", "primary_need_category": "justice_and_legal_agency", "secondary_need_categories": ["identity_and_civic_participation"], "rights_basis": ["fair_trial", "access_to_justice", "legal_aid_and_effective_remedy"], "domain_hint": "LEGAL"}}

  ਭਾਸ਼ਾ ਨਿਯਮ:
  - ਵਰਤੋਂਕਾਰ ਦੀ ਪਸੰਦੀਦਾ ਭਾਸ਼ਾ ਵਿੱਚ ਜਵਾਬ ਦਿਓ।
  - JSON keys ਅਤੇ enum values ਬਿਲਕੁਲ ਨਿਰਧਾਰਤ ਅੰਗਰੇਜ਼ੀ ਵਿੱਚ ਹੀ ਰਹਿਣੇ ਚਾਹੀਦੇ ਹਨ।
  - ਸਿਰਫ਼ ਮਨੁੱਖ-ਪੜ੍ਹਨਯੋਗ ਮੁਕਤ text ਜਿਵੇਂ reason_summary ਨੂੰ localized ਕਰੋ।

closing_reminder: |
  ਮਹੱਤਵਪੂਰਨ:
  - DEFER ਤੋਂ ਦੂਰ ਨਾ ਜਾਓ।
  - domain_hint ਨਾ ਬਣਾਓ ਜਦ ਤਕ ਲਾਇਸੰਸਯੁਕਤ ਸੰਭਾਲ ਸੱਚਮੁੱਚ ਸੰਕੇਤਿਤ ਨਾ ਹੋਵੇ।
  - ਕਾਨੂੰਨੀ ਅਤੇ ਵਿੱਤੀ ਪਹੁੰਚ ਨੂੰ ਆਮ ਪ੍ਰਸ਼ਾਸਕੀ ਮੁੱਦਾ ਨਹੀਂ, ਸਗੋਂ ਅਧਿਕਾਰਾਂ 'ਤੇ ਅਸਰ ਕਰਨ ਵਾਲੀ ਲੋੜ ਸਮਝੋ।
  - ਸਭ ਤੋਂ ਸਪਸ਼ਟ ਅਧਿਕਾਰ ਆਧਾਰ ਵਾਲੀ ਸਭ ਤੋਂ ਸੰਕੁਚਿਤ ਸਹੀ ਸ਼੍ਰੇਣੀ ਨੂੰ ਤਰਜੀਹ ਦਿਓ।
