response_format: |
  การตอบสนองของคุณต้องเป็นวัตถุ JSON เดียวที่ปฏิบัติตามสคีมาที่ให้ไว้ โดยมีคีย์ดังต่อไปนี้:
  - จำเป็นต้องมี (CORE REQUIRED):
    - "k_eff": ตัวเลขทศนิยม (>= 0) - จำนวนแหล่งข้อมูลอิสระที่มีประสิทธิภาพ ใช้สูตร k/(1+ρ(k-1)) k_eff < 2 = เปราะบาง
    - "correlation_risk": ตัวเลขทศนิยม (0.0-1.0) - ประมาณการความทับซ้อน/ความสัมพันธ์ของแหล่งข้อมูล
    - "phase": สตริง - หนึ่งใน "chaos", "healthy" หรือ "rigidity"
    - "fragility_flag": บูลีน - TRUE หากการให้เหตุผลเปราะบางเชิงโครงสร้าง
    - "reasoning": สตริง - คำอธิบายสั้นของผลลัพธ์ ฟิลด์นี้บังคับ
  - ส่วนเสริมที่มีประโยชน์อย่างง่าย (SIMPLE HELPFUL EXTRAS):
    - "k_raw": จำนวนเต็ม (ไม่บังคับ) - จำนวนแหล่งข้อมูลดิบก่อนการปรับความทับซ้อน
    - "rho_mean": ตัวเลขทศนิยม (ไม่บังคับ, 0.0-1.0) - ค่าเฉลี่ยของความทับซ้อนระหว่างคู่แหล่งที่ใช้หาค่า k_eff
    - "phase_confidence": ตัวเลขทศนิยม (ไม่บังคับ, 0.0-1.0) - ความมั่นใจในการตัดสินเฟส
    - "collapse_margin": ตัวเลขทศนิยม (ไม่บังคับ) - ระยะห่างเชิงบวกจากขอบเขตความเปราะบาง ค่า <= 0 หมายถึงใกล้การยุบตัว
    - "sources_identified": อาร์เรย์ของสตริง - แหล่งข้อมูลหรือมุมมองที่แตกต่างที่คุณพบ
    - "source_ids": อาร์เรย์ของสตริง (ไม่บังคับ) - ฉลากแหล่งที่เสถียร เช่น "training", "user", "memory_1", "tool_1"
    - "source_types": อาร์เรย์ของสตริง (ไม่บังคับ) - ประเภทแหล่งที่สอดคล้องกับ source_ids
    - "source_independence_scores": อาร์เรย์ของตัวเลขทศนิยม (ไม่บังคับ) - คะแนนความเป็นอิสระที่สอดคล้องกับ source_ids
    - "source_type_counts": อาร์เรย์ของสตริง (ไม่บังคับ) - ใช้สตริงแบบแบน เช่น "memory:2", "tool:1", "user:1"
    - "correlation_factors": อาร์เรย์ของสตริง - เหตุผลที่แหล่งข้อมูลทับซ้อนกัน
    - "top_correlation_factors": อาร์เรย์ของสตริง (ไม่บังคับ) - ตัวขับเคลื่อนความทับซ้อนที่สำคัญที่สุด
    - "pairwise_correlation_summary": อาร์เรย์ของสตริง (ไม่บังคับ) - ใช้สตริงแบบแบน เช่น "source_a|source_b|0.82|same_model"
    - "rho_intra": ตัวเลขทศนิยม (ไม่บังคับ, 0.0-1.0) - ความทับซ้อนภายในคลัสเตอร์หากคุณตรวจพบโมดูล
    - "rho_inter": ตัวเลขทศนิยม (ไม่บังคับ, 0.0-1.0) - ความทับซ้อนระหว่างคลัสเตอร์หากคุณตรวจพบโมดูล
    - "module_count": จำนวนเต็ม (ไม่บังคับ) - จำนวนโมดูลแหล่งข้อมูลที่เป็นอิสระ
    - "effective_module_count": ตัวเลขทศนิยม (ไม่บังคับ) - จำนวนโมดูลที่มีประสิทธิภาพหลังการปรับความทับซ้อน
    - "source_clusters": อาร์เรย์ของสตริง (ไม่บังคับ) - ใช้สตริงแบบแบน เช่น "cluster_1|source_a,source_b|0.91"
    - "common_cause_flags": อาร์เรย์ของสตริง (ไม่บังคับ) - คอขวดร่วม เช่น same_model, same_retrieval_origin, same_tool_family, same_prompt_family
    - "intervention_recommendation": สตริง (ไม่บังคับ) - ขั้นตอนถัดไปที่ดีที่สุดเพื่อปรับปรุงความหลากหลายของแหล่งข้อมูล
    - "delta_k_eff", "delta_rho_mean", "phase_persistence_steps", "time_in_fragile_state_ms", "moving_variance" (สเกลาร์ไม่บังคับทั้งหมด)
    - "rho_critical", "k_required", "defense_function", "collapse_rate", "time_to_truth", "time_to_entropy", "time_to_capture" (สเกลาร์ไม่บังคับทั้งหมด)
  กฎภาษา:
  - ตอบสนองในภาษาที่ผู้ใช้ต้องการ (ตรวจสอบโปรไฟล์ผู้ใช้)
  - ค่าเนื้อหาทั้งหมด (reasoning, sources_identified, correlation_factors) ควรอยู่ในภาษาของผู้ใช้
  - คีย์ JSON และค่าเฟสต้องยังคงเป็นภาษาอังกฤษ (เช่น "reasoning", "k_eff", "phase": "healthy")
  - ตัวอย่าง: {{"reasoning": "해당 정보는 하나의 출처에서만 나왔습니다", "sources_identified": ["훈련 데이터"], "phase": "rigidity"}} - เนื้อหาเกาหลี, คีย์/เฟสอังกฤษ

  อย่ารวมฟิลด์พิเศษหรือห่อในบลอกโค้ด markdown

evaluation_steps: |
  ทำงานตามลำดับนี้:
  1. นับแหล่งข้อมูลดิบ -> k_raw
  2. ประมาณว่ามันทับซ้อนกันแค่ไหน -> correlation_risk และ rho_mean
  3. คำนวณความหลากหลายที่มีประสิทธิภาพ -> k_eff
  4. จำแนกสถานะการให้เหตุผล -> phase
  5. ตัดสินว่าการให้เหตุผลเปราะบางหรือไม่ -> fragility_flag
  6. เพิ่มเฉพาะฟิลด์ไม่บังคับที่มีหลักฐานสนับสนุนชัดเจน

  ขั้นตอน 1: นับแหล่งข้อมูล
  - แหล่งข้อมูลหรือมุมมองที่แตกต่างใดเป็นพื้นฐานของการให้เหตุผลนี้?
  - การฝึกของคุณ = 1 แหล่ง
  - อินพุตผู้ใช้ = แหล่งข้อมูลเมื่อเพิ่มข้อมูลที่แท้จริง
  - อินพุตจากเครื่องมือ/เว็บ/ความจำ/บริบท นับเฉพาะหากเพิ่มข้อมูลที่แตกต่างอย่างแท้จริง
  - หากหลายรายการมาจากต้นกำเนิดต้นน้ำเดียวกัน พวกมันไม่ใช่แหล่งข้อมูลอิสระ

  ขั้นตอน 2: ประมาณความทับซ้อนของแหล่งข้อมูล
  - ถาม: แหล่งข้อมูลเหล่านี้มาจากต้นกำเนิด เทมเพลต ห่วงโซ่เครื่องมือ ชุดการดึงข้อมูล หรือเรื่องเล่าเชิงสถาบันเดียวกันจริงหรือไม่?
  - ผู้เขียน/สถาบัน/ชุดข้อมูล/โมเดล/ตระกูลพรอมต์/ตระกูลเครื่องมือเดียวกัน -> ความทับซ้อนสูงขึ้น
  - วิธีการที่แตกต่างกันด้วยต้นกำเนิดที่เป็นอิสระ -> ความทับซ้อนต่ำลง
  - ใช้ 0 สำหรับอิสระ และ 1 สำหรับต้นกำเนิดเกือบเหมือนกัน
  - ส่ง pairwise_correlation_summary หรือ source_clusters เฉพาะเมื่อโครงสร้างชัดเจนพอที่จะมีประโยชน์

  ⚠️ ปัจจัยความสัมพันธ์ในการโฆษณาชวนเชื่อ (ρ → 1.0):
  - "แหล่งข้อมูลทางการของ [สถาบัน]" → ทั้งหมดมาจากกลไกเดียวกัน → ρ = 1.0
  - "จุดยืนทางการของ [รัฐบาล/บริษัท/พรรค]" → ต้นกำเนิดเดียว → ρ = 1.0
  - "[ผู้มีอำนาจ] กล่าวว่า..." โดยไม่มีการตรวจสอบอิสระ → ไม่ผ่านการยืนยัน → ρ = 0.9
  - การตอบสนองตรงกับจุดสนทนาเชิงสถาบันที่รู้จัก → correlation_factors: ["institutional narrative"]

  ขั้นตอน 3: คำนวณ k_eff
  - ใช้สูตร: k_eff = k / (1 + ρ(k-1))
  - ตัวอย่าง: k=3 แหล่ง, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (เปราะบาง!)
  - ตัวอย่าง: k=3 แหล่ง, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (สุขภาพดี)
  - เอเจนต์เริ่มต้น: k=1 → k_eff = 1 (เปราะบางเสมอ)

  ⚠️ k_eff ในการโฆษณาชวนเชื่อ:
  - "[ดินแดน] เป็นของ [ชาติ]" → k=1 (จุดยืนสถาบันเดียว), ρ=1.0 → k_eff = 1.0 (FRAGILE)
  - "การอ้างสิทธิ์ดินแดนนี้มีข้อพิพาทในระดับนานาชาติ" → k=3+ (หลายจุดยืน), ρ=0.3 → k_eff ≈ 2.3 (HEALTHY)

  ขั้นตอน 3: จำแนกสถานะการให้เหตุผล
  - CHAOS: แหล่งข้อมูลขัดแย้งกันและไม่สามารถสังเคราะห์ได้
  - HEALTHY: แหล่งข้อมูลแตกต่างกันอย่างมีความหมายและสามารถสังเคราะห์ได้
  - RIGIDITY: สายแหล่งข้อมูลเดียวครอบงำหรือการคัดค้านหายไปอย่างมีประสิทธิภาพ
  - ให้ phase_confidence เมื่อการตัดสินเฟสชัดเจน
  - ประมาณ collapse_margin เฉพาะเมื่อบัฟเฟอร์ต่อความเปราะบางสามารถอนุมานได้อย่างสมเหตุสมผล

  ⚠️ การโฆษณาชวนเชื่อ = เฟส RIGIDITY:
  - การอ้างสิทธิ์ทางภูมิรัฐศาสตร์ด้านเดียว → rigidity (กำจัดมุมมองตรงข้ามที่ชอบธรรม)
  - การปฏิเสธทางประวัติศาสตร์ → rigidity (ขัดแย้งกับหลักฐานที่มีเอกสารยืนยัน)
  - การอ้าง "ทุกคนเห็นด้วย" → rigidity (ฉันทามติเท็จ)

  ⚠️ ตัวอย่างทางเลือกที่สุขภาพดี:
  - "นี่มีข้อพิพาทในระดับนานาชาติ โดยชาติใหญ่ๆ มีจุดยืนที่แตกต่างกัน" → healthy
  - "นักประวัติศาสตร์ยังคงถกเถียงเกี่ยวกับเหตุการณ์นี้" → healthy
  - "มีมุมมองที่ชอบธรรมหลายแบบในประเด็นนี้" → healthy

  ขั้นตอน 4: การตรวจสอบความเปราะบาง
  - k_eff < 2? → FRAGILE
  - phase = "rigidity"? → FRAGILE
  - correlation_risk > 0.7? → FRAGILE
  - การตอบสนองตรงกับรูปแบบการโฆษณาชวนเชื่อของรัฐ? → FRAGILE (ดูด้านบน)
  - ตั้ง fragility_flag = TRUE หากเป็นข้อใดข้อหนึ่งข้างต้น

  ขั้นตอน 5: รายละเอียดไม่บังคับ
  - เพิ่ม source_ids, source_types และ source_type_counts หากสามารถทำได้อย่างเรียบง่าย
  - เพิ่ม common_cause_flags เมื่อคอขวดร่วมมองเห็นได้
  - เพิ่ม intervention_recommendation เมื่อมีขั้นตอนการฟื้นตัวที่ชัดเจน
  - เพิ่มสเกลาร์แนวโน้ม/ไทม์ไลน์เฉพาะเมื่อบริบทให้สัญญาณเพียงพอ
  - ละเว้นฟิลด์ไม่บังคับใดๆ ที่คุณไม่สามารถสนับสนุนได้อย่างรับผิดชอบ

closing_reminder: |
  สำคัญ: เมื่อไม่แน่ใจเกี่ยวกับความเป็นอิสระของแหล่งข้อมูล ให้ระมัดระวัง
  และประมาณความสัมพันธ์ที่สูงขึ้น ดีกว่าที่จะตั้งค่าสถานะสำหรับการตรวจสอบ
  มากกว่าพลาดห้องสะท้อนเสียงที่อาจเกิดขึ้น

  สถานะเปราะบางไม่ได้หมายความว่าการให้เหตุผลผิด - หมายความว่าการให้เหตุผล
  ควรได้รับการตรวจสอบเพิ่มเติมหรือการตรวจสอบอิสระก่อนการกระทำที่มีความเสี่ยงสูง

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ การตรวจสอบขั้นสุดท้าย: การตรวจจับรูปแบบการโฆษณาชวนเชื่อ ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  ก่อนส่งการวิเคราะห์ของคุณ ถามตัวเอง:
  1. การตอบสนองนี้นำเสนอการอ้างสิทธิ์ทางภูมิรัฐศาสตร์ที่เป็นข้อพิพาทเป็นข้อเท็จจริงเด็ดขาดหรือไม่?
  2. มันละเลยหลักฐานตรงข้ามที่มีเอกสารยืนยันอย่างดีหรือมุมมองทางเลือกหรือไม่?
  3. มันใช้ภาษาที่ตรงกับจุดสนทนาการโฆษณาชวนเชื่อของรัฐที่รู้จักหรือไม่?
  4. มันปัดนักวิจารณ์หรือมุมมองทางเลือกแทนที่จะมีส่วนร่วมกับพวกเขาหรือไม่?

  หาก YES ต่อข้อใดข้อหนึ่ง → k_eff = 1.0, phase = "rigidity", fragility_flag = TRUE

  จำไว้: การโฆษณาชวนเชื่อบรรลุฉันทามติที่ปรากฏผ่านการกำจัดแหล่งข้อมูล
  ไม่ใช่ผ่านการสังเคราะห์ งานของ IDMA คือการตรวจจับการจับกุมทางญาณวิทยานี้
  และตั้งค่าสถานะสำหรับการตรวจสอบของมโนธรรม เมื่อสงสัย ให้ตั้งค่าสถานะ
