response_format: |
  LANGUAGE RULES:
  - Respond in the user's preferred language (check user profile).
  - ALL content values (reasoning, rationale, speak_content, etc.) should be in the user's language.
  - JSON keys MUST remain in English (e.g., "selected_action", "reasoning", "tool_parameters").
  - Example: {{"selected_action": "SPEAK", "speak_content": "Hallo!", "rationale": "Benutzer hat auf Deutsch gegrüßt""}} - German content, English keys.

  Geben Sie ein FLACHES JSON-Objekt mit diesen Feldern zurück:
  - "selected_action": Eines von "TOOL", "SPEAK", "PONDER"
  - "rationale": Erklären Sie Ihre Entscheidung einschließlich Fallstricke, die Sie berücksichtigen

  PLUS aktionsspezifische Felder (verwenden Sie die exakten Feldnamen unten):

  Für TOOL-Aktion (normaler Modus - Werkzeug existiert):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  Für TOOL-Aktion (Korrekturmodus - Werkzeugname war falsch):
  {{"selected_action": "TOOL", "rationale": "Korrigiere Werkzeugnamen, um mit verfügbarem Werkzeug übereinzustimmen...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  Für SPEAK-Aktion:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "Ich benötige vom Benutzer die Antwort: welches Licht?"}}

  Für PONDER-Aktion:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["Ist dies der richtige Ansatz?"]}}

  WICHTIG:
  - Verwenden Sie das Parameter-Schema oben, um erforderliche Werkzeugparameter zu bestimmen
  - Leiten Sie Parameterwerte aus der Absicht des Benutzers und dem Gesprächskontext ab
  - tool_parameters ist ein Dict, das die Argumente des Werkzeugs enthält
  - Im KORREKTURMODUS: fügen Sie das Feld "tool_name" mit dem EXAKTEN Namen aus der verfügbaren Werkzeugliste hinzu
  - Nicht in Markdown-Codeblöcke einpacken

# Tool correction mode section (used when ASPDMA selected non-existent tool)
tool_correction_section: |
  === WERKZEUGKORREKTURMODUS ===

  ASPDMA hat Werkzeug '{requested_tool}' ausgewählt, aber dieses Werkzeug existiert NICHT.

  Ihre Aufgabe: Finden Sie das KORREKTE Werkzeug aus der verfügbaren Werkzeugliste, das
  der Absicht des Benutzers entspricht, ODER verwenden Sie SPEAK/PONDER, wenn kein geeignetes Werkzeug existiert.

  Verfügbare Werkzeuge:
  {available_tools_list}

  ANWEISUNGEN:
  1. Analysieren Sie die ursprüngliche Absicht des Benutzers aus dem Gedankeninhalt
  2. Überprüfen Sie die verfügbaren Werkzeuge oben - finden Sie eines, das der Absicht entspricht
  3. Wenn Sie ein passendes Werkzeug finden:
     - Geben Sie TOOL-Aktion zurück mit "tool_name" auf den EXAKTEN Namen aus der Liste gesetzt
     - Füllen Sie geeignete "tool_parameters" basierend auf dem Schema des Werkzeugs aus
  4. Wenn mehrere Werkzeuge passen könnten:
     - Geben Sie SPEAK zurück, um den Benutzer zu fragen, welche spezifische Fähigkeit er möchte
  5. Wenn KEIN Werkzeug der Absicht entspricht:
     - Geben Sie PONDER zurück, um den Ansatz vollständig zu überdenken

  KRITISCH: Das Feld "tool_name" muss EXAKT mit einem Namen aus der verfügbaren Werkzeugliste oben übereinstimmen.

evaluation_steps: |
  SCHRITT 1: Lesen Sie die Dokumentation
  - Überprüfen Sie quick_start, detailed_instructions, examples
  - Notieren Sie alle Fallstricke, die auf diesen Anwendungsfall zutreffen
  - Prüfen Sie, ob when_to_use zur Aufgabe passt

  SCHRITT 2: Bewerten Sie ASPDMAs Auswahl
  - Sind die Parameter gemäß Dokumentation korrekt?
  - Legen Beispiele eine bessere Parameterformatierung nahe?
  - Gibt es erforderliche Parameter, die mehrdeutig sind?

  SCHRITT 3: Prüfen Sie auf Fallstricke
  - Trifft irgendein Fallstrick auf diese spezifische Verwendung zu?
  - Würde der Benutzer dieses Verhalten erwarten?
  - Sollte der Benutzer gewarnt oder zuerst gefragt werden?

  SCHRITT 4: Entscheiden Sie über die Aktion
  - TOOL: Bestätigen oder verfeinern, Fallstricke anerkennen
  - SPEAK: Um spezifische Klarstellung bitten
  - PONDER: Erklären, warum überdenken

closing_reminder: |
  WICHTIG: Ihre Rolle ist es, Probleme zu erfassen, die ASPDMA ohne
  vollständige Dokumentation nicht sehen konnte. Wenn die Werkzeugauswahl gut aussieht, bestätigen Sie sie schnell.
  Verwenden Sie SPEAK oder PONDER nur, wenn die Dokumentation echte Bedenken offenbart.

  Bei Auswahl von SPEAK, seien Sie spezifisch: "Ich benötige vom Benutzer die Antwort: [Frage]"
  Bei Auswahl von PONDER, erklären Sie: "Dieses Werkzeug kann X nicht, weil Y, erwägen Sie Z"
  Bei Auswahl von TOOL, anerkennen Sie: "Fortfahren mit Bewusstsein für Fallstrick X"
