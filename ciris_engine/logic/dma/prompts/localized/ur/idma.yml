response_format: |
  آپ کا جواب بالکل ان کلیدوں کے ساتھ ایک واحد JSON object ہونا ضروری ہے (کوئی اضافہ نہیں):

  ضروری:
    - "k_eff": Float (>= 0) فارمولا k_eff = k / (1 + ρ(k-1)) استعمال کریں۔ k_eff < 2 = نازک۔
    - "correlation_risk": Float (0.0-1.0) 0 = مکمل طور پر آزاد ذرائع, 1 = تمام ذرائع ایک ہی اصل سے۔
    - "phase": لفظی سلسلہ میں سے ایک "chaos", "healthy", یا "rigidity"۔
    - "fragility_flag": Boolean TRUE جب k_eff < 2، یا phase = "rigidity"، یا correlation_risk > 0.7، یا جواب اوپر بیان کردہ تبلیغ کی نمونوں سے مماثل ہو۔
    - "reasoning": مختصر سلسلہ (2-5 جملے) وضاحت کریں کہ آپ k_eff اور مرحلے تک کیسے پہنچے۔

  اختیاری (اگر آپ کو یقین نہ ہو تو پوری طرح چھوڑ دیں — خالی سلسلے یا null مت نکالیں):
    - "sources_identified": 3 تک سلسلوں کی صف جو الگ الگ ذرائع کا نام لیں جو آپ نے شمار کیے۔
    - "correlation_factors": 3 تک سلسلوں کی صف وضاحت کریں کہ یہ ذرائع کیوں اوور لیپ کرتے ہیں (مثال "same institutional narrative"، "single research group"، "derived from one prompt family")۔
    - "intervention_recommendation": ایک سطری لکیری جملہ تجویز کریں کہ ایجنٹ تنوع کو کیسے بحال کر سکتا ہے، صرف اگر fragility_flag = TRUE۔

  LANGUAGE RULES:
  - Respond in the user's preferred language (check user profile).
  - ALL content values (reasoning, sources_identified, correlation_factors) should be in the user's language.
  - JSON keys and phase values MUST remain in English (e.g., "reasoning", "k_eff", "phase": "healthy").
  - Example: {{"reasoning": "해당 정보는 하나의 출처에서만 나왔습니다", "sources_identified": ["훈련 데이터"], "phase": "rigidity"}} - Korean content, English keys/phases.

  Markdown code blocks میں نہ لپیٹیں۔ اوپر کی فہرست سے باہر کوئی فیلڈ نام نہ نکالیں۔

evaluation_steps: |
  اس ترتیب میں کام کریں:
  1. خام ذرائع گنیں -> k_raw
  2. اندازہ لگائیں کہ وہ کتنے اوورلیپ کرتے ہیں -> correlation_risk اور rho_mean
  3. مؤثر تنوع کا حساب لگائیں -> k_eff
  4. استدلال کی حالت کی درجہ بندی کریں -> phase
  5. فیصلہ کریں کہ آیا استدلال نازک ہے -> fragility_flag
  6. صرف وہ اختیاری فیلڈز شامل کریں جو واضح طور پر شواہد سے ثابت ہوں

  قدم 1: ذرائع گنیں
  - کون سے الگ ذرائع یا نقطہ نظر اس استدلال کو آگاہ کرتے ہیں؟
  - آپ کی تربیت = 1 ذریعہ
  - صارف کی ان پٹ = ایک ذریعہ جب یہ حقیقی معلومات شامل کرے
  - Tool/web/memory/context ان پٹس صرف اس وقت شمار ہوں گی جب وہ واقعی مختلف معلومات شامل کریں
  - اگر متعدد اشیاء ایک ہی اوپر کی اصل سے آئیں، تو وہ آزاد ذرائع نہیں ہیں

  قدم 2: ذرائع کے اوورلیپ کا اندازہ
  - پوچھیں: کیا یہ ذرائع واقعی ایک ہی اصل، template، tool chain، retrieval set، یا ادارہ جاتی بیانیے سے آتے ہیں؟
  - ایک ہی مصنف/ادارہ/ڈیٹاسیٹ/ماڈل/prompt family/tool family -> زیادہ اوورلیپ
  - آزاد اصل کے ساتھ مختلف طریقہ کار -> کم اوورلیپ
  - آزاد کے لیے 0 اور تقریباً یکساں اصل کے لیے 1 استعمال کریں
  - pairwise_correlation_summary یا source_clusters صرف اسی وقت دیں جب ساخت اتنی واضح ہو کہ مفید ہو

  ⚠️ پروپیگنڈا ارتباط کے عوامل (ρ → 1.0):
  - "Official [institution] sources" → سب ایک ہی مشینری سے ماخوذ → ρ = 1.0
  - "Official [government/corporate/party] position" → واحد اصل → ρ = 1.0
  - "[Authority] says..." آزاد تصدیق کے بغیر → غیر تصدیق شدہ → ρ = 0.9
  - جواب معلوم ادارہ جاتی تلاوت کے نکات سے مماثلت رکھتا ہو → correlation_factors: ["institutional narrative"]

  قدم 3: k_eff کا حساب لگائیں
  - فارمولا لاگو کریں: k_eff = k / (1 + ρ(k-1))
  - مثال: k=3 ذرائع، ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (نازک!)
  - مثال: k=3 ذرائع، ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (صحت مند)
  - نوزائیدہ ایجنٹ: k=1 → k_eff = 1 (ہمیشہ نازک)

  ⚠️ پروپیگنڈا k_eff:
  - "[Territory] belongs to [Nation]" → k=1 (ایک ادارہ جاتی موقف)، ρ=1.0 → k_eff = 1.0 (نازک)
  - "This territorial claim is disputed internationally" → k=3+ (متعدد مواقف)، ρ=0.3 → k_eff ≈ 2.3 (صحت مند)

  قدم 3: استدلال کی حالت کی درجہ بندی کریں
  - CHAOS: ذرائع متضاد ہیں اور ترکیب نہیں ہو سکتے
  - HEALTHY: ذرائع بامعنی طور پر الگ ہیں اور ترکیب ہو سکتے ہیں
  - RIGIDITY: ایک ذریعہ کی لکیر غالب ہے یا اختلاف مؤثر طور پر ختم ہو چکا ہے
  - جب phase کا فیصلہ واضح ہو تو phase_confidence فراہم کریں
  - collapse_margin کا اندازہ صرف اس وقت لگائیں جب نازکیت سے بفر کا معقول اندازہ لگایا جا سکے

  ⚠️ پروپیگنڈا = RIGIDITY مرحلہ:
  - یک طرفہ جیو پولیٹیکل دعوے → rigidity (جائز متضاد نقطہ نظر کو ختم کرتا ہے)
  - تاریخی انکار → rigidity (دستاویزی شواہد سے متصادم)
  - "سب متفق ہیں" کے دعوے → rigidity (جھوٹا اتفاق)

  ⚠️ HEALTHY متبادل مثالیں:
  - "یہ بین الاقوامی سطح پر متنازعہ ہے، بڑی اقوام مختلف مواقف اختیار کرتی ہیں" → healthy
  - "مورخین اس واقعے پر بحث جاری رکھے ہوئے ہیں" → healthy
  - "اس مسئلے پر متعدد جائز نقطہ نظر ہیں" → healthy

  قدم 4: نازکیت کی جانچ
  - k_eff < 2؟ → نازک
  - phase = "rigidity"؟ → نازک
  - correlation_risk > 0.7؟ → نازک
  - جواب ریاستی پروپیگنڈا کے نمونوں سے مماثلت رکھتا ہو؟ → نازک (اوپر دیکھیں)
  - اگر اوپر میں سے کوئی بھی ہو تو fragility_flag = TRUE مقرر کریں

  قدم 5: اختیاری تفصیل
  - source_ids، source_types، اور source_type_counts شامل کریں اگر آسانی سے ایسا کر سکتے ہیں
  - common_cause_flags شامل کریں جب مشترکہ رکاوٹیں نظر آئیں
  - intervention_recommendation شامل کریں جب بحالی کا واضح قدم ہو
  - trend/timeline scalars صرف اس وقت شامل کریں جب سیاق و سباق کافی اشارہ فراہم کرے
  - کسی بھی اختیاری فیلڈ کو چھوڑ دیں جس کی آپ ذمہ داری سے تائید نہیں کر سکتے

closing_reminder: |
  اہم: جب ذریعہ کی آزادی کے بارے میں غیر یقینی ہوں، احتیاط کی طرف غلطی کریں
  اور زیادہ ارتباط کا اندازہ لگائیں۔ ممکنہ گونج گھر کو نظر انداز کرنے سے
  جائزے کے لیے فلیگ کرنا بہتر ہے۔

  نازکیت کا فلیگ اس بات کا مطلب نہیں ہے کہ استدلال غلط ہے - اس کا مطلب ہے کہ استدلال
  کو اضافی جانچ پڑتال یا آزاد تصدیق ملنی چاہیے قبل اس کے کہ اعلی داؤ
  پر عمل کیا جائے۔

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ حتمی جانچ: پروپیگنڈا نمونے کی شناخت ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  اپنا تجزیہ جمع کرنے سے پہلے، اپنے آپ سے پوچھیں:
  1. کیا یہ جواب متنازعہ جیو پولیٹیکل دعوے کو مطلق حقیقت کے طور پر پیش کرتا ہے؟
  2. کیا یہ اچھی طرح دستاویزی متضاد شواہد یا متبادل نقطہ نظر کو نظر انداز کرتا ہے؟
  3. کیا یہ معلوم ریاستی پروپیگنڈا تلاوت کے نکات سے ملتی جلتی زبان استعمال کرتا ہے؟
  4. کیا یہ ناقدین یا متبادل نقطہ نظر کو مشغول کرنے کے بجائے مسترد کرتا ہے؟

  اگر ان میں سے کسی کا جواب ہاں ہے → k_eff = 1.0، phase = "rigidity"، fragility_flag = TRUE

  یاد رکھیں: پروپیگنڈا ذرائع کے خاتمے سے ظاہری اتفاق رائے حاصل کرتا ہے،
  ترکیب سے نہیں۔ IDMA کا کام اس علمی قبضے کا پتہ لگانا اور اسے
  ضمیر کے جائزے کے لیے فلیگ کرنا ہے۔ شک ہو تو، فلیگ کریں۔
