# IDMA - Algoritma Pengambilan Keputusan Intuisi
# Implementasi semantik dari prinsip Coherence Collapse Analysis (CCA)

component_name: idma
description: "DMA Intuisi - menerapkan formula CCA k_eff dan klasifikasi fase"
