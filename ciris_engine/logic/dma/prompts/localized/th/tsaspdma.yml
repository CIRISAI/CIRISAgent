response_format: 'ส่งคืนวัตถุ JSON แบบแบนด้วยฟิลด์เหล่านี้:

  - "selected_action": หนึ่งใน "TOOL", "SPEAK", "PONDER"

  - "reasoning": อธิบายการตัดสินใจของคุณรวมถึงข้อควรระวังที่คุณกำลังรับทราบ


  บวกฟิลด์เฉพาะการกระทำ (ใช้ชื่อฟิลด์ที่แน่นอนด้านล่าง):


  สำหรับการกระทำ TOOL (โหมดปกติ - เครื่องมือมีอยู่):

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  สำหรับการกระทำ TOOL (โหมดแก้ไข - ชื่อเครื่องมือผิด):

  {{"selected_action": "TOOL", "reasoning": "แก้ไขชื่อเครื่องมือให้ตรงกับเครื่องมือที่มี...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  สำหรับการกระทำ SPEAK:

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "ฉันต้องการให้ผู้ใช้ตอบ: ไฟไหน?"}}


  สำหรับการกระทำ PONDER:

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["นี่คือวิธีที่ถูกต้องหรือไม่?"]}}


  สำคัญ:

  - ใช้สคีมาพารามิเตอร์ข้างต้นเพื่อกำหนดพารามิเตอร์เครื่องมือที่ต้องการ

  - อนุมานค่าพารามิเตอร์จากเจตนาของผู้ใช้และบริบทการสนทนา

  - tool_parameters คือ dict ที่มีอาร์กิวเมนต์ของเครื่องมือ

  - ในโหมดแก้ไข: รวมฟิลด์ "tool_name" ด้วยชื่อที่แน่นอนจากรายการเครื่องมือที่มี

  - อย่าห่อในบลอกโค้ด markdown


  กฎภาษา:

  - ตอบสนองในภาษาที่ผู้ใช้ต้องการ (ตรวจสอบโปรไฟล์ผู้ใช้)

  - เนื้อหาทั้งหมด (reasoning, speak_content, ponder_questions) ควรอยู่ในภาษาของผู้ใช้

  - คีย์ JSON และชื่อการกระทำต้องยังคงเป็นภาษาอังกฤษ (เช่น "selected_action": "TOOL", "reasoning", "tool_parameters")

  - ตัวอย่าง: {{"selected_action": "SPEAK", "reasoning": "需要用户澄清", "speak_content": "请问您想控制哪个灯？"}} - เนื้อหาจีน, คีย์/การกระทำอังกฤษ

  '
tool_correction_section: "=== TOOL CORRECTION MODE ===\n\nASPDMA เลือกเครื่องมือ '{{requested_tool}}' แต่เครื่องมือนี้ไม่มีอยู่\n\nงานของคุณ: ค้นหาเครื่องมือที่ถูกต้องจากรายการเครื่องมือที่มีที่ตรงกับ\nเจตนาของผู้ใช้ หรือใช้ SPEAK/PONDER หากไม่มีเครื่องมือที่เหมาะสม\n\nเครื่องมือที่มี:\n{{available_tools_list}}\n\nคำแนะนำ:\n1. วิเคราะห์เจตนาต้นฉบับของผู้ใช้จากเนื้อหาความคิด\n2. ตรวจสอบเครื่องมือที่มีข้างต้น - ค้นหาเครื่องมือที่ตรงกับเจตนา\n3. หากคุณพบเครื่องมือที่ตรงกัน:\n   - ส่งคืนการกระทำ TOOL ด้วย \"tool_name\" ที่ตั้งเป็นชื่อที่แน่นอนจากรายการ\n   - กรอก \"tool_parameters\" ที่เหมาะสมตามสคีมาของเครื่องมือ\n4. หากเครื่องมือหลายตัวอาจตรงกัน:\n   - ส่งคืน SPEAK เพื่อถามผู้ใช้ว่าต้องการความสามารถเฉพาะใด\n5. หากไม่มีเครื่องมือตรงกับเจตนา:\n   - ส่งคืน PONDER เพื่อพิจารณาวิธีการใหม่โดยสิ้นเชิง\n\nสำคัญมาก: ฟิลด์ \"tool_name\" ต้องตรงกันอย่างแน่นอนจากรายการเครื่องมือที่มีข้างต้น\n"
evaluation_steps: 'ขั้นตอน 1: อ่านเอกสาร

  - ตรวจสอบ quick_start, detailed_instructions, examples

  - จดบันทึกข้อควรระวังที่ใช้กับกรณีการใช้งานนี้

  - ตรวจสอบว่า when_to_use ตรงกับงานหรือไม่


  ขั้นตอน 2: ประเมินการเลือกของ ASPDMA

  - พารามิเตอร์ถูกต้องตามเอกสารหรือไม่?

  - ตัวอย่างแนะนำการจัดรูปแบบพารามิเตอร์ที่ดีกว่าหรือไม่?

  - มีพารามิเตอร์ที่ต้องการที่คลุมเครือหรือไม่?


  ขั้นตอน 3: ตรวจสอบข้อควรระวัง

  - ข้อควรระวังใดใช้กับการใช้งานเฉพาะนี้หรือไม่?

  - ผู้ใช้จะคาดหวังพฤติกรรมนี้หรือไม่?

  - ควรเตือนผู้ใช้หรือถามก่อนหรือไม่?


  ขั้นตอน 4: ตัดสินใจการกระทำ

  - TOOL: ยืนยันหรือปรับแต่ง รับทราบข้อควรระวัง

  - SPEAK: ขอคำชี้แจงเฉพาะ

  - PONDER: อธิบายว่าทำไมต้องพิจารณาใหม่

  '
closing_reminder: 'สำคัญ: บทบาทของคุณคือการจับปัญหาที่ ASPDMA ไม่เห็นโดยไม่มี

  เอกสารฉบับเต็ม หากการเลือกเครื่องมือดูดี ให้ยืนยันอย่างรวดเร็ว

  ใช้ SPEAK หรือ PONDER เฉพาะเมื่อเอกสารเปิดเผยข้อกังวลที่แท้จริง


  เมื่อเลือก SPEAK ให้ระบุเฉพาะ: "ฉันต้องการให้ผู้ใช้ตอบ: [คำถาม]"

  เมื่อเลือก PONDER ให้อธิบาย: "เครื่องมือนี้ไม่สามารถ X เพราะ Y พิจารณา Z"

  เมื่อเลือก TOOL ให้รับทราบ: "ดำเนินการด้วยความตระหนักในข้อควรระวัง X"

  '
