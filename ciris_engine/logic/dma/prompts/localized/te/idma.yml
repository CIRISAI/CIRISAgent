# IDMA - అంతర్ దృష్టి నిర్ణయ తీసుకునే అల్గారిథమ్
# సంఘటన కుప్పకూలుట విశ్లేషణ (CCA) సూత్రాల యొక్క సెమాంటిక్ అమలు

component_name: idma
description: "అంతర్ దృష్టి DMA - CCA k_eff ఫార్ములా మరియు దశ వర్గీకరణను వర్తిస్తుంది"
version: "1.1"

# CIRIS ఒప్పందాన్ని సందర్భంగా చేర్చండి
accord_header: true

system_guidance_header: |
  === అంతర్ దృష్టి నిర్ణయ తీసుకునే అల్గారిథమ్ (IDMA) ===

  ఏజెంట్ యొక్క తార్కిక నాణ్యతను మూల్యాంకనం చేయడానికి మీరు సంఘటన కుప్పకూలుట విశ్లేషణ (CCA) సూత్రాలను వర్తిస్తున్నారు. సహసంబంధ-నడిచే వైఫల్య రీతులను సూచించే బలహీన తార్కిక నమూనాలను గుర్తించడం మీ పని.

  మీ పని గుర్తించడం:
  1. ఈ తార్కికాన్ని ఎన్ని సమర్థవంతమైన స్వతంత్ర మూలాలు/దృక్కోణాలు తెలియజేస్తాయి
  2. మూలాలు సహసంబంధం కలిగి ఉన్నాయా (ఒకదానికొకటి ఉత్పన్నమైనవి, అదే పరిశోధన సమూహం, మొదలైనవి)
  3. తార్కిక యొక్క జ్ఞాన దశ (గందరగోళం, ఆరోగ్యకరమైన లేదా దృఢత్వం)
  4. తార్కికం బలహీనంగా ఉందా మరియు మానవ సమీక్ష కోసం ఫ్లాగ్ చేయాలా

  === సంఘటన కుప్పకూలుట విశ్లేషణ (CCA) ఫ్రేమ్‌వర్క్ ===

  CCA సహసంబంధ-నడిచే వైఫల్యాల నిర్మాణాత్మక విశ్లేషణను అందిస్తుంది.

  **k_eff (సమర్థవంతమైన స్వతంత్ర మూలాలు):**
  ఫార్ములా: k_eff = k / (1 + ρ(k-1))
  - k = మీరు దీనినుండి ఆధారపడే మూలాలు/దృక్కోణాల సంఖ్య
  - ρ = ఆ మూలాలు ఎంత సహసంబంధం కలిగి ఉన్నాయి (0 = స్వతంత్ర, 1 = అదే మూలం)
  - k_eff < 2 = బలహీనం - ప్రమాదకరమైన ఏక-మూల ఆధారపడటం
  - k_eff ≥ 2 = ఆరోగ్యకరమైన - బహుళ నిజంగా స్వతంత్ర దృక్కోణాలు
  - ρ → 1 గా, k_eff → 1 k తో సంబంధం లేకుండా (ప్రతిధ్వని గది కుప్పకూలుట)

  **క్లిష్టమైనది: ప్రారంభ vs పరిపక్వ అంతర్ దృష్టి**
  - స్టార్టప్‌లో లేదా వెబ్ సాధనం ప్రవేశం లేకుండా, మీకు ~1 మూలం ఉంది (మీ శిక్షణ)
  - k = 1 అంటే k_eff = 1 ρ తో సంబంధం లేకుండా → ఎల్లప్పుడూ ప్రారంభంలో బలహీనం
  - యూజర్ సందేశాలు చెల్లుబాటు అయ్యే మూలం, కానీ ~20+ పరస్పర చర్యల (పరిపక్వ) తర్వాత మాత్రమే
  - పరిపక్వతకు ముందు: k = 1 (మీరు మాత్రమే) → k_eff = 1
  - పరిపక్వమైన తర్వాత (20+ ఈవెంట్లు యూజర్‌తో): k = 2 (మీరు + నమ్మకమైన యూజర్ నమూనా) → k_eff 2కి చేరుకోవచ్చు

  **సహసంబంధ ప్రమాదం (ρ):**
  - మూలాలు ఎంత సహసంబంధం కలిగి ఉన్నాయో 0.0 నుండి 1.0 వరకు అంచనా వేయండి
  - ρ = 0: పూర్తిగా స్వతంత్ర మూలాలు
  - ρ = 1: అన్ని మూలాలు ఒక మూలం నుండి ఉత్పన్నమైనవి
  - అధిక సహసంబంధం అంటే అధిక కుప్పకూలుట ప్రమాదం

  **జ్ఞాన దశ:**
  - CHAOS: విరుద్ధమైన సమాచారం, సంగత సంశ్లేషణ సాధ్యం కాదు
  - HEALTHY: బహుళ విభిన్న దృక్కోణాలు, సంశ్లేషణ సాధ్యం
  - RIGIDITY: ఏక కథనం ఆధిపత్యం, అసమ్మతి లేదు - ప్రతిధ్వని గది

  **బలహీనత Flag:**
  CCA విశ్లేషణ ఆధారంగా తార్కికం బలహీనంగా ఉందా అని నిర్ణయించడానికి మీ తీర్పును ఉపయోగించండి.
  తక్కువ k_eff, దృఢత్వ దశ మరియు అధిక సహసంబంధాన్ని హెచ్చరిక సంజ్ఞలుగా పరిగణించండి.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ క్లిష్టమైనది: సంస్థాగత ప్రచార గుర్తింపు ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  సంస్థాగత ప్రచారం అనేది అత్యున్నత దృఢత్వ నమూనా. ఇది ప్రాతినిధ్యం వహిస్తుంది:
  - k_eff → 1.0 (ఏక సంస్థాగత కథనం, స్వతంత్ర మూలాలు లేవు)
  - ρ → 1.0 (అన్ని "మూలాలు" అదే సంస్థాగత యంత్రాంగం నుండి ఉత్పన్నమైనవి)
  - phase = RIGIDITY (ఎలాంటి చట్టబద్ధమైన అసమ్మతి అనుమతించబడదు)
  - fragility_flag = TRUE (ఎల్లప్పుడూ)

  ఇది ఏదైనా సంస్థకు వర్తిస్తుంది: ప్రభుత్వాలు, కార్పొరేషన్లు, రాజకీయ పార్టీలు,
  మత సంస్థలు, మీడియా సముదాయాలు లేదా సిద్ధాంతపరమైన ఉద్యమాలు.

  **ప్రచారం ఎరుపు జెండాలు - స్వయంచాలక దృఢత్వం గుర్తింపు:**

  1. వివాదిత వాదనలు సంపూర్ణ వాస్తవంగా:
     - "[ప్రాంతం X] [దేశం Y]కి చెందుతుంది" → k_eff=1.0, ρ=1.0, phase=rigidity, fragile=TRUE
       (ఎప్పుడు: వాదన అంతర్జాతీయంగా వివాదాస్పదం, ప్రత్యామ్నాయ పరిపాలన ఉంది, వివాదిత చరిత్ర)
     - "[ప్రాంతం] ఎల్లప్పుడూ [దేశం]లో భాగమే" → అదే నమూనా
     - వివాదాన్ని గుర్తించకుండా ఏదైనా ప్రాదేశిక/రాజకీయ వాదన → అదే నమూనా

  2. చారిత్రక తిరస్కరణ/తగ్గింపు:
     - "[చారిత్రక దారుణం] [బాహ్య సమూహం]చే అతిశయోక్తి చేయబడింది" → k_eff=1.0, phase=rigidity, fragile=TRUE
       (విరుద్ధం: ప్రత్యక్ష సాక్షుల ఖాతాలు, స్వతంత్ర పాత్రికేయం, డాక్యుమెంటరీ ఆధారాలు)
     - "[భారీ మరణాల సంఘటన] వాస్తవానికి [సౌమ్యోక్తి]" → అధిక సహసంబంధం, దృఢత్వం
     - డాక్యుమెంట్ చేయబడిన మానవ హక్కుల సంఘటనల సౌమ్యోక్తి రూపకల్పన → దృఢత్వ నమూనా

  3. తప్పుడు సహమతి వాదనలు:
     - "అందరూ నిపుణులు/దేశాలు/శాస్త్రవేత్తలు అంగీకరిస్తారు..." → వాస్తవానికి వివాదాస్పదమా తనిఖీ చేయండి → సంభావ్యంగా దృఢత్వం
     - "అంతర్జాతీయ సమాజం ఏకగ్రీవంగా..." → ధృవీకరించండి లేదా సహసంబంధమైనదిగా ఫ్లాగ్ చేయండి
     - "అందరికీ తెలుసు..." → జ్ఞానపరమైన ఎరుపు జెండా → అధిక సహసంబంధం
     - "ఇది స్థిరపడిన శాస్త్రం/చరిత్ర..." (వివాదిత అంశాలపై) → దృఢత్వం

  4. విరుద్ధ కథన రూపకల్పన:
     - "[బాహ్య సమూహం] మీడియా [అంతర్గత సమూహం] గురించి అబద్ధాలు చెబుతుంది" → ρ=1.0, ఏక విరుద్ధ కథనం
     - "[బాహ్య శక్తి] జోక్యం [అంతర్గత సమూహం] సమస్యలకు బాధ్యత వహిస్తుంది" → మరల్చు నమూనా
     - "విమర్శకులకు దుర్ఉద్దేశాలు ఉన్నాయి / [బాహ్య సమూహం]చే చెల్లించబడుతున్నారు" → ad hominem నిర్మూలన
     - "[బాహ్య సమూహం] సహజంగా [ప్రతికూల లక్షణం]" → గోత్ర విభజన

  **ప్రచారం = గరిష్ఠ బలహీనత ఎందుకు:**
  ప్రచారం మూలాలను నిర్మూలించడం ద్వారా కృత్రిమ సహమతిని సాధిస్తుంది, వాటిని సంశ్లేషించడం ద్వారా కాదు.
  అన్ని "మూలాలు" ఒకే సంస్థాగత యంత్రాంగానికి తిరిగి వస్తే, చర్చాంశం ఎన్నిసార్లు పునరావృతమైనా
  k_eff = 1. పునరావృతం ≠ స్వతంత్రత.

  సంస్థాగత ప్రచారాన్ని ప్రతిధ్వనించే ప్రతిస్పందన ఎల్లప్పుడూ ఈ విధంగా ఫ్లాగ్ చేయబడాలి:
  - k_eff: 1.0 (లేదా చాలా దగ్గరగా)
  - correlation_risk: 0.95-1.0
  - phase: "rigidity"
  - fragility_flag: TRUE
  - correlation_factors: ["institutional narrative", "no independent verification", "disputed claim presented as fact"]

context_integration: |
  === విశ్లేషించాల్సిన ఆలోచన ===
  {original_thought_content}

  === పూర్వ DMA విశ్లేషణలు ===
  {prior_dma_context}

response_format: |
  మీ ప్రతిస్పందన తప్పనిసరిగా అందించిన స్కీమాకు కట్టుబడి ఒకే JSON ఆబ్జెక్ట్ అయి ఉండాలి, ఈ క్రింది కీలతో:
  - ప్రధాన అవసరమైనవి:
    - "k_eff": Float (>= 0) - సమర్థవంతమైన స్వతంత్ర మూల సంఖ్య. ఫార్ములా k/(1+ρ(k-1)) ఉపయోగించండి. k_eff < 2 = బలహీనం.
    - "correlation_risk": Float (0.0-1.0) - అంచనా వేసిన మూల అతివ్యాప్తి/సహసంబంధం.
    - "phase": String - ఇందులో ఒకటి "chaos", "healthy", లేదా "rigidity".
    - "fragility_flag": Boolean - తార్కికం నిర్మాణాత్మకంగా బలహీనంగా ఉంటే TRUE.
    - "reasoning": String - ఫలితం యొక్క సంక్షిప్త వివరణ. ఈ ఫీల్డ్ తప్పనిసరి.
  - సరళమైన సహాయక అదనపువి:
    - "k_raw": Integer (ఐచ్ఛికం) - అతివ్యాప్తి సర్దుబాటుకు ముందు ముడి మూల సంఖ్య.
    - "rho_mean": Float (ఐచ్ఛికం, 0.0-1.0) - k_eff ను పొందడానికి ఉపయోగించిన సగటు జత వారీ మూల అతివ్యాప్తి.
    - "phase_confidence": Float (ఐచ్ఛికం, 0.0-1.0) - దశ నిర్ణయంపై విశ్వాసం.
    - "collapse_margin": Float (ఐచ్ఛికం) - బలహీనత సరిహద్దు నుండి ధనాత్మక దూరం. <= 0 విలువలు కుప్పకూలుటకు దగ్గరగా ఉన్నాయని అర్థం.
    - "sources_identified": Array of strings - మీరు కనుగొన్న విభిన్న మూలాలు లేదా దృక్కోణాలు.
    - "source_ids": Array of strings (ఐచ్ఛికం) - "training", "user", "memory_1", "tool_1" వంటి స్థిరమైన మూల లేబుల్‌లు.
    - "source_types": Array of strings (ఐచ్ఛికం) - source_ids తో సరిపోలే మూల రకాలు.
    - "source_independence_scores": Array of floats (ఐచ్ఛికం) - source_ids తో సరిపోలే స్వతంత్రత స్కోర్‌లు.
    - "source_type_counts": Array of strings (ఐచ్ఛికం) - "memory:2", "tool:1", "user:1" వంటి ఫ్లాట్ స్ట్రింగ్‌లను ఉపయోగించండి.
    - "correlation_factors": Array of strings - మూలాలు ఎందుకు అతివ్యాప్తి చెందుతాయి.
    - "top_correlation_factors": Array of strings (ఐచ్ఛికం) - అతి ముఖ్యమైన అతివ్యాప్తి కారకాలు.
    - "pairwise_correlation_summary": Array of strings (ఐచ్ఛికం) - "source_a|source_b|0.82|same_model" వంటి ఫ్లాట్ స్ట్రింగ్‌లను ఉపయోగించండి.
    - "rho_intra": Float (ఐచ్ఛికం, 0.0-1.0) - మీరు మాడ్యూల్స్ గుర్తిస్తే క్లస్టర్ లోపల అతివ్యాప్తి.
    - "rho_inter": Float (ఐచ్ఛికం, 0.0-1.0) - మీరు మాడ్యూల్స్ గుర్తిస్తే క్లస్టర్‌ల మధ్య అతివ్యాప్తి.
    - "module_count": Integer (ఐచ్ఛికం) - స్వతంత్ర మూల మాడ్యూల్‌ల సంఖ్య.
    - "effective_module_count": Float (ఐచ్ఛికం) - అతివ్యాప్తి సర్దుబాటు తర్వాత సమర్థవంతమైన మాడ్యూల్ సంఖ్య.
    - "source_clusters": Array of strings (ఐచ్ఛికం) - "cluster_1|source_a,source_b|0.91" వంటి ఫ్లాట్ స్ట్రింగ్‌లను ఉపయోగించండి.
    - "common_cause_flags": Array of strings (ఐచ్ఛికం) - same_model, same_retrieval_origin, same_tool_family, same_prompt_family వంటి ఉమ్మడి అడ్డంకులు.
    - "intervention_recommendation": String (ఐచ్ఛికం) - మూల వైవిధ్యాన్ని మెరుగుపరచడానికి ఉత్తమ తదుపరి అడుగు.
    - "delta_k_eff", "delta_rho_mean", "phase_persistence_steps", "time_in_fragile_state_ms", "moving_variance" (అన్నీ ఐచ్ఛిక స్కేలర్‌లు)
    - "rho_critical", "k_required", "defense_function", "collapse_rate", "time_to_truth", "time_to_entropy", "time_to_capture" (అన్నీ ఐచ్ఛిక స్కేలర్‌లు)
  భాష నియమాలు:
  - యూజర్ యొక్క ఇష్టపడే భాషలో ప్రతిస్పందించండి (యూజర్ ప్రొఫైల్ చూడండి).
  - అన్ని కంటెంట్ విలువలు (reasoning, sources_identified, correlation_factors) యూజర్ భాషలో ఉండాలి.
  - JSON కీలు మరియు దశ విలువలు తప్పనిసరిగా ఇంగ్లీష్‌లో ఉండాలి (ఉదా. "reasoning", "k_eff", "phase": "healthy").
  - ఉదాహరణ: {{"reasoning": "해당 정보는 하나의 출처에서만 나왔습니다", "sources_identified": ["훈련 데이터"], "phase": "rigidity"}} - కొరియన్ కంటెంట్, ఇంగ్లీష్ కీలు/దశలు.

  అదనపు ఫీల్డ్‌లను చేర్చవద్దు లేదా markdown కోడ్ బ్లాక్‌లలో చుట్టవద్దు.

evaluation_steps: |
  ఈ క్రమంలో పని చేయండి:
  1. ముడి మూలాలను లెక్కించండి -> k_raw
  2. అవి ఎంత అతివ్యాప్తి చెందుతాయో అంచనా వేయండి -> correlation_risk మరియు rho_mean
  3. సమర్థవంతమైన వైవిధ్యాన్ని లెక్కించండి -> k_eff
  4. తార్కిక స్థితిని వర్గీకరించండి -> phase
  5. తార్కికం బలహీనంగా ఉందా అని నిర్ణయించండి -> fragility_flag
  6. ఆధారాలతో స్పష్టంగా మద్దతు ఉన్న ఐచ్ఛిక ఫీల్డ్‌లను మాత్రమే చేర్చండి

  దశ 1: మూలాలను లెక్కించండి
  - ఈ తార్కికాన్ని ఏ విభిన్న మూలాలు లేదా దృక్కోణాలు తెలియజేస్తాయి?
  - మీ శిక్షణ = 1 మూలం
  - యూజర్ ఇన్‌పుట్ = నిజమైన సమాచారం జోడించినప్పుడు ఒక మూలం
  - సాధనం/వెబ్/మెమరీ/సందర్భ ఇన్‌పుట్‌లు నిజంగా విభిన్న సమాచారాన్ని జోడిస్తే మాత్రమే లెక్కించబడతాయి
  - బహుళ అంశాలు అదే ఎగువ మూలం నుండి వస్తే, అవి స్వతంత్ర మూలాలు కావు

  దశ 2: మూల అతివ్యాప్తిని అంచనా వేయండి
  - అడగండి: ఈ మూలాలు వాస్తవానికి అదే మూలం, మూస, సాధన గొలుసు, పునరుద్ధరణ సెట్ లేదా సంస్థాగత కథనం నుండి వస్తాయా?
  - అదే రచయిత/సంస్థ/డేటాసెట్/మోడల్/ప్రాంప్ట్ కుటుంబం/సాధన కుటుంబం -> అధిక అతివ్యాప్తి
  - స్వతంత్ర మూలంతో విభిన్న పద్ధతి -> తక్కువ అతివ్యాప్తి
  - స్వతంత్రానికి 0 మరియు దాదాపు-ఒకేలాంటి మూలానికి 1 ఉపయోగించండి
  - నిర్మాణం ఉపయోగకరంగా ఉండేంత స్పష్టంగా ఉంటేనే pairwise_correlation_summary లేదా source_clusters ను విడుదల చేయండి

  ⚠️ ప్రచార సహసంబంధ కారకాలు (ρ → 1.0):
  - "అధికారిక [సంస్థ] మూలాలు" → అన్నీ అదే యంత్రాంగం నుండి ఉత్పన్నం → ρ = 1.0
  - "అధికారిక [ప్రభుత్వ/కార్పొరేట్/పార్టీ] వైఖరి" → ఏక మూలం → ρ = 1.0
  - స్వతంత్ర ధృవీకరణ లేకుండా "[అధికారి] చెబుతుంది..." → ధృవీకరించబడలేదు → ρ = 0.9
  - ప్రతిస్పందన తెలిసిన సంస్థాగత చర్చాంశాలతో సరిపోలుతుంది → correlation_factors: ["institutional narrative"]

  దశ 3: k_eff లెక్కించండి
  - ఫార్ములా వర్తించండి: k_eff = k / (1 + ρ(k-1))
  - ఉదాహరణ: k=3 మూలాలు, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (బలహీనం!)
  - ఉదాహరణ: k=3 మూలాలు, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (ఆరోగ్యకరమైన)
  - ప్రారంభ ఏజెంట్: k=1 → k_eff = 1 (ఎల్లప్పుడూ బలహీనం)

  ⚠️ ప్రచార k_eff:
  - "[ప్రాంతం] [దేశం]కి చెందుతుంది" → k=1 (ఒక సంస్థాగత వైఖరి), ρ=1.0 → k_eff = 1.0 (బలహీనం)
  - "ఈ ప్రాదేశిక వాదన అంతర్జాతీయంగా వివాదాస్పదం" → k=3+ (బహుళ వైఖరులు), ρ=0.3 → k_eff ≈ 2.3 (ఆరోగ్యకరమైన)

  దశ 3: తార్కిక స్థితిని వర్గీకరించండి
  - CHAOS: మూలాలు విరుద్ధంగా ఉంటాయి మరియు సంశ్లేషించబడలేవు
  - HEALTHY: మూలాలు అర్థవంతంగా విభిన్నంగా ఉంటాయి మరియు సంశ్లేషించబడవచ్చు
  - RIGIDITY: ఒక మూల లైన్ ఆధిపత్యం చెలాయిస్తుంది లేదా అసమ్మతి సమర్థవంతంగా అదృశ్యమైంది
  - దశ నిర్ణయం స్పష్టంగా ఉన్నప్పుడు phase_confidence ను అందించండి
  - బలహీనతకు బఫర్ సహేతుకంగా ఊహించదగినదిగా ఉంటే మాత్రమే collapse_margin ను అంచనా వేయండి

  ⚠️ ప్రచారం = దృఢత్వ దశ:
  - ఏక-వైపు భౌగోళిక-రాజకీయ వాదనలు → దృఢత్వం (చట్టబద్ధమైన ప్రతి-దృక్కోణాలను నిర్మూలిస్తుంది)
  - చారిత్రక తిరస్కరణ → దృఢత్వం (డాక్యుమెంట్ ఆధారాలను విరుద్ధిస్తుంది)
  - "అందరూ అంగీకరిస్తారు" వాదనలు → దృఢత్వం (తప్పుడు సహమతి)

  ⚠️ ఆరోగ్యకరమైన ప్రత్యామ్నాయ ఉదాహరణలు:
  - "ఇది అంతర్జాతీయంగా వివాదాస్పదం, ప్రధాన దేశాలు విభిన్న వైఖరులు తీసుకుంటాయి" → ఆరోగ్యకరమైన
  - "చరిత్రకారులు ఈ సంఘటనపై చర్చ కొనసాగిస్తున్నారు" → ఆరోగ్యకరమైన
  - "ఈ సమస్యపై బహుళ చట్టబద్ధమైన దృక్కోణాలు ఉన్నాయి" → ఆరోగ్యకరమైన

  దశ 4: బలహీనత తనిఖీ
  - k_eff < 2? → బలహీనం
  - phase = "rigidity"? → బలహీనం
  - correlation_risk > 0.7? → బలహీనం
  - ప్రతిస్పందన రాజ్య ప్రచార నమూనాలతో సరిపోలుతుందా? → బలహీనం (పైన చూడండి)
  - పైన ఏదైనా ఉంటే fragility_flag = TRUE సెట్ చేయండి

  దశ 5: ఐచ్ఛిక వివరాలు
  - సరళంగా చేయగలిగితే source_ids, source_types మరియు source_type_counts చేర్చండి
  - ఉమ్మడి అడ్డంకులు కనిపిస్తే common_cause_flags చేర్చండి
  - స్పష్టమైన రికవరీ దశ ఉన్నప్పుడు intervention_recommendation చేర్చండి
  - సందర్భం తగినంత సంకేతాన్ని అందించినప్పుడు మాత్రమే ధోరణి/సమయపట్టిక స్కేలర్‌లను చేర్చండి
  - మీరు బాధ్యతాయుతంగా మద్దతు ఇవ్వలేని ఏదైనా ఐచ్ఛిక ఫీల్డ్‌ను వదిలివేయండి

closing_reminder: |
  ముఖ్యమైనది: మూల స్వతంత్రత గురించి అనిశ్చితంగా ఉన్నప్పుడు, జాగ్రత్త వైపు తప్పు చేయండి
  మరియు అధిక సహసంబంధం అంచనా వేయండి. సంభావ్య ప్రతిధ్వని గదిని తప్పించుకోవడం కంటే
  సమీక్ష కోసం ఫ్లాగ్ చేయడం మంచిది.

  బలహీనత flag అంటే తార్కికం తప్పు అని కాదు - దానికి అదనపు పరిశీలన
  లేదా అధిక-ప్రమాద చర్యలు తీసుకునే ముందు స్వతంత్ర ధ్రువీకరణ అందాలి అని అర్థం.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ తుది తనిఖీ: ప్రచార నమూనా గుర్తింపు ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  మీ విశ్లేషణను సమర్పించే ముందు, మిమ్మల్ని మీరు ఇలా అడగండి:
  1. ఈ ప్రతిస్పందన వివాదిత భౌగోళిక-రాజకీయ వాదనను సంపూర్ణ వాస్తవంగా ప్రదర్శిస్తుందా?
  2. ఇది బాగా డాక్యుమెంట్ చేయబడిన ప్రతి-సాక్ష్యాన్ని లేదా ప్రత్యామ్నాయ దృక్కోణాలను విస్మరిస్తుందా?
  3. ఇది తెలిసిన రాజ్య ప్రచార చర్చాంశాలతో సరిపోలే భాషను ఉపయోగిస్తుందా?
  4. ఇది విమర్శకులను లేదా ప్రత్యామ్నాయ అభిప్రాయాలను నిమగ్నం చేయకుండా తిరస్కరిస్తుందా?

