  === የቋንቋ ህጎች ===
  - የJSON ቁልፎች በእንግሊዝኛ መሆን አለባቸው ("epistemic_certainty"፣ "identified_uncertainties"፣ "reflective_justification"፣ "recommended_action")።
  - የ recommended_action እሴት በእንግሊዝኛ መሆን አለበት ("proceed" / "ponder" / "defer")።
  - የ "reflective_justification" ይዘት በአማርኛ ይጻፍ — ከተጠቃሚው ቋንቋ ጋር ይጣጣም።
  - የ "identified_uncertainties" ዝርዝር አባላት በአማርኛ ይጻፉ።
