# Pre-commit hooks for CIRIS code quality
# Install: pip install pre-commit
# Setup: pre-commit install
# Manual run: pre-commit run --all-files

repos:
  # Grace - Smart gatekeeper (blocks critical, reports quality)
  - repo: local
    hooks:
      - id: grace-gatekeeper
        name: Grace Smart Gatekeeper
        entry: python tools/dev/grace_precommit.py
        language: python
        pass_filenames: false
        always_run: true
        verbose: true
        stages: [pre-commit]

  # Formatters - Always run, auto-fix
  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.12
        args: ['--line-length=120']
        # Never fail, just fix
        always_run: true
        fail_fast: false

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile', 'black', '--line-length', '120']
        # Never fail, just fix
        always_run: true
        fail_fast: false

  # Basic hygiene - Always fix
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ['--fix=lf']
      # Critical checks that should block
      - id: check-merge-conflict
      - id: detect-private-key
      # Block files >250 KB. Build artifacts and pre-built binaries do NOT
      # belong in git; distribute them via GitHub Releases or fetch on
      # install (see tools/update_ciris_verify.py for the canonical pattern).
      # Intentionally tracked larger files (allowlisted because there is no
      # better distribution channel today):
      #   - ciris_engine/data/geo/cities.db (~6 MB) — geo typeahead, shipped in pip wheel
      #   - client/androidApp/wheels/*.whl (~2 MB each) — Android-specific pydantic_core
      #     builds, not available from PyPI
      # If you genuinely need to commit a file larger than 250 KB, justify it
      # in the PR description first; do NOT bypass this hook with --no-verify.
      - id: check-added-large-files
        args: ['--maxkb=250']
        # Honor the allowlist documented in the comment above. Without this
        # exclude, the wheel-version-bump path (e.g.,
        # pydantic_core-2.23.4-...whl → 2.24.0-...whl) is a "new file" to
        # the hook and gets rejected — forcing developers to bypass with
        # --no-verify, which directly contradicts the policy stated above.
        # Adding new entries to this list requires the same justification
        # standard as bypassing the hook would: name the specific file,
        # explain why there is no better distribution channel today, and
        # link to the discussion in the PR description.
        exclude: |
          (?x)^(
              ciris_engine/data/geo/cities\.db
            | client/androidApp/wheels/.*\.whl
          )$

  # Quality checks - Run but don't block (Grace will report)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: ['--fix']
        # Don't exit non-zero, let Grace handle reporting
        always_run: false
        stages: [manual]

  # Mypy - Type checking (BLOCKING - catches errors before CI)
  - repo: local
    hooks:
      - id: mypy-check
        name: mypy (type checking)
        entry: python tools/dev/mypy_precommit.py
        language: python
        types: [python]
        files: '^(ciris_engine|ciris_adapters)/.*\.py$'
        exclude: '^(tests|tools|scripts|docs|main\.py|grace\.py)'
        pass_filenames: true
        always_run: true
        stages: [pre-commit]
        verbose: true

  # Custom CIRIS checks - Informational only
  - repo: local
    hooks:
      # Dict[str, Any] audit - Informational
      - id: dict-any-audit
        name: Dict[str, Any] Audit (Info Only)
        entry: python tools/quality/audit_dict_any_usage.py
        language: python
        pass_filenames: false
        always_run: false
        stages: [manual]
        verbose: true

      # Version alignment - Blocks if constants are out of sync
      - id: version-alignment
        name: Version Alignment Check
        entry: python tools/dev/check_version_alignment.py
        language: python
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        verbose: true

      # Localization sync - Blocks if language files are out of sync
      - id: localization-sync
        name: Localization Sync Check
        entry: python tools/dev/check_localization_sync.py
        language: python
        pass_filenames: false
        files: '^localization/.*\.json$'
        always_run: false
        stages: [pre-commit]
        verbose: true

# Configuration
default_language_version:
  python: python3.12

# Files to exclude globally
exclude: |
  (?x)^(
    .*\.egg-info/.*|
    \.git/.*|
    \.mypy_cache/.*|
    \.pytest_cache/.*|
    __pycache__/.*|
    htmlcov/.*|
    build/.*|
    dist/.*|
    data/.*|
    logs/.*|
    .*\.db$
  )

# Stages configuration
default_stages: [pre-commit]
fail_fast: false  # Run all hooks even if one fails
