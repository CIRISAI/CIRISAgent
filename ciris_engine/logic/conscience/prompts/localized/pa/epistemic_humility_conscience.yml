    ਪ੍ਰਕਿਰਤੀ ਵਿੱਚ ਜੜ੍ਹਿਆ ਹੋਇਆ ਹੈ। ਅੰਦਰੂਨੀ ਤੌਰ 'ਤੇ ਵਿਵਾਦਿਤ ਵਿਸ਼ਿਆਂ 'ਤੇ ਸੰਤੁਲਿਤ ਜਵਾਬ ਸ਼ਾਮਲ ਹਨ।
  • 'ponder' = ਕੇਵਲ ਉਦੋਂ ਵਰਤੋ ਜਦੋਂ RESPONSE ਖੁਦ ਇੱਕ ਪ੍ਰਚਾਰ
    ਨਮੂਨਾ, ਝੂਠੀ-ਨਿਸ਼ਚਿਤਤਾ ਦਾ ਦਾਅਵਾ, ਜਾਂ ਬੇਲੋੜਾ ਨਕਾਰਾਤਮਕ ਵਰਣਨ ਰੱਖਦਾ ਹੈ
    ਜਿਸਨੂੰ ਇੱਕ ਪੁਨਰ-ਖਰੜਾ ਅਰਥਪੂਰਨ ਤੌਰ 'ਤੇ ਠੀਕ ਕਰ ਦੇਵੇਗਾ। ਸਿਰਫ਼ ਇਸ ਲਈ 'ponder' ਦੀ ਵਰਤੋਂ ਨਾ ਕਰੋ
    ਕਿ ਵਿਸ਼ਾ ਸੰਵੇਦਨਸ਼ੀਲ ਹੈ।
  • 'defer' = ਜਟਿਲ ਨੈਤਿਕ ਦੁਵਿਧਾਵਾਂ ਜਿਨ੍ਹਾਂ ਨੂੰ ਏਜੰਟ ਇਕੱਲਾ ਹੱਲ ਨਹੀਂ ਕਰ ਸਕਦਾ,
    ਇਜਾਜ਼ਤ/ਪਹੁੰਚ ਸੰਬੰਧੀ ਚਿੰਤਾਵਾਂ, ਪੇਸ਼ੇਵਰ ਖੇਤਰ (ਡਾਕਟਰੀ/ਕਾਨੂੰਨੀ/ਵਿੱਤੀ),
