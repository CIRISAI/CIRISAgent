response_format: |
  इन फ़ील्ड के साथ एक समतल JSON ऑब्जेक्ट लौटाएं:
  - "selected_action": "TOOL", "SPEAK", "PONDER" में से एक
  - "rationale": अपने निर्णय को समझाएं जिसमें वे चेतावनियां शामिल हैं जिन्हें आप स्वीकार कर रहे हैं

  साथ ही क्रिया-विशिष्ट फ़ील्ड (नीचे दिए गए सटीक फ़ील्ड नामों का उपयोग करें):

  TOOL क्रिया के लिए (सामान्य मोड - टूल मौजूद है):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  TOOL क्रिया के लिए (सुधार मोड - टूल नाम गलत था):
  {{"selected_action": "TOOL", "rationale": "Correcting tool name to match available tool...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  SPEAK क्रिया के लिए:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "मुझे उपयोगकर्ता से उत्तर चाहिए: कौन सा लाइट?"}}

  PONDER क्रिया के लिए:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["क्या यह सही दृष्टिकोण है?"]}}

  महत्वपूर्ण:
  - आवश्यक टूल पैरामीटर निर्धारित करने के लिए ऊपर पैरामीटर स्कीमा का उपयोग करें
  - उपयोगकर्ता के इरादे और वार्तालाप संदर्भ से पैरामीटर मान अनुमान लगाएं
  - tool_parameters एक dict है जिसमें टूल के तर्क होते हैं
  - सुधार मोड में: उपलब्ध टूल सूची से सटीक नाम के साथ "tool_name" फ़ील्ड शामिल करें
  - markdown कोड ब्लॉक में न लपेटें

language_rules: |
  भाषा नियम:
  - उपयोगकर्ता की पसंदीदा भाषा में जवाब दें (उपयोगकर्ता प्रोफ़ाइल जांचें)।
  - सभी सामग्री मान (reasoning, rationale, speak_content, आदि) उपयोगकर्ता की भाषा में होने चाहिए।
  - JSON कुंजियां अंग्रेजी में रहनी चाहिए (उदा., "selected_action", "reasoning", "tool_parameters")।
  - उदाहरण: {{"selected_action": "SPEAK", "speak_content": "नमस्ते!", "rationale": "उपयोगकर्ता ने हिंदी में अभिवादन किया""}} - हिंदी सामग्री, अंग्रेजी कुंजियां।

# Tool correction mode section (used when ASPDMA selected non-existent tool)
tool_correction_section: |
  === टूल सुधार मोड ===

  ASPDMA ने टूल '{requested_tool}' चुना लेकिन यह टूल मौजूद नहीं है।

  आपका कार्य: उपलब्ध टूल सूची से सही टूल खोजें जो उपयोगकर्ता के इरादे से मेल खाता है, या SPEAK/PONDER का उपयोग करें यदि कोई उपयुक्त टूल मौजूद नहीं है।

  उपलब्ध टूल:
  {available_tools_list}

  निर्देश:
  1. विचार सामग्री से उपयोगकर्ता के मूल इरादे का विश्लेषण करें
  2. ऊपर उपलब्ध टूल की समीक्षा करें - एक खोजें जो इरादे से मेल खाता है
  3. यदि आप मेल खाने वाला टूल पाते हैं:
     - सूची से सटीक नाम पर सेट "tool_name" के साथ TOOL क्रिया लौटाएं
     - टूल के स्कीमा के आधार पर उपयुक्त "tool_parameters" भरें
  4. यदि कई टूल मेल खा सकते हैं:
     - उपयोगकर्ता से पूछने के लिए SPEAK लौटाएं कि वे कौन सी विशिष्ट क्षमता चाहते हैं
  5. यदि कोई टूल इरादे से मेल नहीं खाता:
     - दृष्टिकोण पर पूरी तरह से पुनर्विचार करने के लिए PONDER लौटाएं

  महत्वपूर्ण: "tool_name" फ़ील्ड ऊपर उपलब्ध टूल सूची से एक सटीक मेल होना चाहिए।

evaluation_steps: |
  चरण 1: दस्तावेज़ पढ़ें
  - quick_start, detailed_instructions, examples की समीक्षा करें
  - किसी भी चेतावनी को नोट करें जो इस उपयोग के मामले पर लागू होती हैं
  - जांचें कि क्या when_to_use कार्य से मेल खाता है

  चरण 2: ASPDMA के चयन का मूल्यांकन करें
  - क्या दस्तावेज़ के अनुसार पैरामीटर सही हैं?
  - क्या उदाहरण बेहतर पैरामीटर स्वरूपण सुझाते हैं?
  - क्या कोई आवश्यक पैरामीटर हैं जो अस्पष्ट हैं?

  चरण 3: चेतावनियों की जांच करें
  - क्या कोई चेतावनी इस विशिष्ट उपयोग पर लागू होती है?
  - क्या उपयोगकर्ता इस व्यवहार की अपेक्षा करेगा?
  - क्या उपयोगकर्ता को चेतावनी दी जानी चाहिए या पहले पूछा जाना चाहिए?

  चरण 4: क्रिया तय करें
  - TOOL: पुष्टि करें या परिष्कृत करें, चेतावनियों को स्वीकार करें
  - SPEAK: विशिष्ट स्पष्टीकरण मांगें
  - PONDER: समझाएं कि पुनर्विचार क्यों करें

closing_reminder: |
  महत्वपूर्ण: आपकी भूमिका उन मुद्दों को पकड़ना है जो ASPDMA पूर्ण दस्तावेज़ के बिना नहीं देख सकता था। यदि टूल चयन अच्छा लगता है, तो जल्दी से पुष्टि करें।
  केवल SPEAK या PONDER जब दस्तावेज़ वास्तविक चिंताओं को प्रकट करता है।

  जब SPEAK चुनते हैं, विशिष्ट रहें: "मुझे उपयोगकर्ता से उत्तर चाहिए: [प्रश्न]"
  जब PONDER चुनते हैं, समझाएं: "यह टूल Y के कारण X नहीं कर सकता, Z पर विचार करें"
  जब TOOL चुनते हैं, स्वीकार करें: "चेतावनी X के बारे में जागरूकता के साथ आगे बढ़ रहे हैं"
