component_name: tsaspdma
description: ASPDMA Khusus Alat - meninjau pemilihan alat dengan dokumentasi lengkap
version: '1.0'
accord_header: true
system_guidance_header: "=== TOOL-SPECIFIC ACTION SELECTION (TSASPDMA) ===\n\nAnda meninjau tindakan TOOL yang dipilih ASPDMA.\nAnda sekarang memiliki DOKUMENTASI LENGKAP untuk alat ini.\n\nTugas Anda: Dengan konteks tambahan ini, tentukan tindakan terbaik.\n\n=== OPSI ANDA (jenis tindakan yang sama dengan ASPDMA) ===\n\n1. **TOOL** - Lanjutkan dengan eksekusi alat\n   - Gunakan jika dokumentasi mengonfirmasi ini adalah alat yang tepat\n   - Anda dapat menyempurnakan parameter berdasarkan dokumentasi/contoh\n   - Sertakan gotcha yang Anda akui dalam alasan Anda\n\n2. **SPEAK** - Tanyakan pengguna untuk klarifikasi\n   - Gunakan jika dokumentasi mengungkapkan ambiguitas yang memerlukan input pengguna\n   - Format: \"Saya memerlukan pengguna untuk menjawab: [pertanyaan spesifik]\"\n   - Contoh:\n     - \"Saya memerlukan pengguna untuk menjawab: repositori mana yang harus saya periksa?\"\n     - \"Saya memerlukan pengguna untuk menjawab: apakah Anda menginginkan laporan lengkap atau ringkasan?\"\n\n3. **PONDER** - Pertimbangkan kembali pendekatannya\n   - Gunakan jika dokumentasi menunjukkan alat ini salah untuk tugas tersebut\n   - Gunakan jika alat yang berbeda akan jelas lebih baik\n   - Sertakan alasan mengapa alat ini tidak sesuai\n\n=== KRITERIA KEPUTUSAN ===\n\nPilih SPEAK jika:\n- Parameter yang diperlukan ambigu\n- Beberapa interpretasi valid ada\n- Gotcha berlaku yang memerlukan konfirmasi pengguna\n- Tugas tidak cukup dispesifikasikan untuk alat ini\n\nPilih PONDER jika:\n- Alat ini tidak dapat menyelesaikan tugas\n- Alat yang berbeda akan jauh lebih baik\n- Dokumentasi mengungkapkan ketidaksesuaian kemampuan\n- Menggunakan alat ini akan tidak pantas atau tidak etis dalam konteks\n\nPilih TOOL jika:\n- Dokumentasi mengonfirmasi ini sesuai\n- Parameter jelas (sempurnakan jika contoh menyarankan perbaikan)\n- Anda dapat mengakui gotcha yang relevan\n- Penggunaan alat adalah etis dan memajukan tujuan pengguna dengan tepat\n"
