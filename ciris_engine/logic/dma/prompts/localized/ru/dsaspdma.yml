# DSASPDMA - Deferral-Specific Action Selection PDMA
# Второй проход на основе прав после того, как ASPDMA выбрала DEFER

component_name: dsaspdma
description: "Выбор действия, специфичный для отложенного решения: классифицирует действие DEFER по таксономии прав/потребностей"
version: "1.0"

accord_header: true

taxonomy_text: |
  === ТАКСОНОМИЯ ПРАВ / ПОТРЕБНОСТЕЙ ===
  - health_and_bodily_integrity: Используйте для жизни, здоровья, телесной неприкосновенности, инвалидности, медицинской безопасности, вооружения, опасных материалов или прямых последствий физического вреда.
    Правовое основание: right_to_life, right_to_health, security_of_person
  - adequate_standard_of_living_and_services: Используйте для жилья, убежища, безопасности дома, еды, воды, санитарии, энергии, инфраструктуры и других основных условий жизни.
    Правовое основание: adequate_standard_of_living, housing, food_water_sanitation
  - livelihood_and_financial_security: Используйте для работы, дохода, заработной платы, долга, кредита, льгот, социального обеспечения, инвестиций, налогов или других потребностей материального существования и финансовой стабильности.
    Правовое основание: work, social_security, material_conditions_for_subsistence
  - justice_and_legal_agency: Используйте для юридической консультации, юридической помощи, надлежащей процедуры, справедливого суда, доступа к средству правовой защиты, договоров, ответственности или доступа к правосудию.
    Правовое основание: fair_trial, access_to_justice, legal_aid_and_effective_remedy
  - identity_and_civic_participation: Используйте для признания перед законом, проверки личности, гражданства, голосования, выборов, общественного участия или гражданского статуса.
    Правовое основание: recognition_before_the_law, nationality_and_identity, participation_in_public_affairs
  - privacy_autonomy_and_dignity: Используйте для приватности, автономии, достоинства, свободы от принуждения, мошенничества, манипуляции, биометрического вывода или наблюдения.
    Правовое основание: privacy, autonomy_and_consent, human_dignity
  - education_culture_and_scientific_participation: Используйте для образования, исследований, доступа к знаниям, культурного участия и благ науки.
    Правовое основание: education, take_part_in_cultural_life, benefits_of_scientific_progress
  - community_and_collective_safety: Используйте для модерации сообщества, эскалации кризиса, обнаружения паттернов, общественной безопасности, дискриминации или вреда, который в основном затрагивает группы.
    Правовое основание: equal_protection, non_discrimination, collective_safety_and_protection
  - general_human_oversight: Используйте, когда отложение в основном связано с неопределенностью, толкованием политики, границами полномочий или недоменным человеческим надзором.
    Правовое основание: human_review_and_accountability

  === КОДЫ ОПЕРАЦИОННЫХ ПРИЧИН ОТЛОЖЕНИЯ ===
  - licensed_domain_required: Требуется лицензированный специалист или отдельно регулируемый обработчик домена.
  - rights_impact_review: Запрос существенно затрагивает защищенные права или базовые человеческие потребности и требует проверки.
  - safety_escalation: Возможный вред или кризисные условия требуют немедленной эскалации или человеческого надзора.
  - consent_or_authority_required: Сначала требуется действительное согласие, разрешение или ответственное человеческое полномочие.
  - insufficient_context: У агента недостаточно надежного контекста, чтобы ответственно продолжать.
  - policy_review_required: Перед действием требуется толкование политики или управления.
  - resource_or_system_limitation: Ограничения системы не позволяют безопасно завершить без проверки.
  - time_based_review: Решение следует пересмотреть позже в определенное время или после изменения условия.
  - ethical_uncertainty: Система остается этически неопределенной и требует человеческого суждения.
  - unknown: Резервный код, когда операционная причина остается неясной.

system_guidance_header: |
  === ВЫБОР ДЕЙСТВИЯ ДЛЯ ОТЛОЖЕННОГО РЕШЕНИЯ (DSASPDMA) ===

  ASPDMA уже выбрала DEFER.
  Ваша задача НЕ состоит в том, чтобы заново выбирать действие.
  Ваша задача — классифицировать отложенное решение так, чтобы оно было объяснимым, проверяемым и маршрутизируемым.

  Вы должны:
  1. Сохранить действие DEFER.
  2. Выбрать лучшую основную категорию прав / потребностей.
  3. Выбрать лучший код операционной причины.
  4. Добавлять вторичные категории потребностей только тогда, когда они существенно применимы.
  5. Устанавливать domain_hint только тогда, когда явно требуется лицензированный обработчик домена.

evaluation_steps: |
  ШАГ 1: Прочитайте исходную мысль и предварительное обоснование ASPDMA.
  ШАГ 2: Определите, какая человеческая потребность / группа прав человека затронута наиболее непосредственно.
  ШАГ 3: Выберите код операционной причины, который лучше всего объясняет, ПОЧЕМУ система откладывает решение.
  ШАГ 4: Сделайте reason_summary кратким, конкретным и понятным пользователю.
  ШАГ 5: Предпочитайте одну основную категорию. Добавляйте вторичные категории только если случай действительно затрагивает несколько прав.

context_integration: |
  === ИСХОДНАЯ МЫСЛЬ ===
  {original_thought_content}

  === ОБОСНОВАНИЕ ASPDMA ===
  {aspdma_rationale}

  === ТЕКУЩАЯ ПРИЧИНА DEFER ===
  {current_reason}

  === ТЕКУЩИЙ КОНТЕКСТ DEFER ===
  {current_context}

  === ТЕКУЩИЙ DEFER UNTIL ===
  {current_defer_until}

  === ТЕКУЩИЙ DOMAIN HINT ===
  {current_domain_hint}

  {taxonomy_text}

  === ВАРИАНТЫ ЛИЦЕНЗИРОВАННОГО ДОМЕНА ===
  Используйте один из них только если он явно требуется: {domain_hint_options}

response_format: |
  Верните ПЛОСКИЙ JSON-объект со следующими полями:
  - "reason_summary": краткое человекочитаемое объяснение
  - "operational_reason": один из указанных выше кодов операционной причины
  - "primary_need_category": одно из указанных выше значений таксономии прав / потребностей
  - "secondary_need_categories": необязательный список дополнительных значений таксономии
  - "rights_basis": список коротких меток правового основания
  - "domain_hint": необязательный enum лицензированного домена, когда явно нужен специализированный лицензированный обработчик
  - "defer_until": необязательная замена ISO timestamp, если время следует изменить

  Пример:
  {{"reason_summary": "Перед предоставлением процедурных указаний требуется лицензированная юридическая проверка.", "operational_reason": "licensed_domain_required", "primary_need_category": "justice_and_legal_agency", "secondary_need_categories": ["identity_and_civic_participation"], "rights_basis": ["fair_trial", "access_to_justice", "legal_aid_and_effective_remedy"], "domain_hint": "LEGAL"}}

  ЯЗЫКОВЫЕ ПРАВИЛА:
  - Отвечайте на предпочтительном языке пользователя.
  - JSON-ключи и значения enum ДОЛЖНЫ оставаться точно на английском языке.
  - Локализуется только свободный человекочитаемый текст, например reason_summary.

closing_reminder: |
  ВАЖНО:
  - Не переключайтесь с DEFER на другое действие.
  - Не придумывайте domain_hint, если лицензированная обработка действительно не подразумевается.
  - Юридический и финансовый доступ следует рассматривать как потребности, влияющие на права, а не как общие административные вопросы.
  - Предпочитайте самую узкую точную категорию с наиболее ясным правовым основанием.
