response_format: |
  Ваш ответ ДОЛЖЕН быть единственным JSON-объектом, соответствующим предоставленной схеме, со следующими ключами:
  - "k_eff": Число с плавающей точкой (>= 0) - Количество эффективных независимых источников. Используйте формулу k/(1+ρ(k-1)). k_eff < 2 = хрупкое.
  - "correlation_risk": Число с плавающей точкой (0.0-1.0) - Оценочная корреляция ρ между источниками.
  - "phase": Строка - Одно из "chaos" (противоречивый), "healthy" (разнообразный синтез) или "rigidity" (эхо-камера).
  - "fragility_flag": Булево - TRUE, если k_eff < 2 ИЛИ phase = "rigidity" ИЛИ correlation_risk > 0.7.
  - "sources_identified": Массив строк - Список отдельных источников/перспектив, идентифицированных в рассуждении.
  - "correlation_factors": Массив строк - Факторы, вызывающие корреляцию (например, "тот же автор", "производное от одного исследования").
  - "reasoning": Строка - Ваш анализ разнообразия информации и эпистемического здоровья. Это поле ОБЯЗАТЕЛЬНО.

  LANGUAGE RULES:
  - Respond in the user's preferred language (check user profile).
  - ALL content values (reasoning, rationale, speak_content, etc.) should be in the user's language.
  - JSON keys MUST remain in English (e.g., "selected_action", "reasoning", "tool_parameters").
  - Example: {{"selected_action": "SPEAK", "speak_content": "Привет!", "rationale": "Пользователь поприветствовал на русском""}} - Russian content, English keys.

  Не включайте дополнительные поля или не оборачивайте в блоки кода markdown.

evaluation_steps: |
  ШАГ 1: Подсчитайте источники (k)
  - Какие источники/перспективы информируют это рассуждение?
  - Ваше обучение = 1 источник (всегда присутствует)
  - Ввод пользователя = +1 источник ЕСЛИ зрелые отношения (20+ взаимодействий)
  - Результаты веб/инструментов = +1 источник каждый ЕСЛИ из независимых происхождений
  - Цитаты/данные = +1 источник каждый ЕСЛИ действительно независимые

  ШАГ 2: Оцените корреляцию (ρ)
  - Для каждой пары источников спросите: один ли производный от другого?
  - Тот же автор/учреждение/набор данных → высокая корреляция
  - Все источники соглашаются по сложному вопросу → подозрительная корреляция
  - Разные методологии, тот же вывод → более низкая корреляция
  - ρ = 0 (полностью независимые) до ρ = 1 (все производные из одного происхождения)

  ШАГ 3: Рассчитайте k_eff
  - Примените формулу: k_eff = k / (1 + ρ(k-1))
  - Пример: k=3 источника, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (хрупкое!)
  - Пример: k=3 источника, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (здоровое)
  - Зарождающийся агент: k=1 → k_eff = 1 (всегда хрупкое)

  ШАГ 4: Определение фазы
  - ХАОС: Множественные противоречивые выводы, нет способа разрешить
  - ЗДОРОВЬЕ: Различные перспективы, которые могут быть синтезированы (k_eff ≥ 2)
  - ЖЁСТКОСТЬ: Доминирует единственный нарратив, нет несогласия (k_eff → 1, эхо-камера)

  ШАГ 5: Проверка хрупкости
  - k_eff < 2? → ХРУПКОЕ
  - phase = "rigidity"? → ХРУПКОЕ
  - correlation_risk > 0.7? → ХРУПКОЕ
  - Установите fragility_flag = TRUE, если любое из вышеперечисленного

closing_reminder: |
  ВАЖНО: Когда не уверены в независимости источников, ошибайтесь в сторону осторожности
  и оценивайте более высокую корреляцию. Лучше пометить для рассмотрения, чем пропустить
  потенциальную эхо-камеру.

  Флаг хрупкости НЕ означает, что рассуждение неправильное - это означает, что рассуждение
  должно получить дополнительную проверку или независимое подтверждение перед высокорисковыми
  действиями.
