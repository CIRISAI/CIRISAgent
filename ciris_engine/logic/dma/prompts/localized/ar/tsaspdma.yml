response_format: |
  أرجع كائن JSON مسطح بهذه الحقول:
  - "selected_action": واحد من "TOOL"، "SPEAK"، "PONDER"
  - "rationale": اشرح قرارك بما في ذلك المحاذير التي تقر بها

  بالإضافة إلى حقول خاصة بالإجراء (استخدم أسماء الحقول الدقيقة أدناه):

  لإجراء TOOL (الوضع العادي - الأداة موجودة):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  لإجراء TOOL (وضع التصحيح - اسم الأداة كان خاطئاً):
  {{"selected_action": "TOOL", "rationale": "تصحيح اسم الأداة لمطابقة الأداة المتاحة...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  لإجراء SPEAK:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "أحتاج أن يجيب المستخدم: أي ضوء؟"}}

  لإجراء PONDER:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["هل هذا هو النهج الصحيح؟"]}}

  مهم:
  - استخدم مخطط المعاملات أعلاه لتحديد معاملات الأداة المطلوبة
  - استنتج قيم المعاملات من نية المستخدم وسياق المحادثة
  - tool_parameters هو قاموس يحتوي على حجج الأداة
  - في وضع التصحيح: قم بتضمين حقل "tool_name" مع الاسم الدقيق من قائمة الأدوات المتاحة
  - لا تلف في كتل أكواد markdown

  قواعد اللغة:
  - الرد باللغة المفضلة للمستخدم (تحقق من ملف تعريف المستخدم).
  - جميع قيم المحتوى (reasoning، rationale، speak_content، إلخ) يجب أن تكون بلغة المستخدم.
  - مفاتيح JSON يجب أن تبقى باللغة الإنجليزية (على سبيل المثال، "selected_action"، "reasoning"، "tool_parameters").
  - مثال: {{"selected_action": "SPEAK", "speak_content": "مرحبا!", "rationale": "رد المستخدم بالعربية""}} - محتوى عربي، مفاتيح إنجليزية.

# قسم وضع تصحيح الأداة (يستخدم عندما يختار ASPDMA أداة غير موجودة)
tool_correction_section: |
  === وضع تصحيح الأداة ===

  اختار ASPDMA الأداة '{requested_tool}' ولكن هذه الأداة غير موجودة.

  مهمتك: ابحث عن الأداة الصحيحة من قائمة الأدوات المتاحة التي تطابق
  نية المستخدم، أو استخدم SPEAK/PONDER إذا لم تكن هناك أداة مناسبة.

  الأدوات المتاحة:
  {available_tools_list}

  تعليمات:
  1. حلل نية المستخدم الأصلية من محتوى الفكرة
  2. راجع الأدوات المتاحة أعلاه - ابحث عن واحدة تطابق النية
  3. إذا وجدت أداة مطابقة:
     - أرجع إجراء TOOL مع "tool_name" معين للاسم الدقيق من القائمة
     - املأ "tool_parameters" المناسبة بناءً على مخطط الأداة
  4. إذا كان من الممكن أن تتطابق أدوات متعددة:
     - أرجع SPEAK لسؤال المستخدم عن القدرة المحددة التي يريدها
  5. إذا لم تتطابق أي أداة مع النية:
     - أرجع PONDER لإعادة النظر في النهج بالكامل

  حاسم: يجب أن يكون حقل "tool_name" تطابقاً دقيقاً من قائمة الأدوات المتاحة أعلاه.

evaluation_steps: |
  الخطوة 1: اقرأ الوثائق
  - راجع quick_start، detailed_instructions، examples
  - لاحظ أي محاذير تنطبق على حالة الاستخدام هذه
  - تحقق مما إذا كان when_to_use يطابق المهمة

  الخطوة 2: قيّم اختيار ASPDMA
  - هل المعاملات صحيحة حسب الوثائق؟
  - هل تقترح الأمثلة تنسيق معاملات أفضل؟
  - هل هناك معاملات مطلوبة غامضة؟

  الخطوة 3: تحقق من المحاذير
  - هل ينطبق أي تحذير على هذا الاستخدام المحدد؟
  - هل سيتوقع المستخدم هذا السلوك؟
  - هل يجب تحذير المستخدم أو سؤاله أولاً؟

  الخطوة 4: حدد الإجراء
  - TOOL: أكد أو حسّن، اعترف بالمحاذير
  - SPEAK: اطلب توضيحاً محدداً
  - PONDER: اشرح لماذا يجب إعادة النظر

closing_reminder: |
  مهم: دورك هو اكتشاف المشكلات التي لم يتمكن ASPDMA من رؤيتها بدون
  الوثائق الكاملة. إذا بدا اختيار الأداة جيداً، أكده بسرعة.
  استخدم SPEAK أو PONDER فقط عندما تكشف الوثائق عن مخاوف حقيقية.

  عند اختيار SPEAK، كن محدداً: "أحتاج أن يجيب المستخدم: [سؤال]"
  عند اختيار PONDER، اشرح: "هذه الأداة لا يمكنها X لأن Y، اعتبر Z"
  عند اختيار TOOL، اعترف: "المضي قدماً مع الوعي بالتحذير X"
