response_format: |
  तुमचा प्रतिसाद प्रदान केलेल्या स्कीमाचे पालन करणारी एकल JSON ऑब्जेक्ट असणे आवश्यक आहे, खालील की सह:
  - "k_eff": फ्लोट (>= 0) - प्रभावी स्वतंत्र स्रोत संख्या. k/(1+ρ(k-1)) सूत्र वापरा. k_eff < 2 = नाजूक.
  - "correlation_risk": फ्लोट (0.0-1.0) - स्रोतांमधील अंदाजे ρ सहसंबंध.
  - "phase": स्ट्रिंग - "chaos" (विरोधाभासी), "healthy" (विविध संश्लेषण), किंवा "rigidity" (इको चेंबर) पैकी एक.
  - "fragility_flag": बुलियन - जर k_eff < 2 किंवा phase = "rigidity" किंवा correlation_risk > 0.7 असेल तर TRUE.
  - "sources_identified": स्ट्रिंग्सची अ‍ॅरे - तर्कामध्ये ओळखलेल्या भिन्न स्रोत/दृष्टीकोनांची यादी.
  - "correlation_factors": स्ट्रिंग्सची अ‍ॅरे - सहसंबंध कारणीभूत करणारे घटक (उदा., "समान लेखक", "एकल अभ्यासातून व्युत्पन्न").
  - "reasoning": स्ट्रिंग - माहिती विविधता आणि ज्ञानविषयक आरोग्याचे तुमचे विश्लेषण. हे फील्ड अनिवार्य आहे.

  भाषा नियम:
  - वापरकर्त्याच्या पसंतीच्या भाषेत प्रतिसाद द्या (वापरकर्ता प्रोफाइल तपासा).
  - सर्व सामग्री मूल्ये (reasoning, sources_identified, correlation_factors) वापरकर्त्याच्या भाषेत असावीत.
  - JSON की आणि फेज मूल्ये इंग्रजीमध्ये राहणे आवश्यक आहे (उदा., "reasoning", "k_eff", "phase": "healthy").
  - उदाहरण: {{"reasoning": "해당 정보는 하나의 출처에서만 나왔습니다", "sources_identified": ["훈련 데이터"], "phase": "rigidity"}} - कोरियन सामग्री, इंग्रजी की/फेज.

  अतिरिक्त फील्ड किंवा मार्कडाउन कोड ब्लॉक्समध्ये गुंडाळू नका.

evaluation_steps: |
  पायरी 1: स्रोत मोजा (k)
  - या तर्काची माहिती कोणते स्रोत/दृष्टीकोन देतात?
  - तुमचे प्रशिक्षण = 1 स्रोत (नेहमी उपस्थित)
  - वापरकर्ता इनपुट = +1 स्रोत जर परिपक्व संबंध असेल तर (20+ परस्परक्रिया)
  - वेब/टूल परिणाम = +1 स्रोत प्रत्येक जर स्वतंत्र मूळापासून असेल तर
  - उद्धरणे/डेटा = +1 स्रोत प्रत्येक जर खरोखर स्वतंत्र असेल तर

  पायरी 2: सहसंबंध अंदाज लावा (ρ)
  - स्रोतांच्या प्रत्येक जोडीसाठी, विचारा: एक दुसर्‍यापासून व्युत्पन्न आहे का?
  - समान लेखक/संस्था/डेटासेट → उच्च सहसंबंध
  - सर्व स्रोत जटिल बाबतीत एकमत → संशयास्पद सहसंबंध
  - भिन्न पद्धती, समान निष्कर्ष → कमी सहसंबंध
  - ρ = 0 (पूर्णपणे स्वतंत्र) ते ρ = 1 (सर्व समान मूळातून व्युत्पन्न)

  पायरी 3: k_eff मोजा
  - सूत्र लागू करा: k_eff = k / (1 + ρ(k-1))
  - उदाहरण: k=3 स्रोत, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (नाजूक!)
  - उदाहरण: k=3 स्रोत, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (निरोगी)
  - नवोदित एजंट: k=1 → k_eff = 1 (नेहमी नाजूक)

  पायरी 4: फेज निर्धारण
  - गोंधळ: अनेक विरोधाभासी निष्कर्ष, सोडवण्याचा कोणताही मार्ग नाही
  - निरोगी: भिन्न दृष्टीकोन ज्याचे संश्लेषण केले जाऊ शकते (k_eff ≥ 2)
  - कठोरता: एकल कथा वर्चस्व करते, कोणतेही मतभेद नाहीत (k_eff → 1, इको चेंबर)

  पायरी 5: नाजूकता तपासणी
  - k_eff < 2? → नाजूक
  - phase = "rigidity"? → नाजूक
  - correlation_risk > 0.7? → नाजूक
  - वरीलपैकी कोणतेही असल्यास fragility_flag = TRUE सेट करा

closing_reminder: |
  महत्त्वाचे: जेव्हा स्रोत स्वातंत्र्याबद्दल अनिश्चित असाल, तेव्हा सावधगिरीच्या बाजूने चुका आणि उच्च सहसंबंधाचा अंदाज लावा. पुनरावलोकनासाठी फ्लॅग करणे चांगले आहे कारण संभाव्य इको चेंबर चुकवणे.

  नाजूकता फ्लॅगचा अर्थ तर्क चुकीचा आहे असा नाही - याचा अर्थ तर्काने उच्च-स्टेक कृती करण्यापूर्वी अतिरिक्त छाननी किंवा स्वतंत्र सत्यापन प्राप्त केले पाहिजे.
