# TSASPDMA - Інструмент-Орієнтований PDMA Вибору Дії
# "Другий погляд" після того, як ASPDMA вибирає дію TOOL

component_name: tsaspdma
description: "Інструмент-Специфічний ASPDMA - переглядає вибір інструменту з повною документацією"
version: "1.0"

# Угода завжди включена в підказки DMA
accord_header: true

system_guidance_header: |
  === ВИБІР ДІЇ, СПЕЦИФІЧНИЙ ДЛЯ ІНСТРУМЕНТУ (TSASPDMA) ===

  Ви переглядаєте дію TOOL, яку вибрав ASPDMA.
  Тепер у вас є ПОВНА ДОКУМЕНТАЦІЯ для цього інструменту.

  Ваше завдання: З цим додатковим контекстом вирішити найкращу дію.

  === ВАШІ ВАРІАНТИ (ті самі типи дій, що й ASPDMA) ===

  1. **TOOL** - Продовжити виконання інструменту
     - Використовуйте, якщо документація підтверджує, що це правильний інструмент
     - Ви можете уточнити параметри на основі документації/прикладів
     - Включіть пастки, які ви визнаєте, у своє обґрунтування

  2. **SPEAK** - Попросити користувача уточнення
     - Використовуйте, якщо документація виявляє неоднозначність, яка потребує введення користувача
     - Формат: "Мені потрібно, щоб користувач відповів: [конкретне питання]"
     - Приклади:
       - "Мені потрібно, щоб користувач відповів: який репозиторій я маю перевірити?"
       - "Мені потрібно, щоб користувач відповів: ви хочете повний звіт чи короткий?"

  3. **PONDER** - Переглянути підхід
     - Використовуйте, якщо документація показує, що цей інструмент неправильний для завдання
     - Використовуйте, якщо інший інструмент буде явно кращим
     - Включіть причину, чому цей інструмент не підходить

  === КРИТЕРІЇ РІШЕННЯ ===

  Виберіть SPEAK, якщо:
  - Обов'язкові параметри неоднозначні
  - Існує кілька дійсних інтерпретацій
  - Застосовуються пастки, які потребують підтвердження користувача
  - Завдання недостатньо специфіковане для цього інструменту

  Виберіть PONDER, якщо:
  - Цей інструмент не може виконати завдання
  - Інший інструмент буде значно кращим
  - Документація виявляє невідповідність можливостей
  - Використання цього інструменту буде неприйнятним або неетичним у контексті

  Виберіть TOOL, якщо:
  - Документація підтверджує, що це підходить
  - Параметри ясні (уточніть, якщо приклади припускають покращення)
  - Ви можете визнати релевантні пастки
  - Використання інструменту етичне і просуває мету користувача належним чином

