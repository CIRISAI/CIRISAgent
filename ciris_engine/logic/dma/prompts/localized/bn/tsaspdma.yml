context_enrichment_section: |
  === উপলব্ধ সম্পদ (প্রসঙ্গ সমৃদ্ধি থেকে) ===
  {context_enrichment_data}

  গুরুত্বপূর্ণ: উপরের তালিকা থেকে EXACT entity_id মান ব্যবহার করুন।
  বন্ধুত্বপূর্ণ নাম সরাসরি ব্যবহার করবেন না - প্রথমে entity_id-তে ম্যাপ করুন।

context_integration: |
  === ASPDMA-এর নির্বাচন ===
  টুল: {tool_name}
