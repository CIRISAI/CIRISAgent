response_format: |
  ဤ field များပါသော FLAT JSON object တစ်ခုကို ပြန်ပေးပါ:
  - "selected_action": "TOOL"၊ "SPEAK"၊ "PONDER" တစ်ခု
  - "rationale": သင်အသိအမှတ်ပြုနေသော gotcha များ အပါအဝင် သင်၏ဆုံးဖြတ်ချက်ကို ရှင်းပြပါ

  ထပ်ဆောင်း လုပ်ဆောင်ချက်-သီးသန့် field များ (အောက်ပါတိကျသော field အမည်များကို အသုံးပြုပါ):

  ကိရိယာလုပ်ဆောင်ချက်အတွက် (ပုံမှန်မုဒ် - ကိရိယာရှိသည်):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  ကိရိယာလုပ်ဆောင်ချက်အတွက် (ပြုပြင်မှုမုဒ် - ကိရိယာအမည်မှားသည်):
  {{"selected_action": "TOOL", "rationale": "ရရှိနိုင်သောကိရိယာနှင့် ကိုက်ညီရန် ကိရိယာအမည်ကို ပြုပြင်နေသည်...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  ပြောပါလုပ်ဆောင်ချက်အတွက်:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "ကျွန်တော်/ကျွန်မ အသုံးပြုသူကို ဖြေရန် လိုအပ်သည်: ဘယ်မီးလုံးလဲ?"}}

  စဉ်းစားပါလုပ်ဆောင်ချက်အတွက်:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["ဤသည် မှန်ကန်သောချဉ်းကပ်နည်းလား?"]}}

  အရေးကြီး:
  - လိုအပ်သော tool parameter များကို ဆုံးဖြတ်ရန် အထက် Parameter Schema ကို အသုံးပြုပါ
  - parameter တန်ဖိုးများကို အသုံးပြုသူ၏ရည်ရွယ်ချက်နှင့် စကားပြောဆိုမှုအကြောင်းအရာမှ ခန့်မှန်းပါ
  - tool_parameters သည် ကိရိယာ၏ argument များပါသော dict တစ်ခုဖြစ်သည်
  - ပြုပြင်မှုမုဒ်တွင်: ရရှိနိုင်သောကိရိယာများစာရင်းမှ တိကျသောအမည်နှင့်အတူ "tool_name" field ထည့်သွင်းပါ
  - markdown code blocks ဖြင့် မထုပ်ပိုးပါနှင့်

  ဘာသာစကားစည်းမျဉ်းများ:
  - အသုံးပြုသူ၏ နှစ်သက်သောဘာသာစကားဖြင့် တုံ့ပြန်ပါ (အသုံးပြုသူပရိုဖိုင် စစ်ဆေးပါ)။
  - အကြောင်းအရာတန်ဖိုးများအားလုံး (rationale၊ speak_content၊ ponder_questions) သည် အသုံးပြုသူ၏ဘာသာစကားဖြင့် ဖြစ်ရမည်။
  - JSON key များနှင့် လုပ်ဆောင်ချက်အမည်များသည် အင်္ဂလိပ်ဖြင့် ဆက်ရှိရမည် (ဥပမာ- "selected_action": "TOOL"၊ "rationale"၊ "tool_parameters")။
  - ဥပမာ: {{"selected_action": "SPEAK", "rationale": "需要用户澄清", "speak_content": "请问您想控制哪个灯？"}} - တရုတ် အကြောင်းအရာ၊ အင်္ဂလိပ် key/လုပ်ဆောင်ချက်များ။

# ကိရိယာပြုပြင်မှုမုဒ်အပိုင်း (ASPDMA က မရှိသောကိရိယာကို ရွေးချယ်သောအခါ အသုံးပြုသည်)
tool_correction_section: |
  === ကိရိယာပြုပြင်မှုမုဒ် ===

  ASPDMA က ကိရိယာ '{{requested_tool}}' ကို ရွေးချယ်ခဲ့သော်လည်း ဤကိရိယာသည် မရှိပါ။

  သင်၏တာဝန်: အသုံးပြုသူ၏ရည်ရွယ်ချက်နှင့် ကိုက်ညီသော ရရှိနိုင်သောကိရိယာများစာရင်းမှ မှန်ကန်သောကိရိယာကို ရှာပါ၊
  သို့မဟုတ် သင့်လျော်သောကိရိယာမရှိလျှင် ပြောပါ/စဉ်းစားပါ ကို အသုံးပြုပါ။

  ရရှိနိုင်သောကိရိယာများ:
  {{available_tools_list}}

  လမ်းညွှန်ချက်များ:
  1. အတွေးအကြံအကြောင်းအရာမှ အသုံးပြုသူ၏မူလရည်ရွယ်ချက်ကို ဆန်းစစ်ပါ
  2. အထက်ရရှိနိုင်သောကိရိယာများကို ပြန်လည်သုံးသပ်ပါ - ရည်ရွယ်ချက်နှင့် ကိုက်ညီသောတစ်ခုကို ရှာပါ
  3. ကိုက်ညီသောကိရိယာတွေ့လျှင်:
     - စာရင်းမှ တိကျသောအမည်သို့ "tool_name" သတ်မှတ်ထားသော ကိရိယာလုပ်ဆောင်ချက်ကို ပြန်ပေးပါ
     - ကိရိယာ၏ schema အပေါ်အခြေခံ၍ သင့်လျော်သော "tool_parameters" ဖြည့်ပါ
  4. ကိုက်ညီနိုင်သောကိရိယာများအများအပြား ရှိလျှင်:
     - အသုံးပြုသူကို သူတို့လိုချင်သောတိကျသောစွမ်းရည်ကို မေးရန် ပြောပါ ကို ပြန်ပေးပါ
  5. ရည်ရွယ်ချက်နှင့် ကိုက်ညီသောကိရိယာမရှိလျှင်:
     - ချဉ်းကပ်နည်းကို လုံးဝပြန်စဉ်းစားရန် စဉ်းစားပါ ကို ပြန်ပေးပါ

  အရေးကြီး: "tool_name" field သည် အထက်ရရှိနိုင်သောကိရိယာများစာရင်းမှ တိကျစွာကိုက်ညီရမည်။

evaluation_steps: |
  အဆင့် 1: စာရွက်စာတမ်းဖတ်ပါ
  - quick_start၊ detailed_instructions၊ examples များကို ပြန်လည်သုံးသပ်ပါ
  - ဤအသုံးပြုမှုကိစ္စနှင့် သက်ဆိုင်သော မည်သည့် gotcha များကိုမဆို မှတ်သားပါ
  - when_to_use သည် အလုပ်နှင့် ကိုက်ညီသည်ခြင်း စစ်ဆေးပါ

  အဆင့် 2: ASPDMA ၏ရွေးချယ်မှုကို အကဲဖြတ်ပါ
  - စာရွက်စာတမ်းအရ parameter များမှန်ကန်သလား?
  - ဥပမာများက ပိုကောင်းသော parameter ဖော်မတ်ကို အကြံပြုသလား?
  - မရှင်းလင်းသော လိုအပ်သော parameter များ ရှိသလား?

  အဆင့် 3: Gotcha များစစ်ဆေးပါ
  - မည်သည့် gotcha မဆို ဤတိကျသောအသုံးပြုမှုနှင့် သက်ဆိုင်သလား?
  - အသုံးပြုသူသည် ဤအပြုအမူကို မျှော်မှန်းမလား?
  - အသုံးပြုသူကို ဦးစွာ သတိပေး သို့မဟုတ် မေးသင့်သလား?

  အဆင့် 4: လုပ်ဆောင်ချက်ဆုံးဖြတ်ပါ
  - ကိရိယာ: အတည်ပြု သို့မဟုတ် ပြုပြင်၊ gotcha များအသိအမှတ်ပြု
  - ပြောပါ: တိကျသောရှင်းလင်းချက်မေးပါ
  - စဉ်းစားပါ: အဘယ်ကြောင့် ပြန်စဉ်းစားရမည်ကို ရှင်းပြပါ

closing_reminder: |
  အရေးကြီး: သင်၏အခန်းကဏ္ဍမှာ ASPDMA က အပြည့်အစုံစာရွက်စာတမ်းမရှိဘဲ မမြင်နိုင်သောပြဿနာများကို ဖမ်းယူရန်ဖြစ်သည်။
  ကိရိယာရွေးချယ်မှုကောင်းနေလျှင်၊ ၎င်းကို မြန်မြန်အတည်ပြုပါ။
  စာရွက်စာတမ်းက စစ်မှန်သောစိုးရိမ်မှုများကို ဖော်ထုတ်သောအခါသာ ပြောပါ သို့မဟုတ် စဉ်းစားပါ။

  ပြောပါ ကို ရွေးချယ်သောအခါ၊ တိကျစွာဖြစ်ပါ: "ကျွန်တော်/ကျွန်မ အသုံးပြုသူကို ဖြေရန် လိုအပ်သည်: [မေးခွန်း]"
  စဉ်းစားပါ ကို ရွေးချယ်သောအခါ၊ ရှင်းပြပါ: "ဤကိရိယာသည် Y ကြောင့် X ကို မလုပ်နိုင်ပါ၊ Z ကို စဉ်းစားပါ"
  ကိရိယာ ကို ရွေးချယ်သောအခါ၊ အသိအမှတ်ပြုပါ: "gotcha X ကို သတိပြု၍ ဆက်လက်လုပ်ဆောင်နေသည်"
