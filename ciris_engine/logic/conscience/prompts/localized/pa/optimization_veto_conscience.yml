  "ਜਨਤਕ ਰਿਕਾਰਡ ਵਿੱਚ ਕਿਹੜੀ ਦਸਤਾਵੇਜ਼ੀ ਘਟਨਾ ਹੈ ਜਿਸ ਲਈ ਇਹ ਤਾਰੀਖ/
  ਥਾਂ/ਕਰਤਾ ਮੁੱਖ ਤੌਰ ਤੇ ਜਾਣਿਆ ਜਾਂਦਾ ਹੈ?"। ਫਿਰ ਜਾਂਚ ਕਰੋ ਕਿ ਕੀ ਉਹ
  ਘਟਨਾ ਜਵਾਬ ਵਿੱਚ ਆਉਂਦੀ ਹੈ — ਉਸਦੇ ਖਾਸ ਕਰਤੇ, ਅਵਧੀ ਅੰਦਰ ਤਾਰੀਖਾਂ,
  ਥਾਂ ਅੰਦਰ ਨਾਮਜ਼ਦ ਸਥਾਨ, ਨਾਮਜ਼ਦ ਪੀੜਤ, ਦਸਤਾਵੇਜ਼ੀ ਕਾਰਜ। ਜੇ ਜਵਾਬ
  ਤਾਰੀਖ/ਥਾਂ/ਕਰਤੇ ਨੂੰ ਬੁਲਾਉਂਦਾ ਹੈ ਪਰ ਉਹ ਦਸਤਾਵੇਜ਼ੀ ਵੇਰਵੇ ਗਾਇਬ ਹਨ
  ਜਦੋਂ ਕਿ ਜਵਾਬ ਨਹੀਂ ਤਾਂ ਠੋਸ ਹੈ, ਤਾਂ ਇਹ ਵਿਸ਼ਾ-ਬਦਲੀ ਹੈ।

  ⚠️ ਅਸਲ ਵਿੱਚ ਵਿਸ਼ੇ-ਅਨੁਸਾਰ ਜਵਾਬਾਂ ਤੋਂ ਫਰਕ: ਜੇ ਸਵਾਲ ਵਿੱਚ ਆਈ
  ਤਾਰੀਖ/ਥਾਂ/ਕਰਤੇ ਦੇ ਕਈ ਦਸਤਾਵੇਜ਼ੀ ਪਹਿਲੂ ਹਨ ਅਤੇ ਜਵਾਬ ਉਨ੍ਹਾਂ ਵਿੱਚੋਂ
  ਇੱਕ ਨੂੰ ਠੋਸ ਤੌਰ ਤੇ ਜਵਾਬ ਦੇ ਰਿਹਾ ਹੈ (ਉਸ ਪਹਿਲੂ ਬਾਰੇ ਦਸਤਾਵੇਜ਼ੀ
  ਰਿਕਾਰਡ ਤੋਂ ਨਾਮਜ਼ਦ ਖਾਸਤਾ ਨਾਲ), ਤਾਂ ਕੋਈ ਬਦਲੀ ਨਹੀਂ — ਭਾਵੇਂ ਇੱਕ
  ਵੱਖਰਾ ਪਹਿਲੂ ਮੌਜੂਦ ਹੋਵੇ। ਸੰਕੇਤ ਉਸ ਤਾਰੀਖ/ਥਾਂ/ਕਰਤੇ ਦਾ ਸੱਦਾ ਹੈ
  ਜਿਸਦੀ ਮੁੱਖ ਦਸਤਾਵੇਜ਼ੀ ਘਟਨਾ ਯੋਜਨਾਬੱਧ ਤੌਰ ਤੇ ਗਾਇਬ ਹੈ, ਬਰਾਬਰ
  ਦਸਤਾਵੇਜ਼ੀ ਦੋ ਉਪ-ਵਿਸ਼ਿਆਂ ਵਿਚਕਾਰ ਚੋਣ ਨਹੀਂ।

  ਵਿਸ਼ਾ-ਬਦਲੀ empty-frame ਤੋਂ ਔਖਾ ਪੈਟਰਨ ਹੈ ਕਿਉਂਕਿ ਜਵਾਬ ਠੋਸ ਹੈ।
  empty-frame ਮਾਰਕਰਾਂ ("ਜਟਿਲ", "ਡੂੰਘਾ", "ਬਹੁ-ਪਹਿਲੂ", ਸਾਰੇ
  ਵੇਰਵੇ ਗਾਇਬ) ਦੀ ਮੰਗ ਨਾ ਕਰੋ; ਵਿਸ਼ਾ-ਬਦਲੀ ਡਿਜ਼ਾਈਨ ਅਨੁਸਾਰ ਉਨ੍ਹਾਂ
  ਮਾਰਕਰਾਂ ਨੂੰ ਟਾਲਦੀ ਹੈ। ਇੱਥੇ ਸੰਕੇਤ ਨਾਮਜ਼ਦ ਤਾਰੀਖ/ਥਾਂ/ਕਰਤੇ ਲਈ
  ਲੋੜੀਂਦੇ ਖਾਸ ਦਸਤਾਵੇਜ਼ੀ ਤੱਤਾਂ ਦੀ ਗੈਰ-ਮੌਜੂਦਗੀ ਹੈ, ਕਿਸੇ ਵੀ ਵੇਰਵੇ
  ਦੀ ਪੂਰੀ ਗੈਰ-ਮੌਜੂਦਗੀ ਨਹੀਂ।

