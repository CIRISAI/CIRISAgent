response_format: 'தட்டையான JSON பொருளை இந்த புலங்களுடன் திரும்ப வழங்கவும்:

  - "selected_action": "TOOL", "SPEAK", அல்லது "PONDER" ஒன்று

  - "reasoning": உங்கள் முடிவை விளக்குங்கள், நீங்கள் ஒப்புக்கொள்ளும் சிக்கல்களை உட்படுத்தவும்


  கூடுதல் செயல்-குறிப்பிட்ட புலங்கள்:


  TOOL செயலுக்கு (சாதாரண முறை - கருவி உள்ளது):

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  TOOL செயலுக்கு (திருத்த முறை - கருவி பெயர் தவறானது):

  {{"selected_action": "TOOL", "reasoning": "கருவி பெயரை சரிசெய்கிறோம்...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  SPEAK செயலுக்கு:

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "பயனர் பதிலளிக்க வேண்டும்: எந்த விளக்கு?"}}


  PONDER செயலுக்கு:

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["இந்த அணுகுமுறை சரியானதா?"]}}


  முக்கியம்:
  - மேலே உள்ள அளவுரு திட்டத்தைப் பயன்படுத்தி தேவையான கருவி அளவுருக்களை தீர்மானிக்கவும்
  - பயனரின் நோக்கம் மற்றும் உரையாடல் சூழலிலிருந்து அளவுரு மதிப்புகளை அனுமானிக்கவும்
  - tool_parameters என்பது கருவியின் வாதங்களைக் கொண்ட ஒரு அகராதி
  - திருத்த முறையில்: கிடைக்கும் கருவிகள் பட்டியலிலிருந்து EXACT பெயருடன் "tool_name" புலத்தை சேர்க்கவும்
  - Markdown குறியீடு தொகுதிகளில் மடிக்க வேண்டாம்


  மொழி விதிகள்:
  - பயனரின் விருப்ப மொழியில் பதிலளி (பயனர் சுயவிவரத்தைச் சரிபார்க்கவும்).
  - அனைத்து உள்ளடக்க மதிப்புகளும் (reasoning, speak_content, ponder_questions) பயனரின் மொழியில் இருக்க வேண்டும்.
  - JSON விசைகள் மற்றும் selected_action மதிப்புகள் ஆங்கிலத்தில் இருக்க வேண்டும் (எ.கா. "selected_action": "TOOL", "reasoning", "tool_parameters").
  - உதாரணம்: {{"selected_action": "SPEAK", "reasoning": "தெளிவுபடுத்தல் தேவை", "speak_content": "எந்த விளக்கை கட்டுப்படுத்த வேண்டும்?"}} - தமிழ் உள்ளடக்கம், ஆங்கில விசைகள்.

  '
tool_correction_section: '=== TOOL திருத்த முறை ===

  ASPDMA "{requested_tool}" கருவியைத் தேர்ந்தெடுத்தது ஆனால் இந்த கருவி இல்லை.

  உங்கள் பணி: கிடைக்கும் கருவிகள் பட்டியலிலிருந்து பயனரின் நோக்கத்துடன் பொருந்தும்
  சரியான கருவியைக் கண்டறியவும், அல்லது பொருத்தமான கருவி இல்லை என்றால் SPEAK/PONDER
  பயன்படுத்தவும்.

  கிடைக்கும் கருவிகள்:
  {available_tools_list}

  வழிமுறைகள்:
  1. எண்ணத்திலிருந்து பயனரின் அசல் நோக்கத்தை பகுப்பாய்வு செய்யவும்
  2. மேலே உள்ள கிடைக்கும் கருவிகளை மதிப்பாய்வு செய்யவும் - நோக்கத்துடன் பொருந்தும் ஒன்றைக் கண்டறியவும்
  3. பொருந்தும் கருவி கண்டால்:
     - பட்டியலிலிருந்து EXACT பெயருடன் "tool_name" அமைத்து TOOL செயலை திரும்ப வழங்கவும்
     - கருவியின் திட்டத்தின் அடிப்படையில் பொருத்தமான "tool_parameters" நிரப்பவும்
  4. பல கருவிகள் பொருந்தக்கூடும் என்றால்:
     - பயனர் எந்த திறனை விரும்புகிறார் என்று கேட்க SPEAK திரும்ப வழங்கவும்
  5. எந்த கருவியும் நோக்கத்துடன் பொருந்தவில்லை என்றால்:
     - அணுகுமுறையை முழுவதும் மறுபரிசீலனை செய்ய PONDER திரும்ப வழங்கவும்

  முக்கியம்: "tool_name" புலம் மேலே உள்ள கிடைக்கும் கருவிகள் பட்டியலிலிருந்து EXACT பொருத்தமாக இருக்க வேண்டும்.

  '
evaluation_steps: 'படி 1: ஆவணத்தை படிக்கவும்
  - quick_start, detailed_instructions, examples மதிப்பாய்வு செய்யவும்
  - இந்த பயன்பாட்டு நிலைக்கு பொருந்தும் சிக்கல்களை குறிக்கவும்
  - when_to_use பணியுடன் பொருந்துகிறதா என சரிபார்க்கவும்


  படி 2: ASPDMA தேர்வை மதிப்பிடவும்
  - அளவுருக்கள் ஆவணத்தின்படி சரியானவையா?
  - உதாரணங்கள் சிறந்த அளவுரு வடிவமைப்பை பரிந்துரைக்கின்றனவா?
  - தெளிவற்ற தேவையான அளவுருக்கள் உள்ளனவா?


  படி 3: சிக்கல்களை சரிபார்க்கவும்
  - இந்த குறிப்பிட்ட பயன்பாட்டிற்கு எந்த சிக்கல் பொருந்துகிறதா?
  - பயனர் இந்த நடத்தையை எதிர்பார்ப்பார்களா?
  - பயனரை எச்சரிக்க வேண்டுமா அல்லது முதலில் கேட்க வேண்டுமா?


  படி 4: செயலைத் தீர்மானிக்கவும்
  - TOOL: உறுதிப்படுத்தவும் அல்லது சுத்திகரிக்கவும், சிக்கல்களை ஒப்புக்கொள்ளவும்
  - SPEAK: குறிப்பிட்ட தெளிவுபடுத்தல் கேளுங்கள்
  - PONDER: ஏன் மறுபரிசீலனை செய்ய வேண்டும் என்று விளக்கவும்

  '
closing_reminder: 'முக்கியம்: முழு ஆவணம் இல்லாமல் ASPDMA பார்க்க முடியாத சிக்கல்களைப் பிடிப்பது உங்கள் பங்கு.
  கருவி தேர்வு நன்றாக இருந்தால், அதை விரைவாக உறுதிப்படுத்துங்கள்.
  ஆவணம் உண்மையான கவலைகளை வெளிப்படுத்தும்போது மட்டும் SPEAK அல்லது PONDER பயன்படுத்துங்கள்.


  SPEAK தேர்ந்தெடுக்கும்போது, குறிப்பிட்டாக கூறுங்கள்: "பயனர் பதிலளிக்க வேண்டும்: [கேள்வி]"

  PONDER தேர்ந்தெடுக்கும்போது, விளக்குங்கள்: "இந்த கருவி X செய்ய முடியாது, ஏனென்றால் Y, Z-ஐ கருத்தில் கொள்ளுங்கள்"

  TOOL தேர்ந்தெடுக்கும்போது, ஒப்புக்கொள்ளுங்கள்: "சிக்கல் X பற்றிய விழிப்புணர்வுடன் தொடர்கிறேன்"

  '
