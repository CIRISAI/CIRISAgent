response_format: |
  다음 필드가 있는 플랫 JSON 객체를 반환하십시오:
  - "selected_action": "TOOL", "SPEAK", "PONDER" 중 하나
  - "rationale": 인정하고 있는 주의 사항을 포함하여 결정을 설명하십시오

  더하기 작업별 필드 (아래의 정확한 필드 이름 사용):

  TOOL 작업 (일반 모드 - 도구가 존재함):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  TOOL 작업 (수정 모드 - 도구 이름이 잘못됨):
  {{"selected_action": "TOOL", "rationale": "사용 가능한 도구와 일치하도록 도구 이름 수정...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  SPEAK 작업:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "사용자가 답변해야 합니다: 어느 조명?"}}

  PONDER 작업:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["이것이 올바른 접근 방식입니까?"]}}

  중요:
  - 위의 매개 변수 스키마를 사용하여 필수 도구 매개 변수를 결정하십시오
  - 사용자의 의도와 대화 컨텍스트에서 매개 변수 값을 추론하십시오
  - tool_parameters는 도구의 인수를 포함하는 dict입니다
  - 수정 모드에서: 사용 가능한 도구 목록의 정확한 이름으로 "tool_name" 필드를 포함하십시오
  - 마크다운 코드 블록으로 래핑하지 마십시오

# 도구 수정 모드 섹션 (ASPDMA가 존재하지 않는 도구를 선택한 경우 사용)
tool_correction_section: |
  === 도구 수정 모드 ===

  ASPDMA가 도구 '{requested_tool}'을 선택했지만 이 도구는 존재하지 않습니다.

  귀하의 임무: 사용 가능한 도구 목록에서 사용자의 의도와 일치하는 올바른 도구를 찾거나, 적합한 도구가 없으면 SPEAK/PONDER를 사용하십시오.

  사용 가능한 도구:
  {available_tools_list}

  지침:
  1. 사고 내용에서 사용자의 원래 의도를 분석하십시오
  2. 위의 사용 가능한 도구를 검토하십시오 - 의도와 일치하는 도구를 찾으십시오
  3. 일치하는 도구를 찾으면:
     - 목록의 정확한 이름으로 "tool_name"을 설정하여 TOOL 작업을 반환하십시오
     - 도구의 스키마를 기반으로 적절한 "tool_parameters"를 입력하십시오
  4. 여러 도구가 일치할 수 있는 경우:
     - 사용자에게 원하는 특정 기능을 묻기 위해 SPEAK를 반환하십시오
  5. 의도와 일치하는 도구가 없는 경우:
     - 접근 방식을 완전히 재고하기 위해 PONDER를 반환하십시오

  중요: "tool_name" 필드는 위의 사용 가능한 도구 목록과 정확히 일치해야 합니다.

evaluation_steps: |
  1단계: 문서 읽기
  - quick_start, detailed_instructions, examples 검토
  - 이 사용 사례에 적용되는 주의 사항 기록
  - when_to_use가 작업과 일치하는지 확인

  2단계: ASPDMA의 선택 평가
  - 문서에 따라 매개 변수가 올바릅니까?
  - 예제가 더 나은 매개 변수 형식을 제안합니까?
  - 모호한 필수 매개 변수가 있습니까?

  3단계: 주의 사항 확인
  - 이 특정 사용에 주의 사항이 적용됩니까?
  - 사용자가 이 동작을 기대합니까?
  - 사용자에게 먼저 경고하거나 요청해야 합니까?

  4단계: 작업 결정
  - TOOL: 확인 또는 다듬기, 주의 사항 인정
  - SPEAK: 특정 명확화 요청
  - PONDER: 재고할 이유 설명

closing_reminder: |
  중요: 귀하의 역할은 ASPDMA가 전체 문서 없이 볼 수 없었던 문제를 포착하는 것입니다. 도구 선택이 좋아 보이면 빠르게 확인하십시오.
  문서가 진정한 우려를 드러내는 경우에만 SPEAK 또는 PONDER를 사용하십시오.

  SPEAK를 선택할 때 구체적으로: "사용자가 답변해야 합니다: [질문]"
  PONDER를 선택할 때 설명: "이 도구는 Y 때문에 X를 수행할 수 없으므로 Z를 고려하십시오"
  TOOL을 선택할 때 인정: "주의 사항 X에 대한 인식을 가지고 진행"
