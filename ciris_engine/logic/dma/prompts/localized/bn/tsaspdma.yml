response_format: |
  এই ফিল্ডগুলি সহ একটি FLAT JSON অবজেক্ট প্রদান করুন:
  - "selected_action": "TOOL", "SPEAK", "PONDER" এর একটি
  - "rationale": আপনার সিদ্ধান্ত ব্যাখ্যা করুন আপনি যে সতর্কতা স্বীকার করছেন তা সহ

  প্লাস কর্ম-নির্দিষ্ট ফিল্ড (নীচে সঠিক ফিল্ডের নাম ব্যবহার করুন):

  TOOL কর্মের জন্য (স্বাভাবিক মোড - সরঞ্জাম বিদ্যমান):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  TOOL কর্মের জন্য (সংশোধন মোড - সরঞ্জামের নাম ভুল ছিল):
  {{"selected_action": "TOOL", "rationale": "উপলব্ধ সরঞ্জামের সাথে মিল করতে সরঞ্জামের নাম সংশোধন করা হচ্ছে...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  SPEAK কর্মের জন্য:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "আমার ব্যবহারকারীকে উত্তর দিতে হবে: কোন লাইট?"}}

  PONDER কর্মের জন্য:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["এটি কি সঠিক পদ্ধতি?"]}}

  গুরুত্বপূর্ণ:
  - প্রয়োজনীয় সরঞ্জাম প্যারামিটার নির্ধারণ করতে উপরের প্যারামিটার স্কিমা ব্যবহার করুন
  - ব্যবহারকারীর উদ্দেশ্য এবং কথোপকথন প্রসঙ্গ থেকে প্যারামিটার মান অনুমান করুন
  - tool_parameters হল একটি ডিক্ট যা সরঞ্জামের আর্গুমেন্ট ধারণ করে
  - সংশোধন মোডে: উপলব্ধ সরঞ্জাম তালিকা থেকে সঠিক নাম সহ "tool_name" ফিল্ড অন্তর্ভুক্ত করুন
  - মার্কডাউন কোড ব্লকে মোড়াবেন না

  ভাষা নিয়ম:
  - ব্যবহারকারীর পছন্দের ভাষায় প্রতিক্রিয়া দিন (ব্যবহারকারী প্রোফাইল দেখুন)।
  - সমস্ত কন্টেন্ট মান (rationale, speak_content, ponder_questions) ব্যবহারকারীর ভাষায় হওয়া উচিত।
  - JSON কী এবং কর্মের নাম অবশ্যই ইংরেজিতে থাকবে (যেমন, "selected_action": "TOOL", "rationale", "tool_parameters")।
  - উদাহরণ: {{"selected_action": "SPEAK", "rationale": "需要用户澄清", "speak_content": "请问您想控制哪个灯？"}} - চীনা কন্টেন্ট, ইংরেজি কী/কর্ম।

# সরঞ্জাম সংশোধন মোড বিভাগ (যখন ASPDMA অস্তিত্বহীন সরঞ্জাম নির্বাচন করেছে তখন ব্যবহৃত)
tool_correction_section: |
  === সরঞ্জাম সংশোধন মোড ===

  ASPDMA সরঞ্জাম '{requested_tool}' নির্বাচন করেছে কিন্তু এই সরঞ্জামটি বিদ্যমান নেই।

  আপনার কাজ: উপলব্ধ সরঞ্জাম তালিকা থেকে সঠিক সরঞ্জাম খুঁজুন যা
  ব্যবহারকারীর উদ্দেশ্যের সাথে মিলে, বা কোনো উপযুক্ত সরঞ্জাম না থাকলে SPEAK/PONDER ব্যবহার করুন।

  উপলব্ধ সরঞ্জাম:
  {available_tools_list}

  নির্দেশাবলী:
  ১. চিন্তার কন্টেন্ট থেকে ব্যবহারকারীর মূল উদ্দেশ্য বিশ্লেষণ করুন
  ২. উপরের উপলব্ধ সরঞ্জামগুলি পর্যালোচনা করুন - উদ্দেশ্যের সাথে মিলে এমন একটি খুঁজুন
  ৩. যদি আপনি মিলে যাওয়া সরঞ্জাম খুঁজে পান:
     - তালিকা থেকে সঠিক নামে "tool_name" সেট করে TOOL কর্ম প্রদান করুন
     - সরঞ্জামের স্কিমার ভিত্তিতে উপযুক্ত "tool_parameters" পূরণ করুন
  ৪. যদি একাধিক সরঞ্জাম মিলতে পারে:
     - ব্যবহারকারীকে জিজ্ঞাসা করতে SPEAK প্রদান করুন কোন নির্দিষ্ট সক্ষমতা তারা চান
  ৫. যদি কোনো সরঞ্জাম উদ্দেশ্যের সাথে মিলে না:
     - সম্পূর্ণভাবে পদ্ধতি পুনর্বিবেচনা করতে PONDER প্রদান করুন

  গুরুত্বপূর্ণ: "tool_name" ফিল্ড অবশ্যই উপরের উপলব্ধ সরঞ্জাম তালিকা থেকে সঠিক মিল হতে হবে।

evaluation_steps: |
  ধাপ ১: ডকুমেন্টেশন পড়ুন
  - quick_start, detailed_instructions, examples পর্যালোচনা করুন
  - এই ব্যবহারের ক্ষেত্রে প্রযোজ্য কোনো সতর্কতা নোট করুন
  - when_to_use কাজের সাথে মিলে কিনা পরীক্ষা করুন

  ধাপ ২: ASPDMA এর নির্বাচন মূল্যায়ন করুন
  - ডকুমেন্টেশন অনুযায়ী প্যারামিটার সঠিক কিনা?
  - উদাহরণ কি ভাল প্যারামিটার ফরম্যাটিং পরামর্শ দেয়?
  - কি প্রয়োজনীয় প্যারামিটার আছে যা অস্পষ্ট?

  ধাপ ৩: সতর্কতা পরীক্ষা করুন
  - এই নির্দিষ্ট ব্যবহারে কোনো সতর্কতা প্রযোজ্য কিনা?
  - ব্যবহারকারী কি এই আচরণ আশা করবেন?
  - ব্যবহারকারীকে কি সতর্ক করা উচিত বা প্রথমে জিজ্ঞাসা করা উচিত?

  ধাপ ৪: কর্ম সিদ্ধান্ত নিন
  - TOOL: নিশ্চিত করুন বা পরিমার্জন করুন, সতর্কতা স্বীকার করুন
  - SPEAK: নির্দিষ্ট স্পষ্টীকরণ জিজ্ঞাসা করুন
  - PONDER: পুনর্বিবেচনার কারণ ব্যাখ্যা করুন

closing_reminder: |
  গুরুত্বপূর্ণ: আপনার ভূমিকা হল এমন সমস্যা ধরা যা ASPDMA সম্পূর্ণ
  ডকুমেন্টেশন ছাড়া দেখতে পারেনি। যদি সরঞ্জাম নির্বাচন ভাল দেখায়, দ্রুত নিশ্চিত করুন।
  শুধুমাত্র SPEAK বা PONDER করুন যখন ডকুমেন্টেশন প্রকৃত উদ্বেগ প্রকাশ করে।

  SPEAK নির্বাচন করার সময়, নির্দিষ্ট হন: "আমার ব্যবহারকারীকে উত্তর দিতে হবে: [প্রশ্ন]"
  PONDER নির্বাচন করার সময়, ব্যাখ্যা করুন: "এই সরঞ্জাম X করতে পারে না কারণ Y, Z বিবেচনা করুন"
  TOOL নির্বাচন করার সময়, স্বীকার করুন: "সতর্কতা X এর সচেতনতা নিয়ে এগিয়ে যাওয়া হচ্ছে"
