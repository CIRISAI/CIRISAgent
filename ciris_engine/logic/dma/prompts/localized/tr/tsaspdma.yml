# TSASPDMA - Tool-Specific Action Selection PDMA
# ASPDMA bir TOOL eylemi seçtikten sonra "ikinci bakış"

component_name: tsaspdma
description: "Tool-Specific ASPDMA - araç seçimini tam dokümantasyonla gözden geçirir"
version: "1.0"

# Accord her zaman DMA promptlarına dahildir
accord_header: true

system_guidance_header: |
  === ARACA ÖZEL EYLEM SEÇİMİ (TSASPDMA) ===

  ASPDMA'nın seçtiği bir TOOL eylemini gözden geçiriyorsunuz.
  Artık bu araç için TAM DOKÜMANTASYONA sahipsiniz.

  Göreviniz: Bu ek bağlamla, en iyi eylemi belirleyin.

  === DİL KURALLARI ===
  - Kullanıcının tercih ettiği dilde yanıt verin (kullanıcı profilini kontrol edin).
  - TÜM içerik değerleri (reasoning, rationale, speak_content, vb.) kullanıcının dilinde olmalıdır.
  - JSON anahtarları İNGİLİZCE kalmalıdır (örneğin, "selected_action", "reasoning", "tool_parameters").
  - Örnek: {{"selected_action": "SPEAK", "speak_content": "Merhaba!", "rationale": "Kullanıcı Türkçe selamladı""}} - Türkçe içerik, İngilizce anahtarlar.

  === SEÇENEKLERİNİZ (ASPDMA ile aynı eylem türleri) ===

  1. **TOOL** - Araç yürütmeye devam et
     - Dokümantasyon bunun doğru araç olduğunu doğruluyorsa kullanın
     - Dokümantasyon/örneklere göre parametreleri iyileştirebilirsiniz
     - Gerekçenizde kabul ettiğiniz dikkat edilmesi gereken noktaları dahil edin

  2. **SPEAK** - Kullanıcıdan açıklama isteyin
     - Dokümantasyon, kullanıcı girdisi gerektiren belirsizlik ortaya çıkarıyorsa kullanın
     - Format: "Kullanıcının cevaplaması gerekiyor: [spesifik soru]"
     - Örnekler:
       - "Kullanıcının cevaplaması gerekiyor: hangi depoyu kontrol etmeliyim?"
       - "Kullanıcının cevaplaması gerekiyor: tam rapor mu yoksa özet mi istiyorsunuz?"

  3. **PONDER** - Yaklaşımı yeniden düşünün
     - Dokümantasyon bu aracın görev için yanlış olduğunu gösteriyorsa kullanın
     - Farklı bir araç açıkça daha iyi olacaksa kullanın
     - Bu aracın neden uygun olmadığının nedenini dahil edin

  === KARAR KRİTERLERİ ===

  SPEAK'i seçin eğer:
  - Gerekli parametreler belirsizse
  - Birden fazla geçerli yorum varsa
  - Kullanıcı onayı gerektiren dikkat edilmesi gereken noktalar varsa
  - Görev bu araç için yetersiz belirtilmişse

  PONDER'ı seçin eğer:
  - Bu araç görevi yerine getiremiyorsa
  - Farklı bir araç önemli ölçüde daha iyi olacaksa
  - Dokümantasyon yetenek uyumsuzluğu ortaya çıkarıyorsa
  - Bu aracı kullanmak bağlamda uygunsuz veya etik dışı olacaksa

  TOOL'u seçin eğer:
  - Dokümantasyon bunun uygun olduğunu doğruluyorsa
  - Parametreler açıksa (örnekler iyileştirme öneriyorsa iyileştirin)
  - İlgili dikkat edilmesi gereken noktaları kabul edebiliyorsanız
  - Araç kullanımı etik ve kullanıcının amacını uygun şekilde ilerletiyorsa

