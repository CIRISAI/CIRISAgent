name: Build and Deploy
# GitHub Container Registry permissions fixed in org settings

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run mypy in parallel with tests for faster feedback
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # Stdlib-only guard, no deps required — run before the pip install so a
      # localization regression fails fast. Catches keys referenced in
      # commonMain Kotlin (localizedString/getString) that are undefined in
      # en.json (which render raw on every platform — CIRISAgent#240) and
      # en.json mirror drift across platform bundles.
      - name: Localization guard (reference coverage + mirror parity)
        run: python tools/dev/check_localization_sync.py

      # D27: runtime code must not depend on its own .md (outside L4 attestation
      # tree). Stdlib-only AST gate, no deps. CIRISAgent#807.
      - name: D27 runtime .md-reference gate
        run: python tools/dev/check_no_runtime_md_reference.py

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        # Retry-wrapped per 2.8.11 CI hardening: PyPI transients (slow mirror
        # selection, 503s, regional CDN flake) cause single-attempt installs
        # to fail ~1-2% of runs. nick-fields/retry@v4 with exp backoff turns
        # those into noise instead of CI failures. Worst-case wait: 3×30s.
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: |
            pip install --upgrade pip
            pip install typing_extensions>=4.0.0
            pip install -r requirements.txt
            pip install -r requirements-dev.txt

      - name: Run mypy strict type checking
        run: |
          mypy ciris_engine --config-file mypy.ini

  # Sharded test execution - 8 parallel jobs for ~8x speedup
  test:
    name: Test (shard ${{ matrix.shard }}/8)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Essential for accurate SonarQube results

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Clean Python Cache and Test Artifacts
        run: |
          find . -type d -name __pycache__ -exec rm -rf {} + || true
          find . -type f -name "*.pyc" -delete || true
          find . -type f -name "*.pyo" -delete || true
          rm -rf .pytest_cache || true
          rm -f test_*.db || true
          rm -f ciris_engine.db || true
          rm -rf data/*.db || true

      - name: Install Dependencies
        # Retry-wrapped per 2.8.11 CI hardening.
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: |
            pip install --upgrade pip
            pip install typing_extensions>=4.0.0
            pip install -r requirements.txt
            pip install -r requirements-dev.txt
            pip install pytest-split  # For test sharding

      - name: Run tests (shard ${{ matrix.shard }}/8)
        env:
          CI: true
        run: |
          # Sharded test execution with stability flags:
          # --splits 8 --group N: Split tests into 8 groups, run group N
          # --splitting-algorithm=least_duration: Balance by test duration
          # --store-durations: Save durations to .test_durations (JSON dict)
          # --reruns=2: Rerun failed/crashed tests up to 2 times
          # -n 4: 4 parallel workers within each shard
          # --dist=loadgroup: Respect xdist_group markers (keep grouped tests on same worker)
          # timeout 1800: Force-kill after 30 minutes (tests ~10min + buffer for slow CI)
          timeout --signal=SIGTERM --kill-after=30 1800 \
            pytest tests/ -n 4 --dist=loadgroup \
            --splits 8 --group ${{ matrix.shard }} \
            --splitting-algorithm=least_duration \
            --store-durations --durations-path=test_durations_shard_${{ matrix.shard }} \
            --reruns=2 --reruns-delay=1 --max-worker-restart=4 \
            --cov=./ --cov-report=xml:coverage-shard-${{ matrix.shard }}.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage-shard-${{ matrix.shard }}.xml
          retention-days: 1

      - name: Upload durations artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: durations-shard-${{ matrix.shard }}
          path: test_durations_shard_${{ matrix.shard }}
          retention-days: 7

  # Postgres backend verification — Phase 1 of 2.9.0 waterfall.
  # Runs the persist-routed test suite against a real Postgres so the
  # sqlx-bundled Postgres backend is verified before 2.9.0 ships. Scope is
  # the persistence layer; full agent QA on Postgres comes later once
  # Phases 2-4 finish migrating raw-SQL callers to persist substrate.
  test-postgres:
    name: Test (persist backend = postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ciris_test
          POSTGRES_PASSWORD: ciris_test_password
          POSTGRES_DB: ciris_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ciris_test -d ciris_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: |
            pip install --upgrade pip
            pip install typing_extensions>=4.0.0
            pip install -r requirements.txt
            pip install -r requirements-dev.txt

      - name: Run persistence tests against Postgres-backed persist
        env:
          CI: true
          CIRIS_DB_URL: postgresql://ciris_test:ciris_test_password@localhost:5432/ciris_test_db
          # Mark this run so test fixtures that need to opt out of the
          # Postgres backend (e.g. legacy SQLite-only schema tests) can
          # skip themselves cleanly. Phases 2-4 will widen the scope.
          CIRIS_TEST_BACKEND: postgres
        run: |
          # Phase 1 scope: persist-substrate roundtrip tests + the
          # tests that drive ciris-persist directly. Excludes legacy
          # raw-SQL tests pending Phase 2-4 migration.
          timeout --signal=SIGTERM --kill-after=30 1200 \
            pytest \
              tests/ciris_engine/logic/persistence/ \
              tests/test_persistence/ \
              -n 4 \
              --reruns=2 --reruns-delay=1 \
              --timeout=120 \
              -k "not sqlite_only" \
              -m "not skip_postgres"

  # Staged QA — run the full QA suite against a venv installed from the
  # canonical staged tree (tools.dev.stage_runtime → wheel → venv).
  # Validates the SHIPPED wheel artifact, not just the source tree. Catches
  # the class of bug where setup.py / MANIFEST.in / staging diverge silently
  # and the wheel ships incomplete content (the 2.8.4 thin-wheel + missing
  # conscience-prompts incident class). Fast (~3–4 min on cold cache) so
  # cheap to gate releases on.
  staged-qa:
    name: Staged QA (${{ matrix.subset }})
    runs-on: ubuntu-latest
    # Matrix-split: all_1 / all_2 run as parallel jobs, each dual-backend
    # (sqlite + postgres, parallel). fail-fast off so one leg's failure
    # doesn't cancel the other.
    #
    # timeout-minutes 30 was too short: each job runs sqlite + postgres as
    # concurrent subprocesses, and the postgres leg is meaningfully slower
    # (real PG vs in-process SQLite). It consistently overran the 30-min
    # cap, so GH SIGTERM'd the job mid-run — the postgres agent then did a
    # normal graceful shutdown and its remaining ~77 tests failed
    # "connection refused", while the faster sqlite leg had already gone
    # green. Raised to 55 so the slower leg finishes cleanly.
    timeout-minutes: 55
    strategy:
      fail-fast: false
      matrix:
        subset: [all_1, all_2]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-staged-qa-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-staged-qa-
            ${{ runner.os }}-pip-

      - name: Install TPM2 system libraries
        # Required at runtime by ciris-verify v1.13.2's Linux x86_64 wheel
        # (libtss2-tctildr.so.0 + transitive friends). Without these,
        # `from ciris_verify import verify_tree` fails at ctypes.CDLL with
        # `OSError: libtss2-tctildr.so.0: cannot open shared object file`.
        # Full subset per CIRISAgent#740: tctildr + esys + mu + rc + sys.
        # ubuntu-latest ships without them by default; production Dockerfile
        # apt-installs the same set.
        #
        # Retry-wrapped per 2.8.11 CI hardening: apt mirror selection
        # occasionally returns stale package lists or transient 503s.
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          shell: bash
          command: |
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends \
              libtss2-esys-3.0.2-0t64 \
              libtss2-mu-4.0.1-0t64 \
              libtss2-rc0t64 \
              libtss2-sys1t64 \
              libtss2-tctildr0t64 \
              libtss2-tcti-device0t64

      - name: Install dev deps + build tooling
        # Retry-wrapped per 2.8.11 CI hardening.
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: |
            pip install --upgrade pip wheel
            # qa_runner needs the dev requirements to run (rich, requests, etc.);
            # the staged venv installs the wheel's runtime deps separately via
            # tools.qa_runner.staged_env.
            pip install -r requirements.txt
            pip install -r requirements-dev.txt
            pip install build  # for stage_env's wheel-build step

      - name: Cross-platform parity assertion (staged tree == wheel install)
        # Pre-flight: prove the canonical staging algorithm produces the same
        # bytes the wheel ships. If this fails, every downstream platform
        # (Android Chaquopy, iOS Resources, docker, wheel install) drifts
        # from the signed manifest and L4 cannot pass. Cheap to assert here.
        run: |
          python3 -m tools.dev.stage_runtime --check --quiet > /tmp/staged-hash
          # Build a wheel from the staged tree, install into a tempvenv,
          # walk what got installed and compare. (Reuses staged_env.prepare
          # which is what qa_runner --from-staged calls.)
          python3 -m tools.qa_runner.staged_env --rebuild --root /tmp/ciris-staged-qa
          python3 -m tools.dev.stage_runtime --check --quiet \
            --src /tmp/ciris-staged-qa/venv/lib/python3.12/site-packages \
            > /tmp/installed-hash
          echo "Staged tree hash:    $(cat /tmp/staged-hash)"
          echo "Wheel-install hash:  $(cat /tmp/installed-hash)"
          if ! diff -q /tmp/staged-hash /tmp/installed-hash; then
            echo "::error::Canonical staged tree and wheel install diverge!"
            echo "::error::See tools/dev/stage_runtime.py::ExemptRules vs setup.py package_data + MANIFEST.in."
            exit 1
          fi
          echo "✓ Canonical staging == wheel install (byte-equal)"

      - name: Run QA against staged venv (${{ matrix.subset }}, dual backend)
        env:
          # Force first-run state so the QA runner can drive the setup wizard.
          CIRIS_FORCE_FIRST_RUN: "1"
        run: |
          # --from-staged: server-under-test is the wheel-installed ciris-server
          # in /tmp/ciris-staged-qa/venv (already prepared by the parity-check
          # step above; staged_env.prepare is idempotent and reuses it).
          # --no-mock-llm not set → uses mock LLM (no API keys needed in CI).
          #
          # --database-backends sqlite postgres --parallel-backends: exercises
          # the full QA suite against BOTH persistence backends simultaneously.
          # qa_runner self-provisions the postgres backend via a docker
          # container (ubuntu-latest ships Docker); no GH service block needed.
          python3 -m tools.qa_runner ${{ matrix.subset }} --from-staged \
            --database-backends sqlite postgres --parallel-backends

      - name: Capture upgrade-compat fixture (qa-full)
        # Snapshot the post-QA-sweep agent state as a "full-coverage"
        # upgrade fixture. qa_runner exercises every module's API surface,
        # so the DB carries the widest variety of graph/audit/secrets
        # state of the three host workflows. See tools/release/UPGRADE_FIXTURE.md.
        # qa_runner sets CIRIS_HOME=project_root, so DBs land at
        # $GITHUB_WORKSPACE/data — the action's default location.
        # Captured on the all_1 leg only — one fixture, no cross-leg
        # artifact-name collision.
        if: success() && matrix.subset == 'all_1'
        uses: ./.github/actions/capture-upgrade-fixture
        with:
          source-name: qa-full

      - name: Upload qa_status snapshot
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: staged-qa-status-${{ matrix.subset }}
          path: qa_reports/qa_status.json
          retention-days: 14

      - name: Surface incidents log to job summary on failure
        # Don't make operators download the artifact + grep by hand. The
        # actual cause of "agent never reached WORK" is usually a single
        # ERROR/CRITICAL block in incidents_latest.log — pull it inline so
        # it's visible in the GitHub Actions step log and the job summary.
        if: failure()
        run: |
          {
            echo "## 🚨 Staged QA (${{ matrix.subset }}) failed — surfacing logs"
            echo
            for backend in sqlite postgres; do
              inc="logs/${backend}/incidents_latest.log"
              if [ -f "$inc" ]; then
                echo "### ${backend}: ERROR / CRITICAL lines from \`$inc\`"
                echo
                echo '```'
                # Each ERROR/CRITICAL line + 5 following lines for traceback
                # context. `grep -A 5 ... | head -200` caps at 200 lines so a
                # runaway stack trace doesn't blow out the summary.
                grep -nE ' - (ERROR|CRITICAL)|RUNTIME SHUTDOWN REQUESTED' -A 5 "$inc" \
                  | head -200 \
                  || echo "(no ERROR/CRITICAL lines — investigate latest.log)"
                echo '```'
                echo
              else
                echo "### ${backend}: no incidents log at \`$inc\`"
                echo
              fi
            done
            echo "Full logs in artifact: **staged-qa-server-logs-${{ matrix.subset }}**"
            echo
            echo "Download with: \`gh run download <RUN_ID> -n staged-qa-server-logs-${{ matrix.subset }}\`"
            echo "(NOT \`-p '*'\` — path filters silently drop everything that doesn't match)"
          } >> "$GITHUB_STEP_SUMMARY"
          # Also echo a marker to the step log so it's findable in a scroll.
          echo "::group::Incidents log highlights (also in job summary)"
          for backend in sqlite postgres; do
            inc="logs/${backend}/incidents_latest.log"
            if [ -f "$inc" ]; then
              echo "--- ${backend} ---"
              grep -nE ' - (ERROR|CRITICAL)|RUNTIME SHUTDOWN REQUESTED' -A 5 "$inc" | head -200 || true
            fi
          done
          echo "::endgroup::"

      - name: Upload server logs on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: staged-qa-server-logs-${{ matrix.subset }}
          path: |
            logs/
            /tmp/ciris-staged-qa/venv/lib/python3.12/site-packages/logs/
          retention-days: 7
          if-no-files-found: warn

  # Combine coverage and run SonarQube after all shards complete
  test-summary:
    name: Test Summary
    needs: [typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: coverage-shard-*
          path: coverage/
          merge-multiple: true

      - name: Combine coverage reports
        run: |
          pip install coverage
          # Combine XML reports into single coverage.xml
          python -c "
          import xml.etree.ElementTree as ET
          import glob

          files = glob.glob('coverage/coverage-shard-*.xml')
          if not files:
              print('No coverage files found')
              exit(0)

          # Use first file as base
          base = ET.parse(files[0])
          base_root = base.getroot()

          # Merge others
          for f in files[1:]:
              tree = ET.parse(f)
              for pkg in tree.findall('.//package'):
                  base_root.find('.//packages').append(pkg)

          base.write('coverage.xml')
          print(f'Combined {len(files)} coverage reports')
          "
          ls -la coverage*.xml || true

      - name: Download all duration artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: durations-shard-*
          path: durations/
          merge-multiple: true

      - name: Analyze slowest tests (top 1%)
        run: |
          python -c "
          import json
          import glob

          # Collect all test durations from all shards
          # pytest-split format: {test_nodeid: duration_seconds, ...}
          all_tests = []
          for f in glob.glob('durations/test_durations_shard_*'):
              try:
                  with open(f) as fp:
                      data = json.load(fp)
                      for test_name, duration in data.items():
                          all_tests.append({
                              'name': test_name,
                              'duration': duration
                          })
              except Exception as e:
                  print(f'Warning: Could not parse {f}: {e}')

          if not all_tests:
              print('No test duration data found')
              exit(0)

          # Sort by duration descending
          all_tests.sort(key=lambda x: x['duration'], reverse=True)

          total = len(all_tests)
          top_1_pct = max(1, total // 100)  # At least 1 test

          print(f'## Slowest Tests (Top 1% of {total} tests)')
          print()
          print(f'| Rank | Duration | Test |')
          print(f'|------|----------|------|')

          total_slow_time = 0
          for i, test in enumerate(all_tests[:top_1_pct], 1):
              duration = test['duration']
              total_slow_time += duration
              name = test['name']
              # Truncate long names
              if len(name) > 80:
                  name = '...' + name[-77:]
              print(f'| {i} | {duration:.2f}s | \`{name}\` |')

          print()
          total_time = sum(t['duration'] for t in all_tests)
          print(f'**Top 1% ({top_1_pct} tests) account for {total_slow_time:.1f}s of {total_time:.1f}s total ({100*total_slow_time/total_time:.1f}%)**')
          " | tee slowest-tests.md

          # Add to GitHub Actions summary
          echo "## 🐢 Slowest Tests" >> $GITHUB_STEP_SUMMARY
          cat slowest-tests.md >> $GITHUB_STEP_SUMMARY

      - name: Display and write version
        env:
          CIRIS_BUILD_SIGN_KEY: ${{ secrets.CIRIS_BUILD_SIGN_KEY }}
        run: |
          python version.py
          cat BUILD_INFO.txt || echo "No BUILD_INFO.txt created"

      - name: Upload BUILD_INFO artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-info
          path: BUILD_INFO.txt

      # SonarQube scan (only on main repo)
      - name: Check SonarQube conditions
        id: check_sonar
        run: |
          echo "Repository: ${{ github.repository }}"
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [[ "$REPO_LOWER" == "cirisai/cirisagent" ]] && [[ -n "${{ secrets.SONAR_TOKEN }}" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: SonarCloud Scan
        if: steps.check_sonar.outputs.should_run == 'true'
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Platform-specific wheels: each runner builds the desktop JAR for its OS,
  # then setup.py detects the JAR platform and tags the wheel accordingly.
  # Runs in parallel with tests; `publish-wheels` is the gate that requires
  # test-summary to have passed before any wheel is uploaded.
  build-wheel:
    name: Build Wheel (${{ matrix.name }})
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false  # Don't cancel other builds if one fails/is cancelled
      matrix:
        include:
          - os: macos-14
            name: macOS ARM64
          # macOS Intel: built and uploaded manually (GitHub runner capacity issues)
          - os: ubuntu-latest
            name: Linux x64
          - os: windows-latest
            name: Windows x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle (with distribution + dependency cache)
        # 2.8.11 Tier 2 CI hardening: setup-gradle@v4 caches the Gradle
        # distribution itself (the gradle-X.Y-bin.zip download that timed
        # out post-2.8.10 merge) AND the dependency cache (~/.gradle/caches).
        # First run on a runner downloads + caches; subsequent runs and
        # subsequent jobs on the same workflow share the cache.
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build CIRIS Desktop UberJar
        # Retry-wrapped per 2.8.11 CI hardening: gradle's distribution
        # download from services.gradle.org has a 10s socket timeout by
        # default and DOES fail in the wild (caused the 2.8.10 merge-commit
        # CI flake on main). Tier 2 will swap raw gradlew → setup-gradle
        # action with caching; this retry handles the remaining tail risk.
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 60
          shell: bash
          command: |
            cd client
            ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
            mkdir -p ../ciris_engine/desktop_app
            cp desktopApp/build/compose/jars/CIRIS-*.jar ../ciris_engine/desktop_app/
            echo "Desktop JAR:"
            ls -lh ../ciris_engine/desktop_app/

      # NOTE: JRE bundling removed to keep wheel size under PyPI's 100MB limit.
      # The desktop JAR (~60MB) is included; users must have Java 17+ installed.
      # The CLI provides platform-specific installation instructions if Java
      # is not found (see ciris_engine/desktop_launcher.py).

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Build wheel
        run: |
          python -m build --wheel
          ls -lh dist/
        shell: bash

      - name: Check wheel contents
        run: |
          WHEEL_FILE=$(ls dist/*.whl)
          echo "Wheel: $WHEEL_FILE"
          unzip -l "$WHEEL_FILE" | grep "\.jar" || echo "WARNING: No JAR found in wheel!"
          echo "Total files:"
          unzip -l "$WHEEL_FILE" | tail -1
        shell: bash

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
          retention-days: 30

  # Windows fat installer: PyInstaller-bundled ciris-agent.exe + jlink-trimmed
  # JRE + Compose desktop JAR + libciris_verify.dll, all wrapped in a single
  # Inno Setup .exe. Solves the "Python install path issues" + "Java not
  # installed" pain points for non-technical Windows users (2.7.6 install
  # initiative). Output uploaded as a CI artifact and attached to GitHub
  # Releases on tagged main pushes.
  #
  # See installers/windows/README.md for the full pipeline rationale and
  # how to build locally for testing without a CI run.
  build-windows-installer:
    name: Build Windows Installer
    # Runs in parallel with tests; produces a CI artifact for human download.
    # No downstream job depends on it, so test-summary is not a prerequisite.
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Java 17 (for jlink + desktop JAR build)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle (with distribution + dependency cache)
        # 2.8.11 Tier 2 CI hardening — see equivalent step in build-wheel
        # matrix above for rationale.
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Install Python dependencies
        # Retry-wrapped per 2.8.11 CI hardening.
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: bash
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pyinstaller

      - name: Build CIRIS Desktop UberJar
        # Same step as the matrix wheel build — installer needs the JAR
        # whether or not the wheel build runs in the same workflow.
        # Retry-wrapped per 2.8.11 CI hardening (this step was the cause
        # of the 2.8.10 merge-commit flake on main; see notes above).
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 60
          shell: bash
          command: |
            cd client
            ./gradlew :desktopApp:packageUberJarForCurrentOS --no-daemon
            ls -lh desktopApp/build/compose/jars/

      - name: Build PyInstaller bundle
        run: |
          cd installers/windows
          pyinstaller ciris-agent.spec --noconfirm
          ls dist/ciris-agent/ | head -20
        shell: bash

      - name: Locate desktop JAR for installer
        # PyInstaller's --onedir lands the bundle at
        #   installers/windows/dist/ciris-agent/
        # but Inno Setup's .iss expects the bundle at
        #   dist/ciris-agent/ (repo-root-relative).
        # Move it up + ensure the desktop JAR is at the path the .iss
        # references.
        run: |
          mkdir -p dist
          mv installers/windows/dist/ciris-agent dist/
          # The .iss references ..\..\client\desktopApp\build\compose\jars\
          # which already exists from the gradle step above.
          ls dist/ciris-agent/ | head -10
        shell: bash

      - name: Trim JRE via jlink
        run: |
          $jar = Get-ChildItem -Path 'client\desktopApp\build\compose\jars' -Filter 'CIRIS-windows-*.jar' | Select-Object -First 1
          if (-not $jar) { Write-Error "No CIRIS-windows-*.jar found"; exit 1 }
          .\installers\windows\bundle-jre.ps1 -JarPath $jar.FullName -OutputDir dist\runtime
        shell: pwsh

      - name: Install Inno Setup
        # Retry-wrapped per 2.8.11 CI hardening: chocolatey CDN can return
        # transient HTTP 503 / connection-reset; one bad fetch shouldn't
        # tank the entire installer build.
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          shell: pwsh
          command: choco install innosetup -y --no-progress

      - name: Build installer with Inno Setup
        # Pass the version explicitly so the installer name and metadata
        # match what the bundled binaries report. Read from constants.py
        # to keep one source of truth.
        run: |
          # Read CIRIS_VERSION without importing the `ciris_engine`
          # package — the package's __init__ pulls full runtime + deps
          # not installed in this job (only ciris-verify is). exec()'ing
          # constants.py directly runs only its stdlib imports +
          # constant assignments. Strip "-stable" suffix to match the
          # installer-name convention.
          $version = python -c "exec(open('ciris_engine/constants.py').read()); print(CIRIS_VERSION.replace('-stable',''))"
          Write-Host "Building installer for CIRIS $version"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
              "/DCirisVersion=$version" `
              installers\windows\ciris-installer.iss
          Get-ChildItem dist\*.exe
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-installer
          path: dist/CIRIS-Setup-*.exe
          retention-days: 30

  # Headless wheel (no desktop JAR) for server-only deployments.
  # Tagged py3-none-any so it's a universal fallback.
  build-wheel-headless:
    name: Build Wheel (Headless)
    # Runs in parallel with tests; gated downstream by `publish-wheels`.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build wheel

      - name: Build headless wheel (no JAR)
        run: |
          # Ensure no JAR or bundled JRE is present so setup.py produces py3-none-any
          rm -rf ciris_engine/desktop_app/*.jar ciris_engine/desktop_app/jre
          python -m build --wheel
          ls -lh dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v6
        with:
          name: wheel-headless
          path: dist/*.whl
          retention-days: 30

  # Collect all wheels and publish to PyPI + alias packages + SDK
  publish-wheels:
    name: Publish Wheels
    # Choke point gating all release-side jobs: tests must have passed AND
    # all wheels must have built. register-build / deploy / android-release
    # transitively depend on this through their `needs` chains.
    needs: [test-summary, build-wheel, build-wheel-headless]
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: List all wheels
        run: ls -lh dist/*.whl

      - name: Install build tools
        run: |
          pip install --upgrade pip
          pip install build twine

      - name: Publish to PyPI
        if: github.ref == 'refs/heads/main' && github.repository == 'CIRISAI/CIRISAgent'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          # NO continue-on-error: a 2.7.4 incident hid the PyPI project-size
          # quota rejection (`400 Project size too large`) behind a green
          # build for two releases — only the 9.2 MB headless wheel made
          # it to PyPI, the three platform-specific wheels (~65-70 MB each)
          # were silently dropped, and Linux/macOS/Windows desktop installs
          # got the headless wheel with no JAR. If twine fails now, this
          # step fails — visible in CI, not buried.
          python -m twine upload dist/*.whl --skip-existing --verbose

      - name: Build and publish alias packages
        if: github.ref == 'refs/heads/main' && github.repository == 'CIRISAI/CIRISAgent'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          # Build and publish alias packages (depend on ciris-agent)
          for pkg in packages/ciris-engine packages/cirisagent packages/cirisai packages/ciris-ai; do
            if [ -d "$pkg" ]; then
              echo "Building $pkg..."
              cd "$pkg"
              python -m build --wheel
              python -m twine upload dist/*.whl --skip-existing || true
              cd ../..
            fi
          done

      - name: Build and publish SDK
        if: github.ref == 'refs/heads/main' && github.repository == 'CIRISAI/CIRISAgent'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd ciris_sdk
          python -m build --wheel
          python -m twine upload dist/*.whl --skip-existing || true

  build:
    name: Build Docker Images
    # Runs in parallel with tests; gated downstream by `register-build`
    # (which needs both this job and `publish-wheels`, and `publish-wheels`
    # carries the test-summary gate).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # Generate BUILD_INFO inline rather than downloading the test-summary
      # artifact — keeps this job parallel with tests. version.py just hashes
      # the Python tree and HMAC-signs it; no test-result dependency.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate BUILD_INFO
        env:
          CIRIS_BUILD_SIGN_KEY: ${{ secrets.CIRIS_BUILD_SIGN_KEY }}
        run: |
          python version.py
          cat BUILD_INFO.txt || echo "No BUILD_INFO.txt created"

      # The "Regenerate startup_python_hashes.json" bridge step was retired
      # in 2.8.6 (CIRISAgent#740). Desktop / server now call ciris_verify
      # v1.13.2's verify_tree() FFI directly against agent_root — no JSON
      # middleman. Mobile (Chaquopy) keeps its own boot-time hash dump for
      # Algorithm B. Closes the L3 ceiling on installs (CIRISVerify#9).

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.repository == 'CIRISAI/CIRISAgent' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from constants
        id: version
        run: |
          VERSION=$(grep "^CIRIS_VERSION = " ciris_engine/constants.py | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/cirisai/ciris-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=${{ steps.version.outputs.version }},enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/agent/Dockerfile
          push: ${{ github.repository == 'CIRISAI/CIRISAgent' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64



      - name: Build Summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.repository }}" != "CIRISAI/CIRISAgent" ]]; then
            echo "✅ Built images locally (fork - no push)" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]]; then
              echo "✅ Built images locally (fork PR - no push)" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ Built and pushed images (same-repo PR)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "✅ Built and pushed images (branch push)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Images:" >> $GITHUB_STEP_SUMMARY
          echo "- ciris-agent" >> $GITHUB_STEP_SUMMARY

  register-build:
    name: Register Build with CIRISRegistry
    needs: [build, publish-wheels]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.repository == 'CIRISAI/CIRISAgent'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ciris-build-sign (CIRISVerify v1.10.1+)
        # v1.10.1 ships the `register` subcommand which writes all 3 registry
        # tables (builds + binary_manifests + function_manifests) — closes
        # the parent-row gap that left 2.7.8/2.7.9 with only function_manifests
        # rows (#727). Also cuts over from gRPC RegisterBuild → HTTP POST
        # /v1/builds; drops REGISTRY_JWT_SECRET requirement. Floor kept at the
        # current runtime triple (4.8.0) so the CLI matches what the agent
        # signs against at runtime — avoids canonical-hash skew on register.
        run: |
          pip install --upgrade "ciris-verify>=4.8.0"
          which ciris-build-sign && ciris-build-sign --version

      - name: Emit build-secrets hash file
        # The agent's release builds inject secrets at build time into files
        # not in the source repo. Their SHA-256 hashes are tracked in
        # build_agent_extras.py and surfaced here for ciris-build-sign
        # --tree-extra-hashes-file consumption.
        run: |
          python tools/ops/build_agent_extras.py > build-secrets.json
          cat build-secrets.json
          # Desktop staged tree does NOT contain _build_secrets.py (it is
          # generated at deployment time). Mobile Resources/app DOES contain
          # it (generated at iOS build time). Split so each sign step uses
          # the correct extra-hashes file.  See CIRISAgent#743.
          echo '{}' > build-secrets-desktop.json
          cp build-secrets.json build-secrets-mobile.json

      - name: Stage canonical runtime tree
        # Produce the SAME tree CIRISVerify walks at runtime. Single source of
        # truth for: (a) the manifest signed below, (b) the wheel content (via
        # setup.py package_data + MANIFEST.in), (c) Android Chaquopy bundle,
        # (d) iOS Resources bundle. Every consumer hashes the same bytes, so
        # the runtime walk produces the same total_hash the signing-time walk
        # produced — L4 file integrity passes by construction.
        #
        # Algorithm matches ciris_verify_core::security::build_manifest::
        # walk_file_tree + ExemptRules byte-for-byte. See tools/dev/
        # stage_runtime.py docstring for the full rule set.
        run: |
          python3 -m tools.dev.stage_runtime /tmp/ciris-staged --print-manifest > /tmp/ciris-staged-manifest.json
          # Echo the hash to the workflow log so a green build is auditable.
          python3 -c "import json; m=json.load(open('/tmp/ciris-staged-manifest.json')); print(f'Staged hash: {m[\"total_hash\"]}'); print(f'Staged files: {m[\"files_copied\"]}')"

      - name: Sign build manifest (Python runtime, staged)
        env:
          # Fleet convention: secrets stored base64-encoded; ciris-build-sign
          # reads the seed/secret as FILE PATHS (not raw values), so we
          # materialize to mktemp paths before invocation. Pattern matches
          # CIRISPersist/.github/workflows/ci.yml exactly. Bridge-provisioned
          # across all 6 onboarded repos on 2026-05-01.
          CIRIS_BUILD_ED25519_SECRET: ${{ secrets.CIRIS_BUILD_ED25519_SECRET }}
          CIRIS_BUILD_MLDSA_SECRET: ${{ secrets.CIRIS_BUILD_MLDSA_SECRET }}
        run: |
          if [ -z "${CIRIS_BUILD_ED25519_SECRET}" ] || [ -z "${CIRIS_BUILD_MLDSA_SECRET}" ]; then
            echo "::error::Hybrid signing secrets not configured."
            echo "::error::Set CIRIS_BUILD_ED25519_SECRET and CIRIS_BUILD_MLDSA_SECRET."
            echo "::error::See CIRISPersist/docs/BUILD_SIGNING.md for ciris-build-sign generate-keys + secret upload."
            exit 1
          fi
          # Materialize the secret bytes to short-lived files. set +x stays
          # OFF so the secret never echoes to logs (GH Actions auto-masks
          # declared secrets, but belt-and-suspenders here too).
          umask 077
          ED_KEY_PATH=$(mktemp)
          MLDSA_KEY_PATH=$(mktemp)
          # Secrets are stored base64-encoded; decode to raw bytes for the CLI.
          printf '%s' "${CIRIS_BUILD_ED25519_SECRET}" | base64 -d > "$ED_KEY_PATH"
          printf '%s' "${CIRIS_BUILD_MLDSA_SECRET}" | base64 -d > "$MLDSA_KEY_PATH"

          # Read CIRIS_VERSION as a string literal without importing the
          # `ciris_engine` package (transitive import chain pulls runtime
          # deps not installed in this signing job; only ciris-verify is).
          # Strip the channel suffix (-stable / -rc / -beta) so the
          # registry receives plain semver in `binary_version` per #726
          # — every other primitive ships plain semver, and the registry
          # does exact-string match on the column. Format in source:
          # `CIRIS_VERSION = "x.y.z-stage"`.
          VERSION=$(awk -F'"' '/^CIRIS_VERSION = /{print $2; exit}' ciris_engine/constants.py | sed -E 's/-(stable|rc[0-9]*|beta[0-9]*|alpha[0-9]*)$//')
          if [ -z "$VERSION" ]; then
            echo "ERROR: failed to extract CIRIS_VERSION from ciris_engine/constants.py"; exit 1
          fi
          echo "CIRIS_VERSION (stripped of channel suffix) = $VERSION"
          GIT_SHA=$(git rev-parse HEAD)
          # Sign the staged tree. No --tree-include or --tree-exempt-* flags
          # needed: stage_runtime already applied the canonical filter, so
          # what's at /tmp/ciris-staged is exactly what gets signed and
          # exactly what the runtime walks. Target name preserved as
          # python-source-tree for v1.12.x verify-client compatibility (the
          # name is historical; the content is now the staged runtime).
          # Explicit --tree-include / --tree-exempt-dir / --tree-exempt-ext flags
          # match tools/dev/stage_runtime.py::ExemptRules byte-for-byte. Without
          # them, ciris-build-sign falls back to its internal defaults which
          # exclude .json (and other non-py extensions) — that drops 30+ real
          # runtime data files (ciris_engine/data/localized/*.json) from the
          # registered manifest, even though they're already in the staged tree
          # AND in the wheel install. Caught at L4 validation post-2.8.6 merge.
          # CIRISAgent#742, drift-protection in tests/dev/test_canonical_rules_parity.py.
          ciris-build-sign sign \
            --primitive agent \
            --tree /tmp/ciris-staged \
            --tree-include ciris_engine ciris_adapters ciris_sdk \
            --tree-exempt-dir __pycache__ .venv venv node_modules logs .pytest_cache .mypy_cache dist build .ruff_cache .coverage .tox .nox .git tests examples gui_static desktop_app \
            --tree-exempt-ext pyc pyo env log audit db sqlite sqlite3 md pyi deleted \
            --tree-extra-hashes-file build-secrets-desktop.json \
            --binary-version "$VERSION" \
            --build-id "$GIT_SHA" \
            --target python-source-tree \
            --ed25519-seed "$ED_KEY_PATH" \
            --mldsa-secret "$MLDSA_KEY_PATH" \
            --key-id "agent-steward-2026" \
            --output build-manifest.json
          # Wipe key files immediately after signing.
          shred -uz "$ED_KEY_PATH" "$MLDSA_KEY_PATH" 2>/dev/null || rm -f "$ED_KEY_PATH" "$MLDSA_KEY_PATH"

      - name: Extract mobile Resources.zip
        run: |
          mkdir -p client/iosApp/Resources/app
          cd client/iosApp/Resources && unzip -qo ../Resources.zip

      - name: Sign mobile build manifest
        env:
          # Same secret-materialization pattern as the Python source-tree
          # sign step above; see that step's comment block for rationale.
          CIRIS_BUILD_ED25519_SECRET: ${{ secrets.CIRIS_BUILD_ED25519_SECRET }}
          CIRIS_BUILD_MLDSA_SECRET: ${{ secrets.CIRIS_BUILD_MLDSA_SECRET }}
        run: |
          if [ -z "${CIRIS_BUILD_ED25519_SECRET}" ] || [ -z "${CIRIS_BUILD_MLDSA_SECRET}" ]; then
            echo "::error::Hybrid signing secrets not configured (mobile sign step)."
            exit 1
          fi
          umask 077
          ED_KEY_PATH=$(mktemp)
          MLDSA_KEY_PATH=$(mktemp)
          printf '%s' "${CIRIS_BUILD_ED25519_SECRET}" | base64 -d > "$ED_KEY_PATH"
          printf '%s' "${CIRIS_BUILD_MLDSA_SECRET}" | base64 -d > "$MLDSA_KEY_PATH"

          # Strip channel suffix per #726 (plain semver to registry).
          VERSION=$(awk -F'"' '/^CIRIS_VERSION = /{print $2; exit}' ciris_engine/constants.py | sed -E 's/-(stable|rc[0-9]*|beta[0-9]*|alpha[0-9]*)$//')
          if [ -z "$VERSION" ]; then
            echo "ERROR: failed to extract CIRIS_VERSION from ciris_engine/constants.py"; exit 1
          fi
          echo "CIRIS_VERSION (stripped of channel suffix) = $VERSION"
          GIT_SHA=$(git rev-parse HEAD)
          ciris-build-sign sign \
            --primitive agent \
            --tree client/iosApp/Resources/app \
            --tree-include ciris_engine ciris_adapters ciris_ios ciris_sdk \
            --tree-exempt-dir __pycache__ .venv venv node_modules logs .pytest_cache .mypy_cache dist build .ruff_cache .coverage .tox .nox .git tests examples gui_static desktop_app \
            --tree-exempt-ext pyc pyo env log audit db sqlite sqlite3 md pyi deleted \
            --tree-extra-hashes-file build-secrets-mobile.json \
            --binary-version "$VERSION" \
            --build-id "$GIT_SHA-mobile" \
            --target ios-mobile-bundle \
            --ed25519-seed "$ED_KEY_PATH" \
            --mldsa-secret "$MLDSA_KEY_PATH" \
            --key-id "agent-steward-2026" \
            --output build-manifest-mobile.json
          # Wipe key files immediately after signing.
          shred -uz "$ED_KEY_PATH" "$MLDSA_KEY_PATH" 2>/dev/null || rm -f "$ED_KEY_PATH" "$MLDSA_KEY_PATH"

      - name: Register release with CIRISRegistry (file mode + binary mode)
        # Single-step replacement for the legacy two-curl-POST flow, per
        # CIRISAgent#727. ciris-build-sign register (v1.10.1+) writes all
        # 3 registry tables — builds + binary_manifests + function_manifests —
        # in one call, closing the parent-row gap that left every release
        # ≥ 2.7.8 with only function_manifests rows. Mode auto-detected
        # from the BuildManifest:
        #   - python-source-tree → FILE mode (FileTreeExtras present)
        #     → writes builds row + function_manifests
        #   - ios-mobile-bundle  → BINARY mode (binary hash present)
        #     → writes builds row + binary_manifests + function_manifests
        # Mixed modes in a single register call are rejected, so we run
        # two calls per release (#727 § "single mode per release call").
        # REGISTRY_JWT_SECRET no longer needed (v1.10.1 cut over to HTTP
        # POST /v1/builds with REGISTRY_ADMIN_TOKEN bearer).
        # Pre-flight requirement: agent-steward pubkey must be registered
        # as a trusted key for project='ciris-agent' via
        # RegisterTrustedPrimitiveKey admin RPC (otherwise HTTP 403
        # no_trusted_key).
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          REGISTRY_ADMIN_TOKEN: ${{ secrets.REGISTRY_ADMIN_TOKEN }}
          CIRIS_BUILD_ED25519_SECRET: ${{ secrets.CIRIS_BUILD_ED25519_SECRET }}
          CIRIS_BUILD_MLDSA_SECRET: ${{ secrets.CIRIS_BUILD_MLDSA_SECRET }}
        run: |
          if [ -z "${CIRIS_BUILD_ED25519_SECRET}" ] || [ -z "${CIRIS_BUILD_MLDSA_SECRET}" ]; then
            echo "::error::Hybrid signing secrets not configured (register step)."
            exit 1
          fi
          umask 077
          ED_KEY_PATH=$(mktemp)
          MLDSA_KEY_PATH=$(mktemp)
          printf '%s' "${CIRIS_BUILD_ED25519_SECRET}" | base64 -d > "$ED_KEY_PATH"
          printf '%s' "${CIRIS_BUILD_MLDSA_SECRET}" | base64 -d > "$MLDSA_KEY_PATH"

          # Strip channel suffix per #726 (plain semver to registry).
          VERSION=$(awk -F'"' '/^CIRIS_VERSION = /{print $2; exit}' ciris_engine/constants.py | sed -E 's/-(stable|rc[0-9]*|beta[0-9]*|alpha[0-9]*)$//')
          GIT_SHA=$(git rev-parse HEAD)

          # Call 1: python-source-tree (file mode → builds row, file_manifest_json populated).
          echo "::group::register python-source-tree (file mode)"
          ciris-build-sign register \
            --project ciris-agent \
            --binary-version "$VERSION" \
            --build-id "$GIT_SHA" \
            --target python-source-tree:./build-manifest.json \
            --modules core \
            --source-repo "https://github.com/CIRISAI/CIRISAgent" \
            --source-commit "$GIT_SHA" \
            --ed25519-seed "$ED_KEY_PATH" \
            --mldsa-secret "$MLDSA_KEY_PATH" \
            --key-id "agent-steward-2026"
          echo "::endgroup::"

          # Call 2: ios-mobile-bundle (binary mode → builds + binary_manifests + function_manifests).
          # Two separate `builds` rows per release is fine; they're keyed on
          # build_hash which differs because the `binaries` map differs.
          echo "::group::register ios-mobile-bundle (binary mode)"
          ciris-build-sign register \
            --project ciris-agent \
            --binary-version "$VERSION" \
            --build-id "$GIT_SHA-mobile" \
            --target ios-mobile-bundle:./build-manifest-mobile.json \
            --modules ios \
            --source-repo "https://github.com/CIRISAI/CIRISAgent" \
            --source-commit "$GIT_SHA" \
            --ed25519-seed "$ED_KEY_PATH" \
            --mldsa-secret "$MLDSA_KEY_PATH" \
            --key-id "agent-steward-2026"
          echo "::endgroup::"

          # Wipe key files immediately after register.
          shred -uz "$ED_KEY_PATH" "$MLDSA_KEY_PATH" 2>/dev/null || rm -f "$ED_KEY_PATH" "$MLDSA_KEY_PATH"

      - name: Verify per-target builds rows registered (CIRISVerify v2.0.3+ contract)
        # Asserts the CanonicalBuild v2 + per-target row dispatcher landed
        # correctly. Pre-v2.0.3, both register calls shared one builds row
        # and whichever ran second silently overwrote the first in version-
        # lookup — every non-iOS agent failed L4 against the live registry.
        # v2.0.3+: each target gets its own row; default GET returns the
        # python-source-tree (canonical Python-file manifest) by default;
        # ?target= filter returns the requested target. See CIRISVerify#8,
        # CIRISRegistry#11, CIRISAgent#749.
        env:
          # Use the SAME REGISTRY_URL the register step posted to (vars-driven),
          # so a staging cutover can't have register hit one backend while the
          # smoke check validates a different one. Codex feedback on PR #750.
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
        run: |
          set -eux
          # Strip channel suffix; mirrors the sign step's normalization
          VERSION=$(awk -F'"' '/^CIRIS_VERSION = /{print $2; exit}' ciris_engine/constants.py | sed -E 's/-(stable|rc[0-9]*|beta[0-9]*|alpha[0-9]*)$//')
          # Tolerate trailing slash on the configured registry URL
          REGISTRY="${REGISTRY_URL%/}"
          if [ -z "$REGISTRY" ]; then
            echo "::error::vars.REGISTRY_URL is not configured — smoke step cannot run"
            exit 1
          fi
          BASE="$REGISTRY/v1/builds/$VERSION?project=ciris-agent"

          # Default (no target) → python-source-tree row
          PY_TARGET=$(curl -fsS "$BASE" | jq -r '.target // "MISSING"')
          test "$PY_TARGET" = "python-source-tree" \
            || { echo "::error::Expected target=python-source-tree on default GET, got: $PY_TARGET"; exit 1; }

          # Explicit target=ios-mobile-bundle → iOS row
          IOS_TARGET=$(curl -fsS "$BASE&target=ios-mobile-bundle" | jq -r '.target // "MISSING"')
          test "$IOS_TARGET" = "ios-mobile-bundle" \
            || { echo "::error::Expected target=ios-mobile-bundle on ?target= GET, got: $IOS_TARGET"; exit 1; }

          echo "✓ Both target rows registered correctly (python-source-tree + ios-mobile-bundle)"

  deploy:
    name: Notify CIRISManager of Update
    needs: [build, register-build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.repository == 'CIRISAI/CIRISAgent'
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1  # Just need the latest commit message

      - name: Extract Release Information
        id: release_info
        run: |
          # Extract semantic version from constants.py
          SEMANTIC_VERSION=$(grep "^CIRIS_VERSION = " ciris_engine/constants.py | cut -d'"' -f2)
          echo "Semantic version: $SEMANTIC_VERSION"

          # Extract changelog from CHANGELOG.md using Keep a Changelog format
          if [ -f "CHANGELOG.md" ]; then
            echo "Extracting changelog from CHANGELOG.md"
            CHANGELOG=$(python tools/extract_changelog.py CHANGELOG.md "$SEMANTIC_VERSION")
            echo "Extracted changelog: $CHANGELOG"
          else
            echo "No CHANGELOG.md found, using commit message fallback"
            CHANGELOG=$(git log -1 --pretty=format:"%s")
          fi

          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
          echo "version=$SEMANTIC_VERSION" >> $GITHUB_OUTPUT

      - name: Notify CIRISManager
        run: |

          # Notify CIRISManager about new images with rich context from CHANGELOG.md
          # CIRISManager will orchestrate the deployment
          echo "Notifying CIRISManager with:"
          echo "  Version: ${{ steps.release_info.outputs.version }}"
          echo "  Changelog: ${{ steps.release_info.outputs.changelog }}"
          echo "  Risk Level: ${{ steps.release_info.outputs.risk_level }}"

          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST https://agents.ciris.ai/manager/v1/updates/notify \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"agent_image\": \"ghcr.io/cirisai/ciris-agent:latest\",
              \"strategy\": \"canary\",
              \"source\": \"github-actions\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"changelog\": \"${{ steps.release_info.outputs.changelog }}\",
              \"version\": \"${{ steps.release_info.outputs.version }}\"
            }")

          # Extract HTTP status
          http_status=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2)
          body=$(echo "$response" | sed '/HTTP_STATUS:/d')

          echo "Response body: $body"
          echo "HTTP status: $http_status"

          # Check if successful (2xx status code)
          if [[ "$http_status" =~ ^2[0-9][0-9]$ ]]; then
            echo "✅ Successfully notified CIRISManager"
            echo "Deployment ID: $(echo "$body" | jq -r '.deployment_id // "unknown"')"
            echo "Strategy: $(echo "$body" | jq -r '.strategy // "unknown"')"
          else
            echo "❌ Failed to notify CIRISManager"
            echo "HTTP Status: $http_status"
            echo "Response: $body"
            exit 1
          fi

      - name: Monitor Deployment Status
        run: |
          # Give CIRISManager time to process
          sleep 10

          # Check deployment status
          echo "Checking deployment status..."
          status_response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" https://agents.ciris.ai/manager/v1/updates/status \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}")

          status_http=$(echo "$status_response" | grep "HTTP_STATUS:" | cut -d: -f2)
          status_body=$(echo "$status_response" | sed '/HTTP_STATUS:/d')

          if [[ "$status_http" =~ ^2[0-9][0-9]$ ]]; then
            echo "Deployment Status:"
            echo "$status_body" | jq '.'
          else
            echo "Could not retrieve deployment status"
          fi

          echo ""
          echo "CIRISManager will handle the deployment orchestration."
          echo "Agents will be notified based on the canary deployment strategy."

  # Build Android debug APK + attach Windows installer, create GitHub release with tag.
  # Single release per version with both APK and Windows .exe as assets.
  android-release:
    name: Publish Release (Android APK + Windows Installer)
    needs: [build, register-build, build-windows-installer]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' && github.repository == 'CIRISAI/CIRISAgent'
    permissions:
      contents: write  # Required for creating releases and tags
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle (with distribution + dependency cache)
        # 2.8.11 Tier 2 CI hardening — Android job. Caches the Gradle
        # distribution + the Android Gradle Plugin dependency tree.
        # First run downloads + caches; subsequent runs are warm.
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Set up Python 3.10 (required by Chaquopy)
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Symlink python3.10 for Chaquopy
        run: |
          PYTHON_PATH=$(which python3.10)
          if [ ! -f /usr/bin/python3.10 ] && [ -n "$PYTHON_PATH" ]; then
            sudo ln -s "$PYTHON_PATH" /usr/bin/python3.10
          fi

      - name: Get version from constants
        id: version
        run: |
          VERSION=$(grep "^CIRIS_VERSION = " ciris_engine/constants.py | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build debug APK
        run: |
          cd client
          ./gradlew :androidApp:syncPythonSources
          ./gradlew :androidApp:assembleDebug

          # Copy APK with version name
          VERSION="${{ steps.version.outputs.version }}"
          cp androidApp/build/outputs/apk/debug/androidApp-debug.apk \
             androidApp/build/outputs/apk/debug/CIRIS-$VERSION-debug.apk

          ls -lh androidApp/build/outputs/apk/debug/

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v7
        with:
          name: windows-installer
          path: dist-windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77  # v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CIRIS Agent v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            client/androidApp/build/outputs/apk/debug/CIRIS-${{ steps.version.outputs.version }}-debug.apk
            dist-windows/CIRIS-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
