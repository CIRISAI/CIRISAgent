  {dma_guidance}

context_enrichment_section: |
  === ДОСТУПНЫЕ РЕСУРСЫ (из обогащения контекста) ===
  {context_enrichment_data}

  ВАЖНО: Используйте ТОЧНЫЕ значения entity_id из списка выше.
  НЕ используйте дружественные имена напрямую - сначала сопоставьте их с entity_id.

