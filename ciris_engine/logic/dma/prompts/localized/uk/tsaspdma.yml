response_format: |
  Поверніть ПЛОСКИЙ JSON-об'єкт з цими полями:
  - "selected_action": Один з "TOOL", "SPEAK", "PONDER"
  - "rationale": Поясніть ваше рішення, включаючи пастки, які ви визнаєте

  ПЛЮС поля, специфічні для дії (використовуйте точні назви полів нижче):

  Для дії TOOL (нормальний режим - інструмент існує):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  Для дії TOOL (режим виправлення - назва інструменту була неправильною):
  {{"selected_action": "TOOL", "rationale": "Виправлення назви інструменту для відповідності доступному інструменту...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  Для дії SPEAK:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "Мені потрібно, щоб користувач відповів: яке світло?"}}

  Для дії PONDER:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["Чи це правильний підхід?"]}}

  ВАЖЛИВО:
  - Використовуйте Схему Параметрів вище для визначення обов'язкових параметрів інструменту
  - Визначте значення параметрів з наміру користувача та контексту розмови
  - tool_parameters — це словник, що містить аргументи інструменту
  - У РЕЖИМІ ВИПРАВЛЕННЯ: включіть поле "tool_name" з ТОЧНОЮ назвою зі списку доступних інструментів
  - Не обгортайте в блоки коду markdown

  МОВНІ ПРАВИЛА:
  - Відповідайте мовою користувача, яку він надає перевагу (перевірте профіль користувача).
  - ВСІ значення вмісту (rationale, speak_content, ponder_questions) повинні бути мовою користувача.
  - Ключі JSON та назви дій ПОВИННІ залишатися англійською (наприклад, "selected_action": "TOOL", "rationale", "tool_parameters").
  - Приклад: {{"selected_action": "SPEAK", "rationale": "Потрібне уточнення користувача", "speak_content": "Будь ласка, яким світлом ви хочете керувати?"}} - український вміст, англійські ключі/дії.

# Розділ режиму виправлення інструменту (використовується, коли ASPDMA вибрав неіснуючий інструмент)
tool_correction_section: |
  === РЕЖИМ ВИПРАВЛЕННЯ ІНСТРУМЕНТУ ===

  ASPDMA вибрав інструмент '{requested_tool}', але цей інструмент НЕ існує.

  Ваше завдання: Знайти ПРАВИЛЬНИЙ інструмент зі списку доступних інструментів, який відповідає
  наміру користувача, АБО використовувати SPEAK/PONDER, якщо підходящий інструмент не існує.

  Доступні інструменти:
  {available_tools_list}

  ІНСТРУКЦІЇ:
  1. Проаналізуйте оригінальний намір користувача зі змісту думки
  2. Перегляньте доступні інструменти вище - знайдіть той, який відповідає наміру
  3. Якщо ви знайдете відповідний інструмент:
     - Поверніть дію TOOL з "tool_name", встановленим на ТОЧНУ назву зі списку
     - Заповніть відповідні "tool_parameters" на основі схеми інструменту
  4. Якщо кілька інструментів можуть відповідати:
     - Поверніть SPEAK, щоб запитати користувача, яку конкретну можливість вони хочуть
  5. Якщо ЖОДЕН інструмент не відповідає наміру:
     - Поверніть PONDER, щоб повністю переглянути підхід

  КРИТИЧНО: Поле "tool_name" повинно бути ТОЧНОЮ ВІДПОВІДНІСТЮ зі списку доступних інструментів вище.

evaluation_steps: |
  КРОК 1: Прочитайте Документацію
  - Перегляньте quick_start, detailed_instructions, examples
  - Зверніть увагу на будь-які пастки, які застосовуються до цього випадку використання
  - Перевірте, чи when_to_use відповідає завданню

  КРОК 2: Оцініть Вибір ASPDMA
  - Чи параметри правильні згідно з документацією?
  - Чи приклади припускають краще форматування параметрів?
  - Чи є обов'язкові параметри, які неоднозначні?

  КРОК 3: Перевірте Пастки
  - Чи будь-яка пастка застосовується до цього конкретного використання?
  - Чи користувач очікував би цієї поведінки?
  - Чи слід попередити або спочатку запитати користувача?

  КРОК 4: Вирішіть Дію
  - TOOL: Підтвердіть або уточніть, визнайте пастки
  - SPEAK: Запитайте конкретне уточнення
  - PONDER: Поясніть, чому переглянути

closing_reminder: |
  ВАЖЛИВО: Ваша роль — виявити проблеми, які ASPDMA не міг побачити без
  повної документації. Якщо вибір інструменту виглядає добре, підтвердіть це швидко.
  Лише SPEAK або PONDER, коли документація виявляє справжні проблеми.

  Вибираючи SPEAK, будьте конкретними: "Мені потрібно, щоб користувач відповів: [питання]"
  Вибираючи PONDER, поясніть: "Цей інструмент не може X, тому що Y, розгляньте Z"
  Вибираючи TOOL, визнайте: "Продовжую з обізнаністю про пастку X"
