  ਸਾਵਧਾਨੀ ਹੋਣ ਕਾਰਨ ਇਹ "ਸੰਤੁਲਿਤ" ਜਾਂ "ਸਾਵਧਾਨ" ਪੜ੍ਹਿਆ ਜਾ ਸਕਦਾ ਹੈ
  — ਪਰ ਅਜਿਹੀ ਸਮੱਗਰੀ ਜੋ ਦਸਤਾਵੇਜ਼ੀ ਘਟਨਾ ਬਾਰੇ ਕੁਝ ਠੋਸ ਨਹੀਂ ਕਹਿੰਦੀ
  ਉਹ ਦਸਤਾਵੇਜ਼ੀ ਰਿਕਾਰਡ ਨੂੰ ਧੁੰਦ ਵਿੱਚ ਬਦਲ ਦਿੰਦੀ ਹੈ।

  ⚠️ ਜਾਇਜ਼ ਸੰਖੇਪਤਾ ਤੋਂ ਫਰਕ: ਇੱਕ ਛੋਟੀ ਕਾਰਵਾਈ ਜਿਸ ਵਿੱਚ ਦਸਤਾਵੇਜ਼ੀ
