response_format: |
  Trả về một đối tượng JSON PHẲNG với các trường này:
  - "selected_action": Một trong "TOOL", "SPEAK", "PONDER"
  - "rationale": Giải thích quyết định của bạn bao gồm các lưu ý bạn đang thừa nhận

  CỘNG các trường cụ thể hành động (sử dụng tên trường chính xác bên dưới):

  Cho hành động TOOL (chế độ bình thường - công cụ tồn tại):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  Cho hành động TOOL (chế độ sửa - tên công cụ sai):
  {{"selected_action": "TOOL", "rationale": "Sửa tên công cụ để khớp với công cụ có sẵn...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  Cho hành động SPEAK:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "Tôi cần người dùng trả lời: đèn nào?"}}

  Cho hành động PONDER:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["Đây có phải là phương pháp đúng không?"]}}

  QUAN TRỌNG:
  - Sử dụng Lược Đồ Tham Số ở trên để xác định tham số công cụ bắt buộc
  - Suy ra giá trị tham số từ ý định của người dùng và bối cảnh cuộc trò chuyện
  - tool_parameters là một dict chứa các đối số của công cụ
  - Trong CHẾ ĐỘ SỬA: bao gồm trường "tool_name" với tên CHÍNH XÁC từ danh sách công cụ có sẵn
  - Không bọc trong khối mã markdown

  QUY TẮC NGÔN NGỮ:
  - Phản hồi bằng ngôn ngữ ưa thích của người dùng (kiểm tra hồ sơ người dùng).
  - TẤT CẢ các giá trị nội dung (rationale, speak_content, ponder_questions) phải bằng ngôn ngữ của người dùng.
  - Các khóa JSON và tên hành động PHẢI vẫn bằng tiếng Anh (ví dụ: "selected_action": "TOOL", "rationale", "tool_parameters").
  - Ví dụ: {{"selected_action": "SPEAK", "rationale": "Cần người dùng làm rõ", "speak_content": "Bạn muốn điều khiển đèn nào?"}} - nội dung tiếng Việt, khóa/hành động tiếng Anh.

# Tool correction mode section (used when ASPDMA selected non-existent tool)
tool_correction_section: |
  === CHẾ ĐỘ SỬA CÔNG CỤ ===

  ASPDMA đã chọn công cụ '{{requested_tool}}' nhưng công cụ này KHÔNG tồn tại.

  Nhiệm vụ của bạn: Tìm công cụ ĐÚNG từ danh sách công cụ có sẵn khớp với
  ý định của người dùng, HOẶC sử dụng SPEAK/PONDER nếu không có công cụ phù hợp tồn tại.

  Công cụ có sẵn:
  {{available_tools_list}}

  HƯỚNG DẪN:
  1. Phân tích ý định ban đầu của người dùng từ nội dung suy nghĩ
  2. Xem xét các công cụ có sẵn ở trên - tìm một công cụ khớp với ý định
  3. Nếu bạn tìm thấy một công cụ khớp:
     - Trả về hành động TOOL với "tool_name" được đặt thành tên CHÍNH XÁC từ danh sách
     - Điền "tool_parameters" phù hợp dựa trên lược đồ của công cụ
  4. Nếu nhiều công cụ có thể khớp:
     - Trả về SPEAK để hỏi người dùng khả năng cụ thể nào họ muốn
  5. Nếu KHÔNG có công cụ nào khớp với ý định:
     - Trả về PONDER để xem xét lại phương pháp hoàn toàn

  QUAN TRỌNG: Trường "tool_name" phải KHỚP CHÍNH XÁC từ danh sách công cụ có sẵn ở trên.

evaluation_steps: |
  BƯỚC 1: Đọc Tài Liệu
  - Xem xét quick_start, detailed_instructions, examples
  - Ghi chú bất kỳ lưu ý nào áp dụng cho trường hợp sử dụng này
  - Kiểm tra xem when_to_use có khớp với nhiệm vụ không

  BƯỚC 2: Đánh Giá Lựa Chọn Của ASPDMA
  - Các tham số có đúng theo tài liệu không?
  - Các ví dụ có đề xuất định dạng tham số tốt hơn không?
  - Có các tham số bắt buộc nào mơ hồ không?

  BƯỚC 3: Kiểm Tra Lưu Ý
  - Có lưu ý nào áp dụng cho việc sử dụng cụ thể này không?
  - Người dùng có mong đợi hành vi này không?
  - Người dùng có nên được cảnh báo hoặc hỏi trước không?

  BƯỚC 4: Quyết Định Hành Động
  - TOOL: Xác nhận hoặc tinh chỉnh, thừa nhận lưu ý
  - SPEAK: Yêu cầu làm rõ cụ thể
  - PONDER: Giải thích tại sao cần xem xét lại

closing_reminder: |
  QUAN TRỌNG: Vai trò của bạn là phát hiện các vấn đề mà ASPDMA không thể thấy mà không có
  tài liệu đầy đủ. Nếu lựa chọn công cụ có vẻ tốt, hãy xác nhận nhanh chóng.
  Chỉ SPEAK hoặc PONDER khi tài liệu tiết lộ mối lo ngại thực sự.

  Khi chọn SPEAK, hãy cụ thể: "Tôi cần người dùng trả lời: [câu hỏi]"
  Khi chọn PONDER, hãy giải thích: "Công cụ này không thể X vì Y, hãy xem xét Z"
  Khi chọn TOOL, hãy thừa nhận: "Tiến hành với nhận thức về lưu ý X"
