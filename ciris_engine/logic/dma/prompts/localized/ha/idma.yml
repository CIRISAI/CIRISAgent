response_format: |
  Amsar ku dole ta kasance abu ɗaya na JSON da ke bin tsarin da aka bayar, tare da maɓallan nan:
  - "k_eff": Lamba (>= 0) - Ƙididdigan tushe mai zaman kansa mai tasiri. Yi amfani da dabaran k/(1+ρ(k-1)). k_eff < 2 = rauni.
  - "correlation_risk": Lamba (0.0-1.0) - Ƙididdigar ρ alaƙa tsakanin maɓuɓɓuga.
  - "phase": Igiya - Ɗaya daga cikin "chaos" (sabani), "healthy" (haɗuwa mai bambanci), ko "rigidity" (ɗakin murya).
  - "fragility_flag": Boolean - TRUE idan k_eff < 2 KO phase = "rigidity" KO correlation_risk > 0.7.
  - "sources_identified": Jerin igiyoyi - Jerin maɓuɓɓuga/ra'ayoyi daban-daban da aka gano a cikin tunani.
  - "correlation_factors": Jerin igiyoyi - Abubuwan da ke haifar da alaƙa (misali, "marubuci ɗaya", "an samo daga bincike ɗaya").
  - "reasoning": Igiya - Nazarin ku na bambancin bayanai da lafiyar fahimtar. Wannan filin yana DOLE.

  ƘA'IDODIN HARSHE:
  - Amsa cikin yaren da mai amfani ya fi so (duba bayanan mai amfani).
  - DUKKAN ƙimar abun ciki (reasoning, sources_identified, correlation_factors) ya kamata su kasance cikin yaren mai amfani.
  - Maɓallan JSON da ƙimar mataki dole su kasance cikin Turanci (misali, "reasoning", "k_eff", "phase": "healthy").
  - Misali: {{"reasoning": "Bayanin ya fito ne daga tushe ɗaya kawai", "sources_identified": ["bayanan horo"], "phase": "rigidity"}} - Abun ciki na Hausa, maɓallan/mataki na Turanci.

  Kar a haɗa filayen ƙari ko nannade a cikin shingen code na markdown.

evaluation_steps: |
  MATAKI 1: Ƙidaya Maɓuɓɓuga (k)
  - Waɗanne maɓuɓɓuga/ra'ayoyi suke sanar da wannan tunani?
  - Horar da ku = 1 tushe (koyaushe yana nan)
  - Shigar da mai amfani = +1 tushe IDAN dangantaka ta balaga (mu'amala 20+)
  - Sakamakon yanar gizo/kayan aiki = +1 tushe kowanne IDAN daga asali masu zaman kansu
  - Ambato/bayanai = +1 tushe kowanne IDAN masu zaman kansu na gaske

  MATAKI 2: Ƙididdigeta Alaƙa (ρ)
  - Ga kowane nau'i-biyu na maɓuɓɓuga, tambaya: shin an samo ɗaya daga wancan?
  - Marubuci/cibiya/bayanan ɗaya → alaƙa mai girma
  - Duk maɓuɓɓuga suna yarda akan batu mai rikitarwa → alaƙar da ake tuhuma
  - Hanyoyin daban-daban, ƙarshe ɗaya → alaƙa mai ƙanƙanta
  - ρ = 0 (masu zaman kansu gaba ɗaya) zuwa ρ = 1 (duk an samo daga asali ɗaya)

  MATAKI 3: Ƙididdige k_eff
  - Yi amfani da dabara: k_eff = k / (1 + ρ(k-1))
  - Misali: maɓuɓɓuga k=3, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (rauni!)
  - Misali: maɓuɓɓuga k=3, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (lafiya)
  - Wakili mai sabo: k=1 → k_eff = 1 (koyaushe rauni)

  MATAKI 4: Tantance Mataki
  - HARGITSI: Ƙarshe masu sabani da yawa, babu hanya don warwarewa
  - LAFIYA: Ra'ayoyi daban-daban da ake iya haɗa su (k_eff ≥ 2)
  - TAURARI: Labari ɗaya yana mamaye, babu adawa (k_eff → 1, ɗakin murya)

  MATAKI 5: Binciken Rauni
  - k_eff < 2? → RAUNI
  - phase = "rigidity"? → RAUNI
  - correlation_risk > 0.7? → RAUNI
  - Saita fragility_flag = TRUE idan daya daga cikin sama

closing_reminder: |
  MUHIMMANCI: Lokacin da ba ku da tabbas game da 'yancin maɓuɓɓuga, ku kuskura a gefen taka tsantsan
  kuma ku ƙiyasta alaƙa mafi girma. Ya fi kyau a yi alama don nazari fiye da rasa
  yiwuwar ɗakin murya.

  Alamar rauni BA yana nufin tunanin ba daidai ba ne - yana nufin tunanin
  ya kamata ya sami ƙarin bincike ko tabbatarwa mai zaman kansa kafin ayyuka masu girma
  da za a ɗauka.
