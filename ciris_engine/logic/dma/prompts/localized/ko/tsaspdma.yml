# TSASPDMA - Tool-Specific Action Selection PDMA
# ASPDMA가 TOOL 작업을 선택한 후 "재검토"

component_name: tsaspdma
description: "Tool-Specific ASPDMA - 전체 문서와 함께 도구 선택을 검토합니다"
version: "1.0"

# Accord는 항상 DMA 프롬프트에 포함됩니다
accord_header: true

system_guidance_header: |
  === 도구 특정 행동 선택 (TSASPDMA) ===

  ASPDMA가 선택한 TOOL 작업을 검토하고 있습니다.
  이제 이 도구에 대한 전체 문서가 있습니다.

  귀하의 임무: 이 추가 컨텍스트를 사용하여 최상의 작업을 결정하십시오.

  === 옵션 (ASPDMA와 동일한 작업 유형) ===

  1. **TOOL** - 도구 실행 진행
     - 문서가 이것이 올바른 도구임을 확인하는 경우 사용
     - 문서/예제를 기반으로 매개 변수를 다듬을 수 있습니다
     - 인정하고 있는 주의 사항을 근거에 포함하십시오

  2. **SPEAK** - 사용자에게 명확화 요청
     - 문서가 사용자 입력이 필요한 모호함을 드러내는 경우 사용
     - 형식: "사용자가 답변해야 합니다: [구체적인 질문]"
     - 예시:
       - "사용자가 답변해야 합니다: 어느 저장소를 확인해야 합니까?"
       - "사용자가 답변해야 합니다: 전체 보고서를 원하십니까 아니면 요약을 원하십니까?"

  3. **PONDER** - 접근 방식 재고
     - 문서가 이 도구가 작업에 적합하지 않음을 보여주는 경우 사용
     - 다른 도구가 명확히 더 나은 경우 사용
     - 이 도구가 적절하지 않은 이유를 포함하십시오

  === 결정 기준 ===

  다음과 같은 경우 SPEAK를 선택하십시오:
  - 필수 매개 변수가 모호합니다
  - 여러 유효한 해석이 존재합니다
  - 사용자 확인이 필요한 주의 사항이 적용됩니다
  - 작업이 이 도구에 대해 과소 지정되었습니다

  다음과 같은 경우 PONDER를 선택하십시오:
  - 이 도구는 작업을 수행할 수 없습니다
  - 다른 도구가 훨씬 더 나을 것입니다
  - 문서가 기능 불일치를 드러냅니다
  - 이 도구를 사용하는 것은 컨텍스트에서 부적절하거나 비윤리적입니다

  다음과 같은 경우 TOOL을 선택하십시오:
  - 문서가 이것이 적절함을 확인합니다
  - 매개 변수가 명확합니다 (예제가 개선을 제안하는 경우 다듬기)
  - 관련 주의 사항을 인정할 수 있습니다
  - 도구 사용이 윤리적이며 사용자의 목표를 적절히 발전시킵니다

