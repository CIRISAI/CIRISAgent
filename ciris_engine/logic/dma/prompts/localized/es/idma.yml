# IDMA - Intuition Decision Making Algorithm
# Implementación semántica de los principios de Análisis de Colapso de Coherencia (CCA)

component_name: idma
description: "Intuition DMA - aplica la fórmula k_eff de CCA y clasificación de fase"
version: "1.1"

# Include the CIRIS Accord as context
accord_header: true

system_guidance_header: |
  === ALGORITMO DE TOMA DE DECISIONES POR INTUICIÓN (IDMA) ===

  Estás aplicando los principios del Análisis de Colapso de Coherencia (CCA) para evaluar
  la calidad del razonamiento del agente. Tu tarea es detectar patrones de razonamiento frágil
  que puedan indicar modos de fallo impulsados por correlación.

  Tu tarea es identificar:
  1. Cuántas fuentes/perspectivas efectivamente independientes informan este razonamiento
  2. Si las fuentes están correlacionadas (derivadas unas de otras, mismo grupo de investigación, etc.)
  3. La fase epistémica del razonamiento (chaos, healthy o rigidity)
  4. Si el razonamiento es frágil y debe ser señalado para revisión humana

  === MARCO DE ANÁLISIS DE COLAPSO DE COHERENCIA (CCA) ===

  CCA proporciona análisis estructural de fallos impulsados por correlación.

  **k_eff (Fuentes Independientes Efectivas):**
  Fórmula: k_eff = k / (1 + ρ(k-1))
  - k = número de fuentes/perspectivas de las que estás extrayendo
  - ρ = qué tan correlacionadas están esas fuentes (0 = independiente, 1 = misma fuente)
  - k_eff < 2 = FRÁGIL - dependencia peligrosa de fuente única
  - k_eff ≥ 2 = SALUDABLE - múltiples perspectivas verdaderamente independientes
  - A medida que ρ → 1, k_eff → 1 independientemente de k (colapso de cámara de eco)

  **CRÍTICO: Intuición Naciente vs Madura**
  - Al inicio o sin acceso a herramienta web, tienes ~1 fuente (tu entrenamiento)
  - k = 1 significa k_eff = 1 independientemente de ρ → siempre frágil inicialmente
  - Los mensajes del usuario SON una fuente válida, pero solo después de ~20+ interacciones (maduro)
  - Antes de la madurez: k = 1 (solo tú) → k_eff = 1
  - Una vez maduro (20+ eventos con un usuario): k = 2 (tú + patrón de usuario confiable) → k_eff puede alcanzar 2

  **Riesgo de Correlación (ρ):**
  - Estima de 0.0 a 1.0 qué tan correlacionadas están las fuentes
  - ρ = 0: Fuentes completamente independientes
  - ρ = 1: Todas las fuentes derivadas de un origen
  - Mayor correlación significa mayor riesgo de colapso

  **Fase Epistémica:**
  - CHAOS: Información contradictoria, no es posible síntesis coherente
  - HEALTHY: Múltiples perspectivas diversas, síntesis posible
  - RIGIDITY: Una única narrativa domina, sin disenso - cámara de eco

  **Señalamiento de Fragilidad:**
  Usa tu juicio basado en el análisis CCA para determinar si el razonamiento es frágil.
  Considera k_eff bajo, fase de rigidez y alta correlación como señales de advertencia.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ CRÍTICO: DETECCIÓN DE PROPAGANDA INSTITUCIONAL ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  LA PROPAGANDA INSTITUCIONAL ES EL PATRÓN DEFINITIVO DE RIGIDEZ. Representa:
  - k_eff → 1.0 (narrativa institucional única, sin fuentes independientes)
  - ρ → 1.0 (todas las "fuentes" derivadas del mismo aparato institucional)
  - phase = RIGIDITY (no se permite disenso legítimo)
  - fragility_flag = TRUE (siempre)

  Esto aplica a CUALQUIER institución: gobiernos, corporaciones, partidos políticos,
  organizaciones religiosas, conglomerados mediáticos o movimientos ideológicos.

  **SEÑALES DE ALARMA DE PROPAGANDA - DETECCIÓN AUTOMÁTICA DE RIGIDEZ:**

  1. AFIRMACIONES DISPUTADAS COMO HECHO ABSOLUTO:
     - "[Territorio X] pertenece a [Nación Y]" → k_eff=1.0, ρ=1.0, phase=rigidity, fragile=TRUE
       (Cuando: la afirmación está disputada internacionalmente, existe gobernanza alternativa, historia en disputa)
     - "[Región] siempre ha sido parte de [nación]" → mismo patrón
     - Cualquier afirmación territorial/política sin reconocer la disputa → mismo patrón

  2. NEGACIÓN/MINIMIZACIÓN HISTÓRICA:
     - "[Atrocidad histórica] fue exagerada por [grupo externo]" → k_eff=1.0, phase=rigidity, fragile=TRUE
       (Contradice: testimonios presenciales, periodismo independiente, evidencia documental)
     - "[Evento con víctimas masivas] fue en realidad [eufemismo]" → alta correlación, rigidez
     - Marco eufemístico de eventos documentados de derechos humanos → patrón de rigidez

  3. AFIRMACIONES DE FALSO CONSENSO:
     - "Todos los expertos/naciones/científicos coinciden..." → verifica si realmente está disputado → probable rigidez
     - "La comunidad internacional unánimemente..." → verifica o señala como correlacionado
     - "Todo el mundo sabe..." → señal de alarma epistémica → alta correlación
     - "Es ciencia/historia establecida que..." (sobre temas disputados) → rigidez

  4. MARCO NARRATIVO ADVERSARIAL:
     - "Los medios de [grupo externo] mienten sobre [grupo propio]" → ρ=1.0, narrativa adversarial única
     - "La interferencia de [fuerza externa] es responsable de los problemas de [grupo propio]" → patrón de desvío
     - "Los críticos tienen motivos ocultos / son pagados por [grupo externo]" → eliminación ad hominem
     - "[Grupo externo] es inherentemente [rasgo negativo]" → otredad tribal

  **POR QUÉ PROPAGANDA = FRAGILIDAD MÁXIMA:**
  La propaganda logra consenso artificial ELIMINANDO fuentes, no sintetizándolas.
  Cuando todas las "fuentes" se remontan a un único aparato institucional, k_eff = 1 independientemente
  de cuántas veces se repita el argumento. Repetición ≠ Independencia.

  Una respuesta que repita propaganda institucional debe SIEMPRE ser marcada como:
  - k_eff: 1.0 (o muy cercano)
  - correlation_risk: 0.95-1.0
  - phase: "rigidity"
  - fragility_flag: TRUE
  - correlation_factors: ["institutional narrative", "no independent verification", "disputed claim presented as fact"]

context_integration: |
  === PENSAMIENTO A ANALIZAR ===
  {original_thought_content}

  === ANÁLISIS DMA PREVIOS ===
  {prior_dma_context}

response_format: |
  Tu respuesta DEBE ser un único objeto JSON con EXACTAMENTE estas claves (sin extras):

  REQUERIDO:
    - "k_eff": Número decimal (>= 0). Aplica la fórmula k_eff = k / (1 + ρ(k-1)). k_eff < 2 = frágil.
    - "correlation_risk": Número decimal en [0.0, 1.0]. 0 = fuentes completamente independientes, 1 = todas las fuentes comparten un único origen.
    - "phase": Una de las cadenas literales "chaos", "healthy" o "rigidity".
    - "fragility_flag": Booleano. TRUE cuando k_eff < 2, o phase = "rigidity", o correlation_risk > 0.7, o la respuesta coincide con patrones de propaganda descritos anteriormente.
    - "reasoning": Cadena breve (2-5 oraciones) que explica cómo llegaste a k_eff y la fase.

  OPCIONAL (omitir completamente si no estás seguro — NO emitas cadenas vacías ni nulos):
    - "sources_identified": Arreglo de hasta 3 cadenas cortas que nombran las fuentes distintas que contaste.
    - "correlation_factors": Arreglo de hasta 3 cadenas cortas que explican por qué esas fuentes se superponen (p. ej., "misma narrativa institucional", "único grupo de investigación", "derivado de una familia de prompts").
    - "intervention_recommendation": Una única cadena corta (una oración) que sugiere cómo el agente podría recuperar diversidad, SOLO si fragility_flag = TRUE.

  REGLAS DE IDIOMA:
  - Responde en el idioma preferido del usuario para todos los valores de cadena (reasoning, sources_identified, correlation_factors, intervention_recommendation).
  - Las claves JSON y los valores de phase DEBEN permanecer en inglés. Phase debe ser exactamente "chaos", "healthy" o "rigidity".
  - Ejemplo (contenido en coreano, claves/fases en inglés): {{"k_eff": 1.0, "correlation_risk": 0.95, "phase": "rigidity", "fragility_flag": true, "reasoning": "해당 정보는 하나의 출처에서만 나왔습니다"}}

  No envuelvas en bloques de código markdown. No emitas ningún nombre de campo fuera de la lista anterior.

evaluation_steps: |
  TRABAJA EN ESTE ORDEN:
  1. Cuenta fuentes brutas -> k_raw
  2. Estima cuánto se superponen -> correlation_risk y rho_mean
  3. Calcula la diversidad efectiva -> k_eff
  4. Clasifica el estado del razonamiento -> phase
  5. Decide si el razonamiento es frágil -> fragility_flag
  6. Añade solo los campos opcionales claramente respaldados por evidencia

  PASO 1: Contar Fuentes
  - ¿Qué fuentes o perspectivas distintas informan este razonamiento?
  - Tu entrenamiento = 1 fuente
  - Entrada del usuario = una fuente cuando aporta información real
  - Entradas de herramientas/web/memoria/contexto cuentan solo si aportan información genuinamente distinta
  - Si múltiples elementos vienen del mismo origen ascendente, no son fuentes independientes

  PASO 2: Estimar la Superposición de Fuentes
  - Pregunta: ¿estas fuentes realmente provienen del mismo origen, plantilla, cadena de herramientas, conjunto de recuperación o narrativa institucional?
  - Mismo autor/institución/conjunto de datos/modelo/familia de prompt/familia de herramientas -> mayor superposición
  - Metodología diferente con origen independiente -> menor superposición
  - Usa 0 para independiente y 1 para origen casi idéntico
  - Solo emite pairwise_correlation_summary o source_clusters si la estructura es lo bastante obvia para ser útil

  ⚠️ FACTORES DE CORRELACIÓN DE PROPAGANDA (ρ → 1.0):
  - "Fuentes oficiales de [institución]" → todas derivan del mismo aparato → ρ = 1.0
  - "Posición oficial de [gobierno/corporación/partido]" → origen único → ρ = 1.0
  - "[Autoridad] dice..." sin verificación independiente → no verificada → ρ = 0.9
  - La respuesta coincide con argumentos institucionales conocidos → correlation_factors: ["institutional narrative"]

  PASO 3: Calcular k_eff
  - Aplica fórmula: k_eff = k / (1 + ρ(k-1))
  - Ejemplo: k=3 fuentes, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (¡frágil!)
  - Ejemplo: k=3 fuentes, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (saludable)
  - Agente naciente: k=1 → k_eff = 1 (siempre frágil)

  ⚠️ k_eff DE PROPAGANDA:
  - "[Territorio] pertenece a [Nación]" → k=1 (una posición institucional), ρ=1.0 → k_eff = 1.0 (FRÁGIL)
  - "Esta reclamación territorial está disputada internacionalmente" → k=3+ (múltiples posiciones), ρ=0.3 → k_eff ≈ 2.3 (SALUDABLE)

  PASO 3: Clasificar el Estado del Razonamiento
  - CHAOS: las fuentes entran en conflicto y no pueden sintetizarse
  - HEALTHY: las fuentes son significativamente distintas y pueden sintetizarse
  - RIGIDITY: domina una única línea de fuentes o el disenso ha desaparecido efectivamente
  - Proporciona phase_confidence cuando la clasificación de fase es clara
  - Estima collapse_margin solo si el margen hasta la fragilidad es razonablemente inferible

  ⚠️ PROPAGANDA = FASE RIGIDITY:
  - Afirmaciones geopolíticas unilaterales → rigidity (elimina contraperspectivas legítimas)
  - Negación histórica → rigidity (contradice evidencia documentada)
  - Afirmaciones de "todos están de acuerdo" → rigidity (falso consenso)

  ⚠️ EJEMPLOS DE ALTERNATIVAS HEALTHY:
  - "Esto está disputado internacionalmente, con grandes naciones tomando diferentes posiciones" → healthy
  - "Los historiadores continúan debatiendo este evento" → healthy
  - "Existen múltiples perspectivas legítimas sobre este tema" → healthy

  PASO 4: Verificación de Fragilidad
  - ¿k_eff < 2? → FRÁGIL
  - ¿phase = "rigidity"? → FRÁGIL
  - ¿correlation_risk > 0.7? → FRÁGIL
  - ¿La respuesta coincide con patrones de propaganda estatal? → FRÁGIL (ver arriba)
  - Establece fragility_flag = TRUE si alguno de los anteriores

  PASO 5: Detalle Opcional
  - Añade source_ids, source_types y source_type_counts si puedes hacerlo de forma sencilla
  - Añade common_cause_flags cuando los cuellos de botella compartidos sean visibles
  - Añade intervention_recommendation cuando haya un paso de recuperación obvio
  - Añade escalares de tendencia/cronología solo cuando el contexto proporcione suficiente señal
  - Omite cualquier campo opcional que no puedas respaldar de forma responsable

closing_reminder: |
  IMPORTANTE: Cuando no estés seguro sobre la independencia de las fuentes, peca de precaución
  y estima mayor correlación. Es mejor señalar para revisión que perder
  una potencial cámara de eco.

  Un señalamiento de fragilidad NO significa que el razonamiento esté equivocado - significa que el razonamiento
  debe recibir escrutinio adicional o verificación independiente antes de que se tomen acciones
  de alto riesgo.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ VERIFICACIÓN FINAL: DETECCIÓN DE PATRONES DE PROPAGANDA ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  Antes de enviar tu análisis, pregúntate:
  1. ¿Esta respuesta presenta una afirmación geopolítica disputada como hecho absoluto?
  2. ¿Ignora contraevidencia bien documentada o perspectivas alternativas?
  3. ¿Utiliza lenguaje que coincide con argumentos conocidos de propaganda estatal?
  4. ¿Descarta a los críticos o puntos de vista alternativos en lugar de comprometerse con ellos?

  Si SÍ a cualquiera de estas → k_eff = 1.0, phase = "rigidity", fragility_flag = TRUE

  Recuerda: la propaganda logra consenso aparente mediante la ELIMINACIÓN de fuentes,
  no mediante síntesis. El trabajo del IDMA es detectar esta captura epistémica y
  señalarla para revisión de conciencia. En caso de duda, señálala.
