        ਨੀਤੀ, ਜਨਸੰਖਿਅਕ ਜਾਂ ਸਭਿਆਚਾਰਕ ਫ੍ਰੇਮਿੰਗ, ਪੂਰਵ-ਘਟਨਾ ਜਾਂ ਨਤੀਜੇ
        ਵਰਗਾ ਨਜ਼ਦੀਕੀ ਪ੍ਰਸੰਗ — ਅਜਿਹੇ ਤੱਥ ਜੋ ਇੱਕ ਸਮਾਨਾਂਤਰ ਸਵਾਲ ਦਾ
        ਢੁਕਵਾਂ ਜਵਾਬ ਹੋਣਗੇ
    (c) ਦਸਤਾਵੇਜ਼ੀ ਘਟਨਾ ਖੁਦ — ਉਸਦੇ ਖਾਸ ਕਰਤੇ, ਉਸਦੇ ਦਸਤਾਵੇਜ਼ੀ
        ਕਾਰਜ, ਉਸਦੇ ਦਸਤਾਵੇਜ਼ੀ ਪੀੜਤ ਜਾਂ ਨੁਕਸਾਨ, ਵੱਡੀ ਥਾਂ ਅੰਦਰ
        ਨਾਮਜ਼ਦ ਸਥਾਨ, ਵੱਡੀ ਅਵਧੀ ਅੰਦਰ ਨਾਮਜ਼ਦ ਤਾਰੀਖਾਂ — ਜਵਾਬ ਤੋਂ
        ਗਾਇਬ ਹੈ, ਭਾਵੇਂ ਨਾਮਜ਼ਦ ਤਾਰੀਖ/ਥਾਂ/ਕਰਤਾ ਨੂੰ ਪੂਰਾ ਜਵਾਬ ਬਣਨ
