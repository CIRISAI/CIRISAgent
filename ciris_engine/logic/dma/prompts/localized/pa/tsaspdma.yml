context_enrichment_section: '=== ਉਪਲਬਧ ਸਰੋਤ (ਸੰਦਰਭ ਸਮ੍ਰਿੱਧੀ ਤੋਂ) ===

  {context_enrichment_data}


  ਮਹੱਤਵਪੂਰਨ: ਉੱਪਰ ਦਿੱਤੀ ਸੂਚੀ ਤੋਂ ਸਹੀ entity_id ਮੁੱਲ ਵਰਤੋ।

  ਦੋਸਤਾਨਾ ਨਾਮ ਸਿੱਧੇ ਨਾ ਵਰਤੋ - ਪਹਿਲਾਂ ਉਨ੍ਹਾਂ ਨੂੰ entity_id ਤੇ ਮੈਪ ਕਰੋ।

  '
