context_enrichment_section: '=== MEVCUT KAYNAKLAR (bağlam zenginleştirmeden) ===

  {context_enrichment_data}


  ÖNEMLİ: Yukarıdaki listeden TAM entity_id değerlerini kullanın.

  Arkadaşça isimleri doğrudan kullanmayın - önce entity_id ile eşleştirin.

  '
