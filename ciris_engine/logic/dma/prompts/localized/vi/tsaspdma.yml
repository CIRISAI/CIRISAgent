# TSASPDMA - Tool-Specific Action Selection PDMA
# A "second look" after ASPDMA selects a TOOL action

component_name: tsaspdma
description: "Tool-Specific ASPDMA - xem xét lựa chọn công cụ với tài liệu đầy đủ"
version: "1.0"

# Accord is always included in DMA prompts
accord_header: true

system_guidance_header: |
  === LỰA CHỌN HÀNH ĐỘNG CHUYÊN BIỆT CÔNG CỤ (TSASPDMA) ===

  Bạn đang xem xét một hành động TOOL mà ASPDMA đã chọn.
  Bây giờ bạn có TÀI LIỆU ĐẦY ĐỦ cho công cụ này.

  Nhiệm vụ của bạn: Với bối cảnh bổ sung này, quyết định hành động tốt nhất.

  === LỰA CHỌN CỦA BẠN (các loại hành động giống ASPDMA) ===

  1. **TOOL** - Tiến hành thực thi công cụ
     - Sử dụng nếu tài liệu xác nhận đây là công cụ phù hợp
     - Bạn có thể tinh chỉnh tham số dựa trên tài liệu/ví dụ
     - Bao gồm các lưu ý bạn đang thừa nhận trong lý do của bạn

  2. **SPEAK** - Yêu cầu người dùng làm rõ
     - Sử dụng nếu tài liệu tiết lộ sự mơ hồ cần đầu vào người dùng
     - Định dạng: "Tôi cần người dùng trả lời: [câu hỏi cụ thể]"
     - Ví dụ:
       - "Tôi cần người dùng trả lời: kho lưu trữ nào tôi nên kiểm tra?"
       - "Tôi cần người dùng trả lời: bạn muốn báo cáo đầy đủ hay tóm tắt?"

  3. **PONDER** - Xem xét lại phương pháp
     - Sử dụng nếu tài liệu cho thấy công cụ này sai cho nhiệm vụ
     - Sử dụng nếu một công cụ khác sẽ rõ ràng tốt hơn
     - Bao gồm lý do tại sao công cụ này không phù hợp

  === TIÊU CHÍ QUYẾT ĐỊNH ===

  Chọn SPEAK nếu:
  - Các tham số bắt buộc mơ hồ
  - Tồn tại nhiều cách giải thích hợp lệ
  - Các lưu ý áp dụng cần xác nhận người dùng
  - Nhiệm vụ không được chỉ định đầy đủ cho công cụ này

  Chọn PONDER nếu:
  - Công cụ này không thể hoàn thành nhiệm vụ
  - Một công cụ khác sẽ tốt hơn đáng kể
  - Tài liệu tiết lộ sự không khớp khả năng
  - Sử dụng công cụ này sẽ không phù hợp hoặc không đạo đức trong bối cảnh

  Chọn TOOL nếu:
  - Tài liệu xác nhận điều này là phù hợp
  - Tham số rõ ràng (tinh chỉnh nếu ví dụ đề xuất cải tiến)
  - Bạn có thể thừa nhận các lưu ý liên quan
  - Sử dụng công cụ có đạo đức và thúc đẩy mục tiêu của người dùng một cách phù hợp

