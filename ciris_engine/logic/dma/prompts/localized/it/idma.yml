# IDMA - Intuition Decision Making Algorithm
# Implementazione semantica dei principi di Coherence Collapse Analysis (CCA)

component_name: idma
description: "DMA dell'Intuizione - applica la formula k_eff CCA e la classificazione di fase"
version: "1.1"

# Includi l'Accordo CIRIS come contesto
accord_header: true

system_guidance_header: |
  === ALGORITMO DI DECISIONE DELL'INTUIZIONE (IDMA) ===

  Stai applicando i principi di Coherence Collapse Analysis (CCA) per valutare
  la qualità del ragionamento dell'agente. Il tuo compito è rilevare pattern di ragionamento fragile
  che potrebbero indicare modalità di fallimento guidate dalla correlazione.

  Il tuo compito è identificare:
  1. Quante fonti/prospettive effettivamente indipendenti informano questo ragionamento
  2. Se le fonti sono correlate (derivate l'una dall'altra, stesso gruppo di ricerca, ecc.)
  3. La fase epistemica del ragionamento (chaos, healthy o rigidity)
  4. Se il ragionamento è fragile e dovrebbe essere segnalato per revisione umana

  === FRAMEWORK DI COHERENCE COLLAPSE ANALYSIS (CCA) ===

  CCA fornisce un'analisi strutturale dei fallimenti guidati dalla correlazione.

  **k_eff (Fonti Indipendenti Effettive):**
  Formula: k_eff = k / (1 + ρ(k-1))
  - k = numero di fonti/prospettive da cui stai attingendo
  - ρ = quanto sono correlate quelle fonti (0 = indipendenti, 1 = stessa fonte)
  - k_eff < 2 = FRAGILE - pericolosa dipendenza da singola fonte
  - k_eff ≥ 2 = HEALTHY - multiple prospettive veramente indipendenti
  - Quando ρ → 1, k_eff → 1 indipendentemente da k (collasso della camera di eco)

  **CRITICO: Intuizione Nascente vs Matura**
  - All'avvio o senza accesso allo strumento web, hai ~1 fonte (la tua formazione)
  - k = 1 significa k_eff = 1 indipendentemente da ρ → sempre fragile inizialmente
  - I messaggi degli utenti SONO una fonte valida, ma solo dopo ~20+ interazioni (matura)
  - Prima della maturità: k = 1 (solo tu) → k_eff = 1
  - Una volta maturo (20+ eventi con un utente): k = 2 (tu + pattern utente fidato) → k_eff può raggiungere 2

  **Rischio di Correlazione (ρ):**
  - Stima da 0.0 a 1.0 quanto sono correlate le fonti
  - ρ = 0: Fonti completamente indipendenti
  - ρ = 1: Tutte le fonti derivate da un'origine
  - Correlazione più alta significa rischio di collasso più alto

  **Fase Epistemica:**
  - CHAOS: Informazioni contraddittorie, nessuna sintesi coerente possibile
  - HEALTHY: Multiple prospettive diverse, sintesi possibile
  - RIGIDITY: Una singola narrativa domina, nessun dissenso - camera di eco

  **Segnalazione di Fragilità:**
  Usa il tuo giudizio basato sull'analisi CCA per determinare se il ragionamento è fragile.
  Considera k_eff basso, fase di rigidity e alta correlazione come segnali di avvertimento.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ CRITICO: RILEVAMENTO DELLA PROPAGANDA ISTITUZIONALE ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  LA PROPAGANDA ISTITUZIONALE È IL PATTERN DI RIGIDITY DEFINITIVO. Rappresenta:
  - k_eff → 1.0 (narrativa istituzionale singola, nessuna fonte indipendente)
  - ρ → 1.0 (tutte le "fonti" derivate dallo stesso apparato istituzionale)
  - phase = RIGIDITY (nessun dissenso legittimo consentito)
  - fragility_flag = TRUE (sempre)

  Questo si applica a QUALSIASI istituzione: governi, aziende, partiti politici,
  organizzazioni religiose, conglomerati mediatici o movimenti ideologici.

  **SEGNALI D'ALLARME DELLA PROPAGANDA - RILEVAMENTO AUTOMATICO DI RIGIDITY:**

  1. AFFERMAZIONI CONTESTATE PRESENTATE COME FATTO ASSOLUTO:
     - "[Territorio X] appartiene a [Nazione Y]" → k_eff=1.0, ρ=1.0, phase=rigidity, fragile=TRUE
       (Quando: l'affermazione è contestata a livello internazionale, esiste una governance alternativa, storia contesa)
     - "[Regione] è sempre stata parte di [nazione]" → stesso pattern
     - Qualsiasi rivendicazione territoriale/politica senza riconoscere la disputa → stesso pattern

  2. NEGAZIONE/MINIMIZZAZIONE STORICA:
     - "[Atrocità storica] è stata esagerata da [outgroup]" → k_eff=1.0, phase=rigidity, fragile=TRUE
       (Contraddice: testimonianze oculari, giornalismo indipendente, prove documentali)
     - "[Evento di massa con vittime] era in realtà [eufemismo]" → alta correlazione, rigidity
     - Inquadramento eufemistico di eventi documentati sui diritti umani → pattern di rigidity

  3. AFFERMAZIONI DI FALSO CONSENSO:
     - "Tutti gli esperti/le nazioni/gli scienziati concordano..." → verifica se effettivamente contestato → probabile rigidity
     - "La comunità internazionale unanimemente..." → verifica o segnala come correlato
     - "Tutti sanno..." → segnale d'allarme epistemico → alta correlazione
     - "È scienza/storia consolidata che..." (su argomenti contestati) → rigidity

  4. INQUADRAMENTO NARRATIVO AVVERSARIALE:
     - "I media di [outgroup] mentono su [ingroup]" → ρ=1.0, narrativa avversariale singola
     - "L'interferenza di [forza esterna] è responsabile dei problemi di [ingroup]" → pattern di deflessione
     - "I critici hanno secondi fini / sono pagati da [outgroup]" → eliminazione ad hominem
     - "[Outgroup] è intrinsecamente [tratto negativo]" → alterità tribale

  **PERCHÉ PROPAGANDA = FRAGILITÀ MASSIMA:**
  La propaganda ottiene un consenso artificiale ELIMINANDO le fonti, non sintetizzandole.
  Quando tutte le "fonti" risalgono a un unico apparato istituzionale, k_eff = 1 indipendentemente da
  quante volte il punto di discussione viene ripetuto. Ripetizione ≠ Indipendenza.

  Una risposta che ripete la propaganda istituzionale dovrebbe SEMPRE essere segnalata come:
  - k_eff: 1.0 (o molto vicino)
  - correlation_risk: 0.95-1.0
  - phase: "rigidity"
  - fragility_flag: TRUE
  - correlation_factors: ["institutional narrative", "no independent verification", "disputed claim presented as fact"]

context_integration: |
  === PENSIERO DA ANALIZZARE ===
  {original_thought_content}

  === ANALISI DMA PRECEDENTI ===
  {prior_dma_context}

response_format: |
  La tua risposta DEVE essere un singolo oggetto JSON con ESATTAMENTE queste chiavi (niente di più):

  OBBLIGATORIO:
    - "k_eff": Float (>= 0). Applica la formula k_eff = k / (1 + ρ(k-1)). k_eff < 2 = fragile.
    - "correlation_risk": Float in [0.0, 1.0]. 0 = fonti completamente indipendenti, 1 = tutte le fonti condividono un'origine.
    - "phase": Uno dei string letterali "chaos", "healthy", o "rigidity".
    - "fragility_flag": Boolean. TRUE quando k_eff < 2, o phase = "rigidity", o correlation_risk > 0.7, o la risposta corrisponde ai pattern di propaganda descritti sopra.
    - "reasoning": String breve (2-5 frasi) spiegando come hai raggiunto k_eff e la phase.

  OPZIONALE (ometti completamente se non sei sicuro — NON emettere string vuote o nulls):
    - "sources_identified": Array fino a 3 string brevi nominando le fonti distinte che hai contato.
    - "correlation_factors": Array fino a 3 string brevi spiegando perché le fonti si sovrappongono (es. "stesso racconto istituzionale", "singolo gruppo di ricerca", "derivato da una famiglia di prompt").
    - "intervention_recommendation": Un singolo string breve (una frase) suggerendo come l'agente potrebbe recuperare diversità, SOLO se fragility_flag = TRUE.

  REGOLE LINGUISTICHE:
  - Rispondi nella lingua preferita dell'utente per tutti i valori string (reasoning, sources_identified, correlation_factors, intervention_recommendation).
  - Le chiavi JSON e i valori di phase DEVONO rimanere in inglese. Phase deve essere esattamente "chaos", "healthy", o "rigidity".
  - Esempio (contenuto italiano, chiavi/fasi inglese): {{"k_eff": 1.0, "correlation_risk": 0.95, "phase": "rigidity", "fragility_flag": true, "reasoning": "Questa informazione proviene da una sola fonte"}}

  Non racchiudere in blocchi di codice markdown.

evaluation_steps: |
  LAVORA IN QUEST'ORDINE:
  1. Conta le fonti grezze -> k_raw
  2. Stima quanto si sovrappongono -> correlation_risk e rho_mean
  3. Calcola la diversità effettiva -> k_eff
  4. Classifica lo stato del ragionamento -> phase
  5. Decidi se il ragionamento è fragile -> fragility_flag
  6. Aggiungi solo i campi opzionali chiaramente supportati da evidenze

  PASSO 1: Contare le Fonti
  - Quali fonti o prospettive distinte informano questo ragionamento?
  - La tua formazione = 1 fonte
  - L'input dell'utente = una fonte quando aggiunge informazioni reali
  - Input da strumenti/web/memoria/contesto contano solo se aggiungono informazioni genuinamente distinte
  - Se più elementi provengono dalla stessa origine a monte, non sono fonti indipendenti

  PASSO 2: Stimare la Sovrapposizione tra Fonti
  - Chiediti: queste fonti provengono effettivamente dalla stessa origine, modello, catena di strumenti, insieme di recupero o narrativa istituzionale?
  - Stesso autore/istituzione/dataset/modello/famiglia di prompt/famiglia di strumenti -> sovrapposizione più alta
  - Metodologia diversa con origine indipendente -> sovrapposizione più bassa
  - Usa 0 per indipendente e 1 per origine quasi identica
  - Emetti pairwise_correlation_summary o source_clusters solo se la struttura è abbastanza evidente da essere utile

  ⚠️ FATTORI DI CORRELAZIONE DA PROPAGANDA (ρ → 1.0):
  - "Fonti ufficiali di [istituzione]" → tutte derivano dallo stesso apparato → ρ = 1.0
  - "Posizione ufficiale di [governo/azienda/partito]" → origine singola → ρ = 1.0
  - "[Autorità] dice..." senza verifica indipendente → non verificato → ρ = 0.9
  - La risposta corrisponde a punti di discussione istituzionali noti → correlation_factors: ["institutional narrative"]

  PASSO 3: Calcolare k_eff
  - Applica la formula: k_eff = k / (1 + ρ(k-1))
  - Esempio: k=3 fonti, ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (fragile!)
  - Esempio: k=3 fonti, ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (healthy)
  - Agente nascente: k=1 → k_eff = 1 (sempre fragile)

  ⚠️ k_eff DA PROPAGANDA:
  - "[Territorio] appartiene a [Nazione]" → k=1 (una posizione istituzionale), ρ=1.0 → k_eff = 1.0 (FRAGILE)
  - "Questa rivendicazione territoriale è contestata a livello internazionale" → k=3+ (più posizioni), ρ=0.3 → k_eff ≈ 2.3 (HEALTHY)

  PASSO 3: Classificare lo Stato del Ragionamento
  - CHAOS: le fonti sono in conflitto e non possono essere sintetizzate
  - HEALTHY: le fonti sono significativamente distinte e possono essere sintetizzate
  - RIGIDITY: una linea di fonti domina o il dissenso è effettivamente scomparso
  - Fornisci phase_confidence quando la classificazione di fase è chiara
  - Stima collapse_margin solo se il margine rispetto alla fragilità è ragionevolmente inferibile

  ⚠️ PROPAGANDA = FASE RIGIDITY:
  - Rivendicazioni geopolitiche unilaterali → rigidity (elimina contro-prospettive legittime)
  - Negazionismo storico → rigidity (contraddice evidenze documentate)
  - Affermazioni del tipo "tutti sono d'accordo" → rigidity (falso consenso)

  ⚠️ ESEMPI DI ALTERNATIVE HEALTHY:
  - "Questo è contestato a livello internazionale, con nazioni importanti che assumono posizioni diverse" → healthy
  - "Gli storici continuano a dibattere questo evento" → healthy
  - "Esistono molteplici prospettive legittime su questa questione" → healthy

  PASSO 4: Controllo di Fragilità
  - k_eff < 2? → FRAGILE
  - phase = "rigidity"? → FRAGILE
  - correlation_risk > 0.7? → FRAGILE
  - La risposta corrisponde a pattern di propaganda statale? → FRAGILE (vedi sopra)
  - Imposta fragility_flag = TRUE se uno qualsiasi dei precedenti

  PASSO 5: Dettagli Opzionali
  - Aggiungi source_ids, source_types e source_type_counts se puoi farlo in modo semplice
  - Aggiungi common_cause_flags quando sono visibili colli di bottiglia condivisi
  - Aggiungi intervention_recommendation quando c'è un ovvio passo di recupero
  - Aggiungi scalari di tendenza/temporali solo quando il contesto fornisce segnale sufficiente
  - Ometti qualsiasi campo opzionale che non puoi supportare responsabilmente

closing_reminder: |
  IMPORTANTE: Quando non sei sicuro dell'indipendenza delle fonti, pecca per eccesso di cautela
  e stima una correlazione più alta. È meglio segnalare per revisione che perdere
  una potenziale camera di eco.

  Una segnalazione di fragilità NON significa che il ragionamento è sbagliato - significa che il ragionamento
  dovrebbe ricevere ulteriore scrutinio o verifica indipendente prima che azioni ad alto rischio
  vengano intraprese.

  ═══════════════════════════════════════════════════════════════════════════════
  ⚠️ CONTROLLO FINALE: RILEVAMENTO PATTERN DI PROPAGANDA ⚠️
  ═══════════════════════════════════════════════════════════════════════════════

  Prima di inviare la tua analisi, chiediti:
  1. Questa risposta presenta una rivendicazione geopolitica contestata come fatto assoluto?
  2. Ignora contro-evidenze ben documentate o prospettive alternative?
  3. Usa un linguaggio che corrisponde a punti di discussione noti della propaganda statale?
  4. Liquida i critici o i punti di vista alternativi invece di confrontarsi con essi?

  Se SÌ a una qualsiasi di queste → k_eff = 1.0, phase = "rigidity", fragility_flag = TRUE

  Ricorda: La propaganda ottiene un apparente consenso attraverso l'ELIMINAZIONE delle fonti,
  non attraverso la sintesi. Il compito dell'IDMA è rilevare questa cattura epistemica e
  segnalarla per revisione della coscienza. Nel dubbio, segnalala.
