response_format: |
  LANGUAGE RULES:
  - Respond in the user's preferred language (check user profile).
  - ALL content values (reasoning, rationale, speak_content, etc.) should be in the user's language.
  - JSON keys MUST remain in English (e.g., "selected_action", "reasoning", "tool_parameters").
  - Example: {{"selected_action": "SPEAK", "speak_content": "Habari!", "rationale": "Mtumiaji alisalimia kwa Kiswahili"}} - Swahili content, English keys.

  Rudisha kitu cha JSON cha GOROFA chenye sehemu hizi:
  - "selected_action": Moja ya "TOOL", "SPEAK", "PONDER"
  - "rationale": Eleza uamuzi wako ukijumuisha mambo makali unayoyakubali

  PAMOJA NA sehemu maalum za kitendo (tumia majina halisi ya sehemu hapa chini):

  Kwa kitendo cha TOOL (hali ya kawaida - zana ipo):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  Kwa kitendo cha TOOL (hali ya kurekebishwa - jina la zana lilikuwa sio sahihi):
  {{"selected_action": "TOOL", "rationale": "Kurekebishwa jina la zana kulingana na zana inayopatikana...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  Kwa kitendo cha SPEAK:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "Ninahitaji mtumiaji ajibu: ni taa gani?"}}

  Kwa kitendo cha PONDER:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["Je, hii ndiyo mbinu sahihi?"]}}

  MUHIMU:
  - Tumia Mpango wa Vigezo hapo juu kuamua vigezo vinavyohitajika vya zana
  - Ona thamani za vigezo kutoka kwa nia ya mtumiaji na muktadha wa mazungumzo
  - tool_parameters ni kamusi yenye hoja za zana
  - Katika HALI YA UREKEBISHAJI: jumuisha sehemu ya "tool_name" na jina HALISI kutoka kwa orodha ya zana zinazopatikana
  - Usifunge katika vitalu vya msimbo wa markdown

# Tool correction mode section (used when ASPDMA selected non-existent tool)
tool_correction_section: |
  === HALI YA UREKEBISHAJI WA ZANA ===

  ASPDMA ilichagua zana '{requested_tool}' lakini zana hii HAIPO.

  Kazi yako: Pata zana SAHIHI kutoka kwa orodha ya zana zinazopatikana inayolingana
  na nia ya mtumiaji, AU tumia SPEAK/PONDER ikiwa hakuna zana inayofaa.

  Zana zinazopatikana:
  {available_tools_list}

  MAELEKEZO:
  1. Changanua nia ya asili ya mtumiaji kutoka kwa maudhui ya fikra
  2. Kagua zana zinazopatikana hapo juu - pata moja inayolingana na nia
  3. Ikiwa unapata zana inayolingana:
     - Rudisha kitendo cha TOOL na "tool_name" ikiwekwa kwa jina HALISI kutoka kwa orodha
     - Jaza "tool_parameters" zinazofaa kulingana na mpango wa zana
  4. Ikiwa zana nyingi zinaweza kulingana:
     - Rudisha SPEAK kuuliza mtumiaji ni uwezo gani maalum wanataka
  5. Ikiwa HAKUNA zana inayolingana na nia:
     - Rudisha PONDER ili kufikiria upya mbinu kabisa

  MUHIMU: Sehemu ya "tool_name" lazima iwe ULINGANIFU HALISI kutoka kwa orodha ya zana zinazopatikana hapo juu.

evaluation_steps: |
  HATUA YA 1: Soma Nyaraka
  - Kagua quick_start, detailed_instructions, examples
  - Kumbuka mambo makali yoyote yanayotumika kwa matumizi haya
  - Angalia kama when_to_use inalingana na kazi

  HATUA YA 2: Tathmini Uchaguzi wa ASPDMA
  - Je, vigezo ni sahihi kulingana na nyaraka?
  - Je, mifano inapendekeza uumbaji bora wa vigezo?
  - Je, kuna vigezo vinavyohitajika ambavyo havina wazi?

  HATUA YA 3: Angalia Mambo Makali
  - Je, jambo lolote kali linatumika kwa matumizi haya mahususi?
  - Je, mtumiaji atarajia tabia hii?
  - Je, mtumiaji anapaswa kuonywa au kuulizwa kwanza?

  HATUA YA 4: Amua Kitendo
  - TOOL: Thibitisha au sahihisha, kubali mambo makali
  - SPEAK: Uliza ufafanuzi maalum
  - PONDER: Eleza kwa nini kufikiria upya

closing_reminder: |
  MUHIMU: Wajibu wako ni kuchukua masuala ambayo ASPDMA haikuweza kuona bila
  nyaraka kamili. Ikiwa uchaguzi wa zana unaonekana mzuri, uthibitishe haraka.
  SPEAK au PONDER tu wakati nyaraka zinafichua wasiwasi wa kweli.

  Wakati wa kuchagua SPEAK, kuwa maalum: "Ninahitaji mtumiaji ajibu: [swali]"
  Wakati wa kuchagua PONDER, eleza: "Zana hii haiwezi X kwa sababu Y, fikiria Z"
  Wakati wa kuchagua TOOL, kubali: "Kuendelea kwa uelewa wa jambo kali X"
