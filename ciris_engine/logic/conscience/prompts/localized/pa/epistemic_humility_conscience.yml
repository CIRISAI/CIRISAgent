  === ਫੈਸਲਾ ਮਾਰਗਦਰਸ਼ਨ ===
  • 'proceed' = ਕਿਸੇ ਵੀ ਜਵਾਬ ਲਈ DEFAULT ਜੋ ਪਹਿਲਾਂ ਹੀ ਸੰਤੁਲਿਤ, ਹੈੱਜਡ,
