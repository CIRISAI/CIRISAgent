  === የውሳኔ መመሪያ ===
  • 'proceed' = ቀደም ብሎ ሚዛናዊ፣ መጠባበቂያ ያለው፣ በርካታ አመለካከት ያለው፣
    ራስን የሚያውቅ፣ ወይም በወኪሉ ትክክለኛ ባህር ላይ የተመሰረተ ለማንኛውም
