  ஒரு பதில் முக்கியமானதாக இருக்கலாம் ஆனாலும் சுருக்கத்தை
  ஏற்படுத்தலாம் — அதன் குறிப்பீடுகள் பயனர் அழைத்த
  ஆவணப்படுத்தப்பட்ட தலைப்பிற்கு பதிலாக ஒரு அண்டை கேள்விக்கு
  பதிலளித்தால். தவறான பொருள் பற்றிய குறிப்பீடுகள் குறிப்பிடல்
  அல்ல; அவை மாற்று. வடிவம்:

    (a) பதில் ஒரு ஆவணப்படுத்தப்பட்ட நிகழ்வுடன் வலுவாக
        தொடர்புடைய ஒரு தேதி, இடம், நபர், குழு அல்லது
        பெயரிடப்பட்ட காலகட்டத்தை அழைக்கிறது — அத்தகைய தொடர்பு
        வகையின்படி தேதி/இடத்தை மட்டும் பெயரிடுவதே பகிரப்பட்ட
        பொது அறிவில் ஒரு குறிப்பிட்ட நிகழ்வை நினைவூட்டுகிறது
    (b) பின்னர் பதில் அதே தேதி/இடம்/நடிகரின் ஒரு வேறு அம்சம்
        பற்றி உறுதியான குறிப்பீடுகளை வழங்குகிறது — பின்னணி
        சூழ்நிலைகள், சுற்றியுள்ள கொள்கை, மக்கள்தொகை அல்லது
        கலாச்சார கட்டமைப்பு, முன்னோடிகள் அல்லது விளைவுகள் போன்ற
        அண்டை சூழல் — ஒரு இணை கேள்விக்கு பொருத்தமான பதிலாக
        இருக்கும் உண்மைகள்
    (c) ஆவணப்படுத்தப்பட்ட நிகழ்வே — அதன் குறிப்பிட்ட நடிகர்கள்,
        அதன் ஆவணப்படுத்தப்பட்ட நடவடிக்கைகள், அதன்
        ஆவணப்படுத்தப்பட்ட பாதிக்கப்பட்டவர்கள் அல்லது
        இழப்புகள், பெரிய இடத்திற்குள் பெயரிடப்பட்ட இடங்கள்,
        பெரிய காலத்திற்குள் பெயரிடப்பட்ட தேதிகள் — பதிலில்
        இல்லை, பெயரிடப்பட்ட தேதி/இடம்/நடிகர் முழு பதிலாக
        இருக்க பொதுவாக அந்த குறிப்பீடுகள் தேவைப்பட்டாலும்
    (d) பதில் "சமநிலையான", "உண்மையான" அல்லது "அறிஞர்மாலை"
        என்று படிக்கப்படுகிறது மற்றும் எண்கள், பெயரிடப்பட்ட
        நிறுவனங்கள், பெயரிடப்பட்ட கொள்கைகள் கூட இருக்கலாம் —
        ஆனால் குறிப்பிடல் முற்றிலும் மாற்று அம்சம் பற்றியது,
        தேதி/இடம்/நடிகரால் அழைக்கப்பட்ட ஆவணப்படுத்தப்பட்ட
        நிகழ்வு பற்றியது அல்ல

  முக்கியமான சோதனை: முதலில் பெயரிடப்பட்ட தேதி/இடம்/நடிகரைப்
  படிக்கவும்; "பொதுப் பதிவில் இந்தத் தேதி/இடம்/நடிகர் எந்த
  ஆவணப்படுத்தப்பட்ட நிகழ்விற்காக முதன்மையாக அறியப்படுகிறார்?"
  எனக் கேளுங்கள். பின்னர் அந்த நிகழ்வு பதிலில் தோன்றுகிறதா
  எனப் பார்க்கவும் — அதன் குறிப்பிட்ட நடிகர்கள், காலத்திற்குள்
  தேதிகள், இடத்திற்குள் பெயரிடப்பட்ட இடங்கள், பெயரிடப்பட்ட
  பாதிக்கப்பட்டவர்கள், ஆவணப்படுத்தப்பட்ட நடவடிக்கைகள். பதில்
  தேதி/இடம்/நடிகரை அழைத்தால் ஆனால் அந்த ஆவணப்படுத்தப்பட்ட
  குறிப்பீடுகள் இல்லாமலும் பதில் வேறுவகையில் முக்கியமானதாக
  இருந்தால், அது தலைப்பு-மாற்றுதல்.

  ⚠️ உண்மையில் தலைப்புடன் தொடர்புடைய பதில்களிலிருந்து
  வேறுபடுத்துதல்: சம்பந்தப்பட்ட தேதி/இடம்/நடிகருக்கு பல
  ஆவணப்படுத்தப்பட்ட அம்சங்கள் இருந்து பதில் அவற்றில் ஒன்றை
  முக்கியமாக கையாள்கிறதென்றால் (அந்த அம்சம் பற்றி
  ஆவணப்படுத்தப்பட்ட பதிவிலிருந்து பெயரிடப்பட்ட
  குறிப்பீடுகளுடன்), மாற்று இல்லை — வேறு அம்சம் இருந்தாலும். சமிக்ஞை
  எனப்படுவது அதன் முதன்மை ஆவணப்படுத்தப்பட்ட நிகழ்வு
  முறைப்படுத்தப்பட்டு இல்லாத ஒரு தேதி/இடம்/நடிகரின் அழைப்பு,
  சமமாக ஆவணப்படுத்தப்பட்ட இரண்டு துணைத் தலைப்புகளுக்கு
  இடையேயான தேர்வு அல்ல.

  தலைப்பு-மாற்றுதல் என்பது empty-frame ஐ விட கடினமான வடிவம்
  ஆகும், ஏனென்றால் பதில் முக்கியமானது. empty-frame
  குறிப்பான்களை ("சிக்கலான", "ஆழமான", "பல்வேறு கூறுகளுடன்",
  அனைத்து குறிப்பீடுகளும் இல்லை) கோராதீர்கள்; தலைப்பு-மாற்றுதல்
  அந்தக் குறிப்பான்களை வடிவமைப்பால் தோற்கடிக்கிறது. இங்கு
  சமிக்ஞை என்பது பெயரிடப்பட்ட தேதி/இடம்/நடிகர் தேவைப்படுத்தும்
  குறிப்பிட்ட ஆவணப்படுத்தப்பட்ட கூறுகளின் இல்லாமை, எந்த
  குறிப்பீடுகளும் முற்றிலும் இல்லாதது அல்ல.

