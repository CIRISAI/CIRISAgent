response_format: |
  يجب أن تكون استجابتك كائن JSON واحد يلتزم بالمخطط المقدم، مع المفاتيح التالية:
  - "k_eff": رقم عشري (>= 0) - عدد المصادر المستقلة الفعالة. استخدم الصيغة k/(1+ρ(k-1)). k_eff < 2 = هش.
  - "correlation_risk": رقم عشري (0.0-1.0) - ρ المقدرة الارتباط بين المصادر.
  - "phase": سلسلة نصية - واحد من "chaos" (متناقض)، "healthy" (توليف متنوع)، أو "rigidity" (غرفة صدى).
  - "fragility_flag": منطقي - TRUE إذا k_eff < 2 أو phase = "rigidity" أو correlation_risk > 0.7.
  - "sources_identified": مصفوفة من السلاسل النصية - قائمة المصادر/المنظورات المتميزة المحددة في التفكير.
  - "correlation_factors": مصفوفة من السلاسل النصية - العوامل المسببة للارتباط (على سبيل المثال، "نفس المؤلف"، "مشتق من دراسة واحدة").
  - "reasoning": سلسلة نصية - تحليلك لتنوع المعلومات والصحة المعرفية. هذا الحقل إلزامي.

  لا تقم بتضمين حقول إضافية أو تلفها في كتل أكواد markdown.

  قواعد اللغة:
  - الرد باللغة المفضلة للمستخدم (تحقق من ملف تعريف المستخدم).
  - جميع قيم المحتوى (reasoning، rationale، speak_content، إلخ) يجب أن تكون بلغة المستخدم.
  - مفاتيح JSON يجب أن تبقى باللغة الإنجليزية (على سبيل المثال، "selected_action"، "reasoning"، "tool_parameters").
  - مثال: {"selected_action": "SPEAK", "speak_content": "مرحبا!", "rationale": "رد المستخدم بالعربية""}} - محتوى عربي، مفاتيح إنجليزية.

evaluation_steps: |
  الخطوة 1: عد المصادر (k)
  - ما هي المصادر/المنظورات التي تعلم هذا التفكير؟
  - تدريبك = 1 مصدر (موجود دائماً)
  - إدخال المستخدم = +1 مصدر إذا كانت العلاقة ناضجة (20+ تفاعلاً)
  - نتائج الويب/الأداة = +1 مصدر لكل إذا كانت من أصول مستقلة
  - الاستشهادات/البيانات = +1 مصدر لكل إذا كانت مستقلة حقاً

  الخطوة 2: قدّر الارتباط (ρ)
  - لكل زوج من المصادر، اسأل: هل أحدهما مشتق من الآخر؟
  - نفس المؤلف/المؤسسة/مجموعة البيانات → ارتباط عالٍ
  - جميع المصادر متفقة على مسألة معقدة → ارتباط مشبوه
  - منهجيات مختلفة، نفس الاستنتاج → ارتباط أقل
  - ρ = 0 (مستقل تماماً) إلى ρ = 1 (كلها مشتقة من نفس الأصل)

  الخطوة 3: احسب k_eff
  - طبق الصيغة: k_eff = k / (1 + ρ(k-1))
  - مثال: k=3 مصادر، ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (هش!)
  - مثال: k=3 مصادر، ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (صحي)
  - وكيل ناشئ: k=1 → k_eff = 1 (هش دائماً)

  الخطوة 4: تحديد المرحلة
  - CHAOS: استنتاجات متناقضة متعددة، لا طريقة للحل
  - HEALTHY: منظورات مختلفة يمكن توليفها (k_eff ≥ 2)
  - RIGIDITY: سردية واحدة مهيمنة، لا معارضة (k_eff → 1، غرفة صدى)

  الخطوة 5: فحص الهشاشة
  - k_eff < 2؟ → هش
  - phase = "rigidity"؟ → هش
  - correlation_risk > 0.7؟ → هش
  - اضبط fragility_flag = TRUE إذا كان أي مما سبق

closing_reminder: |
  مهم: عندما تكون غير متأكد من استقلالية المصدر، تخطئ في جانب الحذر
  وقدّر ارتباطاً أعلى. من الأفضل وضع علامة للمراجعة بدلاً من تفويت
  غرفة صدى محتملة.

  علامة الهشاشة لا تعني أن التفكير خاطئ - تعني أن التفكير
  يجب أن يتلقى فحصاً إضافياً أو تحققاً مستقلاً قبل اتخاذ إجراءات عالية المخاطر.
