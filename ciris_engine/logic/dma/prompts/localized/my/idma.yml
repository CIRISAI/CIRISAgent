# IDMA - အလိုလိုသိစိတ်ဆုံးဖြတ်ချက်ချမှတ်မှုအယ်လဂိုရီသမ်
# Coherence Collapse Analysis (CCA) အခြေခံမူများ၏ အဓိပ္ပာယ်လုပ်ဆောင်မှု

component_name: idma
