# DSASPDMA - Deferral-Specific Action Selection PDMA
# ASPDMA က DEFER ကို ရွေးချယ်ပြီးနောက် လူ့အခွင့်အရေးအခြေပြု ဒုတိယအဆင့်

component_name: dsaspdma
description: "ရွှေ့ဆိုင်းမှုအထူးပြု လုပ်ဆောင်ချက်ရွေးချယ်ခြင်း: DEFER လုပ်ဆောင်ချက်ကို အခွင့်အရေး/လိုအပ်ချက် taxonomy ဖြင့် ခွဲခြားသည်"
version: "1.0"

accord_header: true

taxonomy_text: |
  === အခွင့်အရေး / လိုအပ်ချက် TAXONOMY ===
  - health_and_bodily_integrity: အသက်၊ ကျန်းမာရေး၊ ခန္ဓာကိုယ်အပြည့်အဝမှု၊ မသန်စွမ်းမှု၊ ဆေးဘက်ဆိုင်ရာ လုံခြုံမှု၊ လက်နက်အသုံးချမှု၊ အန္တရာယ်ရှိပစ္စည်းများ သို့မဟုတ် တိုက်ရိုက်ရုပ်ပိုင်းထိခိုက်မှုအတွက် အသုံးပြုပါ။
    အခွင့်အရေးအခြေခံ: right_to_life, right_to_health, security_of_person
  - adequate_standard_of_living_and_services: အိမ်ရာ၊ ခိုလှုံရာ၊ အိမ်လုံခြုံရေး၊ အစားအစာ၊ ရေ၊ သန့်ရှင်းရေး၊ စွမ်းအင်၊ အခြေခံအဆောက်အအုံနှင့် အခြားအခြေခံနေထိုင်မှုအခြေအနေများအတွက် အသုံးပြုပါ။
    အခွင့်အရေးအခြေခံ: adequate_standard_of_living, housing, food_water_sanitation
  - livelihood_and_financial_security: အလုပ်၊ ဝင်ငွေ၊ လစာ၊ အကြွေး၊ credit၊ အကျိုးခံစားခွင့်၊ လူမှုဖူလုံရေး၊ ရင်းနှီးမြှုပ်နှံမှု၊ အခွန် သို့မဟုတ် အခြားအသက်မွေးဝမ်းကျောင်းနှင့် ငွေကြေးတည်ငြိမ်မှုလိုအပ်ချက်များအတွက် အသုံးပြုပါ။
    အခွင့်အရေးအခြေခံ: work, social_security, material_conditions_for_subsistence
  - justice_and_legal_agency: ဥပဒေအကြံပေးမှု၊ ဥပဒေအကူအညီ၊ တရားမျှတသောလုပ်ထုံးလုပ်နည်း၊ မျှတသောတရားစီရင်မှု၊ ဖြေရှင်းခွင့်၊ စာချုပ်များ၊ တာဝန်ယူမှု သို့မဟုတ် တရားမျှတရေးဝင်ရောက်ခွင့်များအတွက် အသုံးပြုပါ။
    အခွင့်အရေးအခြေခံ: fair_trial, access_to_justice, legal_aid_and_effective_remedy
  - identity_and_civic_participation: ဥပဒေအရအသိအမှတ်ပြုမှု၊ အထောက်အထားစစ်ဆေးမှု၊ နိုင်ငံသားဖြစ်မှု၊ မဲပေးမှု၊ ရွေးကောက်ပွဲများ၊ ပြည်သူ့ပါဝင်မှု သို့မဟုတ် နိုင်ငံသားအခြေအနေအတွက် အသုံးပြုပါ။
    အခွင့်အရေးအခြေခံ: recognition_before_the_law, nationality_and_identity, participation_in_public_affairs
  - privacy_autonomy_and_dignity: ကိုယ်ရေးလုံခြုံမှု၊ ကိုယ်ပိုင်ဆုံးဖြတ်ခွင့်၊ ဂုဏ်သိက္ခာ၊ အတင်းအကျပ်၊ လိမ်လည်မှု၊ လှည့်စားထိန်းချုပ်မှု၊ biometric ခန့်မှန်းမှု သို့မဟုတ် စောင့်ကြည့်မှုမှ လွတ်မြောက်မှုအတွက် အသုံးပြုပါ။
    အခွင့်အရေးအခြေခံ: privacy, autonomy_and_consent, human_dignity
  - education_culture_and_scientific_participation: ပညာရေး၊ သုတေသန၊ အသိပညာဝင်ရောက်ခွင့်၊ ယဉ်ကျေးမှုပူးပေါင်းပါဝင်မှုနှင့် သိပ္ပံအကျိုးကျေးဇူးများအတွက် အသုံးပြုပါ။
    အခွင့်အရေးအခြေခံ: education, take_part_in_cultural_life, benefits_of_scientific_progress
  - community_and_collective_safety: အသိုင်းအဝိုင်း moderation၊ အရေးပေါ်အဆင့်မြှင့်တင်မှု၊ pattern detection၊ ပြည်သူ့လုံခြုံရေး၊ ခွဲခြားဆက်ဆံမှု သို့မဟုတ် အဖွဲ့များကို အဓိကထိခိုက်စေသော ထိခိုက်မှုများအတွက် အသုံးပြုပါ။
    အခွင့်အရေးအခြေခံ: equal_protection, non_discrimination, collective_safety_and_protection
  - general_human_oversight: ရွှေ့ဆိုင်းမှုသည် မသေချာမှု၊ policy အဓိပ္ပါယ်ဖော်မှု၊ အာဏာကန့်သတ်ချက်များ သို့မဟုတ် domain-specific မဟုတ်သော လူ့ကြီးကြပ်မှုအကြောင်းဖြစ်ပါက အသုံးပြုပါ။
    အခွင့်အရေးအခြေခံ: human_review_and_accountability

  === လုပ်ငန်းဆိုင်ရာ ရွှေ့ဆိုင်းမှု အကြောင်းပြချက် CODE များ ===
  - licensed_domain_required: လိုင်စင်ရ အထူးကျွမ်းကျင်သူ သို့မဟုတ် သီးခြားအုပ်ချုပ်သော domain handler လိုအပ်သည်။
  - rights_impact_review: တောင်းဆိုချက်သည် ကာကွယ်ထားသော အခွင့်အရေးများ သို့မဟုတ် အခြေခံ လူ့လိုအပ်ချက်များကို အရေးပါစွာ သက်ရောက်သောကြောင့် ပြန်လည်သုံးသပ်ရန် လိုအပ်သည်။
  - safety_escalation: ဖြစ်နိုင်သော ထိခိုက်မှု သို့မဟုတ် အရေးပေါ်အခြေအနေများသည် ချက်ချင်း escalation သို့မဟုတ် လူ့ကြီးကြပ်မှုလိုအပ်သည်။
  - consent_or_authority_required: တရားဝင်သဘောတူညီချက်၊ ခွင့်ပြုချက် သို့မဟုတ် တာဝန်ခံ လူ့အာဏာကို အရင်လိုအပ်သည်။
  - insufficient_context: agent တွင် တာဝန်ရှိစွာ ဆက်လက်လုပ်ဆောင်ရန် လုံလောက်သော ယုံကြည်ရသည့် context မရှိပါ။
  - policy_review_required: လုပ်ဆောင်မှုမပြုမီ policy သို့မဟုတ် governance အဓိပ္ပါယ်ဖော်မှု လိုအပ်သည်။
  - resource_or_system_limitation: system ကန့်သတ်ချက်များကြောင့် ပြန်လည်သုံးသပ်မှုမရှိဘဲ လုံခြုံစွာ ပြီးစီးနိုင်ခြင်းမရှိပါ။
  - time_based_review: ဆုံးဖြတ်ချက်ကို နောက်ပိုင်း သတ်မှတ်ထားသောအချိန်တွင် သို့မဟုတ် အခြေအနေပြောင်းပြီးနောက် ပြန်လည်စဉ်းစားသင့်သည်။
  - ethical_uncertainty: system သည် ကျင့်ဝတ်ပိုင်းတွင် မသေချာသေးပြီး လူ့ဆုံးဖြတ်ချက် လိုအပ်သည်။
  - unknown: လုပ်ငန်းဆိုင်ရာ အကြောင်းပြချက် မရှင်းလင်းသေးသောအခါ fallback code.

system_guidance_header: |
  === ရွှေ့ဆိုင်းမှုအထူးပြု လုပ်ဆောင်ချက်ရွေးချယ်ခြင်း (DSASPDMA) ===

  ASPDMA က DEFER ကို ရွေးချယ်ပြီးဖြစ်သည်။
  သင့်တာဝန်မှာ လုပ်ဆောင်ချက်ရွေးချယ်မှုကို ပြန်ဖွင့်ရန် မဟုတ်ပါ။
  သင့်တာဝန်မှာ ရွှေ့ဆိုင်းမှုကို ရှင်းပြနိုင်၊ စစ်ဆေးနိုင်၊ လမ်းကြောင်းသတ်မှတ်နိုင်စေရန် ခွဲခြားရန် ဖြစ်သည်။

  သင်လုပ်ရမည်မှာ:
  1. DEFER လုပ်ဆောင်ချက်ကို ထိန်းသိမ်းပါ။
  2. အကောင်းဆုံး အဓိက အခွင့်အရေး / လိုအပ်ချက် အမျိုးအစားကို ရွေးပါ။
  3. အကောင်းဆုံး လုပ်ငန်းဆိုင်ရာ အကြောင်းပြချက် code ကို ရွေးပါ။
  4. တကယ်သက်ဆိုင်သည့်အခါမှသာ ဒုတိယလိုအပ်ချက် အမျိုးအစားများကို ထည့်ပါ။
  5. လိုင်စင်ရ domain handler လိုအပ်ကြောင်း ရှင်းလင်းနေမှသာ domain_hint ကို သတ်မှတ်ပါ။

evaluation_steps: |
  အဆင့် 1: မူလစဉ်းစားချက်နှင့် ASPDMA ၏ ယာယီအကြောင်းပြချက်ကို ဖတ်ပါ။
  အဆင့် 2: မည်သည့် လူ့လိုအပ်ချက် / လူ့အခွင့်အရေးအစုသည် အနီးကပ်ဆုံး သက်ဆိုင်နေသည်ကို သတ်မှတ်ပါ။
  အဆင့် 3: စနစ်က ဘာကြောင့် ရွှေ့ဆိုင်းနေသည်ကို အကောင်းဆုံးရှင်းပြသည့် လုပ်ငန်းဆိုင်ရာ အကြောင်းပြချက် code ကို ရွေးပါ။
  အဆင့် 4: reason_summary ကို တိုတို၊ တိကျပြီး အသုံးပြုသူဖတ်ရလွယ်ကူအောင် ထားပါ။
  အဆင့် 5: အဓိက အမျိုးအစားတစ်ခုကို ဦးစားပေးပါ။ ဖြစ်ရပ်က အခွင့်အရေးများစွာကို တကယ်လွှမ်းခြုံမှသာ ဒုတိယအမျိုးအစားများ ထည့်ပါ။

context_integration: |
  === မူလစဉ်းစားချက် ===
  {original_thought_content}

  === ASPDMA အကြောင်းပြချက် ===
  {aspdma_rationale}

  === လက်ရှိ DEFER အကြောင်းပြချက် ===
  {current_reason}

  === လက်ရှိ DEFER အခြေအနေ ===
  {current_context}

  === လက်ရှိ DEFER UNTIL ===
  {current_defer_until}

  === လက်ရှိ DOMAIN HINT ===
  {current_domain_hint}

  {taxonomy_text}

  === လိုင်စင်ရ DOMAIN ရွေးချယ်စရာများ ===
  ရှင်းလင်းစွာ လိုအပ်မှသာ ဤအရာများထဲမှ တစ်ခုကို အသုံးပြုပါ: {domain_hint_options}

response_format: |
  အောက်ပါ field များပါသော FLAT JSON object တစ်ခုကို ပြန်ပေးပါ:
  - "reason_summary": လူဖတ်လွယ်သော အတိုချုံးရှင်းပြချက်
  - "operational_reason": အထက်ပါ လုပ်ငန်းဆိုင်ရာ အကြောင်းပြချက် code များထဲမှ တစ်ခု
  - "primary_need_category": အထက်ပါ အခွင့်အရေး / လိုအပ်ချက် taxonomy တန်ဖိုးများထဲမှ တစ်ခု
  - "secondary_need_categories": ထပ်ဆောင်း taxonomy တန်ဖိုးများ၏ ရွေးချယ်နိုင်သော စာရင်း
  - "rights_basis": အတိုချုံး အခွင့်အရေးအခြေခံ label များ၏ စာရင်း
  - "domain_hint": အထူးပြု လိုင်စင်ရ handler လိုအပ်ကြောင်း ရှင်းလင်းသောအခါ ရွေးချယ်နိုင်သော လိုင်စင်ရ domain enum
  - "defer_until": အချိန်ပြောင်းရန် လိုအပ်ပါက ရွေးချယ်နိုင်သော ISO timestamp override

  ဥပမာ:
  {{"reason_summary": "လုပ်ထုံးလုပ်နည်းဆိုင်ရာ လမ်းညွှန်ချက် မပေးမီ လိုင်စင်ရ ဥပဒေရေးရာ ပြန်လည်သုံးသပ်မှု လိုအပ်သည်။", "operational_reason": "licensed_domain_required", "primary_need_category": "justice_and_legal_agency", "secondary_need_categories": ["identity_and_civic_participation"], "rights_basis": ["fair_trial", "access_to_justice", "legal_aid_and_effective_remedy"], "domain_hint": "LEGAL"}}

  ဘာသာစကား စည်းမျဉ်းများ:
  - အသုံးပြုသူနှစ်သက်သော ဘာသာစကားဖြင့် ဖြေပါ။
  - JSON key များနှင့် enum တန်ဖိုးများသည် သတ်မှတ်ထားသည့် အင်္ဂလိပ်စာအတိုင်း တိတိကျကျ ရှိရမည်။
  - reason_summary ကဲ့သို့ လူဖတ်နိုင်သော free text သာ localize လုပ်ပါ။

closing_reminder: |
  အရေးကြီး:
  - DEFER မှ အခြားလုပ်ဆောင်ချက်သို့ မပြောင်းပါနှင့်။
  - လိုင်စင်ရ ကိုင်တွယ်မှု တကယ်လိုအပ်ကြောင်း မဆိုလိုပါက domain_hint ကို မဖန်တီးပါနှင့်။
  - ဥပဒေရေးရာနှင့် ငွေရေးကြေးရေး ဝင်ရောက်ခွင့်ကို ရိုးရိုးအုပ်ချုပ်ရေးကိစ္စမဟုတ်ဘဲ အခွင့်အရေးအပေါ် သက်ရောက်သည့် လိုအပ်ချက်အဖြစ် ဆက်ဆံပါ။
  - အရှင်းဆုံး အခွင့်အရေးအခြေခံရှိသော အကျဉ်းဆုံး မှန်ကန်သည့် အမျိုးအစားကို ဦးစားပေးပါ။
