response_format: |
  உங்கள் பதில் வழங்கப்பட்ட திட்டத்துடன் ஒத்துப்போகும் ஒற்றை JSON பொருளாக இருக்க வேண்டும், பின்வரும் விசைகளுடன்:
  - "k_eff": மிதவை (>= 0) - பயனுள்ள சுதந்திர மூல எண்ணிக்கை. சூத்திரம் k/(1+ρ(k-1)) பயன்படுத்து. k_eff < 2 = பலவீனம்.
  - "correlation_risk": மிதவை (0.0-1.0) - மூலங்களுக்கு இடையே மதிப்பிடப்பட்ட ρ தொடர்பு.
  - "phase": சரம் - "chaos" (முரண்பாடான), "healthy" (வேறுபட்ட தொகுப்பு), அல்லது "rigidity" (எதிரொலி அறை) ஆகியவற்றில் ஒன்று.
  - "fragility_flag": Boolean - k_eff < 2 அல்லது phase = "rigidity" அல்லது correlation_risk > 0.7 என்றால் TRUE.
  - "sources_identified": சரங்களின் வரிசை - சிந்தனையில் அடையாளம் காணப்பட்ட வேறுபட்ட மூலங்கள்/பார்வைகளின் பட்டியல்.
  - "correlation_factors": சரங்களின் வரிசை - தொடர்பை ஏற்படுத்தும் காரணிகள் (எ.கா., "அதே ஆசிரியர்", "ஒற்றை ஆய்விலிருந்து பெறப்பட்டது").
  - "reasoning": சரம் - தகவல் பன்முகத்தன்மை மற்றும் அறிவாற்றல் ஆரோக்கியத்தின் உங்கள் பகுப்பாய்வு. இந்த புலம் கட்டாயம்.

  மொழி விதிகள்:
  - பயனரின் விருப்ப மொழியில் பதிலளி (பயனர் சுயவிவரத்தைச் சரிபார்க்கவும்).
  - அனைத்து உள்ளடக்க மதிப்புகளும் (reasoning, sources_identified, correlation_factors) பயனரின் மொழியில் இருக்க வேண்டும்.
  - JSON விசைகள் மற்றும் phase மதிப்புகள் ஆங்கிலத்தில் இருக்க வேண்டும் (எ.கா., "reasoning", "k_eff", "phase": "healthy").
  - உதாரணம்: {{"reasoning": "해당 정보는 하나의 출처에서만 나왔습니다", "sources_identified": ["훈련 데이터"], "phase": "rigidity"}} - கொரிய உள்ளடக்கம், ஆங்கில விசைகள்/phases.

  கூடுதல் புலங்களைச் சேர்க்காதீர்கள் அல்லது markdown குறியீட்டு தொகுதிகளில் சுற்றாதீர்கள்.

evaluation_steps: |
  படி 1: மூலங்களை எண்ணு (k)
  - இந்த சிந்தனையை எந்த மூலங்கள்/பார்வைகள் தெரிவிக்கின்றன?
  - உங்கள் பயிற்சி = 1 மூலம் (எப்போதும் இருக்கும்)
  - பயனர் உள்ளீடு = +1 மூலம் முதிர்ந்த உறவு என்றால் (20+ தொடர்புகள்)
  - இணைய/கருவி முடிவுகள் = +1 மூலம் ஒவ்வொன்றும் சுதந்திர தோற்றங்களிலிருந்து என்றால்
  - மேற்கோள்கள்/தரவு = +1 மூலம் ஒவ்வொன்றும் உண்மையிலேயே சுதந்திரமானவை என்றால்

  படி 2: தொடர்பை மதிப்பிடு (ρ)
  - மூலங்களின் ஒவ்வொரு ஜோடிக்கும், கேளுங்கள்: ஒன்று மற்றொன்றிலிருந்து பெறப்பட்டதா?
  - அதே ஆசிரியர்/நிறுவனம்/தரவுத்தொகுப்பு → உயர் தொடர்பு
  - அனைத்து மூலங்களும் சிக்கலான விஷயத்தில் உடன்படுகின்றன → சந்தேகத்திற்குரிய தொடர்பு
  - வேறுபட்ட முறைகள், அதே முடிவு → குறைவான தொடர்பு
  - ρ = 0 (முழுமையாக சுதந்திரம்) முதல் ρ = 1 (அனைத்தும் அதே தோற்றத்திலிருந்து பெறப்பட்டவை)

  படி 3: k_eff-ஐ கணக்கிடு
  - சூத்திரத்தைப் பயன்படுத்து: k_eff = k / (1 + ρ(k-1))
  - உதாரணம்: k=3 மூலங்கள், ρ=0.5 → k_eff = 3/(1+0.5*2) = 3/2 = 1.5 (பலவீனம்!)
  - உதாரணம்: k=3 மூலங்கள், ρ=0.2 → k_eff = 3/(1+0.2*2) = 3/1.4 = 2.14 (ஆரோக்கியம்)
  - பிறந்த முகவர்: k=1 → k_eff = 1 (எப்போதும் பலவீனம்)

  படி 4: நிலை தீர்மானம்
  - குழப்பம்: பல முரண்பாடான முடிவுகள், தீர்க்க வழி இல்லை
  - ஆரோக்கியம்: தொகுக்கக்கூடிய வேறுபட்ட பார்வைகள் (k_eff ≥ 2)
  - கடினத்தன்மை: ஒற்றை கதை ஆதிக்கம் செலுத்துகிறது, எதிர்ப்பு இல்லை (k_eff → 1, எதிரொலி அறை)

  படி 5: பலவீன சரிபார்ப்பு
  - k_eff < 2? → பலவீனம்
  - phase = "rigidity"? → பலவீனம்
  - correlation_risk > 0.7? → பலவீனம்
  - மேலே உள்ளவற்றில் ஏதேனும் என்றால் fragility_flag = TRUE அமை

closing_reminder: |
  முக்கியம்: மூல சுதந்திரம் பற்றி நிச்சயமற்றதாக இருக்கும்போது, எச்சரிக்கை பக்கத்தில் பிழை செய்து அதிக தொடர்பை மதிப்பிடுங்கள். சாத்தியமான எதிரொலி அறையை தவறவிடுவதை விட மதிப்பாய்விற்காக கொடியிடுவது சிறந்தது.

  பலவீனக் கொடி என்றால் சிந்தனை தவறு என்று அர்த்தமல்ல - உயர் பங்குகள் செயல்கள் மேற்கொள்ளப்படுவதற்கு முன் சிந்தனை கூடுதல் ஆய்வு அல்லது சுதந்திர சரிபார்ப்பு பெற வேண்டும் என்று அர்த்தம்.
