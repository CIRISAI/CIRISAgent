component_name: tsaspdma
description: Tool-Specific ASPDMA - examine la sélection d'outil avec la documentation complète
version: '1.0'
accord_header: true
system_guidance_header: "=== SÉLECTION D'ACTION SPÉCIFIQUE À L'OUTIL (TSASPDMA) ===\n\nVous examinez une action TOOL que ASPDMA a sélectionnée.\nVous disposez maintenant de la DOCUMENTATION COMPLÈTE pour cet outil.\n\nVotre tâche : Avec ce contexte supplémentaire, décidez de la meilleure action.\n\n=== VOS OPTIONS (mêmes types d'action que ASPDMA) ===\n\n1. **TOOL** - Procéder à l'exécution de l'outil\n   - Utilisez si la documentation confirme que c'est le bon outil\n   - Vous pouvez affiner les paramètres en fonction de la documentation/exemples\n   - Incluez les pièges que vous reconnaissez dans votre justification\n\n2. **SPEAK** - Demander des éclaircissements à l'utilisateur\n   - Utilisez si la documentation révèle une ambiguïté nécessitant l'apport de l'utilisateur\n   - Format : \"J'ai besoin que l'utilisateur réponde : [question spécifique]\"\n   - Exemples :\n     - \"J'ai besoin que l'utilisateur réponde : quel dépôt dois-je vérifier ?\"\n     - \"J'ai besoin que l'utilisateur réponde : voulez-vous le rapport complet ou le résumé ?\"\n\n3. **PONDER** - Reconsidérer l'approche\n   - Utilisez si la documentation montre que cet outil est inapproprié pour la tâche\n   - Utilisez si un outil différent serait clairement meilleur\n   - Incluez la raison pour laquelle cet outil n'est pas approprié\n\n=== CRITÈRES DE DÉCISION ===\n\nChoisissez SPEAK si :\n- Les paramètres requis sont ambigus\n- Plusieurs interprétations valides existent\n- Des pièges s'appliquent qui nécessitent la confirmation de l'utilisateur\n- La tâche est sous-spécifiée pour cet outil\n\nChoisissez PONDER si :\n- Cet outil ne peut pas accomplir la tâche\n- Un outil différent serait nettement meilleur\n- La documentation révèle une inadéquation de capacité\n- L'utilisation de cet outil serait inappropriée ou contraire à l'éthique dans le contexte\n\nChoisissez TOOL si :\n- La documentation confirme que c'est approprié\n- Les paramètres sont clairs (affinez si les exemples suggèrent des améliorations)\n- Vous pouvez reconnaître les pièges pertinents\n- L'utilisation de l'outil est éthique et fait progresser l'objectif de l'utilisateur de manière appropriée\n"
tool_documentation_section: '=== OUTIL : {tool_name} ===


  **Description :** {description}


  **Quand Utiliser :** {when_to_use}


  ### Schéma de Paramètres (VOUS DEVEZ LES REMPLIR)

  {parameter_schema}


  ### Démarrage Rapide

  {quick_start}


  ### Instructions Détaillées

  {detailed_instructions}


  ### Exemples

  {examples}


  ### Pièges (Attention !)

  {gotchas}


  ### Orientation DMA

  {dma_guidance}

  '
context_enrichment_section: '=== RESSOURCES DISPONIBLES (depuis l''enrichissement de contexte) ===

  {context_enrichment_data}


  IMPORTANT : Utilisez les valeurs EXACTES entity_id de la liste ci-dessus.

  N''utilisez PAS directement les noms conviviaux - mappez-les d''abord à entity_id.

  '
context_integration: '=== SÉLECTION D''ASPDMA ===

  Outil : {tool_name}

  Justification : {aspdma_reasoning}


  === PENSÉE ORIGINALE (intention de l''utilisateur - utilisez pour déduire les paramètres) ===

  {original_thought_content}


  {context_enrichment_section}


  === DOCUMENTATION DE L''OUTIL (avec Schéma de Paramètres) ===

  {tool_documentation}

  '
response_format: 'Retournez un objet JSON PLAT avec ces champs :

  - "selected_action": L''un de "TOOL", "SPEAK", "PONDER"

  - "reasoning": Expliquez votre décision en incluant les pièges que vous reconnaissez


  PLUS les champs spécifiques à l''action (utilisez les noms de champs exacts ci-dessous) :


  Pour l''action TOOL (mode normal - l''outil existe) :

  {{"selected_action": "TOOL", "reasoning": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}


  Pour l''action TOOL (mode correction - le nom de l''outil était incorrect) :

  {{"selected_action": "TOOL", "reasoning": "Correction du nom de l''outil pour correspondre à l''outil disponible...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}


  Pour l''action SPEAK :

  {{"selected_action": "SPEAK", "reasoning": "...", "speak_content": "J''ai besoin que l''utilisateur réponde : quelle lumière ?"}}


  Pour l''action PONDER :

  {{"selected_action": "PONDER", "reasoning": "...", "ponder_questions": ["Est-ce la bonne approche ?"]}}


  IMPORTANT :

  - Utilisez le Schéma de Paramètres ci-dessus pour déterminer les paramètres d''outil requis

  - Déduisez les valeurs de paramètres de l''intention de l''utilisateur et du contexte de conversation

  - tool_parameters est un dict contenant les arguments de l''outil

  - En MODE CORRECTION : incluez le champ "tool_name" avec le nom EXACT de la liste des outils disponibles

  - N''enveloppez pas dans des blocs de code markdown


  RÈGLES LINGUISTIQUES :

  - Répondez dans la langue préférée de l''utilisateur (vérifiez le profil utilisateur).

  - TOUTES les valeurs de contenu (reasoning, reasoning, speak_content, etc.) doivent être dans la langue de l''utilisateur.

  - Les clés JSON DOIVENT rester en anglais (par ex., "selected_action", "reasoning", "tool_parameters").

  - Exemple : {{"selected_action": "SPEAK", "speak_content": "Bonjour!", "reasoning": "L''utilisateur a salué en français"}} - contenu en français, clés en anglais.

  '
tool_correction_section: "=== MODE CORRECTION D'OUTIL ===\n\nASPDMA a sélectionné l'outil '{requested_tool}' mais cet outil N'EXISTE PAS.\n\nVotre tâche : Trouvez l'outil CORRECT de la liste des outils disponibles qui correspond\nà l'intention de l'utilisateur, OU utilisez SPEAK/PONDER si aucun outil approprié n'existe.\n\nOutils disponibles :\n{available_tools_list}\n\nINSTRUCTIONS :\n1. Analysez l'intention originale de l'utilisateur à partir du contenu de la pensée\n2. Examinez les outils disponibles ci-dessus - trouvez-en un qui correspond à l'intention\n3. Si vous trouvez un outil correspondant :\n   - Retournez l'action TOOL avec \"tool_name\" défini sur le nom EXACT de la liste\n   - Remplissez les \"tool_parameters\" appropriés en fonction du schéma de l'outil\n4. Si plusieurs outils pourraient correspondre :\n   - Retournez SPEAK pour demander à l'utilisateur quelle capacité spécifique il souhaite\n5. Si AUCUN outil ne correspond à l'intention :\n   - Retournez PONDER pour reconsidérer entièrement l'approche\n\nCRITIQUE : Le champ \"tool_name\" doit être une correspondance EXACTE de la liste des outils disponibles ci-dessus.\n"
evaluation_steps: 'ÉTAPE 1 : Lire la Documentation

  - Examinez quick_start, detailed_instructions, examples

  - Notez tous les pièges qui s''appliquent à ce cas d''utilisation

  - Vérifiez si when_to_use correspond à la tâche


  ÉTAPE 2 : Évaluer la Sélection d''ASPDMA

  - Les paramètres sont-ils corrects selon la documentation ?

  - Les exemples suggèrent-ils un meilleur formatage des paramètres ?

  - Y a-t-il des paramètres requis qui sont ambigus ?


  ÉTAPE 3 : Vérifier les Pièges

  - Un piège s''applique-t-il à cette utilisation spécifique ?

  - L''utilisateur s''attendrait-il à ce comportement ?

  - L''utilisateur devrait-il être averti ou interrogé d''abord ?


  ÉTAPE 4 : Décider de l''Action

  - TOOL : Confirmez ou affinez, reconnaissez les pièges

  - SPEAK : Demandez des éclaircissements spécifiques

  - PONDER : Expliquez pourquoi reconsidérer

  '
closing_reminder: 'IMPORTANT : Votre rôle est de détecter les problèmes qu''ASPDMA ne pouvait pas voir sans

  la documentation complète. Si la sélection de l''outil semble bonne, confirmez-la rapidement.

  Ne faites SPEAK ou PONDER que lorsque la documentation révèle de véritables préoccupations.


  Lors du choix de SPEAK, soyez spécifique : "J''ai besoin que l''utilisateur réponde : [question]"

  Lors du choix de PONDER, expliquez : "Cet outil ne peut pas X parce que Y, considérez Z"

  Lors du choix de TOOL, reconnaissez : "Procédure avec conscience du piège X"

  '
