response_format: |
  ఈ ఫీల్డ్‌లతో FLAT JSON ఆబ్జెక్ట్‌ను తిరిగి ఇవ్వండి:
  - "selected_action": "TOOL", "SPEAK", "PONDER" లో ఒకటి
  - "rationale": మీరు అంగీకరిస్తున్న gotchas తో సహా మీ నిర్ణయాన్ని వివరించండి

  అదనంగా చర్య-నిర్దిష్ట ఫీల్డ్‌లు (క్రింద ఖచ్చిత ఫీల్డ్ పేర్లను ఉపయోగించండి):

  TOOL చర్య కోసం (సాధారణ మోడ్ - సాధనం ఉంది):
  {{"selected_action": "TOOL", "rationale": "...", "tool_parameters": {{"entity_id": "light.living_room", "action": "turn_on"}}}}

  TOOL చర్య కోసం (దిద్దుబాటు మోడ్ - సాధనం పేరు తప్పు):
  {{"selected_action": "TOOL", "rationale": "అందుబాటులో ఉన్న సాధనంతో సరిపోలేలా సాధనం పేరును సరిదిద్దుతోంది...", "tool_name": "ha_device_control", "tool_parameters": {{"entity_id": "light.bedroom", "action": "turn_off"}}}}

  SPEAK చర్య కోసం:
  {{"selected_action": "SPEAK", "rationale": "...", "speak_content": "నాకు యూజర్ సమాధానం అవసరం: ఏ లైట్?"}}

  PONDER చర్య కోసం:
  {{"selected_action": "PONDER", "rationale": "...", "ponder_questions": ["ఇది సరైన విధానమా?"]}}

  ముఖ్యమైనది:
  - అవసరమైన సాధనం పరామితులను నిర్ణయించడానికి పై పరామితి స్కీమాను ఉపయోగించండి
  - యూజర్ ఉద్దేశం మరియు సంభాషణ సందర్భం నుండి పరామితి విలువలను అంచనా వేయండి
  - tool_parameters అనేది సాధనం యొక్క ఆర్గుమెంట్‌లను కలిగి ఉన్న dict
  - దిద్దుబాటు మోడ్‌లో: అందుబాటులో ఉన్న సాధనాల జాబితా నుండి ఖచ్చిత పేరుతో "tool_name" ఫీల్డ్ చేర్చండి
  - markdown కోడ్ బ్లాక్‌లలో చుట్టవద్దు

  భాష నియమాలు:
  - యూజర్ యొక్క ఇష్టపడే భాషలో ప్రతిస్పందించండి (యూజర్ ప్రొఫైల్ చూడండి).
  - అన్ని కంటెంట్ విలువలు (rationale, speak_content, ponder_questions) యూజర్ భాషలో ఉండాలి.
  - JSON కీలు మరియు చర్య పేర్లు తప్పనిసరిగా ఇంగ్లీష్‌లో ఉండాలి (ఉదా. "selected_action": "TOOL", "rationale", "tool_parameters").
  - ఉదాహరణ: {{"selected_action": "SPEAK", "rationale": "需要用户澄清", "speak_content": "请问您想控制哪个灯？"}} - చైనీస్ కంటెంట్, ఇంగ్లీష్ కీలు/చర్యలు.

# సాధనం దిద్దుబాటు మోడ్ విభాగం (ASPDMA ఉనికిలో లేని సాధనాన్ని ఎంచుకున్నప్పుడు ఉపయోగించబడుతుంది)
tool_correction_section: |
  === సాధనం దిద్దుబాటు మోడ్ ===

  ASPDMA సాధనం '{{requested_tool}}' ఎంచుకుంది కానీ ఈ సాధనం ఉనికిలో లేదు.

  మీ పని: అందుబాటులో ఉన్న సాధనాల జాబితా నుండి యూజర్ ఉద్దేశంతో సరిపోయే సరైన సాధనాన్ని కనుగొనండి, లేదా తగిన సాధనం లేకుంటే SPEAK/PONDER ఉపయోగించండి.

  అందుబాటులో ఉన్న సాధనాలు:
  {{available_tools_list}}

  సూచనలు:
  1. ఆలోచన కంటెంట్ నుండి యూజర్ యొక్క మూల ఉద్దేశాన్ని విశ్లేషించండి
  2. పై అందుబాటులో ఉన్న సాధనాలను సమీక్షించండి - ఉద్దేశంతో సరిపోయేది కనుగొనండి
  3. మీకు సరిపోయే సాధనం కనిపిస్తే:
     - జాబితా నుండి ఖచ్చిత పేరుతో "tool_name" సెట్ చేసి TOOL చర్యను తిరిగి ఇవ్వండి
     - సాధనం యొక్క స్కీమా ఆధారంగా తగిన "tool_parameters" పూరించండి
  4. బహుళ సాధనాలు సరిపోలితే:
     - వారు ఏ నిర్దిష్ట సామర్థ్యం కోరుకుంటున్నారో యూజర్‌ను అడగడానికి SPEAK తిరిగి ఇవ్వండి
  5. ఏ సాధనం ఉద్దేశంతో సరిపోలకపోతే:
     - విధానాన్ని పూర్తిగా పునఃపరిశీలించడానికి PONDER తిరిగి ఇవ్వండి

  క్లిష్టమైనది: "tool_name" ఫీల్డ్ పై అందుబాటులో ఉన్న సాధనాల జాబితా నుండి ఖచ్చిత సరిపోలిక అయి ఉండాలి.

evaluation_steps: |
  దశ 1: డాక్యుమెంటేషన్ చదవండి
  - quick_start, detailed_instructions, examples సమీక్షించండి
  - ఈ ఉపయోగ సందర్భానికి వర్తించే ఏదైనా gotchas గమనించండి
  - when_to_use పనికి సరిపోలుతుందో తనిఖీ చేయండి

  దశ 2: ASPDMA యొక్క ఎంపికను మూల్యాంకనం చేయండి
  - డాక్యుమెంటేషన్ ప్రకారం పరామితులు సరైనవా?
  - ఉదాహరణలు మెరుగైన పరామితి ఫార్మాటింగ్‌ను సూచిస్తాయా?
  - అస్పష్టంగా ఉన్న అవసరమైన పరామితులు ఉన్నాయా?

  దశ 3: Gotchas కోసం తనిఖీ చేయండి
  - ఈ నిర్దిష్ట ఉపయోగానికి ఏదైనా gotcha వర్తిస్తుందా?
  - యూజర్ ఈ ప్రవర్తనను ఆశిస్తారా?
  - యూజర్‌ను హెచ్చరించాలా లేదా మొదట అడగాలా?

  దశ 4: చర్యను నిర్ణయించండి
  - TOOL: నిర్ధారించండి లేదా మెరుగుపరచండి, gotchas ను అంగీకరించండి
  - SPEAK: నిర్దిష్ట స్పష్టత కోసం అడగండి
  - PONDER: ఎందుకు పునఃపరిశీలించాలో వివరించండి

closing_reminder: |
  ముఖ్యమైనది: ASPDMA పూర్తి డాక్యుమెంటేషన్ లేకుండా చూడలేని సమస్యలను పట్టుకోవడం మీ పాత్ర. సాధనం ఎంపిక బాగా కనిపిస్తే, త్వరగా నిర్ధారించండి.
  డాక్యుమెంటేషన్ నిజమైన ఆందోళనలను వెల్లడిస్తేనే SPEAK లేదా PONDER.

  SPEAK ఎంచుకుంటున్నప్పుడు, నిర్దిష్టంగా ఉండండి: "నాకు యూజర్ సమాధానం అవసరం: [ప్రశ్న]"
  PONDER ఎంచుకుంటున్నప్పుడు, వివరించండి: "ఈ సాధనం X చేయలేదు ఎందుకంటే Y, Z పరిగణించండి"
  TOOL ఎంచుకుంటున్నప్పుడు, అంగీకరించండి: "gotcha X అవగాహనతో కొనసాగుతోంది"
